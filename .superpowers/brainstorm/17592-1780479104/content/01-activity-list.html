<h2>Page 1: 活动列表页 perf-activity.html</h2>
<p class="subtitle">列表 + 搜索筛选 + 发起/编辑弹窗</p>

<div class="mockup">
  <div class="mockup-header">活动列表</div>
  <div class="mockup-body" style="padding:0">
    <div style="padding:16px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;gap:8px;align-items:center">
        <input class="mock-input" placeholder="搜索活动名称" style="width:200px">
        <select style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;color:#666"><option>全部状态</option></select>
        <select style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;color:#666"><option>全部周期</option></select>
      </div>
      <button style="padding:8px 16px;background:#2563EB;color:#fff;border:none;border-radius:6px;font-size:13px">+ 发起活动</button>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="background:#f9fafb;border-bottom:1px solid #eee">
        <th style="padding:10px 12px;text-align:left"><input type="checkbox"></th>
        <th style="padding:10px 12px;text-align:left">活动名称</th>
        <th style="padding:10px 12px;text-align:left">关联方案</th>
        <th style="padding:10px 12px;text-align:left">考核周期</th>
        <th style="padding:10px 12px;text-align:left">参与人数</th>
        <th style="padding:10px 12px;text-align:left">状态</th>
        <th style="padding:10px 12px;text-align:left">发起人</th>
        <th style="padding:10px 12px;text-align:left">发起时间</th>
        <th style="padding:10px 12px;text-align:left">操作</th>
      </tr></thead>
      <tbody>
        <tr style="border-bottom:1px solid #f0f0f0">
          <td style="padding:10px 12px"><input type="checkbox"></td>
          <td style="padding:10px 12px;font-weight:500">2026年Q2绩效考核</td>
          <td style="padding:10px 12px;color:#666">年度绩效方案 v2</td>
          <td style="padding:10px 12px;color:#666">2026/04-06</td>
          <td style="padding:10px 12px;color:#666">128人</td>
          <td style="padding:10px 12px"><span style="background:#ECFDF5;color:#047857;padding:2px 8px;border-radius:4px;font-size:12px">进行中</span></td>
          <td style="padding:10px 12px;color:#666">Kim</td>
          <td style="padding:10px 12px;color:#666">2026/03/15</td>
          <td style="padding:10px 12px"><span style="color:#2563EB;cursor:pointer;margin-right:8px">查看</span><span style="color:#666;cursor:pointer">编辑</span></td>
        </tr>
        <tr style="border-bottom:1px solid #f0f0f0">
          <td style="padding:10px 12px"><input type="checkbox"></td>
          <td style="padding:10px 12px;font-weight:500">2026年Q1绩效考核</td>
          <td style="padding:10px 12px;color:#666">半年度方案 v1</td>
          <td style="padding:10px 12px;color:#666">2026/01-03</td>
          <td style="padding:10px 12px;color:#666">96人</td>
          <td style="padding:10px 12px"><span style="background:#F4F4F5;color:#71717A;padding:2px 8px;border-radius:4px;font-size:12px">已结束</span></td>
          <td style="padding:10px 12px;color:#666">Kim</td>
          <td style="padding:10px 12px;color:#666">2025/12/20</td>
          <td style="padding:10px 12px"><span style="color:#2563EB;cursor:pointer;margin-right:8px">查看</span><span style="color:#666;cursor:pointer">编辑</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="mockup" style="margin-top:16px">
  <div class="mockup-header">发起活动弹窗</div>
  <div class="mockup-body" style="padding:20px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;font-size:13px">
      <div><div style="font-weight:500;margin-bottom:4px">活动名称 <span style="color:red">*</span></div><input class="mock-input" placeholder="请输入活动名称" style="width:100%"></div>
      <div><div style="font-weight:500;margin-bottom:4px">关联方案 <span style="color:red">*</span></div><select style="width:100%;padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px"><option>请选择绩效方案</option></select></div>
      <div><div style="font-weight:500;margin-bottom:4px">考核周期 <span style="color:red">*</span></div><input class="mock-input" type="date" style="width:100%"></div>
      <div><div style="font-weight:500;margin-bottom:4px">发布时间 <span style="color:red">*</span></div><input class="mock-input" type="date" style="width:100%"></div>
      <div style="grid-column:1/3"><div style="font-weight:500;margin-bottom:4px">活动说明</div><textarea class="mock-input" placeholder="选填" style="width:100%;height:50px;resize:none"></textarea></div>
    </div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end;gap:8px">
      <button style="padding:6px 16px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff">取消</button>
      <button style="padding:6px 16px;border:none;border-radius:6px;font-size:13px;background:#2563EB;color:#fff">确认创建</button>
    </div>
  </div>
</div>
