<h2>活动列表页 perf-activity.html（修正版）</h2>
<p class="subtitle">发起活动不含人员选择，创建后在详情页考核人Tab管理</p>

<div class="mockup">
  <div class="mockup-header">发起活动 Modal</div>
  <div class="mockup-body" style="padding:20px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;font-size:13px">
      <div>
        <div style="font-weight:500;margin-bottom:4px;color:#333">活动名称 <span style="color:red">*</span></div>
        <input class="mock-input" placeholder="请输入活动名称" style="width:100%">
      </div>
      <div>
        <div style="font-weight:500;margin-bottom:4px;color:#333">关联方案 <span style="color:red">*</span></div>
        <select style="width:100%;padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;color:#666">
          <option>请选择绩效方案</option>
        </select>
      </div>
      <div>
        <div style="font-weight:500;margin-bottom:4px;color:#333">考核周期 <span style="color:red">*</span></div>
        <input class="mock-input" type="date" style="width:100%">
      </div>
      <div>
        <div style="font-weight:500;margin-bottom:4px;color:#333">发布时间 <span style="color:red">*</span></div>
        <input class="mock-input" type="date" style="width:100%">
      </div>
      <div style="grid-column:1/3">
        <div style="font-weight:500;margin-bottom:4px;color:#333">活动说明</div>
        <textarea class="mock-input" placeholder="选填，活动备注说明" style="width:100%;height:60px;resize:none"></textarea>
      </div>
    </div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end;gap:8px">
      <button style="padding:6px 16px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;cursor:pointer">取消</button>
      <button style="padding:6px 16px;border:none;border-radius:6px;font-size:13px;background:#2563EB;color:#fff;cursor:pointer">确认创建</button>
    </div>
  </div>
</div>

<div style="margin-top:12px;padding:12px 16px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;font-size:13px;color:#92400E">
  ⚠️ 发起后自动跳转到活动详情页 → 考核人 Tab，由管理员按考核组规则匹配或手动添加参与人员
</div>
