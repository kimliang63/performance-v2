<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHR - 人力资源管理系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   GHR v3.0 — Quiet Precision
   暖白底 · 无边框卡片 · 纯色 · 无渐变 · 有节奏
   ═══════════════════════════════════════════════════════ */
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --sb-bg:#FFF;--sb-hover:#F4F4F5;--sb-active-bg:#F0F5FF;--sb-active-l:#2563EB;
  --sb-text:#71717A;--sb-text-hv:#3F3F46;--sb-text-act:#2563EB;
  --sb-icon:#A1A1AA;--sb-icon-act:#2563EB;--sb-group:#A1A1AA;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadow-card-hover:0 8px 20px -4px rgba(0,0,0,.08),0 2px 6px -2px rgba(0,0,0,.04);
  --shadow-dropdown:0 10px 40px -10px rgba(0,0,0,.12),0 2px 10px -2px rgba(0,0,0,.04);
  --shadow-modal:0 25px 60px -12px rgba(0,0,0,.2);
  --header-h:52px;--sidebar-w:240px;
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--f);background:var(--bg);color:var(--c7);
  height:100vh;overflow:hidden;
  -webkit-font-smoothing:antialiased;line-height:1.5;
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

/* ═══ HEADER — 安静的白色 ═══ */
.hdr{
  height:var(--header-h);background:var(--sf);
  border-bottom:1px solid var(--dv);
  display:flex;align-items:center;
  padding:0 24px;gap:16px;
  position:sticky;top:0;z-index:1100;
}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:8px}
.logo-i{
  width:28px;height:28px;border-radius:6px;
  background:var(--pr);display:flex;align-items:center;justify-content:center;
}
.logo-i svg{width:15px;height:15px;color:#FFF}
.logo-t{font-size:15px;font-weight:700;color:var(--c9);letter-spacing:-.3px}

.menu-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;background:var(--sf);
  border:1px solid var(--c2);border-radius:var(--r1);
  font:500 13px/1 var(--f);color:var(--c6);
  cursor:pointer;transition:all .12s;
}
.menu-btn:hover{border-color:var(--c3);color:var(--c8)}
.menu-btn.on{background:var(--pr50);border-color:var(--pr200);color:var(--pr)}
.menu-btn svg{width:13px;height:13px}

.hdr-c{flex:1;display:flex;justify-content:center}
.sch{
  width:320px;display:flex;align-items:center;gap:8px;
  background:var(--c0);border:1px solid transparent;
  border-radius:var(--r1);padding:0 12px;height:34px;
  transition:all .15s;
}
.sch:focus-within{background:var(--sf);border-color:var(--pr)}
.sch svg{color:var(--c4);flex-shrink:0}
.sch input{
  border:none;background:transparent;outline:none;
  font:13px/1 var(--f);width:100%;color:var(--c9);
}
.sch input::placeholder{color:var(--c4)}
.sch-k{
  font:600 10px/1 var(--m);color:var(--c4);
  background:var(--c1);padding:2px 6px;border-radius:3px;
  border:1px solid var(--c2);flex-shrink:0;
}

.hdr-r{display:flex;align-items:center;gap:2px}
.hdr-ic{
  width:32px;height:32px;border-radius:var(--r1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--c5);background:transparent;border:none;
  transition:all .12s;position:relative;
}
.hdr-ic:hover{background:var(--c1);color:var(--c7)}
.hdr-ic .dot{
  position:absolute;top:6px;right:6px;
  width:7px;height:7px;background:var(--ro);border-radius:50%;
  border:1.5px solid var(--sf);
}
.av{
  width:30px;height:30px;border-radius:50%;
  background:var(--pr);display:flex;align-items:center;justify-content:center;
  font:600 12px/1 var(--f);color:#FFF;
  cursor:pointer;margin-left:6px;
}

/* ═══ 弹出菜单 ═══ */
.menu-ov{
  position:fixed;inset:0;top:var(--header-h);
  background:rgba(0,0,0,.3);z-index:1200;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.menu-ov.on{opacity:1;pointer-events:all}
.mega{
  position:absolute;top:var(--header-h);left:0;right:0;bottom:0;
  background:var(--sf);z-index:1300;
  opacity:0;pointer-events:none;transition:all .2s ease;
  transform:translateY(-4px);overflow-y:auto;
}
.mega.on{opacity:1;pointer-events:all;transform:translateY(0)}
.mega-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px 12px;background:var(--c0);border-bottom:1px solid var(--dv);
}
.mega-hd-l{display:flex;align-items:center;gap:12px}
.mega-hd-ic{
  width:30px;height:30px;border-radius:var(--r1);
  background:var(--pr);display:flex;align-items:center;justify-content:center;
}
.mega-hd-ic svg{width:14px;height:14px;color:#FFF}
.mega-hd-t{font:600 14px/1.2 var(--f);color:var(--c9)}
.mega-hd-s{font:400 11px/1 var(--f);color:var(--c5);margin-top:2px}
.mega-grid{display:flex;flex-direction:column;padding:4px 0}
.mega-mod{border-bottom:1px solid var(--dv)}
.mega-mod:last-child{border-bottom:none}
.mega-mod:hover{background:var(--c0)}
.mega-mod-hd{display:flex;align-items:center;gap:10px;padding:12px 28px}
.mega-mod-ic{
  width:26px;height:26px;border-radius:var(--r1);
  background:var(--pr);display:flex;align-items:center;justify-content:center;
}
.mega-mod-ic svg{width:13px;height:13px;color:#FFF}
.mega-mod-info{flex:1}
.mega-mod-n{font:600 13px/1.3 var(--f);color:var(--c8)}
.mega-mod-l{font:500 10px/1 var(--f);color:var(--c4);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.mega-mod-c{font:500 10px/1 var(--f);color:var(--c4);background:var(--c1);padding:2px 7px;border-radius:3px}
.mega-mod-bd{padding:0 28px 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:2px}
.mega-g{
  padding:8px 12px;cursor:pointer;transition:all .12s;
  border-radius:var(--r1);border:1px solid transparent;
}
.mega-g:hover{background:var(--pr50);border-color:var(--pr100)}
.mega-g-hd{display:flex;align-items:center;gap:8px}
.mega-g-ic{
  width:18px;height:18px;border-radius:4px;
  background:var(--pr50);display:flex;align-items:center;justify-content:center;
}
.mega-g-ic svg{width:10px;height:10px;color:var(--pr)}
.mega-g-n{font:500 13px/1 var(--f);color:var(--c7)}
.mega-g-c{
  font:500 10px/1 var(--f);color:var(--c4);
  margin-left:auto;background:var(--c1);padding:2px 6px;border-radius:8px;
}
.mega-g:hover .mega-g-n{color:var(--pr)}
.mega-g:hover .mega-g-c{background:var(--pr100);color:var(--pr)}

/* ═══ 主布局 ═══ */
.main{display:flex;height:calc(100vh - var(--header-h))}

/* ═══ 侧边栏 ═══ */
.sb{
  width:var(--sidebar-w);background:var(--sb-bg);
  display:flex;flex-direction:column;flex-shrink:0;
  box-shadow:1px 0 0 0 var(--c2);
}
.sb-hd{padding:16px 16px 12px;border-bottom:1px solid var(--dv)}
.sb-hd-in{display:flex;align-items:center;gap:10px}
.sb-ic{
  width:30px;height:30px;border-radius:var(--r1);
  background:var(--pr);display:flex;align-items:center;justify-content:center;
}
.sb-ic svg{width:15px;height:15px;color:#FFF}
.sb-n{font:600 14px/1.2 var(--f);color:var(--c9)}
.sb-l{font:500 10px/1 var(--f);color:var(--c4);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.sb-bd{flex:1;overflow-y:auto;padding:6px 8px}
.sb-g{margin-bottom:1px}
.sb-g-hd{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:var(--r1);cursor:pointer;
  transition:all .12s;
  font:600 14px/1 var(--f);color:var(--sb-text);
}
.sb-g-hd:hover{background:var(--sb-hover);color:var(--sb-text-hv)}
.sb-g-hd svg{width:14px;height:14px;color:var(--sb-icon);flex-shrink:0;transition:all .15s}
.sb-g-hd.on svg{color:var(--sb-icon-act);transform:rotate(90deg)}
.sb-g-hd.on{color:var(--sb-text-hv)}
.sb-g-bd{overflow:hidden;max-height:0;transition:max-height .25s ease}
.sb-g-bd.on{max-height:800px}
.sb-i{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px 7px 32px;border-radius:var(--r1);cursor:pointer;
  transition:all .12s;
  font:400 14px/1.4 var(--f);color:var(--sb-text);
  position:relative;
}
.sb-i:hover{background:var(--sb-hover);color:var(--sb-text-hv);font-weight:500}
.sb-i.on{background:var(--sb-active-bg);color:var(--sb-text-act);font-weight:600}
.sb-i.on::before{
  content:'';position:absolute;left:0;top:5px;bottom:5px;
  width:3px;background:var(--sb-active-l);border-radius:0 2px 2px 0;
}
.sb-i svg{width:14px;height:14px;flex-shrink:0;color:var(--sb-icon);opacity:.6}
.sb-i:hover svg{opacity:.9;color:var(--sb-text-hv)}
.sb-i.on svg{color:var(--sb-icon-act);opacity:1}
.sb-ft{padding:10px 16px;border-top:1px solid var(--dv);font:500 10px/1 var(--f);color:var(--c4);text-align:center}

/* ═══ 内容区 ═══ */
.ct{flex:1;overflow-y:auto;padding:24px}

/* ═══ 页面卡片 — 无边框，纯阴影 ═══ */
.pg{
  background:var(--sf);border-radius:var(--r3);
  box-shadow:var(--shadow-card);
  min-height:calc(100vh - var(--header-h) - 48px);
  display:flex;flex-direction:column;overflow:hidden;
}

/* ── 页面头部 — 没有装饰条，没有渐变，没有光晕 ── */
.pg-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-bottom:1px solid var(--dv);
}
.pg-hd-l{display:flex;align-items:center;gap:14px}
.pg-hd-ic{
  width:36px;height:36px;border-radius:var(--r2);
  background:var(--pr);display:flex;align-items:center;justify-content:center;
}
.pg-hd-ic svg{width:18px;height:18px;color:#FFF}
.pg-hd-t{font:700 18px/1.2 var(--f);color:var(--c9);letter-spacing:-.2px}
.pg-hd-s{font:400 12px/1 var(--f);color:var(--c5);margin-top:3px}
.pg-a{display:flex;gap:8px}

/* ── 按钮 — 纯色，无渐变，无阴影 ── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:0 14px;height:32px;border-radius:var(--r1);
  font:500 13px/1 var(--f);cursor:pointer;
  transition:all .12s;border:none;font-family:inherit;
}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}
.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}
.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}

/* ═══ 统计卡片 — 顶部纯色条，无渐变 ═══ */
.st-g{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:12px;padding:20px 24px;border-bottom:1px solid var(--dv);
}
.st{
  background:var(--sf);border-radius:var(--r2);
  padding:14px 16px;transition:all .2s;
  box-shadow:var(--shadow-card);position:relative;overflow:hidden;
}
.st::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.st:nth-child(1)::before{background:var(--pr)}
.st:nth-child(2)::before{background:var(--ac)}
.st:nth-child(3)::before{background:var(--em)}
.st:nth-child(4)::before{background:var(--vi)}
.st:hover{box-shadow:var(--shadow-card-hover);transform:translateY(-2px)}
.st-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.st-ic{
  width:32px;height:32px;border-radius:var(--r1);
  display:flex;align-items:center;justify-content:center;
}
.st-ic svg{width:16px;height:16px;color:#FFF}
.st-ic.b{background:var(--pr)}
.st-ic.y{background:var(--ac)}
.st-ic.g{background:var(--em)}
.st-ic.p{background:var(--vi)}
.st-ch{font:600 10px/1 var(--f);padding:2px 6px;border-radius:3px}
.st-ch.up{color:var(--em700);background:var(--em50)}
.st-ch.dn{color:var(--ro);background:var(--ro50)}
.st-v{font-family:var(--m);font-size:22px;font-weight:700;color:var(--c9);line-height:1;margin-bottom:4px;letter-spacing:-.3px}
.st-l{font:400 13px/1 var(--f);color:var(--c5)}
.st-trend{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--dv)}
.st-trend-bar{flex:1;height:3px;background:var(--c1);border-radius:2px;overflow:hidden}
.st-trend-fill{height:100%;border-radius:2px}
.st-trend-label{font:500 10px/1 var(--f);color:var(--c4);white-space:nowrap}

/* ═══ Tabs ═══ */
.tb{
  display:flex;padding:0 24px;border-bottom:1px solid var(--dv);
  gap:0;background:var(--c0);
}
.t{
  padding:10px 14px;font:500 13px/1 var(--f);color:var(--c5);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all .12s;margin-bottom:-1px;
  display:flex;align-items:center;gap:5px;
}
.t:hover{color:var(--c7)}
.t.on{color:var(--pr);border-bottom-color:var(--pr);font-weight:600}
.t-c{
  font:600 10px/1 var(--f);background:var(--c2);color:var(--c5);
  padding:2px 6px;border-radius:8px;min-width:18px;text-align:center;
}
.t.on .t-c{background:var(--pr50);color:var(--pr)}

/* ═══ 任务列表 — 行之间无间距，靠 hover 背景区分 ═══ */
.tl{flex:1;overflow:auto}
.tk{
  display:flex;align-items:center;gap:12px;
  padding:12px 24px;border-bottom:1px solid var(--dv);
  cursor:pointer;transition:background .1s;
}
.tk:hover{background:var(--c0)}
.tk:last-child{border-bottom:none}
.tk-p{width:3px;height:36px;border-radius:2px;flex-shrink:0}
.tk-p.h{background:var(--ro)}
.tk-p.m{background:var(--ac)}
.tk-p.l{background:var(--c3)}
.tk-ic{
  width:34px;height:34px;border-radius:var(--r1);
  background:var(--c1);display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .12s;
}
.tk:hover .tk-ic{background:var(--pr50)}
.tk:hover .tk-ic svg{color:var(--pr)}
.tk-ic svg{width:15px;height:15px;color:var(--c5);transition:color .12s}
.tk-i{flex:1;min-width:0}
.tk-n{font:500 13px/1.3 var(--f);color:var(--c9);margin-bottom:3px;transition:color .12s}
.tk:hover .tk-n{color:var(--pr)}
.tk-m{font:400 11px/1 var(--f);color:var(--c5)}
.tk-a{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tk-b{font:500 11px/1 var(--f);padding:3px 8px;border-radius:var(--r1)}
.tk-b.p{color:#92400E;background:var(--ac50)}
.tk-b.i{color:var(--pr);background:var(--pr50)}
.tk-b.d{color:var(--em700);background:var(--em50)}
.tk-q{display:flex;gap:2px;opacity:0;transition:all .15s;transform:translateX(6px)}
.tk:hover .tk-q{opacity:1;transform:translateX(0)}
.tk-q button{
  width:28px;height:28px;border-radius:var(--r1);
  display:flex;align-items:center;justify-content:center;
  border:none;background:transparent;color:var(--c4);cursor:pointer;
  transition:all .12s;
}
.tk-q button:hover{background:var(--pr);color:#FFF}
.tk-q button svg{width:13px;height:13px}

/* ═══ 分页 ═══ */
.pg-n{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;border-top:1px solid var(--dv);background:var(--c0);
}
.pg-n-i{font:400 11px/1 var(--f);color:var(--c5)}
.pg-n-b{display:flex;gap:3px}
.pb{
  min-width:28px;height:28px;border-radius:var(--r1);
  display:flex;align-items:center;justify-content:center;
  border:none;background:transparent;font:500 11px/1 var(--f);
  color:var(--c6);cursor:pointer;transition:all .12s;font-family:inherit;
}
.pb:hover{background:var(--c1)}
.pb.on{background:var(--pr);color:#FFF}
.pb:disabled{opacity:.3;cursor:default}

/* ═══ 空状态 ═══ */
.em{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:48px 20px;
}
.em-ic{
  width:56px;height:56px;background:var(--c1);border-radius:var(--r3);
  display:flex;align-items:center;justify-content:center;margin-bottom:12px;
}
.em-ic svg{width:22px;height:22px;color:var(--c4)}
.em-t{font:600 14px/1.3 var(--f);color:var(--c7);margin-bottom:4px}
.em-d{font:400 12px/1.4 var(--f);color:var(--c4)}

/* ═══ 入场动画 — 只用一次 ═══ */
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .2s ease forwards}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <div class="logo">
      <div class="logo-i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <span class="logo-t">GHR</span>
    </div>
    <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>全部菜单</span>
      <svg width="7" height="7" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 6l4 4 4-4"/></svg>
    </button>
  </div>
  <div class="hdr-c">
    <div class="sch">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input placeholder="搜索菜单、员工、流程…" />
      <span class="sch-k">⌘K</span>
    </div>

    h+=`</div></div>`;
  });
  w.innerHTML=h+'</div>';
}
function goGroup(mk,gn){const m=M[mk],g=m.groups.find(g=>g.n===gn);if(g&&g.items.length)go(mk,g.items[0]);else go(mk,gn)}
function go(m,i){cur=m;child=i;closeMenu();enter()}
function enter(){
  const m=M[cur];if(!m)return;
  document.getElementById('sbHd').innerHTML=`<div class="sb-hd-in"><div class="sb-ic">${I[m.ic]}</div><div><div class="sb-n">${m.n}</div><div class="sb-l">${m.l}</div></div></div>`;
  let f=false;m.groups.forEach(g=>{if(g.items.includes(child))f=true});if(!f)child=m.groups[0].items[0];
  const sb=document.getElementById('sbBd');let h='';
  m.groups.forEach(g=>{
    const has=g.items.includes(child);
    h+=`<div class="sb-g"><div class="sb-g-hd${has?' on':''}" onclick="toggleSb(this)">${I[g.ic]}${g.n}</div><div class="sb-g-bd${has?' on':''}">${g.items.map(it=>`<div class="sb-i${it===child?' on':''}" onclick="sel('${it}')">${I[SBI[it]||'file']}${it}</div>`).join('')}</div></div>`;
  });
  sb.innerHTML=h;render();
}
function toggleSb(el){el.classList.toggle('on');el.nextElementSibling.classList.toggle('on')}
function sel(c){child=c;enter()}
function render(){(cur+'|'+child)==='workbench|我的待办'?renderTodo():renderDefault()}
function renderTodo(){
  document.getElementById('ct').innerHTML=`<div class="pg fi">
    <div class="pg-hd"><div class="pg-hd-l"><div class="pg-hd-ic">${I.inbox}</div><div><div class="pg-hd-t">我的待办</div><div class="pg-hd-s">工作台 · Workbench</div></div></div><div class="pg-a"><button class="btn btn-s">${I.download} 导出</button><button class="btn btn-p">${I.plus} 发起流程</button></div></div>
    <div class="st-g"><div class="st"><div class="st-hd"><div class="st-ic b">${I.inbox}</div><span class="st-ch dn">↓12%</span></div><div class="st-v">4</div><div class="st-l">待审批</div><div class="st-trend"><div class="st-trend-bar"><div class="st-trend-fill" style="width:35%;background:var(--pr)"></div></div><span class="st-trend-label">较上周 -12%</span></div></div><div class="st"><div class="st-hd"><div class="st-ic y">${I.clock}</div></div><div class="st-v">2</div><div class="st-l">审批中</div><div class="st-trend"><div class="st-trend-bar"><div class="st-trend-fill" style="width:18%;background:var(--ac)"></div></div><span class="st-trend-label">较上周持平</span></div></div><div class="st"><div class="st-hd"><div class="st-ic g">${I.check}</div><span class="st-ch up">↑18%</span></div><div class="st-v">28</div><div class="st-l">本月已处理</div><div class="st-trend"><div class="st-trend-bar"><div class="st-trend-fill" style="width:72%;background:var(--em)"></div></div><span class="st-trend-label">目标 40 · 完成 72%</span></div></div><div class="st"><div class="st-hd"><div class="st-ic p">${I.chart}</div><span class="st-ch up">↑5%</span></div><div class="st-v">1.2d</div><div class="st-l">平均处理时长</div><div class="st-trend"><div class="st-trend-bar"><div class="st-trend-fill" style="width:88%;background:var(--vi)"></div></div><span class="st-trend-label">优于目标 1.5d</span></div></div></div>
    <div class="tb"><div class="t on">全部<span class="t-c">8</span></div><div class="t">待审批<span class="t-c">4</span></div><div class="t">审批中<span class="t-c">2</span></div><div class="t">已完成<span class="t-c">2</span></div></div>
    <div class="tl">${TASKS.map(tk=>`<div class="tk"><div class="tk-p ${tk.p}"></div><div class="tk-ic">${I.file}</div><div class="tk-i"><div class="tk-n">${tk.t}</div><div class="tk-m">${tk.s} · ${tk.d}</div></div><div class="tk-a"><span class="tk-b ${ST[tk.st].c}">${ST[tk.st].t}</span><div class="tk-q"><button>${I.eye}</button><button>${I.check}</button></div></div></div>`).join('')}</div>
    <div class="pg-n"><div class="pg-n-i">1–8 / 共 24 条</div><div class="pg-n-b"><button class="pb" disabled>‹</button><button class="pb on">1</button><button class="pb">2</button><button class="pb">3</button><button class="pb">›</button></div></div>
  </div>`;
}
function renderDefault(){
  const m=M[cur];
  document.getElementById('ct').innerHTML=`<div class="pg fi">
    <div class="pg-hd"><div class="pg-hd-l"><div class="pg-hd-ic">${I.file}</div><div><div class="pg-hd-t">${child}</div><div class="pg-hd-s">${m.n} · ${m.l}</div></div></div><div class="pg-a"><button class="btn btn-s">${I.download} 导出</button><button class="btn btn-p">${I.plus} 新建</button></div></div>
    <div class="em"><div class="em-ic">${I.file}</div><div class="em-t">${child}</div><div class="em-d">该页面内容待开发</div></div>
  </div>`;
}
enter();
</script>
</body>
</html>
