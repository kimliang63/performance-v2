<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 绩效方案配置</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadow-card-hover:0 8px 20px -4px rgba(0,0,0,.08),0 2px 6px -2px rgba(0,0,0,.04);
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

/* ═══ HEADER ═══ */
.hdr{height:52px;background:var(--sf);border-bottom:1px solid var(--dv);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px}
.logo-i{width:28px;height:28px;border-radius:6px;background:var(--pr);display:flex;align-items:center;justify-content:center}
.logo-i svg{width:15px;height:15px;color:#FFF}
.logo-t{font-size:15px;font-weight:700;color:var(--c9);letter-spacing:-.3px}
.hdr-title{font:600 14px/1 var(--f);color:var(--c9)}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}
.btn-d{background:var(--ro50);color:var(--ro);border:1px solid var(--ro100)}.btn-d:hover{background:var(--ro100)}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn[disabled]{opacity:.4;cursor:not-allowed;pointer-events:none}

/* ═══ LAYOUT ═══ */
.wiz{display:flex;height:calc(100vh - 52px)}

/* ═══ SIDEBAR ═══ */
.wiz-sb{width:220px;background:var(--sf);border-right:1px solid var(--dv);display:flex;flex-direction:column;flex-shrink:0}
.wiz-sb-hd{padding:16px;border-bottom:1px solid var(--dv);display:flex;align-items:center;justify-content:space-between}
.wiz-sb-t{font:600 13px/1 var(--f);color:var(--c9)}
.wiz-sb-icons{display:flex;gap:4px}
.wiz-sb-icons button{width:24px;height:24px;border-radius:var(--r1);border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--c4);transition:all .12s}
.wiz-sb-icons button:hover{background:var(--c1);color:var(--c7)}
.wiz-sb-icons button svg{width:14px;height:14px}
.wiz-sb-bd{flex:1;overflow-y:auto;padding:8px}
.wiz-sb-ft{padding:14px 16px;border-top:1px solid var(--dv)}
.wiz-sb-ft-t{font:500 12px/1 var(--f);color:var(--c6);margin-bottom:8px}
.wiz-sb-ft-bar{height:6px;background:var(--c1);border-radius:3px;overflow:hidden}
.wiz-sb-ft-fill{height:100%;background:var(--pr);border-radius:3px;transition:width .3s}
.wiz-sb-ft-pct{font:600 12px/1 var(--f);color:var(--pr);margin-top:6px;text-align:right}

/* Sidebar items */
.sb-group{margin-bottom:2px}
.sb-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:var(--r1);cursor:pointer;
  transition:all .12s;font:400 13px/1.3 var(--f);color:var(--c6);
}
.sb-item:hover{background:var(--c0);color:var(--c8)}
.sb-item.on{background:var(--pr50);color:var(--pr);font-weight:600}
.sb-item.on::before{
  content:'';position:absolute;left:0;top:5px;bottom:5px;
  width:3px;background:var(--pr);border-radius:0 2px 2px 0;
}
.sb-item{position:relative}
.sb-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-icon svg{width:11px;height:11px}
.sb-icon.done{background:var(--em50);color:var(--em)}
.sb-icon.done svg{color:var(--em)}
.sb-icon.warn{background:var(--ac50);color:var(--ac)}
.sb-icon.warn svg{color:var(--ac)}
.sb-icon.pending{background:var(--c1);color:var(--c4)}
.sb-icon.pending svg{color:var(--c4)}
.sb-icon.active{background:var(--pr50);color:var(--pr)}
.sb-icon.active svg{color:var(--pr)}
.sb-sub{padding-left:28px}
.sb-sub .sb-item{font-size:13px;padding:6px 12px}

/* ═══ CONTENT ═══ */
.wiz-ct{flex:1;overflow-y:auto;padding:24px}

/* ═══ FORM ═══ */
.form-sec{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden}
.form-sec-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--dv);cursor:pointer;transition:background .12s}
.form-sec-hd:hover{background:var(--c0)}
.form-sec-hd-l{display:flex;align-items:center;gap:8px}
.form-sec-t{font:600 14px/1.3 var(--f);color:var(--c9)}
.form-sec-hd svg{width:14px;height:14px;color:var(--c4);transition:transform .2s}
.form-sec.open .form-sec-hd svg{transform:rotate(180deg)}
.form-sec-bd{padding:16px 20px}
.form-sec.open .form-sec-bd{display:block}
.form-sec-bd{display:none}
.form-row{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:16px}
.form-row.tri{grid-template-columns:repeat(3,1fr)}
.form-grp{display:flex;flex-direction:column;gap:5px}
.form-lb{font:500 12px/1 var(--f);color:var(--c6)}
.form-lb .req{color:var(--ro);margin-left:2px}
.form-input{height:34px;padding:0 10px;border:1px solid var(--c2);border-radius:var(--r1);font:400 13px/1 var(--f);color:var(--c9);background:var(--sf);transition:border-color .12s;outline:none}
.form-input:focus{border-color:var(--pr)}
select.form-input{cursor:pointer;padding-right:24px;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23A1A1AA' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center}
textarea.form-input{height:auto;padding:8px 10px;resize:vertical;min-height:60px}
.form-hint{font:400 11px/1 var(--f);color:var(--c4)}

/* ═══ RADIO ═══ */
.radio-group{display:flex;gap:16px}
.radio{display:flex;align-items:center;gap:6px;cursor:pointer;font:400 13px/1 var(--f);color:var(--c7)}
.radio-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--c3);display:flex;align-items:center;justify-content:center;transition:all .12s}
.radio.on .radio-dot{border-color:var(--pr)}
.radio.on .radio-dot::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--pr)}

/* ═══ TABLE ═══ */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font:600 12px/1 var(--f);color:var(--c5);text-align:left;padding:8px 10px;border-bottom:1px solid var(--dv);background:var(--c0);position:sticky;top:0}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--dv);font:400 13px/1.3 var(--f);color:var(--c7)}
.tbl tr:hover td{background:var(--c0)}
.tbl .act{display:flex;gap:4px}
.tbl .act button{width:28px;height:28px;border-radius:var(--r1);border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--c5);transition:all .12s}
.tbl .act button:hover{background:var(--c1);color:var(--c7)}
.tbl .act button.del:hover{background:var(--ro50);color:var(--ro)}
.tbl .act button svg{width:14px;height:14px}

/* ═══ TOGGLE ═══ */
.tog{display:flex;align-items:center;gap:8px;cursor:pointer}
.tog-track{width:36px;height:20px;background:var(--c3);border-radius:10px;position:relative;transition:background .15s}
.tog.on .tog-track{background:var(--pr)}
.tog-knob{width:16px;height:16px;background:#FFF;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tog.on .tog-knob{transform:translateX(16px)}
.tog-lb{font:400 13px/1 var(--f);color:var(--c7)}

/* ═══ STAGE TOGGLES ═══ */
.stage-list{display:flex;flex-direction:column;gap:8px}
.stage-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--dv);border-radius:var(--r1);transition:all .12s}
.stage-item:hover{border-color:var(--c3);background:var(--c0)}
.stage-item.off{opacity:.5}
.stage-name{font:500 13px/1 var(--f);color:var(--c8)}
.stage-desc{font:400 11px/1 var(--f);color:var(--c4);margin-top:2px}
.stage-pending{font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px;background:var(--c1);color:var(--c5)}

/* ═══ RULE BUILDER ═══ */
.rule-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rule-row select,.rule-row input{height:32px;padding:0 8px;border:1px solid var(--c2);border-radius:var(--r1);font:400 12px/1 var(--f);color:var(--c7);background:var(--sf);outline:none}
.rule-row select:focus,.rule-row input:focus{border-color:var(--pr)}

/* ═══ GROUP PANEL ═══ */
.grp-panel{display:flex;gap:16px}
.grp-list{width:200px;flex-shrink:0;display:flex;flex-direction:column;gap:4px}
.grp-item{padding:10px 12px;border:1px solid var(--dv);border-radius:var(--r1);cursor:pointer;transition:all .12s}
.grp-item:hover{border-color:var(--c3);background:var(--c0)}
.grp-item.on{border-color:var(--pr);background:var(--pr50)}
.grp-item-n{font:500 13px/1 var(--f);color:var(--c8)}
.grp-item-s{font:400 11px/1 var(--f);color:var(--c4);margin-top:3px}
.grp-config{flex:1;min-width:0}

/* ═══ STAGE CONFIG ═══ */
.stage-cfg{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden}
.stage-cfg-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--dv);cursor:pointer;transition:background .12s}
.stage-cfg-hd:hover{background:var(--c0)}
.stage-cfg-hd-l{display:flex;align-items:center;gap:10px}
.stage-cfg-hd-t{font:600 14px/1.3 var(--f);color:var(--c9)}
.stage-cfg-hd-s{font:400 12px/1 var(--f);color:var(--c5)}
.stage-cfg-hd svg{width:14px;height:14px;color:var(--c4);transition:transform .2s}
.stage-cfg.open .stage-cfg-hd svg{transform:rotate(180deg)}
.stage-cfg-bd{padding:16px 20px;display:none}
.stage-cfg.open .stage-cfg-bd{display:block}

/* ═══ WEIGHT TABLE ═══ */
.wt-sum{display:flex;align-items:center;gap:8px;margin-top:8px;font:500 12px/1 var(--f);color:var(--c5)}
.wt-sum .ok{color:var(--em)}
.wt-sum .err{color:var(--ro)}

/* ═══ ANIMATION ═══ */
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .2s ease forwards}
</style>
</head>

<div class="wiz">
  <aside class="wiz-sb">
    <div class="wiz-sb-hd">
      <span class="wiz-sb-t">配置目录</span>

        <button title="设置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
        <button title="展开/折叠"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>

      <div class="wiz-sb-ft-bar"><div class="wiz-sb-ft-fill" id="progressFill" style="width:50%"></div></div>
      <div class="wiz-sb-ft-pct" id="progressPct">50%</div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn btn-s" style="flex:1;justify-content:center" onclick="cancelEdit()">取消</button>
        <button class="btn btn-p" style="flex:1;justify-content:center" onclick="saveScheme()">保存</button>
      </div>
    </div>
  </aside>
  <div class="wiz-ct" id="content"></div>
</div>

<!-- 设置弹窗 -->
<div id="settingsModal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.4);backdrop-filter:blur(2px);align-items:center;justify-content:center">
  <div style="background:var(--sf);border-radius:var(--r4);box-shadow:0 20px 60px -10px rgba(0,0,0,.2);width:520px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column">
    <div style="padding:16px 20px;border-bottom:1px solid var(--dv);display:flex;align-items:center;justify-content:space-between">
      <span style="font:600 15px/1 var(--f);color:var(--c9)">考核阶段配置</span>
      <button onclick="closeSettings()" style="width:28px;height:28px;border-radius:var(--r1);border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--c5);transition:all .12s"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div style="padding:16px 20px;overflow-y:auto;flex:1" id="settingsBody"></div>
    <div style="padding:12px 20px;border-top:1px solid var(--dv);display:flex;justify-content:flex-end;gap:8px">
      <button class="btn btn-s" onclick="closeSettings()">取消</button>
      <button class="btn btn-p" onclick="closeSettings()">确定</button>
    </div>
  </div>
</div>

<script>
const I={
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',

  chevDown:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',

  file:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
  users:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  target:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
  settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
};

// ═══ 数据 ═══
const GRADES=[

const TEMPLATES={
  '月度':{label:'月度绩效',stages:['goal','eval','ratify','confirm']},

  '年度':{label:'年度绩效',stages:['interview','ratify','confirm']},

let curTemplate='年度';

function applyTemplate(tplKey){
  const tpl=TEMPLATES[tplKey];
  if(!tpl)return;
  curTemplate=tplKey;
  form.stages.forEach(s=>{
    s.enabled=tpl.stages.includes(s.id);
  });
  renderSettingsModal();
}

function toggleStage(i){
  form.stages[i].enabled=!form.stages[i].enabled;
  renderSettingsModal();
}

function getSelectedRule(){
  return GRADE_RULES.find(r=>r.name===form.gradeRule)||GRADE_RULES[0];
}

function openSettings(){
  const modal=document.getElementById('settingsModal');
  modal.style.display='flex';
  renderSettingsModal();
}

function closeSettings(){
  document.getElementById('settingsModal').style.display='none';
  render(); // 刷新主界面
}

function renderSettingsModal(){
  const body=document.getElementById('settingsBody');
  if(!body)return;
  const tpl=TEMPLATES[curTemplate];
  const tplKeys=Object.keys(TEMPLATES);
  body.innerHTML=`
    <div style="margin-bottom:14px">

function render(){renderSidebar();renderContent();updateProgress()}

// ═══ 导航顺序 ═══
function getNavList(){
  const list=['basic','autoCreate','groups'];
  form.stages.filter(s=>s.enabled).forEach(s=>list.push(s.id));
  return list;
}
function renderNavButtons(){
  const nav=getNavList();
  const idx=nav.indexOf(activeSection);
  const prev=idx>0?nav[idx-1]:null;
  const next=idx<nav.length-1?nav[idx+1]:null;
  return `<div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--dv)">
    <div>${prev?`<button class="btn btn-s" onclick="selSection('${prev}')">上一步</button>`:'<span></span>'}</div>
    <div>${next?`<button class="btn btn-p" onclick="selSection('${next}')">下一步</button>`:'<span></span>'}</div>
  </div>`;
}

function renderSidebar(){
  const sections=[
    {id:'basic',t:'基本信息',icon:'check',type:'done'},
    {id:'autoCreate',t:'自动创建活动',icon:'clock',type:'pending'},
    {id:'groups',t:'考核组',icon:'clock',type:'pending'},
    {id:'stages',t:'考核环节',icon:'settings',type:'parent',children:
      form.stages.filter(s=>s.enabled).map(s=>({id:s.id,t:s.name,icon:s.status==='done'?'check':s.status==='warn'?'warn':'clock',type:s.status}))
    },
  ];
  document.getElementById('sidebar').innerHTML=sections.map(s=>{
    if(s.children){
      return `<div class="sb-group">
        <div class="sb-item ${activeSection===s.id?'on':''}" onclick="selSection('${s.id}')">
          <div class="sb-icon ${s.type==='done'?'done':'pending'}">${I[s.icon]}</div>${s.t}
        </div>
        <div class="sb-sub">${s.children.map(c=>`
          <div class="sb-item ${activeSection===c.id?'on':''}" onclick="selSection('${c.id}')">
            <div class="sb-icon ${c.type}">${I[c.icon]}</div>${c.t}
          </div>`).join('')}
        </div>
      </div>`;
    }
    return `<div class="sb-item ${activeSection===s.id?'on':''}" onclick="selSection('${s.id}')">
      <div class="sb-icon ${s.type}">${I[s.icon]}</div>${s.t}
    </div>`;
  }).join('');
}

function updateProgress(){
  const total=form.stages.filter(s=>s.enabled).length+3;
  const done=form.stages.filter(s=>s.status==='done').length+(form.name?1:0)+(form.autoCreate.enabled?1:0)+(form.groups.length>0?1:0);
  const pct=Math.min(100,Math.round(done/total*100));
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
}

function renderContent(){
  const ct=document.getElementById('content');
  if(activeSection==='basic') renderBasicInfo(ct);
  else if(activeSection==='autoCreate') renderAutoCreate(ct);
  else if(activeSection==='groups') renderGroups(ct);
  else if(activeSection==='stages') renderStagesOverview(ct);
  else renderStageDetail(ct);
}

// ═══ 自动创建活动 ═══
function toggleAutoCreate(){
  form.autoCreate.enabled=!form.autoCreate.enabled;
  const panel=document.getElementById('autoCreatePanel');
  const tog=document.querySelector('#content .tog');
  if(panel){ panel.style.opacity=form.autoCreate.enabled?'1':'0.5'; panel.style.pointerEvents=form.autoCreate.enabled?'auto':'none'; }
  if(tog){ if(form.autoCreate.enabled) tog.classList.add('on'); else tog.classList.remove('on'); }
  updateAutoCreatePreview();
}

function updateAutoCreatePreview(){
  const el=document.getElementById('autoCreatePreview');
  if(!el)return;
  const d=form.autoCreate.timing;
  const nextCycle=new Date('2026-10-01');
  const ms=nextCycle.getTime()+(d.direction==='前'?-1:1)*d.days*86400000;
  const preview=new Date(ms);
  const pad=n=>String(n).padStart(2,'0');
  el.textContent=`📅 预览：下一周期开始于 2026-10-01，活动将于 ${preview.getFullYear()}-${pad(preview.getMonth()+1)}-${pad(preview.getDate())} 自动创建`;
}

      <div class="form-sec-hd" onclick="toggleSec(this)"><div class="form-sec-hd-l"><span class="form-sec-t">自动创建活动</span></div>${I.chevDown}</div>
      <div class="form-sec-bd">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <span style="font:500 13px/1 var(--f);color:var(--c7)">启用自动创建</span>
          <div class="tog ${form.autoCreate.enabled?'on':''}" onclick="toggleAutoCreate()"><div class="tog-track"><div class="tog-knob"></div></div></div>
        </div>
        <div id="autoCreatePanel" style="opacity:${form.autoCreate.enabled?'1':'0.5'};pointer-events:${form.autoCreate.enabled?'auto':'none'};transition:opacity .15s">
          <div class="form-row">
            <div class="form-grp">
              <label class="form-lb">创建时间</label>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font:400 13px/1 var(--f);color:var(--c7)">周期开始</span>
                <select class="form-input" style="width:80px" onchange="form.autoCreate.timing.direction=this.value;updateAutoCreatePreview()">
                  <option ${form.autoCreate.timing.direction==='前'?'selected':''}>前</option>
                  <option ${form.autoCreate.timing.direction==='后'?'selected':''}>后</option>
                </select>
                <input class="form-input" type="number" value="${form.autoCreate.timing.days}" min="1" max="30" style="width:60px" oninput="form.autoCreate.timing.days=parseInt(this.value)||7;updateAutoCreatePreview()">
                <span style="font:400 13px/1 var(--f);color:var(--c7)">天</span>
              </div>
            </div>
          </div>
          <div id="autoCreatePreview" style="margin-top:8px;padding:10px 14px;background:var(--pr50);border:1px solid var(--pr100);border-radius:var(--r1);font:400 12px/1.3 var(--f);color:var(--pr700)">${(()=>{const d=form.autoCreate.timing;const nextCycle=new Date('2026-10-01');const ms=nextCycle.getTime()+(d.direction==='前'?-1:1)*d.days*86400000;const preview=new Date(ms);const pad=n=>String(n).padStart(2,'0');return `📅 预览：下一周期开始于 2026-10-01，活动将于 ${preview.getFullYear()}-${pad(preview.getMonth()+1)}-${pad(preview.getDate())} 自动创建`;})()}</div>
          <div style="margin-top:8px;font:400 11px/1 var(--f);color:var(--c4)">说明：开启后系统将在指定时间自动创建考核活动</div>
        </div>
      </div>
    </div>
    ${renderNavButtons()}
  </div>`;
  updateAutoCreatePreview();
}

// ═══ 自动移除人员规则 ═══
function toggleAutoRemove(gi){
  const grp=form.groups[gi];
  if(!grp.autoRemove) grp.autoRemove={enabled:false,conditions:[]};
  grp.autoRemove.enabled=!grp.autoRemove.enabled;
  const panel=document.getElementById('autoRemovePanel-'+gi);
  if(panel){ panel.style.opacity=grp.autoRemove.enabled?'1':'0.5'; panel.style.pointerEvents=grp.autoRemove.enabled?'auto':'none'; }
  render();
}

function toggleAutoRemoveCond(gi,cond,checked){
  const grp=form.groups[gi];
  if(!grp.autoRemove) grp.autoRemove={enabled:false,conditions:[]};
  if(checked){ if(!grp.autoRemove.conditions.includes(cond)) grp.autoRemove.conditions.push(cond); }
  else grp.autoRemove.conditions=grp.autoRemove.conditions.filter(c=>c!==cond);
}

// ═══ 定时开启规则 ═══
function renderAutoStartPanel(s){
  const a=s.autoStart||{enabled:false,ref:'prevStageEnd',days:0};
  const isGoal=s.id==='goal';
  const previewDate=(()=>{
    const refDate=isGoal?new Date('2026-07-01'):new Date('2026-07-15');
    return new Date(refDate.getTime()+a.days*86400000);
  })();
  const pad=n=>String(n).padStart(2,'0');
  return `
    <div style="font:500 12px/1 var(--f);color:var(--c6);margin-bottom:10px">定时开启规则</div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font:400 12px/1 var(--f);color:var(--c7)">参考点</span>
        <select class="form-input" style="width:${isGoal?'140':'160'}px" onchange="form.stages.find(s=>s.id==='${s.id}').autoStart.ref=this.value;updateAutoStartPreview('${s.id}')">
          ${isGoal?'':'<option value="prevStageEnd" '+(a.ref==='prevStageEnd'?'selected':'')+'>上一环节结束后</option>'}
          <option value="cycleStart" ${a.ref==='cycleStart'?'selected':''}>周期开始后</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font:400 12px/1 var(--f);color:var(--c7)">延迟天数</span>
        <input class="form-input" type="number" value="${a.days}" min="0" max="30" style="width:60px" oninput="form.stages.find(s=>s.id==='${s.id}').autoStart.days=parseInt(this.value)||0;updateAutoStartPreview('${s.id}')">
        <span style="font:400 12px/1 var(--f);color:var(--c5)">天</span>
      </div>
    </div>
    <div id="autoStartPreview-${s.id}" style="margin-top:10px;padding:8px 12px;background:var(--pr50);border:1px solid var(--pr100);border-radius:var(--r1);font:400 12px/1.3 var(--f);color:var(--pr700)">
      ${isGoal
        ? `📅 预览：假设周期于 2026-07-01 开始，本环节将于 ${previewDate.getFullYear()}-${pad(previewDate.getMonth()+1)}-${pad(previewDate.getDate())} 自动开启`
        : `📅 预览：假设上一环节于 2026-07-15 结束，本环节将于 ${previewDate.getFullYear()}-${pad(previewDate.getMonth()+1)}-${pad(previewDate.getDate())} 自动开启`}
    </div>`;
}

function updateAutoStartPreview(stageId){
  const el=document.getElementById('autoStartPreview-'+stageId);
  if(!el)return;
  const s=form.stages.find(s=>s.id===stageId);
  if(!s||!s.autoStart)return;
  const a=s.autoStart;
  const isGoal=s.id==='goal';
  const refDate=isGoal||a.ref==='cycleStart'?new Date('2026-07-01'):new Date('2026-07-15');
  const previewDate=new Date(refDate.getTime()+a.days*86400000);
  const pad=n=>String(n).padStart(2,'0');
  const refLabel=a.ref==='cycleStart'?'周期开始':'上一环节结束';
  const refDateStr=isGoal||a.ref==='cycleStart'?'2026-07-01':'2026-07-15';
  el.textContent=`📅 预览：假设${refLabel}于 ${refDateStr}，本环节将于 ${previewDate.getFullYear()}-${pad(previewDate.getMonth()+1)}-${pad(previewDate.getDate())} 自动开启`;
}

function toggleAutoStart(stageId,value){
  const panel=document.getElementById('autoStart-'+stageId);
  const stage=form.stages.find(s=>s.id===stageId);
  if(stage&&stage.autoStart) stage.autoStart.enabled=(value==='自动');
  if(panel) panel.style.display=(value==='自动')?'block':'none';
}

// ═══ 导航 ═══
function selSection(id){activeSection=id;render()}
function toggleSec(el){el.closest('.form-sec').classList.toggle('open')}
function submit(){if(!form.name){alert('请填写方案名称');activeSection='basic';render();return}alert('方案已提交：'+form.name)}

function cancelEdit(){
  if(confirm('确定要取消编辑吗？未保存的更改将丢失。')){
    window.location.href='perf-scheme-list.html';
  }
}

function saveScheme(){
  if(!form.name){alert('请填写方案名称');activeSection='basic';render();return}
  alert('方案「'+form.name+'」保存成功');
  window.location.href='perf-scheme-list.html';
}

// Initialize navigation first to create the content container
GHR_NAV.init('perf', '绩效方案');
render();
</script>
</body>
</html>
