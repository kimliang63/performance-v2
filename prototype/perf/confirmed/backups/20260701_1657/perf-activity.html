<html lang="zh-CN">
<head>

<title>HR ONE - 活动管理</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   GHR 活动管理列表 — Quiet Precision
   ═══════════════════════════════════════════════════════ */
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadow-card-hover:0 8px 20px -4px rgba(0,0,0,.08),0 2px 6px -2px rgba(0,0,0,.04);
  --shadow-dropdown:0 10px 40px -10px rgba(0,0,0,.12),0 2px 10px -2px rgba(0,0,0,.04);
  --header-h:52px;
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--f);background:var(--bg);color:var(--c7);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;line-height:1.5;
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

/* ═══ BUTTONS ═══ */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:0 14px;height:32px;border-radius:var(--r1);
  font:500 13px/1 var(--f);cursor:pointer;
  transition:all .12s;border:none;font-family:inherit;
}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}
.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}
.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}
.btn-t{background:transparent;color:var(--c6);border:none;padding:0 8px;height:28px;font-size:12px}
.btn-t:hover{color:var(--pr);background:var(--pr50)}

/* ═══ FILTER BAR ═══ */
.fl-bar{
  background:var(--sf);border-radius:var(--r3);
  box-shadow:var(--shadow-card);
  padding:16px 20px;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.fl-search{
  display:flex;align-items:center;gap:6px;
  background:var(--c0);border:1px solid var(--c2);
  border-radius:var(--r1);padding:0 10px;height:32px;
  min-width:240px;transition:all .15s;
}
.fl-search:focus-within{background:var(--sf);border-color:var(--pr)}
.fl-search svg{color:var(--c4);flex-shrink:0;width:13px;height:13px}
.fl-search input{
  border:none;background:transparent;outline:none;
  font:13px/1 var(--f);width:100%;color:var(--c9);
}
.fl-search input::placeholder{color:var(--c4)}
.fl-sel{
  height:32px;padding:0 28px 0 10px;border:1px solid var(--c2);
  border-radius:var(--r1);font:400 13px/1 var(--f);color:var(--c7);
  background:var(--sf) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23A1A1AA' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center;
  appearance:none;cursor:pointer;transition:all .12s;outline:none;
  -webkit-appearance:none;-moz-appearance:none;
}
.fl-sel:focus{border-color:var(--pr)}
.fl-actions{display:flex;gap:6px;margin-left:auto}

/* ═══ TABLE CARD ═══ */
.tbl-card{
  background:var(--sf);border-radius:var(--r3);
  box-shadow:var(--shadow-card);overflow:hidden;
}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
thead{position:sticky;top:0;z-index:2}
thead th{
  background:var(--c0);font:600 12px/1 var(--f);color:var(--c5);
  text-align:left;padding:10px 14px;border-bottom:1px solid var(--dv);
  white-space:nowrap;letter-spacing:.2px;
  text-transform:uppercase;
}
thead th.col-ck{width:36px;text-align:center}
tbody td{
  font:400 13px/1.4 var(--f);color:var(--c7);
  padding:12px 14px;border-bottom:1px solid var(--dv);
  vertical-align:middle;
}
tbody td.col-ck{text-align:center}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--c0)}
tbody tr:nth-child(even){background:var(--c0)}
tbody tr:nth-child(even):hover{background:var(--pr50)}
tbody tr:last-child td{border-bottom:none}

/* ═══ TABLE CELL STYLES ═══ */
.cell-name{font-weight:500;color:var(--c9);min-width:180px}
.cell-link{color:var(--pr);text-decoration:none;font-weight:500}
.cell-link:hover{text-decoration:underline}
.cell-status{
  display:inline-flex;align-items:center;gap:4px;
  font:500 11px/1 var(--f);padding:3px 10px;border-radius:var(--r1);
  white-space:nowrap;
}
.cell-status.not-started{color:var(--ac700);background:var(--ac50)}
.cell-status.active{color:var(--em700);background:var(--em50)}
.cell-status.ended{color:var(--c5);background:var(--c1)}
.cell-status.archived{color:var(--vi);background:var(--vi50)}
.cell-count{font-family:var(--m);font-weight:600;color:var(--c8)}
.cell-creator{font:400 12px/1 var(--f);color:var(--c6)}
.cell-date{font:400 12px/1 var(--f);color:var(--c5);font-family:var(--m);font-size:11px}
.cell-actions{display:flex;align-items:center;gap:2px;white-space:nowrap}
.cell-plan{font:400 12px/1 var(--f);color:var(--c6)}
.cell-cycle{font:400 12px/1 var(--f);color:var(--c5);font-family:var(--m);font-size:11px}

/* ═══ CHECKBOX ═══ */
.ck{
  width:16px;height:16px;border-radius:3px;border:1.5px solid var(--c3);
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  transition:all .12s;background:var(--sf);flex-shrink:0;
}
.ck.on{background:var(--pr);border-color:var(--pr)}
.ck svg{width:10px;height:10px;color:#FFF;display:none}
.ck.on svg{display:block}

/* ═══ PAGINATION ═══ */
.pg-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-top:1px solid var(--dv);
  font:400 12px/1 var(--f);color:var(--c5);
}
.pg-info{display:flex;align-items:center;gap:16px}
.pg-nav{display:flex;align-items:center;gap:4px}
.pg-btn{
  width:28px;height:28px;border-radius:var(--r1);
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--c2);background:var(--sf);cursor:pointer;
  color:var(--c5);font:500 12px/1 var(--f);transition:all .12s;
}
.pg-btn:hover{border-color:var(--pr);color:var(--pr)}
.pg-btn.on{background:var(--pr);border-color:var(--pr);color:#FFF}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-btn svg{width:12px;height:12px}

/* ═══ MODAL ═══ */
.modal-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.35);
  z-index:2000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-ov.on{opacity:1;pointer-events:all}
.modal{
  background:var(--sf);border-radius:var(--r4);
  box-shadow:0 20px 60px -15px rgba(0,0,0,.2);
  width:520px;max-width:90vw;
  transform:translateY(8px) scale(.98);transition:transform .2s ease;
}
.modal-ov.on .modal{transform:translateY(0) scale(1)}
.modal-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px 14px;border-bottom:1px solid var(--dv);
}
.modal-hd-t{font:600 15px/1.2 var(--f);color:var(--c9)}
.modal-close{
  width:28px;height:28px;border-radius:var(--r1);border:none;
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--c4);transition:all .12s;
}
.modal-close:hover{background:var(--c1);color:var(--c7)}
.modal-close svg{width:16px;height:16px}
.modal-bd{padding:18px 22px}
.modal-ft{
  display:flex;justify-content:flex-end;gap:8px;
  padding:14px 22px 18px;border-top:1px solid var(--dv);
}
.modal-label{font:500 13px/1 var(--f);color:var(--c7);margin-bottom:8px}
.modal-label .req{color:var(--ro);margin-left:2px}
.modal-input{
  width:100%;height:36px;padding:0 12px;border:1px solid var(--c2);
  border-radius:var(--r1);font:400 13px/1 var(--f);color:var(--c9);
  outline:none;transition:border-color .12s;
}
.modal-input:focus{border-color:var(--pr)}
.modal-input.err{border-color:var(--ro)}
.modal-textarea{
  width:100%;min-height:80px;padding:8px 12px;border:1px solid var(--c2);
  border-radius:var(--r1);font:400 13px/1.5 var(--f);color:var(--c9);
  outline:none;transition:border-color .12s;resize:vertical;
}
.modal-textarea:focus{border-color:var(--pr)}
.form-row{margin-bottom:16px}
.form-row:last-child{margin-bottom:0}
.form-err{font:400 11px/1 var(--f);color:var(--ro);margin-top:4px;display:none}
.form-err.show{display:block}

/* ═══ ANIMATION ═══ */
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .25s ease forwards}

/* ═══ CONFIRM DIALOG ═══ */
.cfm-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2100;display:flex;align-items:center;justify-content:center;animation:fi .15s ease}
.cfm-box{background:var(--sf);border-radius:var(--r4);box-shadow:0 20px 60px rgba(0,0,0,.25);width:380px;padding:24px}
.cfm-title{font:600 15px/1.3 var(--f);color:var(--c9);margin-bottom:8px}
.cfm-msg{font:400 13px/1.5 var(--f);color:var(--c6);margin-bottom:20px}
.cfm-btns{display:flex;justify-content:flex-end;gap:8px}
.btn-danger{background:var(--ro);color:#FFF}.btn-danger:hover{background:#E11D48}

/* ═══ BATCH BAR ═══ */
.batch-info{display:flex;align-items:center;gap:8px;font:400 12px/1 var(--f);color:var(--c5);padding:0 20px 12px}
.batch-info .cnt{font-family:var(--m);font-weight:600;color:var(--pr)}
.batch-actions{display:flex;gap:8px;padding:0 20px 16px}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .fl-bar{flex-direction:column;align-items:stretch}
  .fl-search{min-width:auto}
  .fl-actions{margin-left:0}
}

/* ═══ INFO CARD ═══ */
.info-card{
  background:var(--sf);border:1px solid var(--c3);border-radius:var(--r3);
  box-shadow:var(--shadow-card);padding:20px;margin-bottom:16px;
}
.info-card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.info-item-label{font:500 12px/1 var(--f);color:var(--c5);margin-bottom:4px}
.info-item-value{font:400 13px/1.4 var(--f);color:var(--c9)}

/* ═══ STAGE PROGRESS ═══ */
.stage-bar-wrap{
  display:flex;align-items:center;gap:10px;padding:12px 0;flex-wrap:wrap;
}
.stage-stat{
  position:relative;display:flex;align-items:center;gap:8px;
  padding:8px 14px;border-radius:var(--r2);border:1px solid var(--c2);
  background:var(--sf);cursor:pointer;transition:all .15s;flex:1;min-width:160px;
}
.stage-stat:hover{border-color:var(--pr200);box-shadow:var(--shadow-card-hover);transform:translateY(-1px)}
.stage-stat-num{font:700 18px/1 var(--m);color:var(--c9)}
.stage-stat-label{font:400 12px/1 var(--f);color:var(--c6)}
.stage-stat-bar{height:4px;border-radius:2px;background:var(--c2);flex:1;min-width:40px;overflow:hidden}
.stage-stat-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.stage-tooltip{
  display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:var(--c9);color:#FFF;border-radius:var(--r2);padding:12px 16px;
  min-width:220px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.2);
  font:400 12px/1.6 var(--f);white-space:nowrap;
}
.stage-tooltip::before{
  content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%) rotate(45deg);
  width:12px;height:12px;background:var(--c9);
}
.stage-stat:hover .stage-tooltip{display:block}
.stage-tooltip-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.stage-tooltip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ═══ OPLOG FILTER ═══ */
.oplog-type-group{margin-bottom:2px}
.oplog-type-group-label{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px;font:500 13px/1 var(--f);color:var(--c8);cursor:pointer;
  transition:background .1s;user-select:none;
}
.oplog-type-group-label:hover{background:var(--c1)}
.oplog-type-group-label .arrow{
  width:14px;height:14px;color:var(--c4);transition:transform .15s;flex-shrink:0;
}
.oplog-type-group-label .arrow.open{transform:rotate(90deg)}
.oplog-type-item{
  padding:6px 12px 6px 32px;font:400 13px/1 var(--f);color:var(--c7);
  cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px;
}
.oplog-type-item:hover{background:var(--c1)}
.oplog-type-item.active{color:var(--pr);background:var(--pr50);font-weight:500}
.oplog-type-item .dot{width:5px;height:5px;border-radius:50%;background:var(--c3);flex-shrink:0}
.oplog-type-item.active .dot{background:var(--pr)}
.oplog-tree-sep{height:1px;background:var(--dv);margin:4px 8px}
</style>
</head>

    if(filter.search && !a.name.toLowerCase().includes(filter.search.toLowerCase())) return false;
    if(filter.status && a.status!==filter.status) return false;
    return true;
  });
}

function renderEmployeeList(){
  const a=ACTIVITIES.find(x=>x.id===currentDetailId);
  if(!a) return '';
  const st=STATUS_MAP[a.status];
  const canOperate=a.status==='active';
  const exceptionCount=EMPLOYEE_LIST.filter(r=>r.exception!=='-').length;

  // 环节进度统计
  const stageNames=['目标制定','绩效考核','结果审定','结果确认','绩效面谈'];
  const stageColors=['var(--pr)','var(--vi)','var(--ac)','var(--em)','var(--ro)'];
  const stageStats=stageNames.map((name,idx)=>{
    const total=EMPLOYEE_LIST.length;
    const done=EMPLOYEE_LIST.filter(e=>e.node>idx+1||(e.node===idx+1&&e.status==='已完成')).length;
    const active=EMPLOYEE_LIST.filter(e=>e.node===idx+1&&e.status!=='已完成').length;
    const pending=total-done-active;
    const exception=EMPLOYEE_LIST.filter(e=>e.node===idx+1&&e.exception!=='-').length;
    return {name,total,done,active,pending,exception,pct:Math.round(done/total*100),color:stageColors[idx]};
  });
  // 取最早进行中的节点作为当前环节
  const activeNodes=EMPLOYEE_LIST.filter(e=>e.status!=='已完成'&&e.status!=='未开始').map(e=>e.node);
  const currentNodeIdx=activeNodes.length?Math.min(...activeNodes):1;
  const currentNodeName=EMPLOYEE_LIST.find(e=>e.node===currentNodeIdx)?.nodeName||'目标制定';

  return `<div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font:400 13px/1 var(--f);color:var(--c6)">
      <a href="javascript:void(0)" onclick="backToList()" style="color:var(--pr);text-decoration:none;cursor:pointer">← 返回</a>
      <span style="color:var(--c4)">|</span><span>活动管理</span><span style="color:var(--c4)">/</span><span>${a.name}</span>
    </div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font:700 20px/1.3 var(--f);color:var(--c9);display:flex;align-items:center;gap:10px">${a.name}<span class="cell-status ${st.cls}">${st.label}</span></div>
        <div style="font:400 13px/1 var(--f);color:var(--c6);margin-top:6px">考核周期：${a.cycle}<span style="margin:0 8px;color:var(--c4)">|</span>考核关系：${a.dynamicAssessment==='dynamic'?'动态':'锁定'}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-s" onclick="viewSchemeDetail()">活动详情</button>
        <button class="btn btn-s" onclick="viewOpLog()">操作记录</button>
        ${a.status==='ended'?`<button class="btn btn-p" onclick="showArchiveDlg()" style="gap:5px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>归档</button>`:''}
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--dv);margin-bottom:16px">
      <span style="font:400 13px/1 var(--f);color:var(--c6)">当前节点</span>
      <select style="height:32px;padding:0 28px 0 10px;border:1px solid var(--c3);border-radius:var(--r1);font:400 13px/1 var(--f);color:var(--c7);background:var(--sf);appearance:none;cursor:pointer"><option>全部</option><option>目标制定</option><option>绩效考核</option><option>结果审定</option><option>结果确认</option><option>绩效面谈</option></select>
      <span style="font:400 13px/1 var(--f);color:var(--c6)">异常状态</span>
      <select style="height:32px;padding:0 28px 0 10px;border:1px solid var(--c3);border-radius:var(--r1);font:400 13px/1 var(--f);color:var(--c7);background:var(--sf);appearance:none;cursor:pointer"><option>全部</option><option>超时</option><option>逾期</option><option>缺少操作</option><option>不确认</option></select>
      <span style="font:400 13px/1 var(--f);color:var(--c6)">考核组</span>
      <select style="height:32px;padding:0 28px 0 10px;border:1px solid var(--c3);border-radius:var(--r1);font:400 13px/1 var(--f);color:var(--c7);background:var(--sf);appearance:none;cursor:pointer"><option>全部</option><option>管理层组</option><option>员工组</option><option>默认组</option></select>

  const emp=EMPLOYEE_LIST[currentEmployeeIdx];

  if(!emp||!d) return '';

  const statusStyle={'进行中':'color:var(--pr);background:var(--pr50)','已提交':'color:var(--em700);background:var(--em50)','未开始':'color:var(--c5);background:var(--c2)'};

function renderApp(){
  const ct=document.getElementById('ct') || document.getElementById('app');
  if(!ct) return;
  if(currentView==='employees'){
    ct.innerHTML=renderEmployeeList();
    return;
  }
  if(currentView==='employeeDetail'){
    ct.innerHTML=renderEmployeeDetail();
    return;
  }
  if(currentView==='scheme'){
    ct.innerHTML=renderSchemeDetailPage();
    return;
  }
  if(currentView==='oplog'){
    ct.innerHTML=renderOpLogPage();
    return;
  }
  const data=getFiltered();

  ct.innerHTML=`
    <div class="fi">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div>
          <h1 style="font:700 20px/1.2 var(--f);color:var(--c9);margin-bottom:4px">活动管理</h1>
          <p style="font:400 13px/1 var(--f);color:var(--c5)">管理绩效考核活动的发起与执行</p>

}

function renderFilterBar(){
  return `<div class="fl-bar">
    <div class="fl-search">

      <input id="flSearch" placeholder="搜索活动名称…" value="${filter.search}" oninput="onSearchInput(this.value)" />
    </div>
    <select class="fl-sel" id="flStatus" onchange="onStatusChange(this.value)">

      <option value="not_started"${filter.status==='not_started'?' selected':''}>未开始</option>

function renderTable(data){
  const allChecked=data.length>0 && data.every(a=>selectedIds.has(a.id));

  const rows=data.map(a=>{
    const st=STATUS_MAP[a.status];
    const checked=selectedIds.has(a.id);
    const dynamicLabel=a.dynamicAssessment==='dynamic'?'动态':'锁定';
    const dynamicCls=a.dynamicAssessment==='dynamic'?'color:var(--pr);background:var(--pr50)':'color:var(--c6);background:var(--c1)';
    return `<tr>
      <td class="col-ck">
        <div class="ck${checked?' on':''}" onclick="toggleSelect(${a.id})">${I.check}</div>
      </td>
      <td class="cell-name"><a class="cell-link" href="javascript:void(0)" onclick="viewActivity(${a.id})">${a.name}</a></td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font:400 12px/1 var(--f);color:var(--c5)" title="${a.description||''}">${a.description||'—'}</td>
      <td class="cell-cycle">${a.cycle}</td>
      <td><span style="display:inline-flex;font:500 11px/1 var(--f);padding:3px 8px;border-radius:4px;${dynamicCls}">${dynamicLabel}</span></td>
      <td class="cell-plan">${a.plan}</td>
      <td class="cell-count">${a.empCount}</td>
      <td><span class="cell-status ${st.cls}">${st.label}</span></td>
      <td class="cell-creator">${a.updater}</td>
      <td class="cell-date">${a.updateTime}</td>
      <td>
        <div class="cell-actions">
          <button class="btn btn-t" onclick="viewActivity(${a.id})" title="查看">查看</button>
          ${a.status==='not_started'?`<button class="btn btn-t" onclick="editActivity(${a.id})" title="编辑">编辑</button><button class="btn btn-t" onclick="enableActivity(${a.id})" title="启用" style="color:var(--em700)">启用</button>`:''}
          ${a.status==='ended'?`<button class="btn btn-t" onclick="archiveActivity(${a.id})" title="归档" style="color:var(--vi)">归档</button><button class="btn btn-t" onclick="deleteActivity(${a.id})" title="删除" style="color:var(--ro)">删除</button>`:''}
        </div>
      </td>

            <th>关联方案</th>

            <th>状态</th>
            <th>更新人</th>
            <th>最近更新时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>${rows.length?rows:`<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--c4);font-size:13px">暂无匹配的考核活动</td></tr>`}</tbody>
      </table>

function renderBatchBar(){
  const ids=[...selectedIds];
  return `<div class="batch-bar" style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;padding:12px 20px">
    <div class="batch-info">已选 <span class="cnt">${ids.length}</span> 项</div>
    <div class="batch-actions">
      <button class="btn btn-s" style="color:var(--ro)" onclick="batchDelete()">批量删除</button>
      <button class="btn btn-s" onclick="selectedIds.clear();renderApp()">取消选择</button>
    </div>
  </div>`;
}
function batchDelete(){
  const ids=[...selectedIds];
  showConfirm('批量删除',`确定要删除 ${ids.length} 个活动吗？此操作不可撤销。`,()=>{
    ACTIVITIES=ACTIVITIES.filter(a=>!selectedIds.has(a.id));
    selectedIds.clear();renderApp();GHR_NAV.showToast(`已删除 ${ids.length} 个活动`);
  });
}
function deleteActivity(id){
  const a=ACTIVITIES.find(x=>x.id===id);
  if(!a)return;
  showConfirm('删除活动',`确定要删除「${a.name}」吗？此操作不可撤销。`,()=>{
    ACTIVITIES=ACTIVITIES.filter(x=>x.id!==id);selectedIds.delete(id);renderApp();GHR_NAV.showToast('已删除');
  });
}
function enableActivity(id){
  const a=ACTIVITIES.find(x=>x.id===id);
  if(!a)return;
  showConfirm('启用活动',`确定要启用「${a.name}」吗？启用后将进入进行中状态。`,()=>{
    a.status='active';a.updater='当前用户';a.updateTime=formatTime(new Date());
    renderApp();GHR_NAV.showToast('已启用');
  });
}
function archiveActivity(id){
  const a=ACTIVITIES.find(x=>x.id===id);
  if(!a)return;
  showConfirm('归档活动',`确定要归档「${a.name}」吗？归档后数据将锁定，不可编辑、删除。`,()=>{
    a.status='archived';a.updater='当前用户';a.updateTime=formatTime(new Date());
    renderApp();GHR_NAV.showToast('已归档');
  });
}

// ═══ 交互处理 ═══
function onSearchInput(val){
  filter.search=val.trim();
  renderApp();
  const el=document.getElementById('flSearch');
  if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}
}

function onStatusChange(val){
  filter.status=val;
  renderApp();
}

function resetFilters(){
  filter={search:'',status:''};
  renderApp();
}

function toggleSelect(id){
  if(selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderApp();
}

function toggleSelectAll(){
  const data=getFiltered();
  const allChecked=data.length>0 && data.every(a=>selectedIds.has(a.id));
  if(allChecked){
    data.forEach(a=>selectedIds.delete(a.id));
  }else{
    data.forEach(a=>selectedIds.add(a.id));
  }
  renderApp();
}

function openCreateModal(){
  modalState={type:'create',data:{}};
  renderApp();
  setTimeout(()=>{
    const el=document.getElementById('fName');
    if(el) el.focus();
  },50);
}

function editActivity(id){
  const a=ACTIVITIES.find(x=>x.id===id);
  if(!a) return;
  const cycleLabel=a.cycle.split('（')[0]||'';
  modalState={type:'edit',data:{...a,cycleLabel}};
  renderApp();
  setTimeout(()=>{
    const el=document.getElementById('fName');
    if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}
  },50);
}

  }

  const typeMenu=`

      ${g('act','活动管理',['创建活动','编辑活动','启用活动','暂停活动','继续活动','归档'])}

      ${g('stage','环节管理',['开启环节','结束环节','暂停环节','继续环节','终止环节'])}
      <div class="oplog-tree-sep"></div>
      ${g('person','人员操作',['催办','转交','暂停人员','继续人员','终止人员'])}
      <div class="oplog-tree-sep"></div>
      ${g('batch','批量操作',['批量催办','批量转交','批量暂停','批量继续','批量终止'])}
      <div class="oplog-tree-sep"></div>
      ${g('data','数据操作',['导入数据','导出数据'])}
      <div class="oplog-tree-sep"></div>
      ${g('mgmt','人员管理',['添加人员','移除人员','按规则更新'])}
      <div class="oplog-tree-sep"></div>
      ${g('flow','流程处理',['驳回','审批通过'])}

      <span style="color:var(--c4)">|</span><span>活动详情</span><span style="color:var(--c4)">/</span><span>操作记录</span>
    </div>

    <!-- 筛选栏 -->
    <div class="fl-bar" style="margin-bottom:16px">
      <div style="position:relative;display:inline-flex">
        <button class="btn btn-s" onclick="toggleEmpDropdown('oplogTypeDd')" style="gap:6px;min-width:140px;justify-content:space-between">
          <span>${oplogFilter.type||'全部类型'}</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        ${typeMenu}
      </div>
      <div class="fl-search" style="min-width:280px">
        ${I.search}
        <input id="oplogSearch" placeholder="搜索操作人姓名、工号、操作对象…" value="${oplogFilter.search}" oninput="oplogFilter.search=this.value;renderApp()" />
      </div>
      <div class="fl-actions">
        <button class="btn btn-s" onclick="oplogFilter={type:'',search:''};renderApp()">${I.x} 重置</button>
      </div>
    </div>

    <div style="background:var(--sf);border:1px solid var(--c3);border-radius:var(--r2);box-shadow:var(--shadow-card);overflow:hidden">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr>
          <th style="font:600 12px/1 var(--f);color:var(--c5);text-align:left;padding:10px 14px;border-bottom:1px solid var(--dv);background:var(--c0);white-space:nowrap;letter-spacing:.2px;text-transform:uppercase">时间</th>
          <th style="font:600 12px/1 var(--f);color:var(--c5);text-align:left;padding:10px 14px;border-bottom:1px solid var(--dv);background:var(--c0);white-space:nowrap;letter-spacing:.2px;text-transform:uppercase">操作人</th>
          <th style="font:600 12px/1 var(--f);color:var(--c5);text-align:left;padding:10px 14px;border-bottom:1px solid var(--dv);background:var(--c0);white-space:nowrap;letter-spacing:.2px;text-transform:uppercase">操作类型</th>
          <th style="font:600 12px/1 var(--f);color:var(--c5);text-align:left;padding:10px 14px;border-bottom:1px solid var(--dv);background:var(--c0);white-space:nowrap;letter-spacing:.2px;text-transform:uppercase">操作对象</th>
          <th style="font:600 12px/1 var(--f);color:var(--c5);text-align:left;padding:10px 14px;border-bottom:1px solid var(--dv);background:var(--c0);white-space:nowrap;letter-spacing:.2px;text-transform:uppercase">详情</th>
        </tr></thead>
        <tbody>
          ${filtered.length?filtered.map(l=>`<tr>
            <td style="padding:12px 14px;border-bottom:1px solid #F1F5F9;font:400 12px/1 var(--f);color:var(--c6);font-family:'SF Mono','JetBrains Mono',monospace;white-space:nowrap">${l.time}</td>
            <td style="padding:12px 14px;border-bottom:1px solid #F1F5F9"><span style="font:500 13px/1 var(--f);color:var(--c9)">${l.operator}</span><span style="font:400 11px/1 var(--f);color:var(--c5);margin-left:6px;font-family:var(--m)">${l.operatorId}</span></td>
            <td style="padding:12px 14px;border-bottom:1px solid #F1F5F9"><span style="font:500 12px/1 var(--f);padding:2px 10px;border-radius:4px;${typeCls[l.type]||''}">${l.type}</span></td>
            <td style="padding:12px 14px;border-bottom:1px solid #F1F5F9;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.target}">${l.target}</td>
            <td style="padding:12px 14px;border-bottom:1px solid #F1F5F9;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.detail}">${l.detail}</td>
          </tr>`).join(''):`<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--c4);font-size:13px">暂无匹配的操作记录</td></tr>`}
        </tbody>
      </table>
    </div>
    <div style="padding:12px 0;font:400 13px/1 var(--f);color:var(--c6)">共 ${filtered.length} 条操作记录${oplogFilter.type||oplogFilter.search?`（已筛选，共 ${OP_LOGS.length} 条）`:''}</div>
  </div>`;
}

function viewEmployeeDetail(idx){
  currentEmployeeIdx=idx;
  currentView='employeeDetail';
  renderApp();
}

function toggleEmpDropdown(id){
  const dd=document.getElementById(id);
  if(!dd) return;
  const wasOpen=dd.style.display==='block';
  document.querySelectorAll('[id$="Dd"],[id^="empOp"]').forEach(el=>{if(el.tagName==='DIV')el.style.display='none';});
  if(!wasOpen) dd.style.display='block';
}
document.addEventListener('click',function(e){
  if(!e.target.closest('[onclick*="toggleEmpDropdown"]')&&!e.target.closest('[id$="Dd"]')&&!e.target.closest('[id^="empOp"]')){
    document.querySelectorAll('[id$="Dd"],[id^="empOp"]').forEach(el=>{if(el.tagName==='DIV')el.style.display='none';});
  }
});

function showTransferDlg(){
  const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2100;display:flex;align-items:center;justify-content:center';
  ov.innerHTML=`<div style="background:var(--sf);border-radius:var(--r3);box-shadow:0 20px 60px rgba(0,0,0,.2);width:400px;padding:24px">
    <div style="font:600 15px/1.3 var(--f);color:var(--c9);margin-bottom:16px">转交流程</div>
    <div style="margin-bottom:20px"><input style="width:100%;height:36px;padding:0 12px;border:1px solid var(--c3);border-radius:var(--r1);font:400 13px/1 var(--f);color:var(--c7);outline:none" placeholder="请输入转交人姓名" /></div>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button class="btn btn-s" onclick="this.closest('div[style]').parentElement.remove()">取消</button>
      <button class="btn btn-p" onclick="GHR_NAV.showToast('已转交');this.closest('div[style]').parentElement.remove()">确认转交</button>
    </div>
  </div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}

function showArchiveDlg(){
  // 检查未完成的环节
  const incompleteStages=[];
  const stageNames=['目标制定','绩效考核','结果审定','结果确认','绩效面谈'];
  const stageStatus=['进行中','进行中','进行中','进行中','进行中']; // mock当前状态
  stageNames.forEach((name,i)=>{
    if(stageStatus[i]==='进行中'){
      const pending=EMPLOYEE_LIST.filter(e=>e.node===i+1&&e.status!=='已完成').length;
      if(pending>0) incompleteStages.push({name,pending});
    }
  });

  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2100;display:flex;align-items:center;justify-content:center';

  if(incompleteStages.length>0){
    // 有未完成环节，提示先处理
    ov.innerHTML=`<div style="background:var(--sf);border-radius:var(--r4);box-shadow:0 20px 60px rgba(0,0,0,.25);width:480px;padding:24px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <span style="width:32px;height:32px;border-radius:50%;background:var(--ac50);color:var(--ac700);display:flex;align-items:center;justify-content:center;font:600 16px/1 var(--f)">!</span>
        <span style="font:600 15px/1.3 var(--f);color:var(--c9)">以下环节未完成</span>
      </div>
      <div style="margin-bottom:20px;padding:12px 16px;background:var(--c0);border-radius:var(--r1)">
        ${incompleteStages.map(s=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;${s!==incompleteStages[incompleteStages.length-1]?'border-bottom:1px solid var(--dv)':''}">
          <span style="font:500 13px/1 var(--f);color:var(--c8)">${s.name}</span>
          <span style="font:400 12px/1 var(--f);color:var(--ac700)">${s.pending} 人未完成</span>
        </div>`).join('')}
      </div>
      <div style="font:400 13px/1.5 var(--f);color:var(--c6);margin-bottom:20px">请先到对应环节手动结束，再进行归档操作。</div>
      <div style="display:flex;justify-content:flex-end;gap:8px">
        <button class="btn btn-s" onclick="this.closest('div[style*=\"position:fixed\"]').remove()">关闭</button>
        <button class="btn btn-p" onclick="GHR_NAV.showToast('跳转到环节管理');this.closest('div[style*=\"position:fixed\"]').remove()">去处理</button>
      </div>
    </div>`;
  }else{
    // 全部完成，二次确认归档
    const completedCount=EMPLOYEE_LIST.filter(e=>e.status==='已完成').length;
    const totalCount=EMPLOYEE_LIST.length;
    ov.innerHTML=`<div style="background:var(--sf);border-radius:var(--r4);box-shadow:0 20px 60px rgba(0,0,0,.25);width:480px;padding:24px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <span style="width:32px;height:32px;border-radius:50%;background:var(--em50);color:var(--em700);display:flex;align-items:center;justify-content:center">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </span>
        <span style="font:600 15px/1.3 var(--f);color:var(--c9)">确认归档活动</span>
      </div>
      <div style="padding:16px;background:var(--c0);border-radius:var(--r1);margin-bottom:20px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div><div style="font:400 12px/1 var(--f);color:var(--c5);margin-bottom:4px">活动名称</div><div style="font:500 13px/1 var(--f);color:var(--c9)">${ACTIVITIES.find(x=>x.id===currentDetailId)?.name||'-'}</div></div>
          <div><div style="font:400 12px/1 var(--f);color:var(--c5);margin-bottom:4px">被考核人数</div><div style="font:500 13px/1 var(--f);color:var(--c9)">${totalCount} 人</div></div>
          <div><div style="font:400 12px/1 var(--f);color:var(--c5);margin-bottom:4px">已完成</div><div style="font:500 13px/1 var(--f);color:var(--em700)">${completedCount} 人</div></div>
          <div><div style="font:400 12px/1 var(--f);color:var(--c5);margin-bottom:4px">完成率</div><div style="font:500 13px/1 var(--f);color:var(--c9)">${totalCount>0?Math.round(completedCount/totalCount*100):0}%</div></div>
        </div>
      </div>
      <div style="padding:12px 16px;background:var(--ac50);border-radius:var(--r1);margin-bottom:20px;font:400 13px/1.5 var(--f);color:var(--ac700)">
        归档后所有数据将锁定，不可编辑。请确认数据无误。
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px">
        <button class="btn btn-s" onclick="this.closest('div[style*=\"position:fixed\"]').remove()">取消</button>
        <button class="btn btn-p" onclick="GHR_NAV.showToast('活动已归档');this.closest('div[style*=\"position:fixed\"]').remove()">确认归档</button>
      </div>
    </div>`;
  }

  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}

function formatTime(d){
  return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
}

function submitForm(){
  // 清除错误
  ['errName','errPlan','errCycle'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.remove('show');
  });
  document.querySelectorAll('.modal-input').forEach(el=>el.classList.remove('err'));

  const name=document.getElementById('fName').value.trim();
  const plan=document.getElementById('fPlan').value;
  const cycleEl=document.getElementById('fCycle');
  const cycleOpt=cycleEl.selectedOptions[0];
  const cycleLabel=cycleEl.value;
  const cycle=cycleLabel?cycleLabel+'（'+cycleOpt.dataset.start+' - '+cycleOpt.dataset.end+'）':'';
  const dynamicEl=document.querySelector('input[name="fDynamic"]:checked');
  const dynamicAssessment=dynamicEl?dynamicEl.value:'locked';
  const desc=document.getElementById('fDesc').value.trim();

  let hasErr=false;
  if(!name){showErr('errName','fName');hasErr=true}
  if(!plan){showErr('errPlan');hasErr=true}
  if(!cycle){showErr('errCycle','fCycle');hasErr=true}
  if(hasErr) return;

  const now=new Date();
  const timeStr=formatTime(now);

  if(modalState.type==='create'){
    const newId=ACTIVITIES.length?Math.max(...ACTIVITIES.map(a=>a.id))+1:1;
    ACTIVITIES.unshift({
      id:newId,name:name,plan:plan,cycle:cycle,dynamicAssessment:dynamicAssessment,empCount:0,
      status:'not_started',updater:'当前用户',updateTime:timeStr,description:desc,
      creator:'当前用户',createTime:timeStr
    });
    modalState={type:null,data:null};
    viewActivity(newId);
    return;
  }else if(modalState.type==='edit'){
    const a=ACTIVITIES.find(x=>x.id===modalState.data.id);
    if(a){
      a.name=name;a.plan=plan;a.cycle=cycle;a.dynamicAssessment=dynamicAssessment;a.description=desc;
      a.updater='当前用户';a.updateTime=timeStr;
    }
  }

  const wasEdit=modalState.type==='edit';
  modalState={type:null,data:null};
  renderApp();
  if(wasEdit) GHR_NAV.showToast('编辑成功');
}

function showErr(errId,inputId){
  const errEl=document.getElementById(errId);
  if(errEl) errEl.classList.add('show');
  if(inputId){
    const inputEl=document.getElementById(inputId);
    if(inputEl) inputEl.classList.add('err');
  }
}

function closeModal(){
  modalState={type:null,data:null};
  renderApp();
}

function onModalOverlayClick(e){
  if(e.target===e.currentTarget) closeModal();
}

// ESC 关闭弹窗
document.addEventListener('keydown',e=>{
  if(e.key==='Escape' && modalState.type) closeModal();
});

// ═══ 初始化 ═══
GHR_NAV.init('perf','活动管理');
renderAll();
</script>
