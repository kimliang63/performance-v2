<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 移动端绩效流程</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#EFF6FF;--pr100:#DBEAFE;--pr700:#1D4ED8;
  --em:#10B981;--em50:#ECFDF5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#0F172A;--c8:#1E293B;--c7:#334155;--c6:#52525B;--c5:#64748B;--c4:#94A3B8;--c3:#CBD5E1;--c2:#E2E8F0;--c1:#F1F5F8;--c0:#F8FAFC;
  --sf:#FFF;--bg:#F0F4F8;--dv:#F1F5F9;
  --r1:10px;--r2:14px;--r3:18px;--r4:16px;
  --f:'Inter','Noto Sans SC',system-ui,sans-serif;
  --fm:'JetBrains Mono',monospace;
  --sx:0 1px 2px rgba(0,0,0,.04);--sm:0 2px 8px rgba(0,0,0,.06);
  --bd:rgba(15,23,42,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:#E8E8ED;color:var(--c7);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}

.phone{width:393px;height:852px;background:var(--bg);border-radius:48px;box-shadow:0 25px 60px rgba(0,0,0,.3),0 0 0 5px #0F172A,0 0 0 8px #1E293B;overflow:hidden;position:relative;display:flex;flex-direction:column}
.phone-notch{width:126px;height:34px;background:#0F172A;border-radius:0 0 18px 18px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10}
.phone-status{height:54px;background:var(--sf);display:flex;align-items:center;justify-content:space-between;padding:14px 24px 0;font:600 15px/1 var(--f);color:var(--c9)}
.phone-status-r{display:flex;align-items:center;gap:6px}
.phone-nav{height:44px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:12px}
.phone-nav-back{width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c7);flex-shrink:0}
.phone-nav-back svg{width:20px;height:20px}
.phone-nav-t{flex:1;font:600 17px/1 var(--f);color:var(--c9);text-align:center}

/* Segmented Tabs */
.m-tabs{display:flex;gap:0;margin:8px 16px;background:var(--c1);border-radius:var(--r4);padding:3px}
.m-tab{flex:1;text-align:center;padding:8px 0;font:600 12px/1 var(--f);color:var(--c5);border-radius:12px;cursor:pointer;transition:all .2s}
.m-tab.active{background:var(--sf);color:var(--pr);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* AI FAB */
.m-fab{position:absolute;bottom:96px;right:16px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--vi));border:none;box-shadow:0 4px 14px rgba(37,99,235,.35);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:700;transition:transform .2s}
.m-fab:active{transform:scale(.92)}
.m-fab svg{width:20px;height:20px;color:#FFF}

.phone-body{flex:1;overflow-y:auto;padding:16px 20px 100px;background:var(--bg)}
.phone-body::-webkit-scrollbar{width:0}

/* ===== Shared Components ===== */
.ai-banner{background:linear-gradient(135deg,var(--pr50),var(--vi50));border:1px solid var(--pr100);border-radius:var(--r4);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.ai-banner:active{transform:scale(.98)}
.ai-banner-ic{width:32px;height:32px;border-radius:var(--r1);background:linear-gradient(135deg,var(--pr),var(--vi));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-banner-ic svg{width:16px;height:16px;color:#FFF}
.ai-banner-t{font:600 13px/1.3 var(--f);color:var(--c8)}
.ai-banner-d{font:400 11px/1.3 var(--f);color:var(--c5);margin-top:2px}
.ai-banner.warn-banner{border-color:var(--ac100);background:linear-gradient(135deg,var(--ac50),var(--ro50))}
.ai-banner.warn-banner .ai-banner-ic{background:linear-gradient(135deg,var(--ac),var(--ro))}

.ov-card{background:var(--sf);border-radius:var(--r4);box-shadow:var(--sx);border:1px solid var(--bd);padding:16px 20px;margin-bottom:16px}
.ov-top{display:flex;align-items:center;gap:12px}
.ov-avatar{width:44px;height:44px;border-radius:50%;background:var(--pr50);display:flex;align-items:center;justify-content:center;font:700 17px/1 var(--f);color:var(--pr);flex-shrink:0}
.ov-info{flex:1;min-width:0}
.ov-name{font:600 18px/1.2 var(--f);color:var(--c9)}
.ov-role{font:400 13px/1 var(--f);color:var(--c5);margin-top:2px}
.ov-cycle{font:600 13px/1 var(--f);color:var(--pr);background:var(--pr50);padding:4px 12px;border-radius:8px;flex-shrink:0;align-self:flex-start}
.ov-meta{display:flex;align-items:center;gap:16px;margin-top:16px;padding-top:14px;border-top:1px solid var(--dv)}
.ov-meta-item{font:500 13px/1 var(--f);color:var(--c6)}
.ov-meta-item b{font-family:var(--fm);font-weight:600;color:var(--c9)}

.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sec-name{font:600 14px/1 var(--f);color:var(--c8)}
.sec-right{margin-left:auto;font:500 12px/1 var(--f);color:var(--c5)}

.mod{background:var(--sf);border-radius:var(--r4);box-shadow:var(--sx);border:1px solid var(--bd);margin-bottom:10px;overflow:hidden}
.mod-hd{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:10px;transition:background .1s}
.mod-hd:active{background:var(--c0)}
.mod-ic{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mod-ic svg{width:14px;height:14px;color:#FFF}
.mod-info{flex:1;min-width:0}
.mod-name{font:600 13px/1 var(--f);color:var(--c8)}
.mod-meta{font:400 11px/1 var(--f);color:var(--c5);margin-top:3px}
.mod-chevron{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--c4);transition:transform .2s}
.mod-chevron.open{transform:rotate(180deg)}
.mod-chevron svg{width:14px;height:14px}
.mod-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.mod-body.open{max-height:2000px}

/* Goal items */
.goal{border-top:1px solid var(--dv);padding:12px 14px}
.goal:first-child{border-top:none}
.goal-hd{display:flex;align-items:center;gap:8px}
.goal-name{flex:1;font:500 13px/1.3 var(--f);color:var(--c8)}
.goal-name .ai-badge{font:700 9px/1 var(--f);color:var(--vi);background:var(--vi50);padding:2px 5px;border-radius:3px;margin-left:4px}
.goal-type{font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px}
.goal-type.q{background:var(--pr50);color:var(--pr)}
.goal-type.w{background:var(--vi50);color:var(--vi)}
.goal-weight{font:500 11px/1 var(--fm);color:var(--c6)}
.goal-val{display:flex;align-items:baseline;gap:4px;margin-top:8px;font:500 13px/1 var(--f);color:var(--c5)}
.goal-val .v{font-family:var(--fm);font-weight:700;font-size:13px}
.goal-val .v.challenge{color:var(--ac700)}
.goal-val .v.target{color:var(--pr)}
.goal-val .v.baseline{color:var(--c5)}
.goal-val .sep{color:var(--c3);font-size:11px;margin:0 2px}

/* Score rows */
.score-row{border-top:1px solid var(--dv);padding:10px 14px;display:flex;align-items:center;gap:8px}
.score-row:first-child{border-top:none}
.score-name{flex:1;font:500 13px/1 var(--f);color:var(--c8)}
.score-name .ai-badge{font:700 9px/1 var(--f);color:var(--vi);background:var(--vi50);padding:2px 5px;border-radius:3px;margin-left:4px}
.score-wt{font:500 11px/1 var(--fm);color:var(--c5);width:32px;text-align:right}
.score-sel{height:28px;padding:0 6px;border:1px solid var(--c2);border-radius:var(--r1);font:500 11px/1 var(--f);color:var(--c8);background:var(--sf);cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%2394A3B8' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 6px center;padding-right:20px;font-size:11px}
.score-val{font:700 13px/1 var(--fm);color:var(--pr);width:30px;text-align:right}

/* Score summary */
.score-summary{background:var(--sf);border-radius:var(--r4);box-shadow:var(--sx);border:1px solid var(--bd);padding:16px;display:flex;align-items:center;justify-content:space-around;margin-bottom:16px}
.score-summary-item{text-align:center}
.score-summary-v{font:700 24px/1 var(--fm);color:var(--pr)}
.score-summary-l{font:400 11px/1 var(--f);color:var(--c5);margin-top:4px}
.score-summary-grade{font:600 14px/1 var(--f);color:var(--em700)}

/* Warning */
.warn{padding:10px 14px;background:var(--ac50);border:1px solid var(--ac100);border-radius:var(--r4);display:flex;align-items:center;gap:8px;font:500 12px/1.3 var(--f);color:var(--ac700);margin-bottom:16px}
.warn svg{width:16px;height:16px;flex-shrink:0}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--sf);border-radius:var(--r4);box-shadow:var(--sx);border:1px solid var(--bd);padding:14px 16px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.pr::before{background:var(--pr)}.stat.em::before{background:var(--em)}.stat.ac::before{background:var(--ac)}.stat.ro::before{background:var(--ro)}
.stat-t{font:400 11px/1 var(--f);color:var(--c5);margin-bottom:6px}
.stat-v{font:700 22px/1 var(--f);color:var(--c9)}
.stat-d{font:400 10px/1 var(--f);color:var(--c4);margin-top:3px}

/* Distribution */
.dist{background:var(--sf);border-radius:var(--r4);box-shadow:var(--sx);border:1px solid var(--bd);padding:16px;margin-bottom:16px}
.dist-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dist-title{font:600 13px/1 var(--f);color:var(--c8)}
.dist-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.dist-row:last-child{margin-bottom:0}
.dist-label{font:600 12px/1 var(--f);width:24px;flex-shrink:0}
.dist-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.dist-bar{height:14px;border-radius:3px;display:flex;align-items:center;padding-left:6px;font:600 9px/1 var(--f);color:#FFF}
.dist-target{height:3px;background:var(--c1);border-radius:2px;position:relative}
.dist-target-mark{position:absolute;top:0;bottom:0;width:2px;background:var(--c9);opacity:.4}
.dist-pct{font:500 10px/1 var(--fm);width:36px;text-align:right;flex-shrink:0}

/* Person cards */
.person{background:var(--sf);border-radius:var(--r4);box-shadow:var(--sx);border:1px solid var(--bd);margin-bottom:8px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.person-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:600 13px/1 var(--f);color:#FFF;flex-shrink:0}
.person-info{flex:1;min-width:0}
.person-name{font:500 13px/1 var(--f);color:var(--c8)}
.person-dept{font:400 11px/1 var(--f);color:var(--c5);margin-top:2px}
.person-score{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.person-score-v{font:700 16px/1 var(--fm);color:var(--pr)}
.person-score-l{font:400 10px/1 var(--f);color:var(--c4)}
.person-ai-tag{font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px}
.person-ai-tag.match{color:var(--em700);background:var(--em50)}
.person-ai-tag.deviate{color:var(--ac);background:var(--ac50)}
.person-grade{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.person-grade-sel{height:28px;padding:0 8px;border:1px solid var(--c2);border-radius:var(--r1);font:500 12px/1 var(--f);color:var(--c8);background:var(--sf);cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%2394A3B8' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 6px center;padding-right:20px}
.person-grade-l{font:400 10px/1 var(--f);color:var(--c4)}

/* Compliance */
.comp{background:var(--sf);border-radius:var(--r4);box-shadow:var(--sx);border:1px solid var(--bd);padding:14px 16px;margin-bottom:16px}
.comp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.comp-t{font:600 13px/1 var(--f);color:var(--c8);display:flex;align-items:center;gap:6px}
.comp-t svg{width:14px;height:14px;color:var(--em)}
.comp-cnt{font:600 12px/1 var(--f);color:var(--em700)}
.comp-item{display:flex;align-items:center;gap:8px;padding:5px 0;font:400 12px/1 var(--f);color:var(--c6)}
.comp-ck{width:14px;height:14px;border-radius:50%;background:var(--em);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.comp-ck svg{width:8px;height:8px;color:#FFF}

/* Bottom Action Bar */
.action-bar{position:absolute;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);display:flex;align-items:center;padding:10px 20px;gap:10px;padding-bottom:34px;z-index:10}
.action-bar .btn{height:44px;border-radius:var(--r4);font:600 14px/1 var(--f);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s}
.action-bar .btn:active{transform:scale(.97)}
.btn-draft{flex:1;background:var(--c1);color:var(--c7);border:1px solid var(--c2)}
.btn-ai{flex:1;background:linear-gradient(135deg,var(--pr),var(--vi));color:#FFF;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.btn-submit{flex:1;background:var(--pr);color:#FFF;box-shadow:0 2px 8px rgba(37,99,235,.25)}

/* Drawer */
.sheet-ov{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:800;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-ov.on{opacity:1;pointer-events:auto}
.sheet{position:absolute;bottom:0;left:0;right:0;height:70%;background:var(--sf);border-radius:20px 20px 0 0;z-index:810;transform:translateY(100%);transition:transform .3s ease;display:flex;flex-direction:column}
.sheet-ov.on .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--c3);border-radius:2px;margin:8px auto 0}
.sheet-hd{padding:14px 20px;border-bottom:1px solid var(--dv);display:flex;align-items:center;justify-content:space-between}
.sheet-title{font:600 15px/1 var(--f);color:var(--c9)}
.sheet-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c5);background:none;border:none}
.sheet-close svg{width:18px;height:18px}
.sheet-bd{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.sheet-ft{padding:10px 16px;border-top:1px solid var(--dv);display:flex;gap:8px}
.sheet-input{flex:1;height:44px;border:1px solid var(--c2);border-radius:var(--r4);padding:0 14px;font:400 13px/1 var(--f);outline:none}
.sheet-input:focus{border-color:var(--pr)}
.sheet-send{width:44px;height:44px;border-radius:var(--r4);background:var(--pr);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#FFF}
.sheet-send svg{width:18px;height:18px}

.msg{max-width:88%;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end}
.msg-bd{padding:10px 14px;border-radius:var(--r4);font:400 13px/1.5 var(--f)}
.msg.bot .msg-bd{background:var(--c0);color:var(--c8);border-bottom-left-radius:4px}
.msg.user .msg-bd{background:var(--pr);color:#FFF;border-bottom-right-radius:4px}
.msg-time{font:400 10px/1 var(--f);color:var(--c4);margin-top:3px}
.msg.user .msg-time{text-align:right}
.msg-actions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.msg-btn{font:500 11px/1 var(--f);padding:5px 10px;border-radius:var(--r1);border:1px solid var(--c2);background:var(--sf);color:var(--c6);cursor:pointer}
.msg-btn:hover{border-color:var(--pr);color:var(--pr)}
.msg-card{background:var(--sf);border:1px solid var(--c2);border-radius:var(--r1);padding:10px;margin-top:6px}
.msg-card-t{font:600 12px/1.3 var(--f);color:var(--c8);margin-bottom:3px}
.msg-card-d{font:400 11px/1.4 var(--f);color:var(--c5)}
.msg-card-tag{display:inline-block;font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px;margin-top:4px}
.msg-card-tag.em{color:var(--em700);background:var(--em50)}
.msg-card-tag.pr{color:var(--pr);background:var(--pr50)}
.msg-card-tag.ac{color:var(--ac);background:var(--ac50)}
</style>
</head>
<body>

<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-status">
    <span>9:41</span>
    <div class="phone-status-r">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--c9)"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="1.5" width="3" height="10.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--c9)"><path d="M8 2.4C5.6 2.4 3.4 3.3 1.8 4.8L0 3C2 1.1 4.9 0 8 0s6 1.1 8 3l-1.8 1.8C12.6 3.3 10.4 2.4 8 2.4z"/><path d="M8 6.4c-1.6 0-3 .6-4.1 1.6L2.1 6.2C3.6 4.8 5.7 4 8 4s4.4.8 5.9 2.2l-1.8 1.8C11 7 9.6 6.4 8 6.4z"/><path d="M8 10.4c-.8 0-1.6.3-2.1.9L8 14l2.1-2.7c-.5-.6-1.3-.9-2.1-.9z"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x=".5" y=".5" width="21" height="11" rx="2" stroke="var(--c9)"/><rect x="2" y="2" width="16" height="8" rx="1" fill="var(--c9)"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="var(--c9)"/></svg>
    </div>
  </div>

  <div class="phone-nav">
    <div class="phone-nav-back" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="phone-nav-t" id="navTitle">目标制定</div>
  </div>

  <div class="m-tabs">
    <div class="m-tab active" onclick="switchTab(0)">目标制定</div>
    <div class="m-tab" onclick="switchTab(1)">绩效评分</div>
    <div class="m-tab" onclick="switchTab(2)">结果审定</div>
  </div>

  <div class="phone-body" id="phoneBody"></div>

  <button class="m-fab" onclick="toggleDrawer()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/><path d="M12 14v4"/><path d="M8 18h8"/><path d="M6 22h12"/></svg>
  </button>

  <div class="action-bar" id="bottomBar">
    <button class="btn btn-draft">保存草稿</button>
    <button class="btn btn-submit">提交</button>
  </div>

  <div class="sheet-ov" id="drawerOv" onclick="if(event.target===this)toggleDrawer()">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-hd">
        <span class="sheet-title" id="drawerTitle">AI 填写助手</span>

    h+=`<div class="person">
      <div class="person-av" style="background:${p.avColor}">${p.name[0]}</div>
      <div class="person-info"><div class="person-name">${p.name}</div><div class="person-dept">${p.dept} · ${p.emp}</div></div>
      <div class="person-score"><div class="person-score-v">${p.score}</div><div class="person-score-l">评分</div></div>
      <div style="flex-shrink:0"><span class="person-ai-tag ${p.aiMatch?'match':'deviate'}">AI ${p.aiMatch?'匹配':'偏离'}</span></div>
      <div class="person-grade">
        <select class="person-grade-sel" onchange="updateRatGrade(${i},this.value)">${RAT_GRADES.map(g=>`<option value="${g}"${p.grade===g?' selected':''}>${g}</option>`).join('')}</select>
        <div class="person-grade-l">审定等级</div>
      </div>
    </div>`;
  });
  h+=`<div style="height:16px"></div>`;
  return h;
}

/* ===== MAIN RENDER ===== */
function render(){
  const el=document.getElementById('phoneBody');
  if(currentTab===0) el.innerHTML=renderGoal();
  else if(currentTab===1) el.innerHTML=renderEval();
  else el.innerHTML=renderRatify();
}

function toggleMod(tabIdx,modIdx){
  if(openMods[tabIdx].has(modIdx)) openMods[tabIdx].delete(modIdx); else openMods[tabIdx].add(modIdx);
  render();
}

function updateEvalGrade(modIdx,itemIdx,val){
  EVAL_MODULES[modIdx].items[itemIdx].grade=val;
  EVAL_MODULES[modIdx].items[itemIdx].score=GRADE_SCORES[val]||80;
  render();
}

function updateRatGrade(idx,val){
  RAT_PERSONS[idx].grade=val;
  RAT_PERSONS[idx].aiMatch=(val===RAT_PERSONS[idx].aiGrade);
  const total=RAT_PERSONS.length;
  const counts={};RAT_GRADES.forEach(g=>counts[g]=0);
  RAT_PERSONS.forEach(p=>{if(counts[p.grade]!==undefined)counts[p.grade]++;});
  RAT_DISTRIBUTION.forEach(d=>{d.current=Math.round(counts[d.grade]/total*100);});
  render();
}

/* ===== DRAWER ===== */
function toggleDrawer(){
  drawerOpen=!drawerOpen;
  document.getElementById('drawerOv').classList.toggle('on',drawerOpen);
  if(drawerOpen) renderDrawerChat();
}

function renderDrawerChat(){
  const msgs=chatMsgs[currentTab];
  const bd=document.getElementById('drawerBd');
  bd.innerHTML=msgs.map(m=>{
    let h=`<div class="msg ${m.role}"><div class="msg-bd">${m.text.replace(/\n/g,'<br/>')}`;
    if(m.cards) m.cards.forEach(c=>{
      h+=`<div class="msg-card"><div class="msg-card-t">${c.t}</div><div class="msg-card-d">${c.d}</div><span class="msg-card-tag ${c.tc}">${c.tag}</span></div>`;
    });
    h+=`</div>`;
    if(m.actions) h+=`<div class="msg-actions">${m.actions.map(a=>`<button class="msg-btn" onclick="drawerAction('${a}')">${a}</button>`).join('')}</div>`;
    if(m.time) h+=`<div class="msg-time">${m.time}</div>`;
    h+=`</div>`;
    return h;
  }).join('');
  bd.scrollTop=bd.scrollHeight;
}

function sendDrawerMsg(){
  const inp=document.getElementById('drawerInput');
  const txt=inp.value.trim();
  if(!txt)return;
  chatMsgs[currentTab].push({role:'user',text:txt});
  inp.value='';renderDrawerChat();
  setTimeout(()=>{chatMsgs[currentTab].push({role:'bot',text:'收到，正在分析你的需求…',time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});renderDrawerChat();},800);
}

function drawerAction(label){
  chatMsgs[currentTab].push({role:'user',text:label});
  renderDrawerChat();
  setTimeout(()=>{
    if(currentTab===0){
      if(label==='确认添加'){
        const vg=MODULES.find(m=>m.name==='价值观目标');
        if(vg&&vg.goals.length===0){vg.goals.push({name:'客户第一',type:'q',weight:8,aiFill:true,target:4.5,challenge:5,baseline:4,rule:'标准梯度计算'});vg.goals.push({name:'团队协作',type:'q',weight:7,aiFill:true,target:2,challenge:3,baseline:1,rule:'标准梯度计算'});}
        render();chatMsgs[currentTab].push({role:'bot',text:'已添加 2 条价值观目标到模块中，请查看更新。',time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
      }else chatMsgs[currentTab].push({role:'bot',text:`已执行「${label}」，请在页面上查看更新结果。`,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
    }else if(currentTab===1){
      if(label==='自动评分全部'){EVAL_MODULES.forEach(m=>m.items.forEach(it=>{it.grade=it.aiFill?'符合预期+':'符合预期';it.score=GRADE_SCORES[it.grade];}));render();chatMsgs[currentTab].push({role:'bot',text:'已为全部 9 项指标应用 AI 推荐等级。',time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});}
      else chatMsgs[currentTab].push({role:'bot',text:`已执行「${label}」，请在页面上查看更新结果。`,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
    }else{
      if(label==='自动填充全部'||label==='确认应用'){RAT_PERSONS.forEach(p=>{p.grade=p.aiGrade;p.aiMatch=true;});const t=RAT_PERSONS.length;const c={};RAT_GRADES.forEach(g=>c[g]=0);RAT_PERSONS.forEach(p=>{if(c[p.grade]!==undefined)c[p.grade]++;});RAT_DISTRIBUTION.forEach(d=>{d.current=Math.round(c[d.grade]/t*100);});render();chatMsgs[currentTab].push({role:'bot',text:'已为全部 10 人应用 AI 建议等级，强制分布达标。',time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});}
      else chatMsgs[currentTab].push({role:'bot',text:`已执行「${label}」，请在页面上查看更新结果。`,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
    }
    renderDrawerChat();
  },600);
}

render();
</script>
</body>
</html>
