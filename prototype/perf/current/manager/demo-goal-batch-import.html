<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 目标批量导入</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--em:#10B981;--em50:#ECFDF5;--em700:#047857;--ac:#F59E0B;--ac50:#FFFBEB;--ac700:#B45309;--ro:#F43F5E;--ro50:#FFF1F2;--vi:#8B5CF6;--vi50:#F5F3FF;--c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;--sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;--shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);--r1:6px;--r2:8px;--r3:10px;--r4:14px;--f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;--m:'JetBrains Mono','SF Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

.pg-hd{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:20px 24px;margin-bottom:16px}
.pg-hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pg-hd-title{font:700 20px/1.2 var(--f);color:var(--c9);letter-spacing:-.3px}
.pg-hd-actions{display:flex;gap:8px}
.pg-hd-info{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 24px;font:400 13px/1 var(--f);color:var(--c5);padding:12px 16px;background:var(--c0);border-radius:var(--r2)}
.pg-hd-info-item{display:flex;flex-direction:column;gap:2px}
.pg-hd-info-label{font:400 11px/1 var(--f);color:var(--c4);text-transform:uppercase;letter-spacing:.5px}
.pg-hd-info-value{font:500 13px/1.3 var(--f);color:var(--c8)}

.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}.btn-s:hover{border-color:var(--c3);color:var(--c8)}
.btn-o{background:var(--sf);color:var(--pr);border:1px solid var(--pr200)}.btn-o:hover{background:var(--pr50)}

.eval-list{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);overflow:hidden;margin-bottom:16px}
.eval-list table{width:100%;border-collapse:collapse}
.eval-list th{background:var(--c0);padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.eval-list td{padding:10px 16px;font:400 13px/1.4 var(--f);color:var(--c7);border-bottom:1px solid var(--dv);vertical-align:top}
.eval-list tr:last-child td{border-bottom:none}
.eval-list tr:hover td{background:var(--c0)}
.emp-row td{background:var(--c0);font:600 13px/1 var(--f);color:var(--c8);padding:10px 16px !important}
.emp-row:hover td{background:var(--c0) !important}
.mod-tag{display:inline-block;padding:2px 6px;border-radius:3px;font:500 11px/1 var(--f);background:var(--c1);color:var(--c6)}
.type-tag{display:inline-block;padding:3px 8px;border-radius:3px;font:500 11px/1 var(--f);white-space:nowrap}
.type-tag.quant{background:var(--pr50);color:var(--pr)}
.type-tag.qual{background:var(--vi50);color:var(--vi)}
.score-badge{font:600 13px/1 var(--m)}
.upload-bar{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--pr50);border-radius:var(--r2);margin-bottom:16px;border:1px dashed var(--pr200)}
.upload-bar-text{flex:1;font:400 13px/1 var(--f);color:var(--c6)}
.upload-bar-text b{color:var(--pr)}
.filled{color:var(--em700);font-weight:500}
.unfilled{color:var(--c4)}
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--r2);font:500 13px/1 var(--f);color:#FFF;z-index:3000;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;pointer-events:all}
.toast.success{background:var(--em);box-shadow:0 8px 24px rgba(16,185,129,.3)}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-s.btn-active{background:var(--pr50);color:var(--pr);border-color:var(--pr200)}
.search-input{height:32px;border:1px solid var(--c2);border-radius:var(--r1);padding:0 10px 0 32px;font:400 13px/1 var(--f);color:var(--c8);outline:none;background:var(--sf);transition:border .15s;width:100%}
.search-input:focus{border-color:var(--pr);box-shadow:0 0 0 2px var(--pr50)}
.search-input::placeholder{color:var(--c4)}
.pager{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--dv);font:400 12px/1 var(--f);color:var(--c5)}
.pager-info{display:flex;align-items:center;gap:4px}
.pager-btns{display:flex;align-items:center;gap:4px}
.pager-btn{width:28px;height:28px;border-radius:var(--r1);border:1px solid var(--c2);background:var(--sf);color:var(--c6);font:500 12px/1 var(--f);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.pager-btn:hover{border-color:var(--pr);color:var(--pr);background:var(--pr50)}
.pager-btn.active{background:var(--pr);color:#FFF;border-color:var(--pr)}
.pager-btn:disabled{opacity:.4;cursor:default}
.pager-btn svg{width:14px;height:14px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}
</style>
</head>
<body>
<div class="ct fade-in">
  <nav style="display:flex;align-items:center;gap:4px;font:500 12px/1 var(--f);color:var(--c5);margin-bottom:12px">
    <a href="../demo-index.html" style="color:var(--c5);text-decoration:none" onmouseover="this.style.color='var(--pr)'" onmouseout="this.style.color='var(--c5)'">绩效工作台</a>
    <span style="color:var(--c3)">/</span>
    <span style="color:var(--c8);font-weight:600">目标批量导入</span>
  </nav>

  <div class="pg-hd">
    <div class="pg-hd-top">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="pg-hd-title">目标批量导入</div>
        <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--pr50);color:var(--pr)">
          <span style="width:6px;height:6px;border-radius:50%;background:var(--pr);animation:pulse 2s ease-in-out infinite"></span>填写中
        </span>
      </div>
      <div class="pg-hd-actions">
        <button class="btn btn-s" onclick="showToast('草稿已保存','success')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          保存草稿
        </button>
        <button class="btn btn-p" onclick="showToast('已提交审定','success')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          提交审定
        </button>
      </div>
    </div>
    <div class="pg-hd-info">
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">考核方案</span><span class="pg-hd-info-value">产品部2026年Q2绩效考核</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">考核周期</span><span class="pg-hd-info-value">2026年4-6月</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">操作人</span><span class="pg-hd-info-value">赵敏（HRBP）</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">导入范围</span><span class="pg-hd-info-value">产品部 · 15人</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">已导入</span><span class="pg-hd-info-value" id="hdImported" style="color:var(--ac)">0人</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">待导入</span><span class="pg-hd-info-value" id="hdPending" style="color:var(--ac)">15人</span></div>
    </div>
  </div>

  <!-- 导入操作栏 -->
  <div class="upload-bar" id="uploadBar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--pr)" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <div class="upload-bar-text">上传 Excel 文件批量导入目标 · <a href="#" style="color:var(--pr)" onclick="showToast('模板已下载','success');return false">下载导入模板</a></div>
    <button class="btn btn-o" onclick="document.getElementById('fileInput').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      选择文件
    </button>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleImport(event)">
  </div>

  <!-- 筛选栏 -->
  <div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <span style="font:500 13px/1 var(--f);color:var(--c6)">到达状态:</span>
    <div id="statusFilter" style="display:flex;gap:8px">
      <button class="btn btn-s btn-sm btn-active" onclick="filterStatus('全部',this)">全部</button>
      <button class="btn btn-s btn-sm" onclick="filterStatus('已到达',this)">已到达</button>
      <button class="btn btn-s btn-sm" onclick="filterStatus('未到达',this)">未到达</button>
    </div>
    <div style="width:1px;height:20px;background:var(--c2)"></div>
    <div style="position:relative;flex:1;min-width:180px;max-width:260px">
      <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--c4)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" placeholder="搜索员工姓名" id="searchInput" oninput="handleSearch()">
    </div>
  </div>

  <!-- 员工目标列表 -->
  <div class="eval-list">
    <div style="padding:16px 20px;border-bottom:1px solid var(--dv);display:flex;align-items:center;justify-content:space-between">
      <span style="font:600 15px/1 var(--f);color:var(--c9)">员工目标列表</span>
      <span id="listSummary" style="font:400 12px/1 var(--f);color:var(--c5)"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:70px">被考核人</th>
          <th style="min-width:180px">目标名称</th>
          <th style="width:80px;white-space:nowrap">模块</th>
          <th style="width:70px;white-space:nowrap">类型</th>
          <th style="width:48px">权重</th>
          <th style="min-width:140px">目标值/衡量标准</th>
          <th style="width:70px">挑战值</th>
          <th style="width:70px">保底值</th>
          <th style="width:64px">状态</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="pager" id="pager"></div>
  </div>

  <!-- 审批流程 -->
  <div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-top:16px;margin-bottom:16px;overflow:hidden">
    <div style="padding:16px 20px;border-bottom:1px solid var(--dv);display:flex;align-items:center;justify-content:space-between">
      <span style="font:600 15px/1 var(--f);color:var(--c9)">审批流程</span>
    </div>
    <div style="padding:0">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--c0)">
          <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">节点</th>
          <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">处理人</th>
          <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">状态</th>
        </tr></thead>
        <tbody>
          <tr style="background:var(--em50)"><td style="padding:12px 16px;font:500 13px/1.4 var(--f);color:var(--c8);border-bottom:1px solid var(--dv)"><div style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:var(--em);flex-shrink:0"></span>HRBP批量导入</div></td><td style="padding:12px 16px;border-bottom:1px solid var(--dv)"><div style="display:flex;align-items:center;gap:6px"><span style="width:22px;height:22px;border-radius:50%;background:var(--em);display:flex;align-items:center;justify-content:center;font:600 10px/1 var(--f);color:#FFF;flex-shrink:0">李</span><span style="font:400 13px/1 var(--f);color:var(--c8)">赵敏</span></div></td><td style="padding:12px 16px;border-bottom:1px solid var(--dv)"><span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--pr50);color:var(--pr)"><span style="width:6px;height:6px;border-radius:50%;background:var(--pr);animation:pulse 2s ease-in-out infinite"></span>处理中</span></td></tr>
          <tr><td style="padding:12px 16px;font:500 13px/1.4 var(--f);color:var(--c6);border-bottom:1px solid var(--dv)"><div style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:var(--c3);flex-shrink:0"></span>员工确认</div></td><td style="padding:12px 16px;border-bottom:1px solid var(--dv)"><div style="display:flex;align-items:center;gap:6px"><span style="width:22px;height:22px;border-radius:50%;background:var(--c1);display:flex;align-items:center;justify-content:center;font:600 10px/1 var(--f);color:var(--c5);flex-shrink:0">全</span><span style="font:400 13px/1 var(--f);color:var(--c6)">相关人员</span></div></td><td style="padding:12px 16px;border-bottom:1px solid var(--dv)"><span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--c1);color:var(--c5)">待处理</span></td></tr>
          <tr><td style="padding:12px 16px;font:500 13px/1.4 var(--f);color:var(--c4)"><div style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:var(--c3);flex-shrink:0"></span>上级审批</div></td><td style="padding:12px 16px"><div style="display:flex;align-items:center;gap:6px"><span style="width:22px;height:22px;border-radius:50%;background:var(--c1);display:flex;align-items:center;justify-content:center;font:600 10px/1 var(--f);color:var(--c5);flex-shrink:0">王</span><span style="font:400 13px/1 var(--f);color:var(--c4)">王总监</span></div></td><td style="padding:12px 16px"><span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--c1);color:var(--c4)">待处理</span></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="../navigation.js"></script>
<script>
GHR_NAV.init('perf', '目标批量导入');
var currentPage=1;var PAGE_SIZE=8;var currentStatus='全部';

function filterStatus(status,btn){
  currentStatus=status;currentPage=1;
  var container=document.getElementById('statusFilter');
  container.querySelectorAll('.btn').forEach(function(b){b.classList.remove('btn-active');});
  if(btn)btn.classList.add('btn-active');
  render();
}

function getFiltered(){
  var q=(document.getElementById('searchInput').value||'').trim().toLowerCase();
  return EMPLOYEES.filter(function(e){
    if(currentStatus==='已到达'&&!e.reached)return false;
    if(currentStatus==='未到达'&&e.reached)return false;
    if(q&&e.name.toLowerCase().indexOf(q)<0)return false;
    return true;
  });
}

function handleSearch(){currentPage=1;render();}

var EMPLOYEES=[
  {name:'张明',dept:'产品部',reached:true,goals:[
    {mod:'关键指标',name:'资源利用率（通用）',type:'quant',weight:5,target:105,challenge:110,baseline:100},
    {mod:'关键指标',name:'HRAS UAT用户验收首次通过率',type:'quant',weight:10,target:98,challenge:100,baseline:95},
    {mod:'关键指标',name:'HRAS需求评审及时率',type:'quant',weight:15,target:98,challenge:100,baseline:95},
    {mod:'关键行动',name:'HRAS产品管理规范',type:'qual',weight:10,desc:'需求管理流程规范、产品需求规范、迭代火车管理规范、周会/月会准时完成'},
    {mod:'关键行动',name:'日常滚动需求响应',type:'qual',weight:10,desc:'根据业务日会需求优先级，滚动响应日常需求，输出产品解决方案'},
    {mod:'关键行动',name:'HR ONE 绩效重构事项推进',type:'qual',weight:25,desc:'06-10 输出AI+绩效核心页面原型；06-19 完成绩效版本4需求内审；06-24 完成需求评审'},
    {mod:'关键行动',name:'AI应用项目探索与落地推广',type:'qual',weight:25,desc:'06-05 完成ASSC采购侧AI应用1.0版本；06-12 对接LBU试点应用；06-26 完成1.1版本'}
  ]},
  {name:'李华',dept:'产品部',reached:true,goals:[
    {mod:'关键指标',name:'产品迭代完成率',type:'quant',weight:20,target:95,challenge:100,baseline:90},
    {mod:'关键指标',name:'客户需求响应及时率',type:'quant',weight:15,target:90,challenge:95,baseline:85},
    {mod:'关键行动',name:'产品规划文档输出',type:'qual',weight:30,desc:'完成Q3产品路线图，包含市场分析和竞品对比'},
    {mod:'关键行动',name:'跨部门协作项目推进',type:'qual',weight:20,desc:'主导2个跨部门项目，协调研发与业务资源'},
    {mod:'关键行动',name:'团队知识分享',type:'qual',weight:15,desc:'每月1次技术分享，输出知识库文档'}
  ]},
  {name:'王芳',dept:'产品部',reached:true,goals:[
    {mod:'关键指标',name:'需求处理量',type:'quant',weight:20,target:40,challenge:50,baseline:30},
    {mod:'关键行动',name:'用户反馈跟进',type:'qual',weight:30,desc:'按时响应率≥95%，建立反馈闭环机制'},
    {mod:'关键行动',name:'文档规范执行',type:'qual',weight:20,desc:'需求文档规范达标，迭代文档完整'}
  ]},
  {name:'赵强',dept:'产品部',reached:false,goals:[
    {mod:'关键指标',name:'项目按时交付率',type:'quant',weight:25,target:90,challenge:95,baseline:85},
    {mod:'关键行动',name:'技术方案评审',type:'qual',weight:30,desc:'完成3次技术方案评审，输出评审报告'},
    {mod:'关键行动',name:'团队效能提升',type:'qual',weight:25,desc:'团队代码质量提升20%，建立代码审查机制'}
  ]},
  {name:'陈静',dept:'产品部',reached:false,goals:[
    {mod:'关键指标',name:'设计任务完成率',type:'quant',weight:20,target:85,challenge:95,baseline:80},
    {mod:'关键行动',name:'设计规范建设',type:'qual',weight:30,desc:'输出设计规范文档，建立组件库'}

function render(){
  var filtered=getFiltered();
  var totalPages=Math.ceil(filtered.length/PAGE_SIZE)||1;
  if(currentPage>totalPages)currentPage=totalPages;
  var start=(currentPage-1)*PAGE_SIZE;
  var pageData=filtered.slice(start,start+PAGE_SIZE);
  var html='';
  pageData.forEach(function(emp){
    emp.goals.forEach(function(g){
      var u=!emp.reached;
      html+='<tr>';
      html+='<td style="font-weight:500;color:var(--c8)">'+emp.name+'</td>';
      html+='<td style="font-weight:500;color:var(--c8)">'+g.name+'</td>';
      html+='<td><span class="mod-tag">'+g.mod+'</span></td>';
      html+='<td><span class="type-tag '+g.type+'">'+(g.type==='quant'?'定量':'定性')+'</span></td>';
      html+='<td style="font-family:var(--m)">'+g.weight+'%</td>';
      if(g.type==='quant'){
        html+='<td'+(u?'':' class="unfilled"')+'>'+(u?'—':(g.target||'—'))+'</td>';
        html+='<td'+(u?'':' class="unfilled"')+'>'+(u?'—':(g.challenge||'—'))+'</td>';
        html+='<td'+(u?'':' class="unfilled"')+'>'+(u?'—':(g.baseline||'—'))+'</td>';
      }else{
        html+='<td'+(u?'':' class="unfilled"')+' colspan="3" style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+(g.desc||'')+'">'+(u?'—':(g.desc||'—'))+'</td>';
      }
      html+='<td style="white-space:nowrap"><span style="font:500 11px/1 var(--f);padding:2px 6px;border-radius:3px;background:'+(emp.reached?'var(--em50)':'var(--ac50)')+';color:'+(emp.reached?'var(--em700)':'var(--ac700)')+'">'+(emp.reached?'已到达':'未到达')+'</span></td>';
      html+='</tr>';
    });
  });
  document.getElementById('tableBody').innerHTML=html;
  var rc=filtered.filter(function(e){return e.reached;}).length;
  var uc=filtered.length-rc;
  document.getElementById('hdImported').textContent=rc+'人';
  document.getElementById('hdPending').textContent=uc+'人';
  document.getElementById('listSummary').textContent='已到达 '+rc+'人 · 未到达 '+uc+'人';
  var ph='<span class="pager-info">共 <b style="color:var(--c8)">'+filtered.length+'</b> 人，第 '+Math.min(start+1,filtered.length)+'-'+Math.min(start+PAGE_SIZE,filtered.length)+' 条</span><div class="pager-btns">';
  ph+='<button class="pager-btn" onclick="goPage('+(currentPage-1)+')"'+(currentPage<=1?' disabled':'')+'><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>';
  for(var p=1;p<=totalPages;p++){
    ph+='<button class="pager-btn'+(p===currentPage?' active':'')+'" onclick="goPage('+p+')">'+p+'</button>';
  }
  ph+='<button class="pager-btn" onclick="goPage('+(currentPage+1)+')"'+(currentPage>=totalPages?' disabled':'')+'><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>';
  ph+='</div>';
  document.getElementById('pager').innerHTML=ph;
}
function goPage(p){currentPage=p;render();}
function handleImport(e){
  var file=e.target.files[0];if(!file)return;
  MOCK_IMPORT.forEach(function(mi){
    var emp=EMPLOYEES.find(function(e){return e.name===mi.emp;});
    if(!emp)return;
    mi.goals.forEach(function(ig){
      var g=emp.goals.find(function(g){return g.name===ig.name;});
      if(g){g.target=ig.target||'';g.challenge=ig.challenge||'';g.baseline=ig.baseline||'';}
    });
  });
  render();
  showToast('已导入 '+MOCK_IMPORT.length+' 名员工的目标数据','success');
  e.target.value='';
}
function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(type||'success')+' show';
  setTimeout(function(){t.classList.remove('show')},3000);
}
