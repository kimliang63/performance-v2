<style>
:root{--pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--em:#10B981;--em50:#ECFDF5;--em700:#047857;--ac:#F59E0B;--ac50:#FFFBEB;--ac700:#B45309;--ro:#F43F5E;--ro50:#FFF1F2;--vi:#8B5CF6;--vi50:#F5F3FF;--c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;--sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;--shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);--r1:6px;--r2:8px;--r3:10px;--r4:14px;--f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;--m:'JetBrains Mono','SF Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}


.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}.btn-s:hover{border-color:var(--c3);color:var(--c8)}
.btn-o{background:var(--sf);color:var(--pr);border:1px solid var(--pr200)}.btn-o:hover{background:var(--pr50)}

.eval-list{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);overflow:hidden;margin-bottom:16px}
.eval-list table{width:100%;border-collapse:collapse}
.eval-list th{background:var(--c0);padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.eval-list td{padding:10px 16px;font:400 13px/1.4 var(--f);color:var(--c7);border-bottom:1px solid var(--dv);vertical-align:top}
.eval-list tr:last-child td{border-bottom:none}
.eval-list tr:hover td{background:var(--c0)}
.emp-row td{background:var(--c0);font:600 13px/1 var(--f);color:var(--c8);padding:10px 16px !important}
.emp-row:hover td{background:var(--c0) !important}
.type-tag{display:inline-block;padding:3px 8px;border-radius:3px;font:500 11px/1 var(--f);white-space:nowrap}
.type-tag.quant{background:var(--pr50);color:var(--pr)}
.type-tag.qual{background:var(--vi50);color:var(--vi)}
.upload-bar{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--pr50);border-radius:var(--r2);margin-bottom:16px;border:1px dashed var(--pr200)}
.upload-bar-text{flex:1;font:400 13px/1 var(--f);color:var(--c6)}
.upload-bar-text b{color:var(--pr)}
.filled{color:var(--em700);font-weight:500}
.unfilled{color:var(--c4)}
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--r2);font:500 13px/1 var(--f);color:#FFF;z-index:3000;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;pointer-events:all}
.toast.success{background:var(--em);box-shadow:0 8px 24px rgba(16,185,129,.3)}
.toast.warning{background:var(--ac700);box-shadow:0 8px 24px rgba(245,158,11,.3)}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-s.btn-active{background:var(--pr50);color:var(--pr);border-color:var(--pr200)}
.search-input{height:32px;border:1px solid var(--c2);border-radius:var(--r1);padding:0 10px 0 32px;font:400 13px/1 var(--f);color:var(--c8);outline:none;background:var(--sf);transition:border .15s;width:100%}
.search-input:focus{border-color:var(--pr);box-shadow:0 0 0 2px var(--pr50)}
.search-input::placeholder{color:var(--c4)}
.pager{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--dv);font:400 12px/1 var(--f);color:var(--c5)}
.pager-info{display:flex;align-items:center;gap:4px}
.pager-btns{display:flex;align-items:center;gap:4px}
.pager-btn{width:28px;height:28px;border-radius:var(--r1);border:1px solid var(--c2);background:var(--sf);color:var(--c6);font:500 12px/1 var(--f);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.pager-btn:hover{border-color:var(--pr);color:var(--pr);background:var(--pr50)}
.pager-btn.active{background:var(--pr);color:#FFF;border-color:var(--pr)}
.pager-btn:disabled{opacity:.4;cursor:default}
.pager-btn svg{width:14px;height:14px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}
</style>

  var ctx=document.getElementById('activityContext');

  '已完成':{bg:'var(--em50)',color:'var(--em700)'},
  '已暂停':{bg:'var(--c1)',color:'var(--c6)'},
  '已终止':{bg:'var(--ro50)',color:'var(--ro)'}
};
function canImportByFlow(emp){
  if(emp.hasTodo||emp.hasOnlineSubmit)return false;
  return emp.personalFlowStatus==='未开始';
}
function importBlockReason(emp){
  if(emp.hasTodo)return '已有待办，禁止导入';
  if(emp.hasOnlineSubmit)return '已有在线正式提交，禁止导入';
  if(emp.personalFlowStatus!=='未开始')return '个人流程状态为'+emp.personalFlowStatus+'，禁止导入';
  return '';
}
function flowStatusLabel(emp){
  if(emp.hasTodo&&emp.personalFlowStatus==='未开始')return '已有待办';
  if(emp.hasOnlineSubmit&&emp.personalFlowStatus==='未开始')return '已有在线提交';
  return emp.personalFlowStatus;
}
function flowStatusBadge(emp){
  var label=flowStatusLabel(emp);
  var st=FLOW_STATUS_STYLE[emp.personalFlowStatus]||FLOW_STATUS_STYLE['处理中'];
  if(label==='已有待办'||label==='已有在线提交')st={bg:'var(--ro50)',color:'var(--ro)'};
  return '<span style="font:500 11px/1 var(--f);padding:2px 6px;border-radius:3px;background:'+st.bg+';color:'+st.color+'">'+label+'</span>';
}
function empCell(emp){
  return '<div style="font-weight:500;color:var(--c8)">'+emp.name+'</div><div style="font:400 11px/1 var(--m);color:var(--c5);margin-top:3px">'+emp.employeeId+'</div>';

  {employeeId:'EMP2004',itemName:'项目按时交付率',completed:'91%',score:4.0,grade:'符合预期'},
  {employeeId:'EMP2007',itemName:'客户满意度评分',completed:'4.2',score:5.0,grade:'超出预期'},
  {employeeId:'EMP9999',itemName:'不存在',completed:'1',score:1,grade:'低于预期'}
];

var currentPage=1;var PAGE_SIZE=8;var currentStatus='全部';

function filterStatus(status,btn){
  currentStatus=status;currentPage=1;
  var container=document.getElementById('statusFilter');
  container.querySelectorAll('.btn').forEach(function(b){b.classList.remove('btn-active');});
  if(btn)btn.classList.add('btn-active');
  render();
}

function getFiltered(){
  var q=(document.getElementById('searchInput').value||'').trim().toLowerCase();
  return EMPLOYEES.filter(function(e){
    if(currentStatus!=='全部'&&e.personalFlowStatus!==currentStatus)return false;
    if(q&&e.name.toLowerCase().indexOf(q)<0&&String(e.employeeId).toLowerCase().indexOf(q)<0)return false;
    return true;
  });
}

function handleSearch(){
  currentPage=1;
  render();
}

function render(){
  var filtered=getFiltered();
  var totalPages=Math.ceil(filtered.length/PAGE_SIZE)||1;
  if(currentPage>totalPages)currentPage=totalPages;
  var start=(currentPage-1)*PAGE_SIZE;
  var pageData=filtered.slice(start,start+PAGE_SIZE);

  var html='';
  pageData.forEach(function(emp){
    emp.goals.forEach(function(g){
      html+='<tr>'+
        '<td>'+empCell(emp)+'</td>'+
        '<td style="font-weight:500;color:var(--c8)">'+g.name+'</td>'+
        '<td>'+(g.completed||'<span style="color:var(--c4)">—</span>')+'</td>'+
        '<td><span class="type-tag '+g.type+'">'+(g.type==='quant'?'定量':'定性')+'</span></td>'+
        '<td style="font-family:var(--m)">'+g.weight+'%</td>'+
        '<td style="font-family:var(--m);font-weight:600">'+(g.score!==null&&g.score!==''?g.score:'—')+'</td>'+
        '<td style="white-space:nowrap">'+(g.grade?'<span style="padding:2px 6px;border-radius:3px;font:500 11px/1 var(--f);background:var(--em50);color:var(--em700)">'+g.grade+'</span>':'—')+'</td>'+
        '<td style="white-space:nowrap">'+flowStatusBadge(emp)+'</td>'+
        '</tr>';
    });
  });
  document.getElementById('tableBody').innerHTML=html;

  var allowCount=filtered.filter(canImportByFlow).length;
  var blockCount=filtered.length-allowCount;
  var hdImported=document.getElementById('hdImported');
  var hdPending=document.getElementById('hdPending');
  if(hdImported)hdImported.textContent=allowCount+'人';
  if(hdPending)hdPending.textContent=blockCount+'人';
  document.getElementById('listSummary').textContent='可导入(未开始) '+allowCount+'人 · 禁止导入 '+blockCount+'人';

  var ph='<span class="pager-info">共 <b style="color:var(--c8)">'+filtered.length+'</b> 人，第 '+Math.min(start+1,filtered.length)+'-'+Math.min(start+PAGE_SIZE,filtered.length)+' 条</span><div class="pager-btns">';
  ph+='<button class="pager-btn" onclick="goPage('+(currentPage-1)+')"'+(currentPage<=1?' disabled':'')+'><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>';
  for(var p=1;p<=totalPages;p++){
    ph+='<button class="pager-btn'+(p===currentPage?' active':'')+'" onclick="goPage('+p+')">'+p+'</button>';
  }
  ph+='<button class="pager-btn" onclick="goPage('+(currentPage+1)+')"'+(currentPage>=totalPages?' disabled':'')+'><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>';
  ph+='</div>';
  document.getElementById('pager').innerHTML=ph;
}

function goPage(p){currentPage=p;render();}

function handleImport(e){
  var file=e.target.files[0];if(!file)return;
  var success=[];var failed=[];
  MOCK_IMPORT_ROWS.forEach(function(row,idx){
    var lineNo=idx+2;
    var emp=EMPLOYEES.find(function(x){return x.employeeId===row.employeeId;});
    if(!emp){
      failed.push({line:lineNo,employeeId:row.employeeId,reason:'工号不在当前活动'});
      return;
    }
    var block=importBlockReason(emp);
    if(block){
      failed.push({line:lineNo,employeeId:row.employeeId,name:emp.name,reason:block});
      return;
    }
    var g=emp.goals.find(function(x){return x.name===row.itemName;});
    if(!g){
      failed.push({line:lineNo,employeeId:row.employeeId,name:emp.name,reason:'指标/目标无法匹配：'+row.itemName});
      return;
    }
    g.completed=row.completed;g.score=row.score;g.grade=row.grade;g.filled=true;
    success.push({line:lineNo,employeeId:row.employeeId,name:emp.name,itemName:row.itemName});
  });
  render();
  var msg='导入完成：成功 '+success.length+' 行，失败 '+failed.length+' 行（按工号逐人门禁，部分成功）';
  if(failed.length)msg+='；失败：'+failed.map(function(f){return f.employeeId+(f.name?'/'+f.name:'')+' '+f.reason;}).join('；');
  showToast(msg,failed.length?'warning':'success');
  console.info('考核导入结果',{success:success,failed:failed});
  e.target.value='';
}

function validateEmployeeEval(emp){
  var block=importBlockReason(emp);
  if(block)return block;
  if(!emp.goals.length)return '至少一条考核指标';
  for(var i=0;i<emp.goals.length;i++){
    var g=emp.goals[i];
    if(!g.name)return '存在指标名称缺失';
    if(g.type==='quant'&&(g.completed===''||g.completed==null))return '定量指标完成值未填：'+g.name;
    if(g.type==='qual'&&!g.completed&&!g.grade)return '定性指标完成情况未填：'+g.name;
  }
  return '';
}
function submitEvalImport(){
  var success=[];var failed=[];
  EMPLOYEES.forEach(function(emp){
    var block=importBlockReason(emp);
    if(block){
      failed.push(emp.employeeId+'/'+emp.name+'：'+block);
      return;
    }
    var reason=validateEmployeeEval(emp);
    if(reason)failed.push(emp.employeeId+'/'+emp.name+'：'+reason);
    else success.push(emp.employeeId+'/'+emp.name);
  });
  var msg='提交完成：'+success.length+' 人成功，'+failed.length+' 人失败';
  if(failed.length)msg+='；失败：'+failed.slice(0,5).join('；')+(failed.length>5?'…':'');
  showToast(msg,failed.length?'warning':'success');
  console.info('考核正式提交校验结果',{success:success,failed:failed});
}
function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'success')+' show';setTimeout(function(){t.classList.remove('show')},4000);}
render();
</script>
</body>
