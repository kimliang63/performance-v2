<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 考核结果批量导入</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--em:#10B981;--em50:#ECFDF5;--em700:#047857;--ac:#F59E0B;--ac50:#FFFBEB;--ac700:#B45309;--ro:#F43F5E;--ro50:#FFF1F2;--vi:#8B5CF6;--vi50:#F5F3FF;--c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;--sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;--shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);--r1:6px;--r2:8px;--r3:10px;--r4:14px;--f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;--m:'JetBrains Mono','SF Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
.ct{max-width:1060px;margin:0 auto;padding:24px}

.steps{display:flex;align-items:center;margin-bottom:24px;background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:16px 24px}
.step{display:flex;align-items:center;gap:8px;flex:1}
.step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:600 12px/1 var(--f);color:var(--c4);background:var(--c1);border:2px solid var(--c2);flex-shrink:0;transition:all .2s}
.step.active .step-num{background:var(--pr);color:#FFF;border-color:var(--pr)}
.step.done .step-num{background:var(--em);color:#FFF;border-color:var(--em)}
.step-text{font:500 13px/1 var(--f);color:var(--c5)}
.step.active .step-text{color:var(--c9);font-weight:600}
.step.done .step-text{color:var(--em700)}
.step-line{width:40px;height:2px;background:var(--c2);flex-shrink:0;margin:0 8px}
.step-line.done{background:var(--em)}

.card{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:24px;margin-bottom:16px}
.card-title{font:600 15px/1 var(--f);color:var(--c9);margin-bottom:4px}
.card-desc{font:400 13px/1 var(--f);color:var(--c5);margin-bottom:16px}

.upload-zone{border:2px dashed var(--c2);border-radius:var(--r3);padding:48px 24px;text-align:center;cursor:pointer;transition:all .15s;background:var(--c0)}
.upload-zone:hover{border-color:var(--pr);background:var(--pr50)}
.upload-zone.dragover{border-color:var(--pr);background:var(--pr50);box-shadow:0 0 0 4px var(--pr100)}
.upload-icon{font-size:40px;margin-bottom:12px;opacity:.6}
.upload-text{font:500 14px/1 var(--f);color:var(--c8);margin-bottom:6px}
.upload-hint{font:400 12px/1 var(--f);color:var(--c5)}

.file-preview{background:var(--c0);border:1px solid var(--c2);border-radius:var(--r2);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-top:16px}
.file-icon{width:40px;height:40px;border-radius:var(--r1);background:var(--em50);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.file-info{flex:1}
.file-name{font:500 13px/1 var(--f);color:var(--c8)}
.file-meta{font:400 12px/1 var(--f);color:var(--c5);margin-top:2px}
.file-remove{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c4);background:transparent;border:none}
.file-remove:hover{background:var(--ro50);color:var(--ro)}

.preview-table{width:100%;border-collapse:collapse}
.preview-table th{background:var(--c0);padding:10px 12px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;position:sticky;top:0}
.preview-table td{padding:10px 12px;font:400 13px/1.3 var(--f);color:var(--c7);border-bottom:1px solid var(--dv)}
.preview-table tr:hover td{background:var(--c0)}
.preview-table .err td{background:var(--ro50)}
.emp-group{background:var(--c0);font:600 13px/1 var(--f);color:var(--c8);padding:10px 12px;border-bottom:1px solid var(--c2)}

.stats-bar{display:flex;gap:16px;padding:12px 0;border-bottom:1px solid var(--dv);margin-bottom:16px}
.stat-item{display:flex;align-items:center;gap:6px;font:400 13px/1 var(--f)}
.stat-dot{width:8px;height:8px;border-radius:50%}
.stat-dot.ok{background:var(--em)}.stat-dot.err{background:var(--ro)}

.btn{display:inline-flex;align-items:center;gap:5px;padding:0 16px;height:36px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:14px;height:14px}
.btn-p{background:var(--pr);color:#FFF}.btn-p:hover{background:var(--pr700)}.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}.btn-s:hover{border-color:var(--c3);color:var(--c8)}
.btn-o{background:var(--sf);color:var(--pr);border:1px solid var(--pr200)}.btn-o:hover{background:var(--pr50)}
.actions{display:flex;justify-content:space-between;align-items:center;margin-top:16px}

.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--r2);font:500 13px/1 var(--f);color:#FFF;z-index:3000;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;pointer-events:all}
.toast.success{background:var(--em);box-shadow:0 8px 24px rgba(16,185,129,.3)}
.toast.error{background:var(--ro);box-shadow:0 8px 24px rgba(244,63,94,.3)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}
</style>
</head>
<body>
<div class="ct fade-in">
  <nav style="display:flex;align-items:center;gap:4px;font:500 12px/1 var(--f);color:var(--c5);margin-bottom:12px">
    <a href="../demo-index.html" style="color:var(--c5);text-decoration:none" onmouseover="this.style.color='var(--pr)'" onmouseout="this.style.color='var(--c5)'">绩效工作台</a>
    <span style="color:var(--c3)">/</span>
    <span style="color:var(--c8);font-weight:600">考核结果批量导入</span>
  </nav>

  <div class="steps">
    <div class="step active" id="step1"><div class="step-num">1</div><span class="step-text">上传文件</span></div>
    <div class="step-line" id="line1"></div>
    <div class="step" id="step2"><div class="step-num">2</div><span class="step-text">数据预览</span></div>
    <div class="step-line" id="line2"></div>
    <div class="step" id="step3"><div class="step-num">3</div><span class="step-text">导入完成</span></div>
  </div>

  <!-- Step 1 -->
  <div id="panel1" class="card fade-in">
    <div class="card-title">上传考核结果文件</div>
    <div class="card-desc">HRBP 批量导入员工目标完成值或评价结果</div>
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-o" onclick="showToast('模板已下载','success')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        下载导入模板
      </button>
      <span style="font:400 12px/1 var(--f);color:var(--c4)">模板字段：员工姓名 | 指标名称 | 类型 | 完成值/完成情况 | 评分 | 等级</span>
    </div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📁</div>
      <div class="upload-text">点击或拖拽文件至此上传</div>
      <div class="upload-hint">支持 .xlsx .xls .csv，单文件不超过 10MB</div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(event)">
    <div id="filePreview"></div>
    <div class="actions">
      <span style="font:400 12px/1 var(--f);color:var(--c4)">💡 支持一次导入多名员工的考核结果，系统按员工姓名自动分组</span>
      <button class="btn btn-p" id="btnNext1" disabled onclick="goStep(2)">下一步：预览数据</button>
    </div>
  </div>

  <!-- Step 2 -->
  <div id="panel2" class="card fade-in" style="display:none">
    <div class="card-title">数据预览</div>
    <div class="card-desc">按员工分组展示，红色行存在错误</div>
    <div class="stats-bar" id="previewStats"></div>
    <div style="max-height:480px;overflow-y:auto;border:1px solid var(--c2);border-radius:var(--r2)">
      <table class="preview-table" id="previewTable"></table>
    </div>
    <div class="actions">
      <button class="btn btn-s" onclick="goStep(1)">← 返回修改</button>
      <button class="btn btn-p" onclick="doImport()">确认导入</button>
    </div>
  </div>

  <!-- Step 3 -->
  <div id="panel3" class="card fade-in" style="display:none;text-align:center;padding:48px 24px">
    <div style="font-size:48px;margin-bottom:16px">✅</div>
    <div class="card-title" style="font-size:18px;margin-bottom:8px">导入成功</div>
    <div class="card-desc" style="margin-bottom:24px" id="doneSummary"></div>
    <div style="display:flex;gap:12px;justify-content:center">
      <a href="../demo-index.html" class="btn btn-p">返回工作台</a>
      <button class="btn btn-s" onclick="resetImport()">继续导入</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
GHR_NAV.init('perf', '考核结果批量导入');
var currentStep=1,uploadedFile=null;

var MOCK_DATA=[
  {emp:'张明',name:'资源利用率（通用）',type:'定量',weight:5,completed:'108%',score:100,grade:'符合预期+',errors:[]},
  {emp:'张明',name:'HRAS UAT用户验收首次通过率',type:'定量',weight:10,completed:'97%',score:80,grade:'符合预期',errors:[]},
  {emp:'张明',name:'HRAS需求评审及时率',type:'定量',weight:15,completed:'96%',score:80,grade:'符合预期',errors:[]},
  {emp:'张明',name:'HRAS产品管理规范',type:'定性',weight:10,completed:'4项规范全部符合',score:null,grade:'符合预期+',errors:[]},
  {emp:'张明',name:'日常滚动需求响应',type:'定性',weight:10,completed:'按时完成GOFO迭代',score:null,grade:'符合预期+',errors:[]},
  {emp:'张明',name:'HR ONE 绩效重构事项推进',type:'定性',weight:25,completed:'3个里程碑按时交付',score:null,grade:'符合预期+',errors:[]},
  {emp:'张明',name:'AI应用项目探索与落地推广',type:'定性',weight:25,completed:'3个版本按时发布',score:null,grade:'符合预期+',errors:[]},
  {emp:'李华',name:'产品迭代完成率',type:'定量',weight:20,completed:'92%',score:100,grade:'超出预期',errors:[]},
  {emp:'李华',name:'客户需求响应及时率',type:'定量',weight:15,completed:'88%',score:80,grade:'符合预期',errors:[]},
  {emp:'李华',name:'产品规划文档输出',type:'定性',weight:30,completed:'完成Q3路线图',score:null,grade:'符合预期+',errors:[]},
  {emp:'李华',name:'跨部门协作项目推进',type:'定性',weight:20,completed:'主导2个项目',score:null,grade:'符合预期',errors:[]},
  {emp:'李华',name:'团队知识分享',type:'定性',weight:15,completed:'每月1次分享',score:null,grade:'符合预期',errors:[]},
  {emp:'赵强',name:'项目按时交付率',type:'定量',weight:25,completed:'87%',score:80,grade:'符合预期',errors:[]},
  {emp:'赵强',name:'技术方案评审',type:'定性',weight:30,completed:'完成3次评审',score:null,grade:'符合预期+',errors:[]},
  {emp:'赵强',name:'团队效能提升',type:'定性',weight:25,completed:'代码质量提升18%',score:null,grade:'符合预期',errors:[]},
];

function goStep(n){
  if(n===2&&!MOCK_DATA.length){showToast('请先上传文件','error');return;}
  currentStep=n;
  [1,2,3].forEach(function(i){
    document.getElementById('panel'+i).style.display=i===n?'':'none';
    document.getElementById('step'+i).className='step'+(i===n?' active':i<n?' done':'');
  });
  document.getElementById('line1').className='step-line'+(n>1?' done':'');
  document.getElementById('line2').className='step-line'+(n>2?' done':'');
  if(n===2)renderPreview();
  if(n===3){
    var empCount=new Set(MOCK_DATA.map(function(r){return r.emp})).size;
    document.getElementById('doneSummary').textContent='已为 '+empCount+' 名员工导入 '+MOCK_DATA.length+' 条考核结果';
  }
}

function handleFile(e){
  var file=e.target.files[0];if(!file)return;
  uploadedFile=file;
  var size=file.size>1024*1024?(file.size/(1024*1024)).toFixed(1)+'MB':(file.size/1024).toFixed(0)+'KB';
  document.getElementById('filePreview').innerHTML='<div class="file-preview"><div class="file-icon">📊</div><div class="file-info"><div class="file-name">'+file.name+'</div><div class="file-meta">'+size+'</div></div><button class="file-remove" onclick="removeFile()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>';
  document.getElementById('btnNext1').disabled=false;
}

function removeFile(){
  uploadedFile=null;document.getElementById('filePreview').innerHTML='';
  document.getElementById('fileInput').value='';document.getElementById('btnNext1').disabled=true;
}

function renderPreview(){
  var errCount=MOCK_DATA.filter(function(r){return r.errors.length>0;}).length;
  var empCount=new Set(MOCK_DATA.map(function(r){return r.emp})).size;
  document.getElementById('previewStats').innerHTML=
    '<div class="stat-item"><span class="stat-dot ok"></span>覆盖 <b style="color:var(--c8)">'+empCount+'</b> 名员工，<b style="color:var(--c8)">'+MOCK_DATA.length+'</b> 条数据</div>'+
    (errCount?'<div class="stat-item"><span class="stat-dot err"></span>错误 <b style="color:var(--ro)">'+errCount+'</b> 条</div>':'')

  var groups={};
  MOCK_DATA.forEach(function(r){
    if(!groups[r.emp])groups[r.emp]=[];
    groups[r.emp].push(r);
  });

  var h='<thead><tr><th>指标名称</th><th>类型</th><th>权重</th><th>完成值/完成情况</th><th>得分</th><th>等级</th><th>状态</th></tr></thead><tbody>';
  Object.keys(groups).forEach(function(emp){
    var goals=groups[emp];
    h+='<tr class="emp-group"><td colspan="7">👤 '+emp+' — '+goals.length+' 项考核指标</td></tr>';
    goals.forEach(function(r){
      var hasErr=r.errors.length>0;
      h+='<tr'+(hasErr?' class="err"':'')+'>'+
        '<td style="font-weight:500;color:var(--c8)">'+r.name+'</td>'+
        '<td><span style="padding:2px 6px;border-radius:3px;font:500 11px/1 var(--f);background:'+(r.type==='定量'?'var(--pr50);color:var(--pr)':'var(--vi50);color:var(--vi)')+'">'+r.type+'</span></td>'+
        '<td style="font-family:var(--m)">'+r.weight+'%</td>'+
        '<td>'+r.completed+'</td>'+
        '<td style="font-family:var(--m);font-weight:600">'+(r.score!==null?r.score:'—')+'</td>'+
        '<td><span style="padding:2px 6px;border-radius:3px;font:500 11px/1 var(--f);background:var(--em50);color:var(--em700)">'+r.grade+'</span></td>'+
        '<td>'+(hasErr?'<span style="color:var(--ro)">❌ '+r.errors[0]+'</span>':'<span style="color:var(--em700)">✓</span>')+'</td></tr>';
    });
  });
  h+='</tbody>';
  document.getElementById('previewTable').innerHTML=h;
}

function doImport(){goStep(3);}
function resetImport(){
  uploadedFile=null;currentStep=1;
  document.getElementById('filePreview').innerHTML='';
  document.getElementById('fileInput').value='';
  document.getElementById('btnNext1').disabled=true;
  goStep(1);
}
function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'success')+' show';setTimeout(function(){t.classList.remove('show')},3000);}
var uz=document.getElementById('uploadZone');
uz.addEventListener('dragover',function(e){e.preventDefault();uz.classList.add('dragover')});
uz.addEventListener('dragleave',function(){uz.classList.remove('dragover')});
uz.addEventListener('drop',function(e){e.preventDefault();uz.classList.remove('dragover');if(e.dataTransfer.files.length)handleFile({target:{files:e.dataTransfer.files}});});
</script>
</body>
</html>
