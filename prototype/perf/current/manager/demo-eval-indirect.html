<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 绩效评分 - 间接上级</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

.btn{display:inline-flex;align-items:center;gap:5px;padding:0 16px;height:34px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:14px;height:14px}
.btn-p{background:var(--pr);color:#FFF}.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}.btn-s:hover{border-color:var(--c3);color:var(--c8)}

.info-row{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.info-item{display:flex;align-items:center;gap:6px;font:400 13px/1 var(--f);color:var(--c5)}
.info-item strong{font-weight:600;color:var(--c8)}

.eval-card{background:var(--sf);border-radius:var(--r3);box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:16px;overflow:hidden}
.eval-card-hd{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--dv)}
.eval-card-icon{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.eval-card-icon svg{width:12px;height:12px;color:#FFF}
.eval-card-name{font:600 14px/1 var(--f);color:var(--c9)}
.eval-card-weight{font:500 11px/1 var(--fm);padding:2px 7px;border-radius:3px;background:var(--pr50);color:var(--pr);margin-left:8px}
.eval-card-readonly{font:500 11px/1 var(--f);padding:2px 7px;border-radius:3px;background:var(--c1);color:var(--c4);margin-left:8px}

.eval-table{width:100%;border-collapse:collapse}
.eval-table th{background:var(--c0);padding:8px 12px;font:500 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);white-space:nowrap}
.eval-table td{padding:10px 12px;font:400 13px/1.3 var(--f);color:var(--c7);border-bottom:1px solid var(--dv);vertical-align:middle}
.eval-table tr:last-child td{border-bottom:none}
.eval-table .g-name{font-weight:500;color:var(--c8)}
.eval-table .g-weight{font-family:var(--fm);text-align:center}
.eval-table .g-val{font-family:var(--fm);text-align:right;color:var(--c6)}
.eval-table input[type="number"]{width:60px;height:30px;border:1px solid var(--c2);border-radius:var(--r1);text-align:center;font:500 13px/1 var(--fm);font-family:var(--fm);outline:none;padding:0 4px}
.eval-table input[type="number"]:focus{border-color:var(--pr);box-shadow:0 0 0 2px var(--pr100)}
.eval-table select{height:30px;border:1px solid var(--c2);border-radius:var(--r1);padding:0 8px;font:500 13px/1 var(--f);outline:none;font-family:inherit;background:var(--sf);cursor:pointer}
.eval-table select:focus{border-color:var(--pr)}
.eval-table textarea{width:100%;min-width:140px;height:28px;border:1px solid var(--c2);border-radius:var(--r1);padding:4px 8px;font:400 12px/1.3 var(--f);resize:vertical;outline:none;font-family:inherit}
.eval-table textarea:focus{border-color:var(--pr)}
.grade-s{color:var(--ro);font-weight:600}
.grade-a{color:var(--ac700);font-weight:600}
.grade-b{color:var(--pr);font-weight:600}
.grade-c{color:var(--c6);font-weight:600}
.grade-d{color:var(--c4);font-weight:600}

.summary-bar{background:var(--sf);border-radius:var(--r3);box-shadow:0 1px 3px rgba(0,0,0,.05);padding:16px 20px;display:flex;align-items:center;gap:32px;position:sticky;bottom:0;z-index:100;border-top:2px solid var(--pr)}
.summary-item{display:flex;flex-direction:column;gap:2px}
.summary-label{font:400 11px/1 var(--f);color:var(--c5)}
.summary-val{font:700 20px/1 var(--fm)}
.summary-val.grade-s{color:var(--ro)}
.summary-val.grade-a{color:var(--ac700)}
.summary-val.grade-b{color:var(--pr)}

.toast{position:fixed;top:70px;right:24px;padding:12px 18px;border-radius:var(--r2);font:500 13px/1.3 var(--f);box-shadow:0 10px 40px -10px rgba(0,0,0,.12);z-index:3000;transform:translateX(120%);transition:transform .25s ease}
.toast.on{transform:translateX(0)}
.toast.success{background:var(--em);color:#FFF}
.toast.warning{background:var(--ac);color:#FFF}
</style>
</head>
<body>

<div style="height:52px;background:var(--sf);border-bottom:1px solid var(--dv);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:1100">
  <div style="display:flex;align-items:center;gap:14px">
    <a href="../demo-index.html" style="text-decoration:none;display:flex;align-items:center;gap:8px">
      <div style="width:28px;height:28px;border-radius:6px;background:var(--pr);display:flex;align-items:center;justify-content:center">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span style="font-size:15px;font-weight:700;color:var(--c9)">HR ONE</span>
    </a>
    <div style="width:1px;height:20px;background:var(--c2)"></div>
    <span style="font:500 13px/1 var(--f);color:var(--c5)">业务演示 - 管理者端</span>
    <span style="color:var(--c3)">&#8250;</span>
    <span style="font:600 13px/1 var(--f);color:var(--c8)">绩效评分 - 间接上级</span>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
    <span style="font:500 12px/1 var(--f);color:var(--c5)">李总 - VP</span>
    <div style="width:30px;height:30px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font:600 12px/1 var(--f);color:#FFF">李</div>
  </div>
</div>

<div style="padding:20px 24px;padding-bottom:100px">
  <div style="background:var(--sf);border-radius:var(--r3);box-shadow:0 1px 3px rgba(0,0,0,.05);padding:20px;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div style="width:36px;height:36px;border-radius:var(--r2);background:var(--ac);display:flex;align-items:center;justify-content:center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <div>
        <div style="font:700 17px/1.2 var(--f);color:var(--c9)">绩效评分</div>
        <div style="font:400 12px/1 var(--f);color:var(--c5);margin-top:3px">间接上级评分 - 2026年Q2</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn btn-s" onclick="saveDraft()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          暂存
        </button>
        <button class="btn btn-p" onclick="submitEval()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          提交评分
        </button>
      </div>
    </div>
    <div class="info-row">
      <div class="info-item">被评人：<strong>张明</strong></div>
      <div class="info-item">部门：<strong>产品部</strong></div>
      <div class="info-item">岗位：<strong>高级产品经理</strong></div>
      <div class="info-item">考核周期：<strong>2026年Q2</strong></div>
      <div class="info-item">评分范围：<strong>能力发展、价值观</strong></div>
    </div>
  </div>

  <div id="evalCards"></div>
</div>

<div class="summary-bar" id="summaryBar">
  <div class="summary-item">
    <span class="summary-label">评分范围加权总分</span>
    <span class="summary-val" id="totalScore">--</span>
  </div>
  <div class="summary-item">
    <span class="summary-label">建议等级</span>
    <span class="summary-val" id="suggestGrade">--</span>
  </div>
  <div style="margin-left:auto;font:400 12px/1.3 var(--f);color:var(--c5)">间接上级仅评能力发展与价值观模块</div>
</div>

<div id="toast" class="toast"></div>

<script>
var MODULES=[
  {name:'业绩目标',weight:30,color:'var(--pr)',readonly:true,goals:[
    {name:'完成Q2产品迭代',weight:18,target:'100%',completed:'95%',score:null,grade:null,comment:''},
    {name:'新客户拓展',weight:12,target:'5000',completed:'5200',score:null,grade:null,comment:''}
  ]},
  {name:'管理目标',weight:20,color:'var(--em)',readonly:true,goals:[
    {name:'团队效率提升',weight:10,target:'110%',completed:'115%',score:null,grade:null,comment:''},
    {name:'人才培养',weight:10,target:'2人',completed:'2人',score:null,grade:null,comment:''}
  ]},
  {name:'能力发展',weight:15,color:'var(--ac)',readonly:false,goals:[
    {name:'云原生架构认证',weight:8,target:'1项',completed:'1项',score:85,grade:'B',comment:'按时完成认证'},
    {name:'业务分析报告',weight:7,target:'2份',completed:'3份',score:92,grade:'A',comment:'超额完成，报告质量高'}
  ]},
  {name:'价值观',weight:10,color:'var(--vi)',readonly:false,goals:[
    {name:'价值观践行',weight:10,target:'85分',completed:'88分',score:88,grade:'A',comment:'360评估表现良好'}
  ]}
];

function getGradeClass(grade){
  if(grade==='S')return'grade-s';
  if(grade==='A')return'grade-a';
  if(grade==='B')return'grade-b';
  if(grade==='C')return'grade-c';
  return'grade-d';
}

function scoreToGrade(score){
  if(score>=95)return'S';
  if(score>=85)return'A';
  if(score>=70)return'B';
  if(score>=60)return'C';
  return'D';
}

function renderCards(){
  var html='';
  MODULES.forEach(function(mod,mi){
    var isRO=mod.readonly;
    html+='<div class="eval-card">';
    html+='<div class="eval-card-hd"><div class="eval-card-icon" style="background:'+mod.color+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div>';
    html+='<span class="eval-card-name">'+mod.name+'</span>';
    html+='<span class="eval-card-weight">'+mod.weight+'%</span>';
    if(isRO)html+='<span class="eval-card-readonly">直接上级评分</span>';
    html+='</div>';
    if(mod.goals.length===0){
      html+='<div style="padding:20px;text-align:center;color:var(--c4);font:400 13px/1 var(--f)">暂无目标</div>';
    }else{
      html+='<table class="eval-table"><thead><tr><th style="width:140px">目标名称</th><th style="width:60px;text-align:center">权重</th><th style="width:80px;text-align:right">目标值</th><th style="width:80px;text-align:right">完成值</th><th style="width:70px;text-align:center">评分</th><th style="width:80px">等级</th><th>评语</th></tr></thead><tbody>';
      mod.goals.forEach(function(g,gi){
        html+='<tr>';
        html+='<td class="g-name">'+g.name+'</td>';
        html+='<td class="g-weight">'+g.weight+'%</td>';
        html+='<td class="g-val">'+g.target+'</td>';
        html+='<td class="g-val" style="color:var(--c8)">'+g.completed+'</td>';
        if(isRO){
          html+='<td style="text-align:center;color:var(--c4)">--</td>';
          html+='<td style="color:var(--c4)">--</td>';
          html+='<td style="color:var(--c4);font-size:12px">由直接上级评分</td>';
        }else{
          html+='<td style="text-align:center"><input type="number" min="0" max="100" value="'+(g.score||'')+'" onchange="onScoreChange('+mi+','+gi+',this.value)" oninput="onScoreChange('+mi+','+gi+',this.value)"></td>';
          html+='<td><select onchange="onGradeChange('+mi+','+gi+',this.value)"><option value="">请选择</option><option value="S"'+(g.grade==='S'?' selected':'')+'>S</option><option value="A"'+(g.grade==='A'?' selected':'')+'>A</option><option value="B"'+(g.grade==='B'?' selected':'')+'>B</option><option value="C"'+(g.grade==='C'?' selected':'')+'>C</option><option value="D"'+(g.grade==='D'?' selected':'')+'>D</option></select></td>';
          html+='<td><textarea placeholder="评语..." oninput="onCommentChange('+mi+','+gi+',this.value)">'+(g.comment||'')+'</textarea></td>';
        }
        html+='</tr>';
      });
      html+='</tbody></table>';
    }
    html+='</div>';
  });
  document.getElementById('evalCards').innerHTML=html;
}

function onScoreChange(mi,gi,val){
  var v=parseInt(val);
  if(isNaN(v))v=0;
  if(v<0)v=0;if(v>100)v=100;
  MODULES[mi].goals[gi].score=v;
  MODULES[mi].goals[gi].grade=scoreToGrade(v);
  renderCards();
  updateSummary();
}

function onGradeChange(mi,gi,val){
  MODULES[mi].goals[gi].grade=val;
}

function onCommentChange(mi,gi,val){
  MODULES[mi].goals[gi].comment=val;
}

function updateSummary(){
  var totalWeight=0,totalScore=0;
  MODULES.forEach(function(mod){
    if(mod.readonly)return;
    mod.goals.forEach(function(g){
      if(g.score!==null&&g.score!==undefined){
        totalWeight+=g.weight;
        totalScore+=g.score*g.weight;
      }
    });
  });
  var avg=totalWeight>0?Math.round(totalScore/totalWeight*10)/10:0;
  document.getElementById('totalScore').textContent=avg>0?avg:'--';
  document.getElementById('totalScore').className='summary-val '+(avg>0?getGradeClass(scoreToGrade(avg)):'');
  document.getElementById('suggestGrade').textContent=avg>0?scoreToGrade(avg):'--';
  document.getElementById('suggestGrade').className='summary-val '+(avg>0?getGradeClass(scoreToGrade(avg)):'');
}

function saveDraft(){showToast('评分已暂存','success')}
function submitEval(){
  var hasEmpty=false;
  MODULES.forEach(function(mod){
    if(mod.readonly)return;
    mod.goals.forEach(function(g){
      if(g.score===null||g.score===undefined||g.score===0)hasEmpty=true;
    });
  });
  if(hasEmpty){showToast('请完成所有评分项后再提交','warning');return}
  showToast('评分已提交','success');
}

function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(type||'success');
  setTimeout(function(){t.classList.add('on')},10);
  setTimeout(function(){t.classList.remove('on')},2500);
}

renderCards();
updateSummary();
</script>
<script src="../navigation.js"></script>
<script>GHR_NAV.init('perf', '绩效评分');</script>
</body>
</html>
