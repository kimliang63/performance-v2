<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>结果审定 · 间接上级</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c9);min-height:100vh}
.card{background:var(--sf);border:1px solid var(--c2);border-radius:var(--r3);padding:20px 24px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--c0);text-align:left;padding:10px 14px;font-weight:600;color:var(--c6);border-bottom:1px solid var(--c2);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--c1);vertical-align:middle}
tr:hover td{background:var(--pr50)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600;line-height:20px}
.badge-s{background:#FEF3C7;color:#92400E}
.badge-a{background:var(--em100);color:var(--em700)}
.badge-b{background:var(--pr100);color:var(--pr700)}
.badge-c{background:var(--ac100);color:var(--ac700)}
.badge-d{background:var(--ro100);color:#BE123C}
.badge-wait{background:var(--c1);color:var(--c5)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:var(--r2);font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer;border:none;transition:all .15s}
.btn-pri{background:var(--pr);color:#FFF}.btn-pri:hover{background:var(--pr700)}
.btn-out{background:var(--sf);color:var(--c7);border:1px solid var(--c3)}.btn-out:hover{border-color:var(--ro);color:var(--ro)}
.btn-ro{background:var(--ro);color:#FFF}.btn-ro:hover{background:#E11D48}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:var(--sf);border:1px solid var(--c2);border-radius:var(--r2);padding:16px 20px;text-align:center}
.stat-val{font-size:28px;font-weight:700;line-height:1.2}
.stat-label{font-size:12px;color:var(--c5);margin-top:4px}
.opinion{font-size:12px;color:var(--c6);background:var(--c0);padding:6px 10px;border-radius:var(--r1);margin-top:4px;max-width:200px;line-height:1.5}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--sf);border-radius:var(--r4);padding:24px;width:420px;max-width:90vw}
.modal h4{font-size:15px;font-weight:700;margin-bottom:12px}
.modal textarea{width:100%;height:100px;border:1px solid var(--c3);border-radius:var(--r2);padding:10px;font-size:13px;font-family:var(--f);resize:vertical;margin-bottom:16px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px}
#toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-60px);padding:10px 24px;border-radius:var(--r2);font-size:13px;font-weight:600;z-index:9999;transition:transform .3s;pointer-events:none}
#toast.success{background:var(--em);color:#FFF}
#toast.error{background:var(--ro);color:#FFF}
#toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div style="height:52px;background:var(--sf);border-bottom:1px solid var(--dv);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:1100">
  <div style="display:flex;align-items:center;gap:14px">
    <a href="../demo-index.html" style="text-decoration:none;display:flex;align-items:center;gap:8px">
      <div style="width:28px;height:28px;border-radius:6px;background:var(--pr);display:flex;align-items:center;justify-content:center">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span style="font-size:15px;font-weight:700;color:var(--c9)">HR ONE</span>
    </a>
    <div style="width:1px;height:20px;background:var(--c2)"></div>
    <span style="font:500 13px/1 var(--f);color:var(--c5)">业务演示 - 管理者端</span>
    <span style="color:var(--c3)">&#8250;</span>
    <span style="font:600 13px/1 var(--f);color:var(--c8)">结果审定 · 间接上级</span>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
    <span style="font:500 12px/1 var(--f);color:var(--c5)">李总 - VP</span>
    <div style="width:30px;height:30px;border-radius:50%;background:var(--pr);display:flex;align-items:center;justify-content:center;font:600 12px/1 var(--f);color:#FFF">李</div>
  </div>
</div>

<div style="max-width:1200px;margin:0 auto;padding:24px">
  <h2 style="font-size:18px;font-weight:700;margin-bottom:20px">间接上级审定</h2>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val" style="color:var(--c9)">5</div><div class="stat-label">团队总人数</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--pr)">5</div><div class="stat-label">直接上级已审定</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--ac)">3</div><div class="stat-label">待批准</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--em)">2</div><div class="stat-label">已批准</div></div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h3 style="font-size:15px;font-weight:600">审定结果列表</h3>
      <div style="display:flex;gap:8px">
        <button class="btn btn-pri" onclick="showToast('已批量批准全部','success')">批量批准</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>姓名</th><th>岗位</th><th>加权总分</th><th>直接上级审定等级</th><th>审定意见</th><th>间接上级状态</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="memberBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h3 style="font-size:15px;font-weight:600;margin-bottom:16px">强制分布校验</h3>
    <div id="distCheck"></div>
  </div>
</div>

<div class="modal-overlay" id="returnModal">
  <div class="modal">
    <h4>退回审定</h4>
    <p style="font-size:13px;color:var(--c6);margin-bottom:12px">请填写退回原因，将退回给直接上级重新审定。</p>
    <textarea id="returnReason" placeholder="请输入退回原因..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-out" onclick="closeReturnModal()">取消</button>
      <button class="btn btn-ro" onclick="confirmReturn()">确认退回</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success');
  setTimeout(function() { t.classList.add('on'); }, 10);
  setTimeout(function() { t.classList.remove('on'); }, 2500);
}

var members = [
  {name:'张明',role:'高级产品经理',weight:87.5,grade:'A',opinion:'表现稳定，项目交付质量高',status:'待批准'},
  {name:'李雪',role:'产品经理',weight:92.0,grade:'S',opinion:'季度突出贡献，带领团队超额完成',status:'待批准'},
  {name:'王浩然',role:'产品专员',weight:78.0,grade:'B',opinion:'基本达标，需加强主动性',status:'待批准'},
  {name:'周婷',role:'产品专员',weight:72.5,grade:'C',opinion:'多项目延期，需改进计划能力',status:'已批准'},
  {name:'吴强',role:'产品经理',weight:85.0,grade:'B',opinion:'执行力强，协作能力好',status:'已批准'}
];

var badgeMap = {S:'badge-s',A:'badge-a',B:'badge-b',C:'badge-c',D:'badge-d'};
var distRules = {S:{max:0.1,label:'≤10%'},A:{max:0.2,label:'≤20%'},B:{min:0.5,label:'≥50%'},C:{min:0.1,label:'≥10%'},D:{max:0.1,label:'≤10%'}};
var returnIdx = -1;

function renderTable() {
  var html = '';
  members.forEach(function(m, i) {
    var statusBadge = m.status === '已批准'
      ? '<span class="badge badge-a">已批准</span>'
      : '<span class="badge badge-wait">待批准</span>';
    var actions = m.status === '已批准'
      ? '<span style="font-size:12px;color:var(--c4)">--</span>'
      : '<div style="display:flex;gap:6px"><button class="btn btn-pri" style="padding:4px 12px;font-size:12px" onclick="approve(' + i + ')">批准</button><button class="btn btn-out" style="padding:4px 12px;font-size:12px" onclick="openReturn(' + i + ')">退回</button></div>';
    html += '<tr>' +
      '<td style="font-weight:600">' + m.name + '</td>' +
      '<td>' + m.role + '</td>' +
      '<td style="text-align:center;font-weight:600">' + m.weight + '</td>' +
      '<td style="text-align:center"><span class="badge ' + badgeMap[m.grade] + '">' + m.grade + '</span></td>' +
      '<td><div class="opinion">' + m.opinion + '</div></td>' +
      '<td style="text-align:center">' + statusBadge + '</td>' +
      '<td>' + actions + '</td>' +
      '</tr>';
  });
  document.getElementById('memberBody').innerHTML = html;
}

function renderDist() {
  var counts = {S:0,A:0,B:0,C:0,D:0};
  members.forEach(function(m) { counts[m.grade]++; });
  var total = members.length;
  var colors = {S:'#F59E0B',A:'#10B981',B:'#2563EB',C:'#F97316',D:'#F43F5E'};
  var html = '';
  ['S','A','B','C','D'].forEach(function(g) {
    var pct = counts[g] / total;
    var rule = distRules[g];
    var ruleText = rule.label;
    var valid = rule.max !== undefined ? pct <= rule.max : pct >= rule.min;
    html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:13px">' +
      '<div style="width:40px;font-weight:600;text-align:right;color:' + colors[g] + '">' + g + '</div>' +
      '<div style="flex:1;height:22px;background:var(--c1);border-radius:11px;overflow:hidden"><div style="height:100%;width:' + Math.max(pct*100,2) + '%;background:' + colors[g] + ';border-radius:11px"></div></div>' +
      '<div style="width:50px;font-size:12px;color:var(--c6);text-align:center">' + counts[g] + '/' + total + '</div>' +
      '<div style="width:80px;font-size:12px;color:var(--c5);text-align:right">' + ruleText + (valid ? ' <span style="color:var(--em)">✓</span>' : ' <span style="color:var(--ro)">✗</span>') + '</div>' +
      '</div>';
  });
  document.getElementById('distCheck').innerHTML = html;
}

function approve(idx) {
  members[idx].status = '已批准';
  renderTable();
  showToast(members[idx].name + ' 已批准','success');
}

function openReturn(idx) {
  returnIdx = idx;
  document.getElementById('returnReason').value = '';
  document.getElementById('returnModal').classList.add('show');
}

function closeReturnModal() {
  document.getElementById('returnModal').classList.remove('show');
}

function confirmReturn() {
  var reason = document.getElementById('returnReason').value.trim();
  if (!reason) { showToast('请填写退回原因','error'); return; }
  closeReturnModal();
  showToast('已退回 ' + members[returnIdx].name + ' 的审定结果','success');
}

renderTable();
renderDist();
</script>
<script src="../navigation.js"></script>
<script>GHR_NAV.init('perf', '结果审定');</script>
</body>
</html>
