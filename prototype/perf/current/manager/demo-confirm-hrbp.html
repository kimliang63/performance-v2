<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 申诉详情</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --r1:6px;--r2:8px;--r3:10px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

.card{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden}
.card-hd{padding:14px 20px;border-bottom:1px solid var(--dv);display:flex;align-items:center;gap:8px}
.card-hd-ic{width:24px;height:24px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-hd-ic svg{width:13px;height:13px;color:#FFF}
.card-hd-t{font:600 14px/1 var(--f);color:var(--c9)}
.card-bd{padding:16px 20px}
.card-bd+.card-bd{border-top:1px solid var(--dv);padding-top:16px}

/* Header */
.pg-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.pg-hd-l{display:flex;align-items:center;gap:10px}
.pg-hd-t{font:700 18px/1.2 var(--f);color:var(--c9)}
.pg-hd-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font:400 13px/1 var(--f);color:var(--c6);margin-top:6px}
.meta-sep{color:var(--c3)}

/* Status */
.status-appealed{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;font:500 11px/1 var(--f);background:var(--ro50);color:var(--ro)}
.status-appealed::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--ro)}

/* Read-only notice */
.ro-notice{padding:12px 16px;background:var(--c0);border:1px solid var(--c2);border-radius:var(--r2);font:400 12px/1.5 var(--f);color:var(--c5);margin-bottom:16px}
.ro-notice strong{color:var(--c6)}

/* Eval tag */
.eval-tag{display:inline-block;padding:2px 8px;border-radius:3px;font:500 11px/1 var(--f)}
.eval-tag.excellent{background:var(--em50);color:var(--em700)}
.eval-tag.good{background:var(--pr50);color:var(--pr)}
.eval-tag.normal{background:var(--c1);color:var(--c6)}
.eval-tag.poor{background:var(--ro50);color:var(--ro)}

/* Table */
table{width:100%;border-collapse:collapse}
th{background:var(--c0);padding:8px 12px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:8px 12px;font:400 13px/1.4 var(--f);color:var(--c7);border-bottom:1px solid var(--dv);vertical-align:middle}
tr:last-child td{border-bottom:none}
.mod-row td{background:var(--c0);padding:6px 12px;border-bottom:1px solid var(--dv);font:500 12px/1 var(--f);color:var(--c5)}

/* Disputed row highlight */
tr.disputed td{background:var(--ro50)}

/* Flow */
.flow-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--dv)}
.flow-item:last-child{border-bottom:none}
.flow-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.flow-dot.done{background:var(--em)}
.flow-dot svg{width:12px;height:12px;stroke:#FFF;stroke-width:2.5;fill:none}
.flow-info{flex:1;min-width:0}
.flow-name{font:500 13px/1 var(--f);color:var(--c8)}
.flow-grade{font:400 12px/1 var(--f);color:var(--c5);margin-top:2px}
.flow-badge{font:500 11px/1 var(--f);padding:2px 8px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.flow-badge.done{background:var(--em50);color:var(--em700)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}
</style>
</head>
<body>

<div class="ct fade-in">
  <nav style="display:flex;align-items:center;gap:4px;font:500 12px/1 var(--f);color:var(--c5);margin-bottom:12px">
    <a href="../demo-index.html" style="color:var(--c5);text-decoration:none" onmouseover="this.style.color='var(--pr)'" onmouseout="this.style.color='var(--c5)'">绩效工作台</a>
    <span style="color:var(--c3)">/</span>
    <span style="color:var(--c8);font-weight:600">申诉详情</span>
  </nav>

  <div class="pg-hd" style="margin-bottom:8px">
    <div class="pg-hd-l">
      <div class="pg-hd-t">申诉详情</div>
      <span class="status-appealed">已申诉</span>
    </div>
  </div>
  <div class="pg-hd-meta" style="margin-bottom:12px">
    <span style="font:500 14px/1 var(--f);color:var(--c8)">陈静</span>
    <span class="meta-sep">·</span>产品部
    <span class="meta-sep">·</span>技术组
    <span class="meta-sep">·</span>高级工程师
    <span class="meta-sep">·</span>2026年Q2
  </div>

  <!-- Read-only notice -->
  <div class="ro-notice">
    <strong>只读提示：</strong>申诉已提交并结束结果确认流程，最终绩效结果保持锁定。HRBP 仅可查看申诉原始事实，后续由线下沟通处理，系统不登记处理结论。
  </div>

  <!-- Appeal detail -->
  <div class="card">
    <div class="card-hd">
      <div class="card-hd-ic" style="background:var(--ro)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
      <span class="card-hd-t">申诉内容</span>
    </div>
    <div class="card-bd" id="appealContent"></div>
  </div>

  <!-- Score detail -->
  <div class="card">
    <div class="card-hd">
      <div class="card-hd-ic" style="background:var(--pr)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
      <span class="card-hd-t">得分明细</span>
      <span style="font:600 14px/1 var(--fm);color:var(--c9);margin-left:auto">72.5</span>
      <span style="font:500 13px/1 var(--f);color:var(--ac700)">符合预期-</span>
    </div>
    <div class="card-bd">
      <table>
        <thead><tr><th>指标名称</th><th style="width:52px">类型</th><th style="width:52px">权重</th><th style="width:80px">目标值</th><th style="width:64px">完成值</th><th style="width:80px">评价</th></tr></thead>
        <tbody id="scoreDetail"></tbody>
      </table>
    </div>
  </div>

  <!-- Ratify flow (history only) -->
  <div class="card">
    <div class="card-hd">
      <div class="card-hd-ic" style="background:var(--c6)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
      <span class="card-hd-t">审定流程</span>
    </div>
    <div class="card-bd" id="gradeChain"></div>
  </div>
</div>

<script src="../navigation.js"></script>
<script>
GHR_NAV.init('perf', '结果确认');

var APPEAL = {
  employee: {name:'陈静', dept:'产品部', group:'技术组', role:'高级工程师'},
  cycle: '2026年Q2',
  overallGrade: '符合预期-',
  overallScore: 72.5,
  appealReason: 'Q2负责的模块需求复杂度高，在缺乏充分前期调研的情况下按时交付，评级应至少为"符合预期"。',
  appealTime: '2026-06-16 09:30',
  disputedItems: [3, 7],
  attachments: [
    {name:'Q2项目需求文档_v3.pdf', size:'2.4 MB'},
    {name:'迭代交付记录_2026Q2.xlsx', size:'856 KB'}
  ],
  gradeChain: [
    {node:'审定前等级', grade:'符合预期-', done:true},
    {node:'直线上级审定', grade:'符合预期-', done:true},
    {node:'间接上级审定', grade:'符合预期-', done:true},
    {node:'逐级上级审定', grade:'符合预期-', done:true}
  ],
  modules: [
    {name:'KPI', weight:30, color:'var(--pr)', items:[
      {id:1, name:'需求评审及时率', type:'定量', weight:5, target:'98%', challenge:'100%', result:'96%', grade:null, score:80},
      {id:2, name:'UAT验收首次通过率', type:'定量', weight:10, target:'98%', challenge:'100%', result:'97%', grade:null, score:80},
      {id:3, name:'资源利用率（通用）', type:'定量', weight:15, target:'105%', challenge:'110%', result:'108%', grade:null, score:100}
    ]},
    {name:'KPA', weight:70, color:'var(--em)', items:[
      {id:4, name:'产品管理规范', type:'定性', weight:10, target:'—', result:'—', grade:'符合预期+', score:null},
      {id:5, name:'滚动需求响应', type:'定性', weight:10, target:'—', result:'—', grade:'符合预期', score:null},
      {id:6, name:'绩效重构事项推进', type:'定性', weight:25, target:'—', result:'—', grade:'符合预期', score:null},
      {id:7, name:'AI应用项目探索与落地', type:'定性', weight:25, target:'—', result:'—', grade:'符合预期-', score:null}
    ]}
  ]
};

var GRADE_CLS = {'超出预期':'excellent','符合预期+':'good','符合预期':'normal','符合预期-':'poor','低于预期':'poor'};

function renderAppealContent(){
  var h='';
  // Disputed items
  h+='<div style="margin-bottom:14px"><div style="font:500 12px/1 var(--f);color:var(--c6);margin-bottom:6px">异议项</div>';
  APPEAL.modules.forEach(function(mod){
    mod.items.forEach(function(item){
      if(APPEAL.disputedItems.indexOf(item.id)===-1)return;
      var g=item.grade;
      var label=item.type==='定量'?item.score+'分':(g?'<span class="eval-tag '+GRADE_CLS[g]+'">'+g+'</span>':'—');
      h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--ro50);border-radius:var(--r1);margin-bottom:4px;font:400 13px/1.3 var(--f);color:var(--c8)">';
      h+='<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+mod.color+';flex-shrink:0"></span>';
      h+=item.name+' <span style="color:var(--c5);font-size:12px">'+item.type+' · '+item.weight+'%</span>';
      h+='<span style="margin-left:auto">'+label+'</span>';
      h+='</div>';
    });
  });
  h+='</div>';

  // Reason
  h+='<div style="margin-bottom:14px"><div style="font:500 12px/1 var(--f);color:var(--c6);margin-bottom:6px">申诉原因</div>';
  h+='<div style="font:400 13px/1.6 var(--f);color:var(--c7);padding:12px 14px;background:var(--c0);border-radius:var(--r1)">'+APPEAL.appealReason+'</div></div>';

  // Attachments
  h+='<div style="margin-bottom:4px"><div style="font:500 12px/1 var(--f);color:var(--c6);margin-bottom:6px">佐证材料</div>';
  APPEAL.attachments.forEach(function(f){
    h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--c0);border-radius:var(--r1);margin-bottom:4px;font:400 13px/1 var(--f);color:var(--c8)"><span style="font-size:16px">📎</span>'+f.name+'<span style="color:var(--c4);font-size:11px;margin-left:auto">'+f.size+'</span></div>';
  });
  h+='</div>';

  // Time
  h+='<div style="font:400 12px/1 var(--f);color:var(--c5);text-align:right">提交时间：'+APPEAL.appealTime+'</div>';

  document.getElementById('appealContent').innerHTML=h;
}

function renderScoreDetail(){
  var h='';
  APPEAL.modules.forEach(function(mod){
    h+='<tr class="mod-row"><td colspan="6"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+mod.color+';margin-right:6px;vertical-align:middle"></span>'+mod.name+'（'+mod.weight+'%）</td></tr>';
    mod.items.forEach(function(item){
      var isDisputed=APPEAL.disputedItems.indexOf(item.id)>=0;
      var evalCell;
      if(item.type==='定量'){
        evalCell='<span style="font:500 13px/1 var(--m);color:var(--c7)">'+item.score+'分</span>';
      } else {
        var g=item.grade;
        evalCell='<span class="eval-tag '+GRADE_CLS[g]+'">'+g+'</span>';
      }
      h+='<tr'+(isDisputed?' class="disputed"':'')+'>'+
        '<td style="font-weight:500;color:var(--c8)">'+item.name+'</td>'+
        '<td style="color:var(--c5);font-size:12px">'+item.type+'</td>'+
        '<td style="font:500 12px/1 var(--f);color:var(--c6)">'+item.weight+'%</td>'+
        '<td style="color:var(--c6);font-size:12px">'+item.target+'</td>'+
        '<td style="color:var(--c6);font-size:12px">'+item.result+'</td>'+
        '<td>'+evalCell+'</td>'+
        '</tr>';
    });
  });
  document.getElementById('scoreDetail').innerHTML=h;
}

function renderGradeChain(){
  var h='';
  APPEAL.gradeChain.forEach(function(node,i){
    h+='<div class="flow-item">';
    h+='<div class="flow-dot done"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>';
    h+='<div class="flow-info"><div class="flow-name">'+node.node+'</div><div class="flow-grade">'+node.grade+'</div></div>';
    h+='<span class="flow-badge done">已完成</span>';
    h+='</div>';
  });
  // Final: appealed state
  h+='<div class="flow-item">';
  h+='<div class="flow-dot" style="background:var(--ro)"><svg viewBox="0 0 24 24"><line x1="12" y1="9" x2="12" y2="13" stroke="#FFF" stroke-width="2.5"/><line x1="12" y1="17" x2="12.01" y2="17" stroke="#FFF" stroke-width="2.5"/></svg></div>';
  h+='<div class="flow-info"><div class="flow-name">员工申诉</div><div class="flow-grade">已申诉，结果锁定</div></div>';
  h+='<span class="flow-badge" style="background:var(--ro50);color:var(--ro)">已申诉</span>';
  h+='</div>';
  document.getElementById('gradeChain').innerHTML=h;
}

renderAppealContent();
renderScoreDetail();
renderGradeChain();
</script>
</body>
</html>
