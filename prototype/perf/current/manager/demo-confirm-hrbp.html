<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 绩效结果确认·HRBP知悉</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

/* ═══ PAGE HEADER ═══ */
.pg-hd{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:20px 24px;margin-bottom:16px}
.pg-hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pg-hd-title{font:700 20px/1.2 var(--f);color:var(--c9);letter-spacing:-.3px}
.pg-hd-actions{display:flex;gap:8px}
.pg-hd-info{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 24px;font:400 13px/1 var(--f);color:var(--c5);padding:12px 16px;background:var(--c0);border-radius:var(--r2)}
.pg-hd-info-item{display:flex;flex-direction:column;gap:2px}
.pg-hd-info-label{font:400 11px/1 var(--f);color:var(--c4);text-transform:uppercase;letter-spacing:.5px}
.pg-hd-info-value{font:500 13px/1.3 var(--f);color:var(--c8)}

/* ═══ STAT CARDS ═══ */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:16px}
.stat-card{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:20px;text-align:center}
.stat-val{font:700 28px/1.2 var(--m);color:var(--c9)}
.stat-label{font:400 12px/1 var(--f);color:var(--c5);margin-top:4px}

/* ═══ TABLE ═══ */
.eval-list{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);overflow:hidden;margin-bottom:16px}
.eval-list table{width:100%;border-collapse:collapse}
.eval-list th{background:var(--c0);padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.eval-list td{padding:10px 16px;font:400 13px/1.4 var(--f);color:var(--c7);border-bottom:1px solid var(--dv);vertical-align:top}
.eval-list tr:last-child td{border-bottom:none}
.eval-list tr:hover td{background:var(--c0)}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}
.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}
.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}

/* ═══ REASON BOX ═══ */
.reason-box{background:var(--ro50);border:1px solid var(--ro100);border-radius:var(--r1);padding:8px 12px;font:400 12px/1.5 var(--f);color:var(--c7);margin-top:4px;max-width:280px}

/* ═══ NOTE CARD ═══ */
.note-card{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:20px 24px}

/* ═══ TOAST ═══ */
.validate-toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:var(--em);color:#FFF;padding:10px 20px;border-radius:var(--r2);font:500 13px/1 var(--f);box-shadow:0 8px 24px rgba(16,185,129,.3);z-index:3000;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;align-items:center;gap:8px}
.validate-toast.show{opacity:1;pointer-events:all}
.validate-toast svg{width:16px;height:16px}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}
</style>
</head>
<body>

<!-- Navigation will be injected by navigation.js -->

<!-- Main content -->
<div class="ct fade-in">
  <!-- Breadcrumb -->
  <nav style="display:flex;align-items:center;gap:4px;font:500 12px/1 var(--f);color:var(--c5);margin-bottom:12px">
    <a href="../demo-index.html" style="color:var(--c5);text-decoration:none;transition:color .12s" onmouseover="this.style.color='var(--pr)'" onmouseout="this.style.color='var(--c5)'">绩效工作台</a>
    <span style="color:var(--c3)">/</span>
    <span style="color:var(--c8);font-weight:600">结果确认·HRBP知悉</span>
  </nav>

  <!-- Page header -->
  <div class="pg-hd">
    <div class="pg-hd-top">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="pg-hd-title">绩效结果确认·HRBP知悉</div>
        <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--em50);color:var(--em700)">
          <span style="width:6px;height:6px;border-radius:50%;background:var(--em700)"></span>
          已确认
        </span>
      </div>
      <div class="pg-hd-actions">
        <!-- Read-only: no action buttons -->
      </div>
    </div>
    <div class="pg-hd-info">
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">考核方案</span><span class="pg-hd-info-value">产品部2026年Q2绩效考核</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">考核周期</span><span class="pg-hd-info-value">2026年4-6月</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">HRBP</span><span class="pg-hd-info-value">赵敏</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">团队人数</span><span class="pg-hd-info-value">15</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">已确认</span><span class="pg-hd-info-value" style="color:var(--em700)">12</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">待确认</span><span class="pg-hd-info-value" style="color:var(--ac700)">2</span></div>
    </div>
  </div>

  <!-- 统计卡片 -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-val" style="color:var(--c9)">15</div>
      <div class="stat-label">团队总人数</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--ro)">2</div>
      <div class="stat-label">不同意员工</div>
    </div>
  </div>

  <!-- 员工确认状态表 -->
  <div class="eval-list">
    <div style="padding:16px 20px;border-bottom:1px solid var(--dv);display:flex;align-items:center;justify-content:space-between">
      <span style="font:600 15px/1 var(--f);color:var(--c9)">不同意员工列表</span>
      <span id="listSummary" style="font:400 12px/1 var(--f);color:var(--c5)"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:80px">被考核人</th>
          <th style="width:80px">部门</th>
          <th style="width:80px">考核组</th>
          <th style="width:100px">最终等级</th>
          <th style="width:80px">确认状态</th>
          <th style="width:130px">确认时间</th>
          <th>备注/申诉原因</th>
        </tr>
      </thead>
      <tbody id="memberBody"></tbody>
    </table>
  </div>

  <!-- 说明卡片 -->
  <div class="note-card">
    <div style="font:600 14px/1 var(--f);color:var(--c9);margin-bottom:12px">说明</div>
    <ul style="font:400 13px/2 var(--f);color:var(--c6);padding-left:20px;list-style:disc">
      <li>HRBP仅查看员工确认状态，不可修改任何绩效等级或确认结果</li>
      <li>对于"有异议"的员工，HRBP应跟进了解情况并协调处理</li>
      <li>本页面为纯查看页面，无"已知悉"按钮</li>
    </ul>
  </div>
</div>

<div class="validate-toast" id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span id="toastMsg"></span></div>

<script src="../navigation.js"></script>
<script>
GHR_NAV.init('perf', '结果确认');

var GRADE_COLORS={'超出预期':'var(--em700)','符合预期+':'var(--pr)','符合预期':'var(--c7)','符合预期-':'var(--ac)','低于预期':'var(--ro)'};
var GRADE_BG={'超出预期':'var(--em50)','符合预期+':'var(--pr50)','符合预期':'var(--c1)','符合预期-':'var(--ac50)','低于预期':'var(--ro50)'};

var MEMBERS=[
  {name:'张明',dept:'产品部',group:'产品组',grade:'符合预期+',status:'confirmed',time:'2026-06-14 18:20',note:''},
  {name:'李华',dept:'产品部',group:'产品组',grade:'超出预期',status:'confirmed',time:'2026-06-14 17:45',note:''},
  {name:'王芳',dept:'产品部',group:'产品组',grade:'符合预期',status:'confirmed',time:'2026-06-14 16:30',note:''},
  {name:'赵强',dept:'产品部',group:'技术组',grade:'符合预期',status:'confirmed',time:'2026-06-15 09:10',note:''},
  {name:'陈静',dept:'产品部',group:'技术组',grade:'符合预期-',status:'disputed',time:'2026-06-16 09:30',note:'认为Q2负责的模块需求复杂度高，在缺乏充分前期调研的情况下按时交付，评级应至少为"符合预期"。'},
  {name:'刘洋',dept:'产品部',group:'产品组',grade:'符合预期',status:'confirmed',time:'2026-06-15 10:05',note:''},
  {name:'孙丽',dept:'产品部',group:'产品组',grade:'超出预期',status:'confirmed',time:'2026-06-14 15:20',note:''},
  {name:'周磊',dept:'产品部',group:'产品组',grade:'符合预期',status:'confirmed',time:'2026-06-15 11:30',note:''},
  {name:'吴涛',dept:'产品部',group:'技术组',grade:'符合预期+',status:'disputed',time:'2026-06-15 14:00',note:'Q2期间主导完成核心系统架构升级，同时兼任两个跨部门项目的技术负责人，认为当前评级未充分反映实际贡献范围和技术难度。'},
  {name:'郑洁',dept:'产品部',group:'技术组',grade:'符合预期',status:'confirmed',time:'2026-06-15 09:45',note:''},
  {name:'黄鹏',dept:'产品部',group:'技术组',grade:'符合预期-',status:'pending',time:'',note:''},
  {name:'林敏',dept:'产品部',group:'产品组',grade:'符合预期',status:'confirmed',time:'2026-06-15 16:20',note:''},
  {name:'何杰',dept:'产品部',group:'技术组',grade:'符合预期+',status:'confirmed',time:'2026-06-14 18:00',note:''},
  {name:'马超',dept:'产品部',group:'产品组',grade:'符合预期-',status:'confirmed',time:'2026-06-15 10:50',note:''},
  {name:'胡蝶',dept:'产品部',group:'技术组',grade:'低于预期',status:'confirmed',time:'2026-06-15 15:10',note:''}
];

function getStatusBadge(s){
  if(s==='confirmed') return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--em50);color:var(--em700)">已确认</span>';
  if(s==='pending') return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--ac50);color:var(--ac700)">待确认</span>';
  return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--ro50);color:var(--ro)">有异议</span>';
}

function getGradeBadge(g){
  var bg=GRADE_BG[g]||'var(--c1)';
  var fg=GRADE_COLORS[g]||'var(--c7)';
  return '<span style="display:inline-flex;align-items:center;justify-content:center;height:24px;border-radius:var(--r1);font:500 11px/1 var(--f);padding:0 8px;background:'+bg+';color:'+fg+'">'+g+'</span>';
}

function renderTable(){
  var html='';
  var filtered=MEMBERS.filter(function(m){return m.status==='disputed'});
  filtered.forEach(function(m){
    html+='<tr>'+
      '<td><span style="font-weight:600;color:var(--c8)">'+m.name+'</span></td>'+
      '<td style="color:var(--c6)">'+m.dept+'</td>'+
      '<td><span style="font:500 11px/1 var(--f);padding:2px 6px;border-radius:3px;background:var(--c1);color:var(--c6)">'+m.group+'</span></td>'+
      '<td>'+getGradeBadge(m.grade)+'</td>'+
      '<td>'+getStatusBadge(m.status)+'</td>'+
      '<td style="color:var(--c5);font-size:12px">'+(m.time||'--')+'</td>'+
      '<td>'+(m.note?'<div class="reason-box"><strong>申诉原因：</strong>'+m.note+'</div>':'<span style="color:var(--c4);font-size:12px">--</span>')+'</td>'+
      '</tr>';
  });
  document.getElementById('memberBody').innerHTML=html;
  document.getElementById('listSummary').textContent='不同意 '+filtered.length+'人';
}

function showToast(msg){
  var t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.className='validate-toast show';
  setTimeout(function(){t.classList.remove('show')},3000);
}

renderTable();
</script>

</body>
</html>
