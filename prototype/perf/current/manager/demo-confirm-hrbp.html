<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 绩效结果确认·HRBP知悉</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

.pg-hd{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:20px 24px;margin-bottom:16px}
.pg-hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pg-hd-title{font:700 20px/1.2 var(--f);color:var(--c9);letter-spacing:-.3px}
.pg-hd-meta{display:flex;align-items:center;gap:4px;padding:10px 16px;background:var(--c0);border-radius:var(--r2);flex-wrap:wrap}
.meta-sep{color:var(--c3);margin:0 2px}

.section{padding:20px 24px;border-bottom:1px solid var(--dv)}
.section:last-child{border-bottom:none}
.section-hd{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.section-icon{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-icon svg{width:14px;height:14px;color:#FFF}
.section-title{font:600 14px/1 var(--f);color:var(--c9)}

.status-disputed{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--ro50);color:var(--ro)}
.status-disputed::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--ro)}

.eval-table{width:100%;border-collapse:collapse}
.eval-table th{background:var(--c0);padding:8px 14px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.eval-table td{padding:8px 14px;font:400 13px/1.4 var(--f);color:var(--c7);border-bottom:1px solid var(--dv);vertical-align:middle}
.eval-table tr:last-child td{border-bottom:none}
.module-group-label td{font:500 12px/1 var(--f);color:var(--c5);background:var(--c0);padding:6px 14px;border-bottom:1px solid var(--dv)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}
</style>
</head>
<body>

<!-- Navigation will be injected by navigation.js -->

<!-- Main content -->
<div class="ct fade-in">
  <!-- Breadcrumb -->
  <nav style="display:flex;align-items:center;gap:4px;font:500 12px/1 var(--f);color:var(--c5);margin-bottom:12px">
    <a href="../demo-index.html" style="color:var(--c5);text-decoration:none;transition:color .12s" onmouseover="this.style.color='var(--pr)'" onmouseout="this.style.color='var(--c5)'">绩效工作台</a>
    <span style="color:var(--c3)">/</span>
    <span style="color:var(--c8);font-weight:600">HRBP知悉</span>
  </nav>

  <!-- Page header -->
  <div class="pg-hd">
    <div class="pg-hd-top">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="pg-hd-title">绩效结果确认·HRBP知悉</div>
        <span class="status-disputed">有异议</span>
      </div>
    </div>
    <div class="pg-hd-meta">
      <span style="font:500 14px/1 var(--f);color:var(--c8)">陈静</span>
      <span class="meta-sep">·</span>
      <span style="font:400 13px/1 var(--f);color:var(--c6)">技术组</span>
      <span class="meta-sep">·</span>
      <span style="font:400 13px/1 var(--f);color:var(--c6)">高级工程师</span>
      <span class="meta-sep">·</span>
      <span style="font:400 13px/1 var(--f);color:var(--c6)">2026年Q2</span>
    </div>
  </div>

  <!-- 申诉信息 -->
  <div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden">
    <div class="section">
      <div class="section-hd">
        <div class="section-icon" style="background:var(--ro)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <span class="section-title">申诉信息</span>
      </div>
      <div style="font:400 13px/1.6 var(--f);color:var(--c7);padding:12px 16px;background:var(--ro50);border:1px solid var(--ro100);border-radius:var(--r1);margin-bottom:8px">
        <strong style="color:var(--ro)">申诉原因：</strong>Q2负责的模块需求复杂度高，在缺乏充分前期调研的情况下按时交付，评级应至少为"符合预期"。
      </div>
      <div style="font:400 12px/1 var(--f);color:var(--c5)">申诉时间：2026-06-16 09:30</div>
    </div>
  </div>

  <!-- 绩效结果 -->
  <div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden">
    <div class="section">
      <div class="section-hd">
        <div class="section-icon" style="background:var(--ac)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
        <span class="section-title">绩效结果</span>
      </div>
      <!-- 等级展示 -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
        <span style="font:400 13px/1 var(--f);color:var(--c5)">综合等级</span>
        <span id="overallGradeText" style="font:700 22px/1 var(--f);color:var(--ac700)">符合预期-</span>
        <span id="overallScore" style="font:700 18px/1 var(--m);color:var(--c5);margin-left:auto">72.5</span>
      </div>
    </div>
  </div>

  <!-- 得分明细 -->
  <div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden">
    <div class="section">
      <div class="section-hd">
        <div class="section-icon" style="background:var(--pr)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
        <span class="section-title">得分明细</span>
      </div>
      <table class="eval-table">
        <thead>
          <tr>
            <th>指标名称</th>
            <th style="width:60px">类型</th>
            <th style="width:72px">权重</th>
            <th style="width:90px">目标值</th>
            <th style="width:72px">完成值</th>
            <th style="width:80px">得分/评价</th>
          </tr>
        </thead>
        <tbody id="scoreDetail"></tbody>
      </table>
    </div>
  </div>

  <!-- 审定流程 -->
  <div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden">
    <div class="section">
      <div class="section-hd">
        <div class="section-icon" style="background:var(--c6)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        <span class="section-title">审定流程</span>
      </div>
      <div id="gradeChain"></div>
    </div>
  </div>
</div>

<script src="../navigation.js"></script>
<script>
GHR_NAV.init('perf', '结果确认');

var APPEAL = {
  employee: {name:'陈静', dept:'产品部', group:'技术组', role:'高级工程师'},
  cycle: '2026年Q2',
  overallGrade: '符合预期-',
  overallScore: 72.5,
  status: 'disputed',
  appealReason: 'Q2负责的模块需求复杂度高，在缺乏充分前期调研的情况下按时交付，评级应至少为"符合预期"。',
  appealTime: '2026-06-16 09:30',
  gradeChain: [
    {node:'审定前等级', grade:'符合预期-', status:'已完成', color:'var(--em)', statusBg:'var(--em50)', statusColor:'var(--em700)'},
    {node:'直线上级审定', grade:'符合预期-', status:'已完成', color:'var(--em)', statusBg:'var(--em50)', statusColor:'var(--em700)'},
    {node:'间接上级审定', grade:'符合预期-', status:'已完成', color:'var(--em)', statusBg:'var(--em50)', statusColor:'var(--em700)'},
    {node:'逐级上级审定', grade:'符合预期-', status:'已完成', color:'var(--em)', statusBg:'var(--em50)', statusColor:'var(--em700)'},
    {node:'HRBP知悉', grade:'待处理', status:'处理中', color:'var(--ac)', statusBg:'var(--ac50)', statusColor:'var(--ac700)'}
  ],
  modules: [
    {name:'KPI', weight:30, color:'var(--pr)', items:[
      {name:'需求评审及时率', type:'定量', weight:5, target:'98%', challenge:'100%', result:'96%', score:80},
      {name:'UAT用户验收首次通过率', type:'定量', weight:10, target:'98%', challenge:'100%', result:'97%', score:80},
      {name:'资源利用率（通用）', type:'定量', weight:15, target:'105%', challenge:'110%', result:'108%', score:100}
    ]},
    {name:'KPA', weight:70, color:'var(--em)', items:[
      {name:'产品管理规范', type:'定性', weight:10, grade:'符合预期+'},
      {name:'滚动需求响应', type:'定性', weight:10, grade:'符合预期'},
      {name:'绩效重构事项推进', type:'定性', weight:25, grade:'符合预期'},
      {name:'AI应用项目探索与落地', type:'定性', weight:25, grade:'符合预期-'}
    ]}
  ]
};

var GRADE_COLORS = {'超出预期':'var(--em700)','符合预期+':'var(--pr700)','符合预期':'var(--c7)','符合预期-':'var(--ac700)','低于预期':'var(--ro)','待处理':'var(--ac700)'};
var GRADE_BG = {'超出预期':'var(--em50)','符合预期+':'var(--pr50)','符合预期':'var(--c1)','符合预期-':'var(--ac50)','低于预期':'var(--ro50)','待处理':'var(--ac50)'};

function renderGradeChain(){
  var html='';
  APPEAL.gradeChain.forEach(function(node,i){
    html+='<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;'+(i<APPEAL.gradeChain.length-1?'border-bottom:1px solid var(--dv)':'')+'">';
    html+='<div style="width:32px;height:32px;border-radius:50%;background:'+node.color+';display:flex;align-items:center;justify-content:center;flex-shrink:0">';
    if(node.status==='已完成'){
      html+='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
    } else {
      html+='<span style="font:600 10px/1 var(--f);color:#FFF">待</span>';
    }
    html+='</div>';
    html+='<div style="flex:1;min-width:0">';
    html+='<div style="font:500 13px/1 var(--f);color:var(--c8)">'+node.node+'</div>';
    html+='<div style="font:400 12px/1 var(--f);color:var(--c5);margin-top:2px">'+node.grade+'</div>';
    html+='</div>';
    html+='<span style="font:500 11px/1 var(--f);padding:3px 10px;border-radius:var(--r1);background:'+node.statusBg+';color:'+node.statusColor+'">'+node.status+'</span>';
    html+='</div>';
  });
  document.getElementById('gradeChain').innerHTML=html;
}

function renderScoreDetail(){
  var html='';
  APPEAL.modules.forEach(function(mod){
    html+='<tr class="module-group-label"><td colspan="6"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+mod.color+';margin-right:6px;vertical-align:middle"></span>'+mod.name+'（'+mod.weight+'%）</td></tr>';
    mod.items.forEach(function(item){
      var resultCell;
      if(item.type==='定量'){
        resultCell='<span style="font:500 13px/1 var(--m);color:var(--c7)">'+item.score+'</span>';
      } else {
        var g=item.grade;
        var bg=GRADE_BG[g]||'var(--c1)';
        var fg=GRADE_COLORS[g]||'var(--c7)';
        resultCell='<span style="display:inline-flex;align-items:center;justify-content:center;height:24px;border-radius:var(--r1);font:500 11px/1 var(--f);padding:0 8px;background:'+bg+';color:'+fg+'">'+g+'</span>';
      }
      html+='<tr>'+
        '<td style="font-weight:500;color:var(--c8)">'+item.name+'</td>'+
        '<td style="color:var(--c5);font-size:12px">'+item.type+'</td>'+
        '<td style="font:500 12px/1 var(--f);color:var(--c6)">'+item.weight+'%</td>'+
        '<td style="color:var(--c6);font-size:12px">'+item.target+'</td>'+
        '<td style="color:var(--c6);font-size:12px">'+item.result+'</td>'+
        '<td>'+resultCell+'</td>'+
        '</tr>';
    });
  });
  document.getElementById('scoreDetail').innerHTML=html;
}

renderGradeChain();
renderScoreDetail();
</script>

</body>
</html>
