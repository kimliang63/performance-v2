<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 目标审批 - 间接上级</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --r1:6px;--r2:8px;--r3:10px;
  --f:'Inter','Noto Sans SC',-apple-system,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

/* Header */
.hdr{height:52px;background:var(--sf);border-bottom:1px solid var(--dv);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:1100}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;text-decoration:none}
.logo-i{width:28px;height:28px;border-radius:6px;background:var(--pr);display:flex;align-items:center;justify-content:center}
.logo-i svg{width:15px;height:15px;color:#FFF}
.logo-t{font-size:15px;font-weight:700;color:var(--c9);letter-spacing:-.3px}
.hdr-sep{width:1px;height:20px;background:var(--c2);margin:0 2px}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--vi);display:flex;align-items:center;justify-content:center;font:600 12px/1 var(--f);color:#FFF}

.breadcrumb{display:flex;align-items:center;gap:4px;font:500 12px/1 var(--f);color:var(--c5);margin-bottom:12px}
.breadcrumb a{color:var(--c5);text-decoration:none;transition:color .12s}
.breadcrumb a:hover{color:var(--pr)}
.breadcrumb .sep{color:var(--c3)}
.breadcrumb .cur{color:var(--c8);font-weight:600}

.ct{padding:24px}

/* Page header */
.pg-hd{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:20px 24px;margin-bottom:16px}
.pg-hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pg-hd-title{font:700 20px/1.2 var(--f);color:var(--c9)}
.pg-hd-actions{display:flex;gap:8px}
.pg-hd-info{display:grid;grid-template-columns:repeat(4,1fr);gap:8px 24px;font:400 13px/1 var(--f);color:var(--c5);padding:12px 16px;background:var(--c0);border-radius:var(--r2)}
.pg-hd-info-item{display:flex;flex-direction:column;gap:2px}
.pg-hd-info-label{font:400 11px/1 var(--f);color:var(--c4);text-transform:uppercase;letter-spacing:.5px}
.pg-hd-info-value{font:500 13px/1.3 var(--f);color:var(--c8)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}
.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}
.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}
.btn-danger{background:var(--sf);color:var(--ro);border:1px solid var(--ro100)}
.btn-danger:hover{background:var(--ro50);border-color:var(--ro)}
.btn-ac{background:var(--sf);color:var(--ac700);border:1px solid var(--ac100)}
.btn-ac:hover{background:var(--ac50);border-color:var(--ac)}

/* Module section */
.mod-section{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden}
.mod-section.em{}
.mod-hd{display:flex;align-items:center;padding:14px 20px;gap:12px;cursor:pointer;user-select:none;transition:background .12s}
.mod-hd:hover{background:var(--c0)}
.mod-hd-title{font:600 15px/1 var(--f);color:var(--c9);flex:1}
.mod-hd-stats{display:flex;align-items:center;gap:16px;font:400 13px/1 var(--f);color:var(--c5)}
.mod-hd-stats strong{font-family:var(--m);font-weight:600;color:var(--pr)}
.mod-hd-chevron{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--c4);transition:transform .25s;flex-shrink:0}
.mod-hd-chevron.open{transform:rotate(180deg)}
.mod-hd-chevron svg{width:14px;height:14px}
.mod-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.mod-body.open{max-height:2000px}

/* Goal row */
.goal-row{border-top:1px solid var(--dv);transition:background .1s}
.goal-row:hover{background:var(--c0)}
.goal-summary{display:flex;align-items:center;padding:10px 20px;gap:10px;cursor:pointer}
.goal-name{flex:1;font:500 14px/1.3 var(--f);color:var(--c8)}
.goal-meta{display:flex;align-items:center;gap:12px;flex-shrink:0}
.goal-type{font:500 11px/1 var(--f);padding:2px 7px;border-radius:3px;background:var(--c1);color:var(--c6)}
.goal-type.quant{background:var(--pr50);color:var(--pr)}
.goal-type.qual{background:var(--vi50);color:var(--vi)}
.goal-weight{font:500 13px/1 var(--m);color:var(--c7)}

/* Goal detail - read only */
.goal-detail{padding:0 20px 12px 42px;display:none}
.goal-detail.open{display:block}
.gd-form{border-radius:var(--r2);padding:8px 0}
.gd-sec{margin-bottom:10px}
.gd-sec:last-child{margin-bottom:0}
.gd-sec-title{font:600 12px/1 var(--f);color:var(--c6);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.gd-sec-title svg{width:13px;height:13px;color:var(--pr)}
.gd-row{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px}
.gd-row.f3{grid-template-columns:1fr 1fr 1fr}
.gd-fi{display:flex;flex-direction:column;gap:3px}
.gd-fi-l{font:400 11px/1 var(--f);color:var(--c5)}
.gd-fi-v{font:500 13px/1.4 var(--f);color:var(--c8)}
.gd-fi-v.mono{font-family:var(--m)}
.gd-linked{display:flex;align-items:center;gap:4px;padding:5px 8px;background:var(--pr50);border:1px solid var(--pr200);border-radius:var(--r1);font:500 12px/1 var(--f);color:var(--pr)}
.gd-linked svg{width:12px;height:12px;flex-shrink:0}
.gd-rule-box{margin-top:8px;padding:8px 10px;background:var(--sf);border:1px solid var(--c2);border-radius:var(--r1)}
.gd-rule-box code{font:400 11px/1.5 var(--m);color:var(--c8);white-space:pre-wrap;word-break:break-all}
.gd-rule-lbl{font:500 10px/1 var(--f);color:var(--c4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}

/* Approval comment */
.approval-box{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-top:16px;overflow:hidden}
.approval-box textarea{width:100%;height:80px;border:1px solid var(--c2);border-radius:var(--r1);padding:10px 12px;font:400 13px/1.5 var(--f);resize:vertical;outline:none;font-family:inherit}
.approval-box textarea:focus{border-color:var(--pr)}

/* Toast */
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-10px);padding:10px 20px;border-radius:var(--r2);font:500 13px/1 var(--f);box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:3000;opacity:0;pointer-events:none;transition:all .25s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--em);color:#FFF}
.toast.error{background:var(--ro);color:#FFF}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:2000;align-items:center;justify-content:center}
.modal-overlay.on{display:flex}
.modal{background:var(--sf);border-radius:var(--r3);padding:24px;width:420px;box-shadow:var(--shadow-modal)}
.modal-t{font:600 16px/1 var(--f);color:var(--c9);margin-bottom:12px}
.modal-desc{font:400 13px/1.5 var(--f);color:var(--c6);margin-bottom:12px}
.modal textarea{width:100%;height:80px;border:1px solid var(--c2);border-radius:var(--r1);padding:10px 12px;font:400 13px/1.5 var(--f);resize:vertical;outline:none;font-family:inherit}
.modal textarea:focus{border-color:var(--pr)}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <a href="../demo-index.html" class="logo">
      <div class="logo-i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <span class="logo-t">HR ONE</span>
    </a>
    <div class="hdr-sep"></div>
    <span style="font:500 13px/1 var(--f);color:var(--c5)">绩效工作台</span>
  </div>
  <div class="hdr-r">
    <span style="font:500 12px/1 var(--f);color:var(--c5)">李总 - VP</span>
    <div class="avatar">李</div>
  </div>
</div>

<div class="ct">
  <nav class="breadcrumb">
    <a href="../demo-index.html">绩效工作台</a>
    <span class="sep">/</span>
    <a href="demo-workbench-team-goal.html">团队目标</a>
    <span class="sep">/</span>
    <span class="cur">目标审批</span>
  </nav>

  <div class="pg-hd">
    <div class="pg-hd-top">
      <div class="pg-hd-title">目标审批</div>
      <div class="pg-hd-actions">
        <button class="btn btn-ac" onclick="showDelegateModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          转派
        </button>
        <button class="btn btn-danger" onclick="showRejectModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          退回
        </button>
        <button class="btn btn-p" onclick="approveGoal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          批准
        </button>
      </div>
    </div>
    <div class="pg-hd-info">
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">申请人</span><span class="pg-hd-info-value">张明</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">部门</span><span class="pg-hd-info-value">产品部</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">岗位</span><span class="pg-hd-info-value">高级产品经理</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">提交时间</span><span class="pg-hd-info-value">2026-06-10</span></div>
    </div>
  </div>

  <div id="moduleContainer"></div>

  <div class="approval-box">
    <div style="padding:14px 20px;border-bottom:1px solid var(--dv)">
      <div style="font:600 14px/1 var(--f);color:var(--c8)">审批意见</div>
    </div>
    <div style="padding:16px 20px">
      <textarea id="approvalComment" placeholder="请输入审批意见..."></textarea>
    </div>
  </div>

  <!-- 审批流程 -->
  <div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-top:16px;overflow:hidden">
    <div style="padding:16px 20px;border-bottom:1px solid var(--dv);display:flex;align-items:center;justify-content:space-between">
      <span style="font:600 15px/1 var(--f);color:var(--c9)">审批流程</span>
      <span style="font:400 12px/1 var(--f);color:var(--c5)">员工制定流程</span>
    </div>
    <div style="padding:0">
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="background:var(--c0)">
            <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">节点</th>
            <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">处理人</th>
            <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">流入时间</th>
            <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">流出时间</th>
            <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">状态</th>
            <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">原因/备注</th>
          </tr>
        </thead>
        <tbody>
          <tr style="background:var(--pr50)">
            <td style="padding:12px 16px;font:500 13px/1.4 var(--f);color:var(--c8);border-bottom:1px solid var(--dv)">
              <div style="display:flex;align-items:center;gap:6px">
                <span style="width:8px;height:8px;border-radius:50%;background:var(--pr);flex-shrink:0"></span>
                目标填写
              </div>
            </td>
            <td style="padding:12px 16px;border-bottom:1px solid var(--dv)">
              <div style="display:flex;align-items:center;gap:6px">
                <span style="width:22px;height:22px;border-radius:50%;background:var(--pr);display:flex;align-items:center;justify-content:center;font:600 10px/1 var(--f);color:#FFF;flex-shrink:0">张</span>
                <span style="font:400 13px/1 var(--f);color:var(--c8)">张明</span>
              </div>
            </td>
            <td style="padding:12px 16px;font:400 13px/1 var(--f);color:var(--c7);border-bottom:1px solid var(--dv)">2026-06-01 09:00</td>
            <td style="padding:12px 16px;font:400 13px/1 var(--f);color:var(--c4);border-bottom:1px solid var(--dv)">—</td>
            <td style="padding:12px 16px;border-bottom:1px solid var(--dv)">
              <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--pr50);color:var(--pr)">
                <span style="width:6px;height:6px;border-radius:50%;background:var(--pr);animation:pulse 2s ease-in-out infinite"></span>
                处理中
              </span>
            </td>
            <td style="padding:12px 16px;font:400 13px/1 var(--f);color:var(--c5);border-bottom:1px solid var(--dv)">当前节点</td>
          </tr>
          <tr>
            <td style="padding:12px 16px;font:500 13px/1.4 var(--f);color:var(--c6);border-bottom:1px solid var(--dv)">
              <div style="display:flex;align-items:center;gap:6px">
                <span style="width:8px;height:8px;border-radius:50%;background:var(--c3);flex-shrink:0"></span>
                直属上级审批
              </div>
            </td>
            <td style="padding:12px 16px;border-bottom:1px solid var(--dv)">
              <div style="display:flex;align-items:center;gap:6px">
                <span style="width:22px;height:22px;border-radius:50%;background:var(--c1);display:flex;align-items:center;justify-content:center;font:600 10px/1 var(--f);color:var(--c5);flex-shrink:0">李</span>
                <span style="font:400 13px/1 var(--f);color:var(--c6)">李总</span>
              </div>
            </td>
            <td style="padding:12px 16px;font:400 13px/1 var(--f);color:var(--c4);border-bottom:1px solid var(--dv)">—</td>
            <td style="padding:12px 16px;font:400 13px/1 var(--f);color:var(--c4);border-bottom:1px solid var(--dv)">—</td>
            <td style="padding:12px 16px;border-bottom:1px solid var(--dv)">
              <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--c1);color:var(--c5)">待处理</span>
            </td>
            <td style="padding:12px 16px;font:400 13px/1 var(--f);color:var(--c4);border-bottom:1px solid var(--dv)">—</td>
          </tr>
          <tr>
            <td style="padding:12px 16px;font:500 13px/1.4 var(--f);color:var(--c6);border-bottom:1px solid var(--dv)">
              <div style="display:flex;align-items:center;gap:6px">
                <span style="width:8px;height:8px;border-radius:50%;background:var(--c3);flex-shrink:0"></span>
                间接上级审批
              </div>
            </td>
            <td style="padding:12px 16px;border-bottom:1px solid var(--dv)">
              <div style="display:flex;align-items:center;gap:6px">
                <span style="width:22px;height:22px;border-radius:50%;background:var(--c1);display:flex;align-items:center;justify-content:center;font:600 10px/1 var(--f);color:var(--c5);flex-shrink:0">李</span>
                <span style="font:400 13px/1 var(--f);color:var(--c6)">李总</span>
              </div>
            </td>
            <td style="padding:12px 16px;font:400 13px/1 var(--f);color:var(--c4);border-bottom:1px solid var(--dv)">—</td>
            <td style="padding:12px 16px;font:400 13px/1 var(--f);color:var(--c4);border-bottom:1px solid var(--dv)">—</td>
            <td style="padding:12px 16px;border-bottom:1px solid var(--dv)">
              <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--c1);color:var(--c5)">待处理</span>
            </td>
            <td style="padding:12px 16px;font:400 13px/1 var(--f);color:var(--c4);border-bottom:1px solid var(--dv)">—</td>
          </tr>
          <tr>
            <td style="padding:12px 16px;font:500 13px/1.4 var(--f);color:var(--c6)">
              <div style="display:flex;align-items:center;gap:6px">
                <span style="width:8px;height:8px;border-radius:50%;background:var(--c3);flex-shrink:0"></span>
                HR确认
              </div>
            </td>
            <td style="padding:12px 16px">
              <div style="display:flex;align-items:center;gap:6px">
                <span style="width:22px;height:22px;border-radius:50%;background:var(--c1);display:flex;align-items:center;justify-content:center;font:600 10px/1 var(--f);color:var(--c5);flex-shrink:0">赵</span>
                <span style="font:400 13px/1 var(--f);color:var(--c6)">赵HR</span>
              </div>
            </td>
            <td style="padding:12px 16px;font:400 13px/1 var(--f);color:var(--c4)">—</td>
            <td style="padding:12px 16px;font:400 13px/1 var(--f);color:var(--c4)">—</td>
            <td style="padding:12px 16px">
              <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--c1);color:var(--c5)">待处理</span>
            </td>
            <td style="padding:12px 16px;font:400 13px/1 var(--f);color:var(--c4)">—</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="rejectModal">
  <div class="modal">
    <div class="modal-t">退回目标</div>
    <div class="modal-desc">请填写退回原因，申请人将收到通知并需修改后重新提交。</div>
    <textarea id="rejectReason" placeholder="请输入退回原因..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-s" onclick="closeModal('rejectModal')">取消</button>
      <button class="btn btn-danger" onclick="confirmReject()">确认退回</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="delegateModal">
  <div class="modal">
    <div class="modal-t">转派审批</div>
    <div class="modal-desc">将此审批任务转派给其他管理者。</div>
    <textarea id="delegateReason" placeholder="请输入转派原因..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-s" onclick="closeModal('delegateModal')">取消</button>
      <button class="btn btn-ac" onclick="confirmDelegate()">确认转派</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../navigation.js"></script>
<script>
GHR_NAV.init('perf', '目标审批');

const MODULES=[
  {name:'KPI',weight:30,color:'var(--pr)',goals:[
    {id:'g1',name:'资源利用率（通用）',type:'quant',weight:5,target:105,challenge:110,baseline:100,unit:'%',measure:'梯度评分',rule:'标准梯度计算',ruleFormula:'IF(实际>=挑战,120,IF(实际>=目标,100,IF(实际>=保底,80,0)))',linkedIndicator:'资源利用率',desc:'1.指标定义：人员的实际工作量饱和情况，数据来源：Devops\n2.计算逻辑：公式=当月实际任务工时（人天）/EHR实际出勤天数*100%'},
    {id:'g2',name:'HRASUAT用户验收首次通过率(产品)',type:'quant',weight:10,target:98,challenge:100,baseline:95,unit:'百分比',measure:'梯度评分',rule:'标准梯度计算',ruleFormula:'IF(实际>=挑战,120,IF(实际>=目标,100,IF(实际>=保底,80,0)))',linkedIndicator:'UAT首次通过率',desc:'1.指标定义：需求首次业务验收通过的概率\n2.计算逻辑：公式=当月需求首次业务验收通过的迭代数量/当月业务验收的迭代总数*100%'},
    {id:'g3',name:'HRAS需求评审及时率(产品)',type:'quant',weight:15,target:98,challenge:100,baseline:95,unit:'百分比',measure:'梯度评分',rule:'标准梯度计算',ruleFormula:'IF(实际>=挑战,120,IF(实际>=目标,100,IF(实际>=保底,80,0)))',linkedIndicator:'需求评审及时率',desc:'1.迭代版本评审的及时性情况\n2.计算逻辑：公式=统计周期内按时需求评审迭代数/计划评审迭代*100%\n备注：按需求个数的维度。'},
  ]},
  {name:'KPA',weight:70,color:'var(--em)',goals:[
    {id:'g4',name:'HRAS产品管理规范',type:'qual',weight:10,measure:'定性评分',desc:'1、需求管理流程尊从规范\n2、产品需求规范\n3、迭代火车管理规范\n4、周会/月会前事项准时完成更新'},
    {id:'g5',name:'【产品设计】日常滚动需求响应',type:'qual',weight:10,measure:'定性评分',desc:'根据业务日会需求优先级，滚动响应日常需求，输出产品解决方案'},
    {id:'g6',name:'【产品设计】HR ONE 绩效重构事项推进',type:'qual',weight:25,measure:'定性评分',desc:'06-10 输出AI+绩效核心用户页面原型\n06-19 完成绩效版本4需求内审\n06-24 完成绩效版本4需求评审'},
    {id:'g7',name:'【应用探索】AI应用项目探索与落地推广',type:'qual',weight:25,measure:'定性评分',desc:'06-05 输出ASSC采购侧AI项目管理应用1.0版本\n06-12 对接LBU AI应用场景需求\n06-26 完成1.1版本'},
  ]}
];

let expandedMods=new Set([0,1]);
let expandedGoals=new Set();

function render(){
  const c=document.getElementById('moduleContainer');
  let h='';
  MODULES.forEach((m,mi)=>{
    const open=expandedMods.has(mi);
    const tw=m.goals.reduce((s,g)=>s+g.weight,0);
    h+=`<div class="mod-section ${m.color==='var(--em)'?'em':''}">
      <div class="mod-hd" onclick="toggleMod(${mi})">
        <div class="mod-hd-title">${m.name}</div>
        <div class="mod-hd-stats">
          <span>合计权重: <strong>${tw}%</strong></span>
          <span>目标数: <strong>${m.goals.length}</strong></span>
        </div>
        <div class="mod-hd-chevron ${open?'open':''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
      </div>
      <div class="mod-body ${open?'open':''}">`;
    m.goals.forEach((g,gi)=>{
      const gid=mi+'_'+gi;
      const gOpen=expandedGoals.has(gid);
      const isQ=g.type==='quant';
      h+=`<div class="goal-row">
        <div class="goal-summary" onclick="toggleGoal('${gid}')">
          <div class="goal-icon" style="background:var(--c1);color:var(--c6);font:600 11px/1 var(--m);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">${gi+1}</div>
          <span class="goal-name">${g.name}</span>
          <span class="goal-weight" style="font:600 13px/1 var(--m);color:var(--pr);background:var(--pr50);padding:2px 8px;border-radius:var(--r1);flex-shrink:0">${g.weight}%</span>
          <div class="goal-meta">
            <span class="goal-type ${isQ?'quant':'qual'}">${isQ?'定量':'定性'}</span>
            <div class="mod-hd-chevron ${gOpen?'open':''}" style="width:16px;height:16px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
          </div>
        </div>
        <div class="goal-detail ${gOpen?'open':''}">
          <div class="gd-form">
            <div class="gd-sec">
              <div class="gd-sec-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>目标信息</div>
              <div class="gd-fi"><span class="gd-fi-l">权重</span><span class="gd-fi-v mono">${g.weight}%</span></div>
            </div>
            ${isQ?`
            <div class="gd-sec">
              <div class="gd-sec-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>衡量标准</div>
              <div class="gd-row f3">
                <div class="gd-fi"><span class="gd-fi-l">目标值</span><span class="gd-fi-v mono">${g.target} ${g.unit||''}</span></div>
                <div class="gd-fi"><span class="gd-fi-l">挑战值</span><span class="gd-fi-v mono">${g.challenge} ${g.unit||''}</span></div>
                <div class="gd-fi"><span class="gd-fi-l">保底值</span><span class="gd-fi-v mono">${g.baseline} ${g.unit||''}</span></div>
              </div>
            </div>
            <div class="gd-sec">
              <div class="gd-sec-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>指标描述</div>
              <div style="font:400 13px/1.6 var(--f);color:var(--c7);white-space:pre-line;word-break:break-word">${g.desc||'-'}</div>
            </div>
            `:`
            <div class="gd-sec">
              <div class="gd-sec-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>指标描述</div>
              <div style="font:400 13px/1.6 var(--f);color:var(--c7);white-space:pre-line;word-break:break-word">${g.desc||'-'}</div>
            </div>
            `}
          </div>
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  c.innerHTML=h;
}

function toggleMod(mi){expandedMods.has(mi)?expandedMods.delete(mi):expandedMods.add(mi);render()}
function toggleGoal(id){expandedGoals.has(id)?expandedGoals.delete(id):expandedGoals.add(id);render()}

function approveGoal(){
  const comment=document.getElementById('approvalComment').value;
  showToast('已批准，目标进入下一审批节点','success');
}

function showRejectModal(){document.getElementById('rejectModal').classList.add('on')}
function showDelegateModal(){document.getElementById('delegateModal').classList.add('on')}
function closeModal(id){document.getElementById(id).classList.remove('on')}

function confirmReject(){
  const reason=document.getElementById('rejectReason').value;
  if(!reason){showToast('请填写退回原因','error');return}
  closeModal('rejectModal');
  showToast('已退回，申请人将收到通知','success');
}

function confirmDelegate(){
  const reason=document.getElementById('delegateReason').value;
  if(!reason){showToast('请填写转派原因','error');return}
  closeModal('delegateModal');
  showToast('已转派','success');
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show '+(type||'success');
  setTimeout(()=>t.classList.remove('show'),2500);
}

render();
</script>
</body>
</html>
