<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>结果审定 · 直接上级</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c9);min-height:100vh}
.card{background:var(--sf);border:1px solid var(--c2);border-radius:var(--r3);padding:20px 24px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:var(--sf);border:1px solid var(--c2);border-radius:var(--r2);padding:16px 20px;text-align:center}
.stat-val{font-size:28px;font-weight:700;line-height:1.2}
.stat-label{font-size:12px;color:var(--c5);margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--c0);text-align:left;padding:10px 14px;font-weight:600;color:var(--c6);border-bottom:1px solid var(--c2);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--c1);vertical-align:middle}
tr:hover td{background:var(--pr50)}
select{border:1px solid var(--c3);border-radius:var(--r1);padding:4px 8px;font-size:13px;font-family:var(--f);background:var(--sf);cursor:pointer}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600;line-height:20px}
.badge-s{background:#FEF3C7;color:#92400E}
.badge-a{background:var(--em100);color:var(--em700)}
.badge-b{background:var(--pr100);color:var(--pr700)}
.badge-c{background:var(--ac100);color:var(--ac700)}
.badge-d{background:var(--ro100);color:#BE123C}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:var(--r2);font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer;border:none;transition:all .15s}
.btn-pri{background:var(--pr);color:#FFF}.btn-pri:hover{background:var(--pr700)}
.btn-out{background:var(--sf);color:var(--c7);border:1px solid var(--c3)}.btn-out:hover{border-color:var(--pr);color:var(--pr)}
.btn-warn{background:var(--ac);color:#FFF}.btn-warn:hover{background:var(--ac700)}
.dist-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:13px}
.dist-label{width:40px;font-weight:600;text-align:right}
.dist-track{flex:1;height:22px;background:var(--c1);border-radius:11px;position:relative;overflow:hidden}
.dist-fill{height:100%;border-radius:11px;transition:width .3s}
.dist-rule{width:80px;font-size:12px;color:var(--c5);text-align:right}
.dist-val{width:50px;font-size:12px;color:var(--c6);text-align:center}
#toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-60px);padding:10px 24px;border-radius:var(--r2);font-size:13px;font-weight:600;z-index:9999;transition:transform .3s;pointer-events:none}
#toast.success{background:var(--em);color:#FFF}
#toast.error{background:var(--ro);color:#FFF}
#toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div style="height:52px;background:var(--sf);border-bottom:1px solid var(--dv);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:1100">
  <div style="display:flex;align-items:center;gap:14px">
    <a href="../demo-index.html" style="text-decoration:none;display:flex;align-items:center;gap:8px">
      <div style="width:28px;height:28px;border-radius:6px;background:var(--pr);display:flex;align-items:center;justify-content:center">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span style="font-size:15px;font-weight:700;color:var(--c9)">HR ONE</span>
    </a>
    <div style="width:1px;height:20px;background:var(--c2)"></div>
    <span style="font:500 13px/1 var(--f);color:var(--c5)">业务演示 - 管理者端</span>
    <span style="color:var(--c3)">&#8250;</span>
    <span style="font:600 13px/1 var(--f);color:var(--c8)">结果审定 · 直接上级</span>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
    <span style="font:500 12px/1 var(--f);color:var(--c5)">王总 - 产品总监</span>
    <div style="width:30px;height:30px;border-radius:50%;background:var(--vi);display:flex;align-items:center;justify-content:center;font:600 12px/1 var(--f);color:#FFF">王</div>
  </div>
</div>

<div style="max-width:1200px;margin:0 auto;padding:24px">
  <h2 style="font-size:18px;font-weight:700;margin-bottom:20px">团队绩效审定</h2>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val" style="color:var(--c9)">5</div><div class="stat-label">团队人数</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--em)">5</div><div class="stat-label">已评分</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--ac)">3</div><div class="stat-label">待审定</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--pr)">2</div><div class="stat-label">已审定</div></div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h3 style="font-size:15px;font-weight:600">团队成员列表</h3>
      <div style="display:flex;gap:8px">
        <button class="btn btn-pri" onclick="showToast('批量审定完成','success')">批量审定</button>
        <button class="btn btn-out" onclick="showToast('逐个审定模式已开启','success')">逐个审定</button>
        <button class="btn btn-warn" onclick="showToast('已提交间接上级审定','success')">提交间接上级</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>姓名</th><th>岗位</th><th>自评分</th><th>上级评分</th><th>加权总分</th><th>当前等级</th><th>审定等级</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="memberBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h3 style="font-size:15px;font-weight:600;margin-bottom:16px">强制分布校验</h3>
    <div id="distCheck"></div>
  </div>
</div>

<div id="toast"></div>

<script>
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success');
  setTimeout(function() { t.classList.add('on'); }, 10);
  setTimeout(function() { t.classList.remove('on'); }, 2500);
}

var members = [
  {name:'张明',role:'高级产品经理',self:88,manager:87,weight:87.5,cur:'A',status:'待审定'},
  {name:'李雪',role:'产品经理',self:93,manager:91,weight:92.0,cur:'S',status:'待审定'},
  {name:'王浩然',role:'产品专员',self:80,manager:76,weight:78.0,cur:'B',status:'待审定'},
  {name:'周婷',role:'产品专员',self:75,manager:70,weight:72.5,cur:'C',status:'已审定'},
  {name:'吴强',role:'产品经理',self:86,manager:84,weight:85.0,cur:'B',status:'已审定'}
];

var badgeMap = {S:'badge-s',A:'badge-a',B:'badge-b',C:'badge-c',D:'badge-d'};
var distRules = {S:{max:0.1,label:'≤10%'},A:{max:0.2,label:'≤20%'},B:{min:0.5,label:'≥50%'},C:{min:0.1,label:'≥10%'},D:{max:0.1,label:'≤10%'}};

function renderTable() {
  var html = '';
  members.forEach(function(m, i) {
    var gradeSelect = m.status === '已审定'
      ? '<span class="badge ' + badgeMap[m.cur] + '">' + m.cur + '</span>'
      : '<select onchange="updateGrade(' + i + ',this.value)">' +
        ['S','A','B','C','D'].map(function(g) { return '<option' + (g===m.cur?' selected':'') + '>' + g + '</option>'; }).join('') +
        '</select>';
    html += '<tr>' +
      '<td style="font-weight:600">' + m.name + '</td>' +
      '<td>' + m.role + '</td>' +
      '<td style="text-align:center">' + m.self + '</td>' +
      '<td style="text-align:center">' + m.manager + '</td>' +
      '<td style="text-align:center;font-weight:600">' + m.weight + '</td>' +
      '<td style="text-align:center"><span class="badge ' + badgeMap[m.cur] + '">' + m.cur + '</span></td>' +
      '<td style="text-align:center">' + gradeSelect + '</td>' +
      '<td>' + (m.status === '待审定'
        ? '<button class="btn btn-pri" style="padding:4px 12px;font-size:12px" onclick="ratify(' + i + ')">审定</button>'
        : '<span style="color:var(--em);font-size:12px;font-weight:600">已审定</span>') +
      '</td></tr>';
  });
  document.getElementById('memberBody').innerHTML = html;
}

function renderDist() {
  var counts = {S:0,A:0,B:0,C:0,D:0};
  members.forEach(function(m) { counts[m.cur]++; });
  var total = members.length;
  var colors = {S:'#F59E0B',A:'#10B981',B:'#2563EB',C:'#F97316',D:'#F43F5E'};
  var html = '';
  ['S','A','B','C','D'].forEach(function(g) {
    var pct = counts[g] / total;
    var rule = distRules[g];
    var ruleText = rule.label;
    var valid = rule.max !== undefined ? pct <= rule.max : pct >= rule.min;
    html += '<div class="dist-row">' +
      '<div class="dist-label" style="color:' + colors[g] + '">' + g + '</div>' +
      '<div class="dist-track"><div class="dist-fill" style="width:' + Math.max(pct*100,2) + '%;background:' + colors[g] + (valid ? '' : ';opacity:0.5') + '"></div></div>' +
      '<div class="dist-val">' + counts[g] + '/' + total + '</div>' +
      '<div class="dist-rule">' + ruleText + (valid ? ' <span style="color:var(--em)">✓</span>' : ' <span style="color:var(--ro)">✗</span>') + '</div>' +
      '</div>';
  });
  document.getElementById('distCheck').innerHTML = html;
}

function updateGrade(idx, val) {
  members[idx].cur = val;
  renderDist();
}

function ratify(idx) {
  members[idx].status = '已审定';
  renderTable();
  showToast(members[idx].name + ' 已审定为 ' + members[idx].cur + ' 级','success');
}

renderTable();
renderDist();
</script>
<script src="../navigation.js"></script>
<script>GHR_NAV.init('perf', '结果审定');</script>
</body>
</html>
