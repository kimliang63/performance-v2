<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 结果审定</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;
  --em:#10B981;--em50:#ECFDF5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#0F172A;--c8:#1E293B;--c7:#334155;--c6:#475569;--c5:#64748B;--c4:#94A3B8;--c3:#CBD5E1;--c2:#E2E8F0;--c1:#F1F5F9;--c0:#F8FAFC;
  --sf:#FFF;--bg:#F0F4F8;--dv:#E2E8F0;
  --r1:10px;--r2:12px;--r3:14px;--r4:18px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
  --sx:0 1px 2px rgba(0,0,0,.04);--sm:0 2px 8px rgba(0,0,0,.06);
  --bd:rgba(15,23,42,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:#E5E7EB;color:var(--c7);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}
.phone{width:393px;height:852px;background:var(--bg);border-radius:48px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.05),inset 0 0 0 1px rgba(255,255,255,.1);overflow:hidden;position:relative;display:flex;flex-direction:column}
.phone-notch{width:126px;height:34px;background:#000;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:100}
.phone-status{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 8px;font:600 14px/1 var(--f);color:var(--c9)}
.phone-status-r{display:flex;gap:4px;align-items:center}
.phone-nav{height:50px;display:flex;align-items:center;padding:0 16px;gap:10px}
.phone-nav-back{width:32px;height:32px;border-radius:8px;background:var(--c1);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--c7);flex-shrink:0}
.phone-nav-back svg{width:16px;height:16px}
.phone-nav-t{flex:1;font:600 17px/1 var(--f);color:var(--c9)}
.phone-body{flex:1;overflow-y:auto;padding:0 16px}
.phone-body::-webkit-scrollbar{width:0}

/* Distribution Card */
.dist-card{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:14px;margin-bottom:14px}
.dist-title{font:600 13px/1 var(--f);color:var(--c8);margin-bottom:12px}
.dist-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dist-row:last-child{margin-bottom:0}
.dist-label{font:500 11px/1 var(--f);color:var(--c6);width:28px;text-align:center}
.dist-bar-wrap{flex:1;height:20px;background:var(--c1);border-radius:10px;overflow:hidden;position:relative}
.dist-bar{height:100%;border-radius:10px;transition:width .3s}
.dist-bar.actual{position:absolute;top:0;left:0}
.dist-bar.target{position:absolute;top:0;left:0;opacity:.3}
.dist-pct{font:600 11px/1 var(--fm);color:var(--c7);width:36px;text-align:right}

/* Member Row */
.member-row{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);margin-bottom:6px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.member-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:600 13px/1 var(--f);color:#FFF;flex-shrink:0}
.member-info{flex:1;min-width:0}
.member-name{font:500 13px/1 var(--f);color:var(--c8)}
.member-score{font:400 11px/1 var(--fm);color:var(--c5);margin-top:2px}
.member-grade-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.grade-badge{font:600 12px/1 var(--f);padding:3px 10px;border-radius:10px}
.grade-badge.s{background:var(--vi50);color:var(--vi)}
.grade-badge.a{background:var(--em50);color:var(--em700)}
.grade-badge.b{background:var(--pr50);color:var(--pr)}
.grade-badge.c{background:var(--ac50);color:var(--ac700)}
.grade-badge.d{background:var(--ro50);color:var(--ro)}
.grade-select{height:28px;border:1px solid var(--c2);border-radius:8px;padding:0 8px;font:500 11px/1 var(--f);color:var(--c7);background:var(--sf);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%2394A3B8' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 6px center;padding-right:20px}
.grade-tag{font:500 10px/1 var(--f);padding:2px 6px;border-radius:4px;white-space:nowrap}

/* Actions */
.actions{margin-top:14px;display:flex;gap:8px;margin-bottom:20px}
.btn{flex:1;padding:12px;border-radius:var(--r2);font:600 14px/1 var(--f);text-align:center;cursor:pointer;border:none;transition:all .12s}
.btn:active{transform:scale(.97)}
.btn-submit{background:var(--pr);color:#FFF;box-shadow:0 2px 8px rgba(37,99,235,.25)}

.toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:var(--c9);color:#FFF;padding:10px 22px;border-radius:22px;font:500 13px/1 var(--f);z-index:900;opacity:0;pointer-events:none;transition:opacity .2s}

/* Mobile AI Bottom Sheet */
.ai-sheet{position:fixed;bottom:0;left:0;right:0;height:70vh;background:var(--sf);border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.15);z-index:950;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s ease}
.ai-sheet.open{transform:translateY(0)}
.ai-sheet-hd{padding:14px 16px;border-bottom:1px solid var(--dv);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ai-sheet-hd-ic{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--pr),var(--vi));display:flex;align-items:center;justify-content:center}
.ai-sheet-hd-ic svg{width:14px;height:14px;color:#FFF}
.ai-sheet-hd-t{flex:1;font:600 14px/1 var(--f);color:var(--c9)}
.ai-sheet-close{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--c5);cursor:pointer}
.ai-sheet-bd{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:88%;animation:fadeIn .2s ease}
.ai-msg.bot{align-self:flex-start}
.ai-msg.user{align-self:flex-end}
.ai-msg-bd{padding:10px 14px;border-radius:12px;font:400 13px/1.5 var(--f);word-break:break-word}
.ai-msg.bot .ai-msg-bd{background:var(--c0);color:var(--c8);border-bottom-left-radius:4px}
.ai-msg.user .ai-msg-bd{background:var(--pr);color:#FFF;border-bottom-right-radius:4px}
.ai-msg-time{font:400 10px/1 var(--f);color:var(--c4);margin-top:3px}
.ai-msg-actions{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.ai-msg-btn{font:500 11px/1 var(--f);padding:5px 10px;border-radius:8px;border:1px solid var(--c2);background:var(--sf);color:var(--c6);cursor:pointer}
.ai-msg-btn:active{background:var(--pr50);border-color:var(--pr)}
.ai-msg-card{background:var(--sf);border:1px solid var(--c2);border-radius:8px;padding:10px;margin-top:6px}
.ai-msg-card-t{font:600 12px/1 var(--f);color:var(--c8);margin-bottom:3px}
.ai-msg-card-d{font:400 11px/1.4 var(--f);color:var(--c5)}
.ai-msg-card-tag{display:inline-block;font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px;margin-top:4px}
.ai-shortcuts{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.ai-shortcut{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--sf);border:1px solid var(--c2);border-radius:8px;cursor:pointer}
.ai-shortcut:active{background:var(--pr50);border-color:var(--pr200)}
.ai-shortcut-icon{font-size:16px;flex-shrink:0}
.ai-shortcut-label{font:500 12px/1.2 var(--f);color:var(--c8)}
.ai-sheet-ft{padding:10px 12px;border-top:1px solid var(--dv);display:flex;gap:6px;flex-shrink:0}
.ai-sheet-input{flex:1;height:36px;border:1px solid var(--c2);border-radius:18px;padding:0 14px;font:400 13px/1 var(--f);color:var(--c8);outline:none}
.ai-sheet-input:focus{border-color:var(--pr)}
.ai-sheet-send{width:36px;height:36px;border-radius:50%;background:var(--pr);border:none;display:flex;align-items:center;justify-content:center;color:#FFF}
.ai-fab{position:fixed;bottom:80px;right:16px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--vi));border:none;box-shadow:0 4px 12px rgba(37,99,235,.3);display:flex;align-items:center;justify-content:center;z-index:940}
.ai-fab svg{width:20px;height:20px;color:#FFF}
.ai-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:940;opacity:0;pointer-events:none;transition:opacity .2s}
.ai-sheet-overlay.open{opacity:1;pointer-events:all}
</style>
</head>
<body>

<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-status">
    <span>9:41</span>
    <div class="phone-status-r">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--c9)"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="1.5" width="3" height="10.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="none" stroke="var(--c9)" stroke-width="1.2"><rect x="0.5" y="0.5" width="12" height="11" rx="2"/><line x1="13" y1="4" x2="13" y2="8"/><rect x="2" y="2.5" width="7" height="7" rx="1" fill="var(--c9)"/></svg>
    </div>
  </div>
  <div class="phone-nav">
    <a href="../demo-index.html" class="phone-nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="phone-nav-t">结果审定</span>
  </div>
  <div class="phone-body" id="phoneBody"></div>
  <div class="toast" id="toast"></div>
</div>

<script>
const GRADES = ['超出预期','符合预期+','符合预期','符合预期-','低于预期'];
const GRADE_COLORS = {'超出预期':'var(--em700)','符合预期+':'var(--pr)','符合预期':'var(--c7)','符合预期-':'var(--ac)','低于预期':'var(--ro)'};
const GRADE_BG = {'超出预期':'var(--em50)','符合预期+':'var(--pr50)','符合预期':'var(--c1)','符合预期-':'var(--ac50)','低于预期':'var(--ro50)'};
const DIST_TARGET = {'超出预期':10,'符合预期+':30,'符合预期':40,'符合预期-':20,'低于预期':0};

const MEMBERS = [
  {name:'张明',dept:'产品部',role:'高级产品经理',group:'产品组',score:87.5,curGrade:'符合预期+',directGrade:'符合预期+',newGrade:'',reached:true},
  {name:'李华',dept:'产品部',role:'产品经理',group:'产品组',score:91.0,curGrade:'超出预期',directGrade:'超出预期',newGrade:'',reached:true},
  {name:'王芳',dept:'产品部',role:'产品专员',group:'产品组',score:77.0,curGrade:'符合预期',directGrade:'符合预期',newGrade:'',reached:true},
  {name:'赵强',dept:'产品部',role:'高级产品经理',group:'技术组',score:85.0,curGrade:'符合预期',directGrade:'符合预期',newGrade:'',reached:false},
  {name:'陈静',dept:'产品部',role:'产品助理',group:'技术组',score:66.5,curGrade:'符合预期-',directGrade:'符合预期-',newGrade:'',reached:false},
  {name:'刘洋',dept:'产品部',role:'产品经理',group:'产品组',score:82.0,curGrade:'符合预期',directGrade:'符合预期',newGrade:'',reached:true},
  {name:'孙丽',dept:'产品部',role:'高级产品经理',group:'产品组',score:93.5,curGrade:'超出预期',directGrade:'超出预期',newGrade:'',reached:true},
  {name:'周磊',dept:'产品部',role:'产品经理',group:'产品组',score:79.0,curGrade:'符合预期',directGrade:'符合预期',newGrade:'',reached:true},
  {name:'吴涛',dept:'产品部',role:'技术总监',group:'技术组',score:88.0,curGrade:'符合预期+',directGrade:'符合预期+',newGrade:'',reached:true},
  {name:'郑洁',dept:'产品部',role:'高级工程师',group:'技术组',score:74.5,curGrade:'符合预期',directGrade:'符合预期',newGrade:'',reached:true},
  {name:'黄鹏',dept:'产品部',role:'工程师',group:'技术组',score:70.0,curGrade:'符合预期-',directGrade:'符合预期-',newGrade:'',reached:false},
  {name:'林敏',dept:'产品部',role:'产品经理',group:'产品组',score:81.0,curGrade:'符合预期',directGrade:'符合预期',newGrade:'',reached:true},
  {name:'何杰',dept:'产品部',role:'高级工程师',group:'技术组',score:86.5,curGrade:'符合预期+',directGrade:'符合预期+',newGrade:'',reached:true},
  {name:'马超',dept:'产品部',role:'产品助理',group:'产品组',score:68.0,curGrade:'符合预期-',directGrade:'符合预期-',newGrade:'',reached:false},
  {name:'胡蝶',dept:'产品部',role:'工程师',group:'技术组',score:62.0,curGrade:'低于预期',directGrade:'低于预期',newGrade:'',reached:false}
];

function calcDist(){
  const dist = {};
  GRADES.forEach(g=>dist[g]=0);
  MEMBERS.forEach(m=>{if(m.reached&&m.newGrade)dist[m.newGrade]++});
  return dist;
}

function render(){
  const el = document.getElementById('phoneBody');
  let h = '';
  const dist = calcDist();
  const reached = MEMBERS.filter(m=>m.reached).length;

  // Header stats
  h += `<div style="display:flex;gap:8px;margin-bottom:12px">
    <div style="flex:1;background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:12px;text-align:center">
      <div style="font:700 20px/1 var(--fm);color:var(--c9)">${MEMBERS.length}</div>
      <div style="font:400 11px/1 var(--f);color:var(--c5);margin-top:3px">总人数</div>
    </div>
    <div style="flex:1;background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:12px;text-align:center">
      <div style="font:700 20px/1 var(--fm);color:var(--em)">${reached}</div>
      <div style="font:400 11px/1 var(--f);color:var(--c5);margin-top:3px">已到达</div>
    </div>
    <div style="flex:1;background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:12px;text-align:center">
      <div style="font:700 20px/1 var(--fm);color:var(--ac)">${MEMBERS.length-reached}</div>
      <div style="font:400 11px/1 var(--f);color:var(--c5);margin-top:3px">未到达</div>
    </div>
  </div>`;

  // Distribution
  h += '<div class="dist-card"><div class="dist-title">等级分布 · 强制分布规则</div>';
  GRADES.forEach(g => {
    const color = GRADE_COLORS[g];
    const count = dist[g]||0;
    const target = Math.ceil(MEMBERS.length*DIST_TARGET[g]/100);
    h += `<div class="dist-row">
      <span class="dist-label" style="color:${color}">${g.replace('符合预期','符合').replace('超出预期','超出').replace('低于预期','低于')}</span>
      <div class="dist-bar-wrap">
        <div class="dist-bar target" style="width:${DIST_TARGET[g]}%;background:${color}"></div>
        <div class="dist-bar actual" style="width:${Math.round(count/MEMBERS.length*100)}%;background:${color}"></div>
      </div>
      <span class="dist-pct">${count}人</span>
    </div>`;
  });
  h += '</div>';

  // Member list
  h += `<div style="font:600 14px/1 var(--f);color:var(--c8);margin-bottom:10px">成员审定 (${MEMBERS.length}人)</div>`;

  MEMBERS.forEach((m,i) => {
    const gc = GRADE_COLORS[m.curGrade]||'var(--c5)';
    const bgc = GRADE_BG[m.curGrade]||'var(--c1)';
    h += `<div class="member-row" style="${!m.reached?'opacity:.55':''}">
      <div class="member-av" style="background:${gc}">${m.name[0]}</div>
      <div class="member-info">
        <div class="member-name">${m.name} <span style="font:400 10px/1 var(--f);color:var(--c5)">${m.role}</span></div>
        <div class="member-score">${m.score}分 · 审定前 <span class="grade-tag" style="background:${bgc};color:${gc}">${m.curGrade}</span> → 直线上级 <span class="grade-tag" style="background:${GRADE_BG[m.directGrade]||'var(--c1)'};color:${GRADE_COLORS[m.directGrade]||'var(--c5)'}">${m.directGrade}</span></div>
      </div>
      <div class="member-grade-wrap">
        ${m.reached?`<select class="grade-select" onchange="updateGrade(${i},this.value)">
          <option value="">请选择</option>
          ${GRADES.map(g=>`<option value="${g}" ${g===m.newGrade?'selected':''}>${g}</option>`).join('')}
        </select>`:'<span style="font:400 11px/1 var(--f);color:var(--c4)">未到达</span>'}
      </div>
    </div>`;
  });

  h += `<div class="actions">
    <button class="btn btn-submit" onclick="showToast('已批量提交审定结果')">批量提交</button>
  </div>`;

  h += '<div style="height:8px"></div>';
  el.innerHTML = h;
}

function updateGrade(idx,val){
  MEMBERS[idx].newGrade = val;
  render();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2000);
}

render();

// ═══ MOBILE AI ═══
var AI_S={open:false,msgs:[{role:'bot',text:'👋 AI审定助手\n\n• 分析等级分布\n• 批量推荐等级\n• 异常检测',time:'刚刚',shortcuts:true}]};
var AI_S_SHORTCUTS=[
  {icon:'📊',label:'分析等级分布'},
  {icon:'📝',label:'批量调整建议'},
  {icon:'⚠️',label:'异常检测'}
];

function toggleAI(){AI_S.open=!AI_S.open;document.getElementById('aiSheet').classList.toggle('open',AI_S.open);document.getElementById('aiOverlay').classList.toggle('open',AI_S.open);if(AI_S.open)renderAI();}
function closeAI(){AI_S.open=false;document.getElementById('aiSheet').classList.remove('open');document.getElementById('aiOverlay').classList.remove('open');}

function renderAI(){
  var bd=document.getElementById('aiSheetBd');
  bd.innerHTML=AI_S.msgs.map(function(m){
    var h='<div class="ai-msg '+m.role+'"><div class="ai-msg-bd">'+m.text.replace(/\n/g,'<br/>')+'</div>';
    if(m.shortcuts){h+='<div class="ai-shortcuts">'+AI_S_SHORTCUTS.map(function(s){return '<div class="ai-shortcut" onclick="aiAction(\''+s.label+'\')"><span class="ai-shortcut-icon">'+s.icon+'</span><span class="ai-shortcut-label">'+s.label+'</span></div>';}).join('')+'</div>';}
    if(m.card){h+='<div class="ai-msg-card"><div class="ai-msg-card-t">'+m.card.t+'</div><div class="ai-msg-card-d">'+m.card.d+'</div><span class="ai-msg-card-tag" style="background:var(--em50);color:var(--em700)">'+m.card.tag+'</span></div>';}
    if(m.acts){h+='<div class="ai-msg-actions">'+m.acts.map(function(a){return '<button class="ai-msg-btn" onclick="aiAction(\''+a+'\')">'+a+'</button>';}).join('')+'</div>';}
    if(m.time){h+='<div class="ai-msg-time">'+m.time+'</div>';}
    return h+'</div>';
  }).join('');
  bd.scrollTop=bd.scrollHeight;
}

function aiSend(){
  var inp=document.getElementById('aiInp');var t=inp.value.trim();if(!t)return;
  AI_S.msgs.push({role:'user',text:t});inp.value='';renderAI();
  setTimeout(function(){AI_S.msgs.push({role:'bot',text:'收到，正在分析…',time:'刚刚',acts:['分析等级分布','批量调整建议','异常检测']});renderAI();},600);
}

function aiAction(a){
  AI_S.msgs.push({role:'user',text:a});
  setTimeout(function(){
    if(a==='分析等级分布'){AI_S.msgs.push({role:'bot',text:'📊 等级分布分析：\n超出预期: 1人 ✅\n符合预期+: 1人 ⚠️偏低\n符合预期: 2人 ✅\n符合预期-: 1人 ✅\n低于预期: 0人 ✅',time:'刚刚',card:{t:'分布分析',d:'整体达标，符合预期+偏低',tag:'建议调整'}});}
    else if(a==='批量调整建议'){AI_S.msgs.push({role:'bot',text:'📝 推荐等级：\n张明 → 符合预期+\n李华 → 超出预期\n王芳 → 符合预期\n赵强 → 符合预期\n陈静 → 符合预期-',time:'刚刚',acts:['确认应用']});}
    else if(a==='异常检测'){AI_S.msgs.push({role:'bot',text:'⚠️ 发现1名低分员工：\n陈静 66.5分，建议关注',time:'刚刚',card:{t:'异常检测',d:'陈静得分偏低',tag:'需关注'}});}
    else{AI_S.msgs.push({role:'bot',text:'收到，正在分析…',time:'刚刚'});}
    renderAI();
  },600);
}
</script>
