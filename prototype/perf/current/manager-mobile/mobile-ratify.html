<style>
.star-rating-sm{display:flex;gap:2px;align-items:center;flex-direction:column}
.star-rating-sm .star-row{display:flex;gap:3px}
.star-rating-sm .star{font-size:24px;line-height:1;cursor:pointer;color:var(--c3);transition:color .12s}
.star-rating-sm .star.sel{color:var(--ac)}
.star-row-inline{display:flex;gap:1px}
.star-inline{font-size:14px;color:var(--c3);cursor:pointer;line-height:1}
.star-inline.sel{color:var(--ac)}

.weui-search-bar{padding:8px 0}
.weui-search-bar__box{display:flex;align-items:center;background:var(--c1);border-radius:var(--r1);padding:0 10px;height:32px}
.weui-search-bar__icon{font-size:14px;margin-right:6px;flex-shrink:0}
.weui-search-bar__input{flex:1;border:none;background:transparent;font:400 var(--fs-base)/1 var(--f);color:var(--c8);outline:none}
.weui-search-bar__input::placeholder{color:var(--c4)}
.weui-search-bar__clear{font:400 14px/1 var(--f);color:var(--c4);cursor:pointer;padding:0 4px;flex-shrink:0;display:none}
.weui-search-bar__clear.show{display:block}

.member-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:none;align-items:flex-end}
.member-sheet{background:var(--sf);border-radius:16px 16px 0 0;width:100%;max-height:85%;display:flex;flex-direction:column;animation:slideUp .3s ease}
.member-sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--dv)}
.member-sheet-name{font:600 16px/1 var(--f);color:var(--c9)}
.member-sheet-close{width:36px;height:36px;border:none;background:var(--c1);border-radius:50%;font-size:18px;color:var(--c5);cursor:pointer;display:flex;align-items:center;justify-content:center}
.member-sheet-bd{flex:1;overflow-y:auto;padding:14px 16px 34px}

@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>

MEMBERS.forEach(function(m){
  m.stars=m.ratifyGrade?GRADES.indexOf(m.ratifyGrade)+1:0;
});

var currentGrade=null;

function getFiltered(){
  var input=document.getElementById('searchInput');
  var q=(input&&input.value||'').trim().toLowerCase();
  return MEMBERS.filter(function(m){
    if(currentGrade&&(m.ratifyGrade||m.grade)!==currentGrade)return false;
    if(q&&m.name.toLowerCase().indexOf(q)<0)return false;
    return true;
  });
}

function filterByGrade(grade){
  currentGrade=currentGrade===grade?null:grade;
  render();
}

function setStarInline(i,v){
  MEMBERS[i].ratifyGrade=GRADES[v-1];
  MEMBERS[i].stars=v;
  render();
}

function renderDistTable(filtered){
  var total=filtered.length;
  var h='<div class="weui-cells" style="margin-top:0">';
  FORCE_DIST_RULES.forEach(function(r){
    var count=filtered.filter(function(m){return(m.ratifyGrade||m.grade)===r.grade;}).length;
    var ok=count>=r.min&&count<=r.max;
    var diff=0,dir='';
    if(count<r.min){diff=Math.ceil(total*r.min/100)-count;dir='+';}
    else if(count>r.max){diff=count-Math.ceil(total*r.max/100);dir='-';}
    var sel=currentGrade===r.grade?'background:var(--pr50)':'';
    var rowBg=!ok?'background:var(--ro50)':sel;
    h+='<div class="weui-cell" style="'+rowBg+';cursor:pointer" onclick="filterByGrade(\''+r.grade+'\')">';
    h+='<div class="weui-cell__bd" style="font:500 var(--fs-base)/1 var(--f);color:'+(ok?'var(--c8)':'var(--ro)')+'">'+r.grade+'</div>';
    h+='<div class="weui-cell__ft" style="display:flex;align-items:center;gap:8px">';
    h+='<span style="font-size:14px">'+(ok?'✅':'❌')+'</span>';
    if(diff>0)h+='<span style="font:500 var(--fs-sm)/1 var(--f);color:var(--ro)">'+(dir==='+'?'需+':'需-')+diff+'</span>';
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}

function renderMemberList(filtered){
  var h='';
  filtered.forEach(function(m){
    var i=MEMBERS.indexOf(m);
    var cg=m.ratifyGrade||m.grade;
    h+='<div class="weui-cell">';
    h+='<div class="weui-cell__bd">';
    h+='<span style="font:500 var(--fs-base)/1 var(--f);color:var(--c8)">'+m.name+'</span>';
    h+='<span style="font:400 var(--fs-sm)/1 var(--f);color:var(--c5);margin-left:6px">'+m.dept+'</span>';
    h+='<div class="star-row-inline" style="margin-top:4px">';
    for(var v=1;v<=7;v++){
      h+='<span class="star-inline'+(v<=m.stars?' sel':'')+'" data-v="'+v+'" onclick="event.stopPropagation();setStarInline('+i+','+v+')">★</span>';
    }
    h+='</div>';
    h+='</div>';
    h+='<div class="weui-cell__ft" style="display:flex;align-items:center;gap:4px">';
    h+='<span style="font:500 var(--fs-sm)/1 var(--f);padding:2px 6px;border-radius:3px;background:'+(GRADE_BG[cg]||'')+';color:'+(GRADE_COLOR[cg]||'')+'">'+cg+'</span>';
    h+='<span style="font:400 var(--fs-sm)/1 var(--f);color:var(--pr);cursor:pointer" onclick="event.stopPropagation();openMemberDetail('+i+')">更多</span>';
    h+='</div></div>';
  });
  return h;
}

function openMemberDetail(i){

  var h='';
  h+='<div class="weui-cells" style="margin-bottom:10px">';
  h+='<div class="weui-cell"><div class="weui-cell__bd" style="color:var(--c5)">部门</div><div class="weui-cell__ft" style="color:var(--c8)">'+m.dept+'</div></div>';
  h+='<div class="weui-cell"><div class="weui-cell__bd" style="color:var(--c5)">岗位</div><div class="weui-cell__ft" style="color:var(--c8)">'+m.role+'</div></div>';
  h+='<div class="weui-cell"><div class="weui-cell__bd" style="color:var(--c5)">分数</div><div class="weui-cell__ft" style="font:600 var(--fs-base)/1 var(--fm);color:var(--c9)">'+m.totalScore+'</div></div>';
  h+='<div class="weui-cell"><div class="weui-cell__bd" style="color:var(--c5)">初评等级</div><div class="weui-cell__ft"><span style="font:500 var(--fs-sm)/1 var(--f);padding:2px 8px;border-radius:3px;background:'+(GRADE_BG[m.grade]||'')+';color:'+(GRADE_COLOR[m.grade]||'')+'">'+m.grade+'</span></div></div>';
  h+='<div class="weui-cell"><div class="weui-cell__bd" style="color:var(--c5)">审定等级</div><div class="weui-cell__ft"><span style="font:500 var(--fs-sm)/1 var(--f);padding:2px 8px;border-radius:3px;background:'+(GRADE_BG[m.ratifyGrade||m.grade]||'')+';color:'+(GRADE_COLOR[m.ratifyGrade||m.grade]||'')+'">'+(m.ratifyGrade||'待调整')+'</span></div></div>';
  h+='</div>';
  h+='<div style="text-align:center;padding:12px 0">';
  h+='<div style="font:500 var(--fs-base)/1 var(--f);color:var(--c6);margin-bottom:10px">调整等级</div>';
  h+='<div class="star-rating-sm"><div class="star-row">';
  for(var v=1;v<=7;v++){
    h+='<span class="star'+(v<=(m.stars||0)?' sel':'')+'" data-v="'+v+'" onclick="setStarInline('+i+','+v+');closeMemberDetail()">★</span>';
  }
  h+='</div></div>';
  h+='<div style="font:600 var(--fs-base)/1 var(--f);color:var(--pr);margin-top:8px">'+(m.stars?GRADE_TIPS[m.stars]:'点击评星')+'</div>';
  h+='</div>';
  document.getElementById('mdBody').innerHTML=h;
  document.getElementById('memberOverlay').style.display='flex';
}
function closeMemberDetail(){document.getElementById('memberOverlay').style.display='none';}

function render(){
  var h='';
  var filtered=getFiltered();

  h+='<div class="weui-panel weui-panel_access" style="margin-bottom:10px"><div class="weui-panel__hd" style="font:600 var(--fs-base)/1 var(--f);color:var(--c9)">等级分布</div>';
  h+=renderDistTable(filtered);
  h+='</div>';

  h+='<div class="weui-panel weui-panel_access" style="margin-bottom:10px"><div class="weui-panel__hd" style="font:600 var(--fs-base)/1 var(--f);color:var(--c8)">成员审定 ('+filtered.length+'人)</div><div class="weui-cells">';
  h+=renderMemberList(filtered);
  h+='</div></div>';

  h+='<div style="height:80px"></div>';
  document.getElementById('phoneContent').innerHTML=h;
}

render();
</script>
</body>
</html>
