<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HR ONE - 目标审批</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../mobile-base.css">
<style>
.goal-mod{margin-bottom:10px}
.goal-mod-hd{display:flex;align-items:center;gap:8px;padding:8px 0}
.goal-mod-color{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.goal-mod-name{font:600 var(--fs-base)/1 var(--f);color:var(--c8);flex:1}
.goal-mod-wt{font:500 var(--fs-sm)/1 var(--fm);color:var(--c5)}
.goal-card{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:12px;margin-bottom:8px}
.goal-card-hd{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.goal-card-name{flex:1;font:500 var(--fs-base)/1.3 var(--f);color:var(--c8)}
.goal-card-type{font:500 var(--fs-xs)/1 var(--f);padding:2px 6px;border-radius:3px}
.goal-card-type.quant{background:var(--pr50);color:var(--pr)}
.goal-card-type.qual{background:var(--em50);color:var(--em700)}
.goal-card-wt{font:500 var(--fs-sm)/1 var(--fm);color:var(--c5)}
.goal-card-desc{font:400 var(--fs-sm)/1.4 var(--f);color:var(--c6);padding:6px 10px;background:var(--c0);border-radius:6px;margin-bottom:6px}
.goal-metrics{display:flex;gap:8px}
.goal-ms-row{display:flex;align-items:center;padding-top:4px}
.goal-ms-label{font:400 var(--fs-sm)/1 var(--f);color:var(--c4);width:56px;flex-shrink:0}
.goal-ms-val{font:400 var(--fs-sm)/1.4 var(--f);color:var(--c7)}

.panel{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);margin-bottom:10px}
.panel-hd{padding:12px 14px;font:600 var(--fs-base)/1 var(--f);color:var(--c8);border-bottom:1px solid var(--dv)}
.flow-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--dv)}
.flow-item:last-child{border-bottom:none}
.flow-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.flow-dot svg{width:12px;height:12px}
.flow-info{flex:1}
.flow-name{font:500 var(--fs-base)/1 var(--f);color:var(--c8)}
.flow-person{font:400 var(--fs-sm)/1 var(--f);color:var(--c5);margin-top:2px}
.flow-badge{font:500 var(--fs-xs)/1 var(--f);padding:2px 8px;border-radius:4px;white-space:nowrap}
</style>
</head>
<body>
<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-status">9:41<div class="phone-status-r">
    <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="6" width="3" height="6" rx="1" fill="currentColor" style="color:var(--c9)"/><rect x="4.5" y="4" width="3" height="8" rx="1" fill="currentColor" style="color:var(--c9)"/><rect x="9" y="1.5" width="3" height="10.5" rx="1" fill="currentColor" style="color:var(--c9)"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="currentColor" style="color:var(--c9)"/></svg>
    <svg width="15" height="12" viewBox="0 0 15 12" fill="none"><rect x="0.5" y="0.5" width="12" height="11" rx="2" stroke="currentColor" style="color:var(--c9)" stroke-width="1.2"/><line x1="13" y1="4" x2="13" y2="8" stroke="currentColor" style="color:var(--c9)" stroke-width="1.2"/><rect x="2" y="2.5" width="7" height="7" rx="1" fill="currentColor" style="color:var(--c9)"/></svg>
  </div></div>
  <div class="weui-navigation-bar">
    <a href="../demo-index.html" class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="title">目标审批</span>
  </div>
  <div class="phone-body" id="phoneBody"></div>
  <div class="bottom-bar">
    <button class="weui-btn weui-btn_default" style="flex:1" onclick="showToast('已退回')">退回</button>
    <button class="weui-btn weui-btn_primary" style="flex:1" onclick="showToast('已批准')">批准</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="../mobile-base.js"></script>
<script>
var EMP={name:'张明',dept:'产品部',title:'高级产品经理',cycle:'2026年Q2'};

var MODS=[
  {name:'KPI',weight:30,color:'var(--pr)',goals:[
    {name:'资源利用率（通用）',type:'quant',weight:5,unit:'%',challenge:110,target:105,baseline:100,desc:'人员实际工作量饱和情况'},
    {name:'HRAS UAT用户验收首次通过率',type:'quant',weight:10,unit:'%',challenge:100,target:98,baseline:95,desc:'需求首次业务验收通过的概率'},
    {name:'HRAS需求评审及时率',type:'quant',weight:15,unit:'%',challenge:100,target:98,baseline:95,desc:'迭代版本评审的及时性情况'}
  ]},
  {name:'KPA',weight:70,color:'var(--em)',goals:[
    {name:'HRAS产品管理规范',type:'qual',weight:10,desc:'需求管理流程规范、产品需求规范、迭代火车管理规范'},
    {name:'日常滚动需求响应',type:'qual',weight:10,desc:'根据业务日会需求优先级，滚动响应日常需求'},
    {name:'HR ONE 绩效重构事项推进',type:'qual',weight:25,desc:'06-10 输出原型；06-19 需求内审；06-24 需求评审'},
    {name:'AI应用项目探索与落地推广',type:'qual',weight:25,desc:'06-05 1.0版本；06-12 LBU试点；06-26 1.1版本'}
  ]}
];

function render(){
  var h='';
  // Employee card
  h+='<div class="weui-panel weui-panel_access" style="margin-bottom:10px"><div class="weui-cells"><div class="weui-cell"><div class="weui-cell__hd"><div style="width:36px;height:36px;border-radius:50%;background:var(--pr50);display:flex;align-items:center;justify-content:center;font:700 var(--fs-lg)/1 var(--f);color:var(--pr);margin-right:12px">'+EMP.name[0]+'</div></div><div class="weui-cell__bd"><div style="font:600 var(--fs-base)/1 var(--f);color:var(--c9)">'+EMP.name+'</div><div style="font:400 var(--fs-sm)/1 var(--f);color:var(--c5);margin-top:2px">'+EMP.title+' · '+EMP.dept+'</div></div><div class="weui-cell__ft"><span class="weui-badge" style="background:var(--pr50);color:var(--pr)">'+EMP.cycle+'</span></div></div></div></div>';

  // Modules
  MODS.forEach(function(m){
    h+='<div class="weui-panel weui-panel_access goal-mod"><div class="weui-panel__hd" style="display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:'+m.color+';display:inline-block"></span><span style="font:600 var(--fs-base)/1 var(--f);color:var(--c8)">'+m.name+'</span><span style="font:500 var(--fs-sm)/1 var(--fm);color:var(--c5)">权重 '+m.weight+'%</span></div><div class="weui-cells">';
    m.goals.forEach(function(g){
      var isQuant=g.type==='quant';
      h+='<div class="weui-cell"><div style="width:100%">';
      // Header
      h+='<div class="goal-card-hd">';
      h+='<span class="goal-card-name">'+g.name+'</span>';
      h+='<span class="goal-card-type '+(isQuant?'quant':'qual')+'">'+(isQuant?'定量':'定性')+'</span>';
      h+='<span class="goal-card-wt">'+g.weight+'%</span>';
      h+='</div>';

      if(isQuant){
        // Description
        h+='<div class="goal-card-desc">'+g.desc+'</div>';
        // Three-column metrics
        h+='<div class="goal-metrics" style="display:flex;flex-direction:row;gap:8px">';
        h+='<div style="flex:1;text-align:center"><div style="font:600 14px/1 var(--fm);color:var(--c9)">'+g.challenge+g.unit+'</div><div style="font:400 10px/1 var(--f);color:var(--c4);margin-top:2px">挑战值</div></div>';
        h+='<div style="flex:1;text-align:center"><div style="font:600 14px/1 var(--fm);color:var(--c9)">'+g.target+g.unit+'</div><div style="font:400 10px/1 var(--f);color:var(--c4);margin-top:2px">目标值</div></div>';
        h+='<div style="flex:1;text-align:center"><div style="font:600 14px/1 var(--fm);color:var(--c9)">'+g.baseline+g.unit+'</div><div style="font:400 10px/1 var(--f);color:var(--c4);margin-top:2px">保底值</div></div>';
        h+='</div>';
      } else {
        // Description + measure
        h+='<div class="goal-card-desc">'+g.desc+'</div>';
        h+='<div class="goal-ms-row"><span class="goal-ms-label">指标描述</span><span class="goal-ms-val">'+g.desc+'</span></div>';
      }
      h+='</div></div>';
    });
    h+='</div></div>';
  });

  // Approval flow
  h+='<div class="panel"><div class="panel-hd">审批流程</div>';
  h+='<div class="flow-item"><div class="flow-dot" style="background:var(--em)"><svg viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div><div class="flow-info"><div class="flow-name">间接上级审批</div><div class="flow-person">刘VP</div></div><span class="flow-badge" style="background:var(--em50);color:var(--em700)">已完成</span></div>';
  h+='<div class="flow-item"><div class="flow-dot" style="background:var(--pr)"><svg viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div><div class="flow-info"><div class="flow-name">直接上级审批</div><div class="flow-person">王总监</div></div><span class="flow-badge" style="background:var(--pr50);color:var(--pr)">进行中</span></div>';
  h+='</div>';

  h+='<div style="height:80px"></div>';
  document.getElementById('phoneBody').innerHTML=h;
}

render();
</script>
</body>
</html>
