<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HR ONE - 目标审批</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../mobile-base.css">
</head>
<body>
<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-status">9:41<div class="phone-status-r">
    <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="6" width="3" height="6" rx="1" fill="currentColor" style="color:var(--c9)"/><rect x="4.5" y="4" width="3" height="8" rx="1" fill="currentColor" style="color:var(--c9)"/><rect x="9" y="1.5" width="3" height="10.5" rx="1" fill="currentColor" style="color:var(--c9)"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="currentColor" style="color:var(--c9)"/></svg>
    <svg width="15" height="12" viewBox="0 0 15 12" fill="none"><rect x="0.5" y="0.5" width="12" height="11" rx="2" stroke="currentColor" style="color:var(--c9)" stroke-width="1.2"/><line x1="13" y1="4" x2="13" y2="8" stroke="currentColor" style="color:var(--c9)" stroke-width="1.2"/><rect x="2" y="2.5" width="7" height="7" rx="1" fill="currentColor" style="color:var(--c9)"/></svg>
  </div></div>
  <div class="weui-navigation-bar">
    <a href="../demo-index.html" class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="title">目标审批</span>
  </div>
  <div class="phone-body" id="phoneBody"></div>
</div>
<div class="toast" id="toast"></div>
<script src="../mobile-base.js"></script>
<script>
var PENDING=[
  {name:'赵强',title:'高级产品经理',color:'var(--ac)',goals:[
    {title:'资源利用率（通用）',weight:5,deadline:'2026-06-30'},
    {title:'HRAS UAT用户验收首次通过率',weight:10,deadline:'2026-06-30'},
    {title:'HR ONE 绩效重构事项推进',weight:25,deadline:'2026-06-24'}
  ]},
  {name:'陈静',title:'产品助理',color:'var(--vi)',goals:[
    {title:'HRAS产品管理规范',weight:10,deadline:'2026-06-30'},
    {title:'AI应用项目探索与落地推广',weight:25,deadline:'2026-06-26'}
  ]}
];

var DONE=[
  {name:'张明',title:'高级产品经理',color:'var(--pr)'},
  {name:'李华',title:'产品经理',color:'var(--em)'}
];

var curTab='pending',openIdx=-1;

function render(){
  var h='';
  // Tabs
  h+='<div class="weui-tab" style="margin-bottom:12px"><div class="weui-navbar" style="background:var(--c1);border-radius:var(--r1);padding:3px"><div class="weui-navbar__item'+(curTab==='pending'?' weui-bar__item_on':'')+'" onclick="switchTab(\'pending\')" style="padding:8px 0;font-size:var(--fs-base)">待审批 ('+PENDING.length+')</div><div class="weui-navbar__item'+(curTab==='done'?' weui-bar__item_on':'')+'" onclick="switchTab(\'done\')" style="padding:8px 0;font-size:var(--fs-base)">已审批 ('+DONE.length+')</div></div></div>';

  if(curTab==='pending'){
    PENDING.forEach(function(p,i){
      h+='<div class="weui-panel weui-panel_access" style="margin-bottom:8px"><div class="weui-cells"><div class="weui-cell weui-cell_access" onclick="toggleDetail('+i+')"><div class="weui-cell__hd"><div style="width:36px;height:36px;border-radius:50%;background:'+p.color+';display:flex;align-items:center;justify-content:center;font:600 var(--fs-base)/1 var(--f);color:#FFF;margin-right:10px">'+p.name[0]+'</div></div><div class="weui-cell__bd"><div style="font:500 var(--fs-base)/1 var(--f);color:var(--c8)">'+p.name+'</div><div style="font:400 var(--fs-sm)/1 var(--f);color:var(--c5);margin-top:2px">'+p.title+'</div></div><div class="weui-cell__ft"><span class="weui-badge" style="background:var(--pr50);color:var(--pr)">'+p.goals.length+' 个目标</span></div></div></div>';
      if(openIdx===i){
        h+='<div style="padding:0 16px 12px">';
        p.goals.forEach(function(g,j){
          h+='<div style="background:var(--c0);border-radius:var(--r1);padding:10px 12px;margin-bottom:6px"><div style="font:500 var(--fs-sm)/1 var(--f);color:var(--c5);margin-bottom:4px">目标 '+(j+1)+'</div><div style="font:500 var(--fs-base)/1 var(--f);color:var(--c8);margin-bottom:6px">'+g.title+'</div><div style="display:flex;gap:12px;font:400 var(--fs-sm)/1 var(--f);color:var(--c5)"><span>权重 <strong style="color:var(--c7)">'+g.weight+'%</strong></span><span>截止 <strong style="color:var(--c7)">'+g.deadline+'</strong></span></div></div>';
        });
        h+='<div style="margin-bottom:8px"><textarea class="weui-textarea" style="min-height:60px;font-size:var(--fs-sm)" placeholder="请输入审批意见（选填）"></textarea></div>';
        h+='<div style="display:flex;gap:8px"><button class="weui-btn weui-btn_warn" style="flex:1" onclick="handleApprove('+i+',\'reject\')">退回</button><button class="weui-btn weui-btn_primary" style="flex:1" onclick="handleApprove('+i+',\'approve\')">批准</button></div>';
        h+='</div>';
      }
      h+='</div>';
    });
  } else {
    DONE.forEach(function(d){
      h+='<div class="weui-panel weui-panel_access"><div class="weui-cells"><div class="weui-cell"><div class="weui-cell__hd"><div style="width:36px;height:36px;border-radius:50%;background:'+d.color+';display:flex;align-items:center;justify-content:center;font:600 var(--fs-base)/1 var(--f);color:#FFF;margin-right:10px">'+d.name[0]+'</div></div><div class="weui-cell__bd"><div style="font:500 var(--fs-base)/1 var(--f);color:var(--c8)">'+d.name+'</div><div style="font:400 var(--fs-sm)/1 var(--f);color:var(--c5);margin-top:2px">'+d.title+'</div></div><div class="weui-cell__ft"><span class="weui-badge" style="background:var(--em50);color:var(--em700)">已批准</span></div></div></div></div>';
    });
  }
  h+='<div style="height:24px"></div>';
  document.getElementById('phoneBody').innerHTML=h;
}
function switchTab(t){curTab=t;openIdx=-1;render();}
function toggleDetail(i){openIdx=openIdx===i?-1:i;render();}
function handleApprove(i,action){
  var p=PENDING[i];
  showToast((action==='approve'?'已批准 ':'已退回 ')+p.name+' 的目标');
  PENDING.splice(i,1);openIdx=-1;render();
}
render();
</script>
</body>
</html>
