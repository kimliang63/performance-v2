<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 团队目标</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;
  --em:#10B981;--em50:#ECFDF5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#0F172A;--c8:#1E293B;--c7:#334155;--c6:#475569;--c5:#64748B;--c4:#94A3B8;--c3:#CBD5E1;--c2:#E2E8F0;--c1:#F1F5F9;--c0:#F8FAFC;
  --sf:#FFF;--bg:#F0F4F8;--dv:#E2E8F0;
  --r1:10px;--r2:12px;--r3:14px;--r4:18px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
  --sx:0 1px 2px rgba(0,0,0,.04);--sm:0 2px 8px rgba(0,0,0,.06);
  --bd:rgba(15,23,42,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:#E5E7EB;color:var(--c7);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}
.phone{width:393px;height:852px;background:var(--bg);border-radius:48px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.05),inset 0 0 0 1px rgba(255,255,255,.1);overflow:hidden;position:relative;display:flex;flex-direction:column}
.phone-notch{width:126px;height:34px;background:#000;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:100}
.phone-status{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 8px;font:600 14px/1 var(--f);color:var(--c9)}
.phone-status-r{display:flex;gap:4px;align-items:center}
.phone-nav{height:50px;display:flex;align-items:center;padding:0 16px;gap:10px}
.phone-nav-back{width:32px;height:32px;border-radius:8px;background:var(--c1);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--c7);flex-shrink:0}
.phone-nav-back svg{width:16px;height:16px}
.phone-nav-t{flex:1;font:600 17px/1 var(--f);color:var(--c9)}
.phone-body{flex:1;overflow-y:auto;padding:0 16px}
.phone-body::-webkit-scrollbar{width:0}

/* Pills */
.pills{display:flex;gap:6px;margin-bottom:14px}
.pill{padding:7px 16px;border-radius:20px;font:500 13px/1 var(--f);cursor:pointer;transition:all .15s;border:1px solid var(--c2);background:var(--sf);color:var(--c6)}
.pill.active{background:var(--pr);color:#FFF;border-color:var(--pr)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:14px 16px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.pr::before{background:var(--pr)}.stat.em::before{background:var(--em)}.stat.ac::before{background:var(--ac)}.stat.ro::before{background:var(--ro)}
.stat-t{font:400 11px/1 var(--f);color:var(--c5);margin-bottom:6px}
.stat-v{font:700 22px/1 var(--f);color:var(--c9)}
.stat-d{font:400 10px/1 var(--f);color:var(--c4);margin-top:3px}

/* Section */
.sec-hd{display:flex;align-items:center;gap:8px;margin:16px 0 10px}
.sec-name{font:600 14px/1 var(--f);color:var(--c8)}
.sec-right{margin-left:auto;font:500 12px/1 var(--f);color:var(--c5)}

/* Member Card */
.member{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);margin-bottom:6px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.member-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:600 13px/1 var(--f);color:#FFF;flex-shrink:0}
.member-info{flex:1;min-width:0}
.member-name{font:500 13px/1 var(--f);color:var(--c8)}
.member-dept{font:400 11px/1 var(--f);color:var(--c5);margin-top:2px}
.member-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.badge{font:500 10px/1 var(--f);padding:3px 8px;border-radius:10px}
.badge.submitted{background:var(--em50);color:var(--em700)}
.badge.filling{background:var(--ac50);color:var(--ac700)}
.badge.notstarted{background:var(--c1);color:var(--c5)}
.progress-wrap{width:60px;height:4px;background:var(--c1);border-radius:2px;overflow:hidden}
.progress-bar{height:100%;border-radius:2px;transition:width .3s}
.btn-urge{font:500 10px/1 var(--f);padding:4px 10px;border-radius:8px;background:var(--pr50);color:var(--pr);cursor:pointer;border:none}
.btn-urge:active{background:var(--pr100)}

.toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:var(--c9);color:#FFF;padding:10px 22px;border-radius:22px;font:500 13px/1 var(--f);z-index:900;opacity:0;pointer-events:none;transition:opacity .2s}
</style>
</head>
<body>

<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-status">
    <span>9:41</span>
    <div class="phone-status-r">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--c9)"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="1.5" width="3" height="10.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="none" stroke="var(--c9)" stroke-width="1.2"><rect x="0.5" y="0.5" width="12" height="11" rx="2"/><line x1="13" y1="4" x2="13" y2="8"/><rect x="2" y="2.5" width="7" height="7" rx="1" fill="var(--c9)"/></svg>
    </div>
  </div>
  <div class="phone-nav">
    <a href="../demo-index.html" class="phone-nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="phone-nav-t">团队目标</span>
  </div>
  <div class="phone-body" id="phoneBody"></div>
  <div class="toast" id="toast"></div>
</div>

<script>
const CYCLES = [{id:'q2',label:'2026年Q2'},{id:'q1',label:'2026年Q1'}];
let curCycle = 'q2';

const DATA = {
  q2: {
    members: [
      {name:'张明',role:'高级产品经理',goals:4,progress:100,status:'submitted',color:'var(--pr)'},
      {name:'李雪',role:'产品经理',goals:3,progress:100,status:'submitted',color:'var(--em)'},
      {name:'王浩然',role:'产品设计师',goals:3,progress:60,status:'filling',color:'var(--ac)'},
      {name:'周婷',role:'数据分析',goals:0,progress:0,status:'notstarted',color:'var(--vi)'},
      {name:'吴强',role:'产品运营',goals:0,progress:0,status:'notstarted',color:'var(--ro)'}
    ],
    stats:{total:5,submitted:2,filling:1,notstarted:2}
  },
  q1: {
    members: [
      {name:'张明',role:'高级产品经理',goals:5,progress:100,status:'submitted',color:'var(--pr)'},
      {name:'李雪',role:'产品经理',goals:4,progress:100,status:'submitted',color:'var(--em)'},
      {name:'王浩然',role:'产品设计师',goals:4,progress:100,status:'submitted',color:'var(--ac)'},
      {name:'周婷',role:'数据分析',goals:3,progress:100,status:'submitted',color:'var(--vi)'},
      {name:'吴强',role:'产品运营',goals:4,progress:100,status:'submitted',color:'var(--ro)'}
    ],
    stats:{total:5,submitted:5,filling:0,notstarted:0}
  }
};

function render(){
  const el = document.getElementById('phoneBody');
  const d = DATA[curCycle];
  let h = '';

  h += '<div class="pills">';
  CYCLES.forEach(c => {
    h += `<div class="pill ${c.id===curCycle?'active':''}" onclick="switchCycle('${c.id}')">${c.label}</div>`;
  });
  h += '</div>';

  h += `<div class="stats">
    <div class="stat pr"><div class="stat-t">团队成员</div><div class="stat-v">${d.stats.total}</div><div class="stat-d">参与考核</div></div>
    <div class="stat em"><div class="stat-t">已提交</div><div class="stat-v">${d.stats.submitted}</div><div class="stat-d">${Math.round(d.stats.submitted/d.stats.total*100)}% 完成</div></div>
    <div class="stat ac"><div class="stat-t">填写中</div><div class="stat-v">${d.stats.filling}</div><div class="stat-d">进行中</div></div>
    <div class="stat ro"><div class="stat-t">未开始</div><div class="stat-v">${d.stats.notstarted}</div><div class="stat-d">需提醒</div></div>
  </div>`;

  h += `<div class="sec-hd"><span class="sec-name">成员列表</span><span class="sec-right">${d.members.length} 人</span></div>`;

  const statusMap = {submitted:'已提交',filling:'填写中',notstarted:'未开始'};
  const progressColor = {submitted:'var(--em)',filling:'var(--ac)',notstarted:'var(--c3)'};

  d.members.forEach(m => {
    h += `<div class="member">
      <div class="member-av" style="background:${m.color}">${m.name[0]}</div>
      <div class="member-info">
        <div class="member-name">${m.name}</div>
        <div class="member-dept">${m.role}</div>
      </div>
      <div class="member-right">
        <span class="badge ${m.status}">${statusMap[m.status]}</span>
        <div class="progress-wrap"><div class="progress-bar" style="width:${m.progress}%;background:${progressColor[m.status]}"></div></div>
        ${m.status!=='submitted'?`<button class="btn-urge" onclick="event.stopPropagation();showToast('已向${m.name}发送催办')">催办</button>`:''}
      </div>
    </div>`;
  });

  h += '<div style="height:24px"></div>';
  el.innerHTML = h;
}

function switchCycle(id){
  curCycle = id;
  render();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2000);
}

render();
</script>
</body>
</html>
