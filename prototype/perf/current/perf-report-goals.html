<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 目标中心</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --r1:6px;--r2:8px;--r3:10px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}

.fl-bar{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.fl-search{display:flex;align-items:center;gap:6px;background:var(--c0);border:1px solid var(--c2);border-radius:var(--r1);padding:0 10px;height:32px;min-width:200px;transition:all .15s}
.fl-search:focus-within{background:var(--sf);border-color:var(--pr)}
.fl-search svg{color:var(--c4);flex-shrink:0;width:13px;height:13px}
.fl-search input{border:none;background:transparent;outline:none;font:13px/1 var(--f);width:100%;color:var(--c9)}
.fl-search input::placeholder{color:var(--c4)}
.fl-sel{height:32px;padding:0 28px 0 10px;border:1px solid var(--c2);border-radius:var(--r1);font:400 13px/1 var(--f);color:var(--c7);background:var(--sf) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23A1A1AA' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center;appearance:none;cursor:pointer;transition:all .12s;outline:none;-webkit-appearance:none;-moz-appearance:none}
.fl-sel:focus{border-color:var(--pr)}
.fl-actions{display:flex;gap:6px;margin-left:auto}

.tbl-card{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);overflow:hidden;margin-bottom:16px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:var(--c0);font:600 12px/1 var(--f);color:var(--c5);text-align:left;padding:10px 14px;border-bottom:1px solid var(--dv);white-space:nowrap;letter-spacing:.2px;text-transform:uppercase}
tbody td{font:400 13px/1.4 var(--f);color:var(--c7);padding:12px 14px;border-bottom:1px solid var(--dv);vertical-align:middle}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--c0)}
tbody tr:nth-child(even){background:var(--c0)}
tbody tr:nth-child(even):hover{background:var(--pr50)}
tbody tr:last-child td{border-bottom:none}
.mono{font-family:var(--m);font-size:12px}

.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font:500 11px/1 var(--f);white-space:nowrap}
.tag-em{background:var(--em50);color:var(--em700)}
.tag-ac{background:var(--ac50);color:var(--ac700)}
.tag-pr{background:var(--pr50);color:var(--pr)}
.tag-c5{background:var(--c1);color:var(--c5)}
.tag-ro{background:var(--ro50);color:var(--ro)}

.pg-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--dv);font:400 12px/1 var(--f);color:var(--c5)}
.pg-info{display:flex;align-items:center;gap:16px}
.pg-nav{display:flex;align-items:center;gap:4px}
.pg-btn{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;border:1px solid var(--c2);background:var(--sf);cursor:pointer;color:var(--c5);font:500 12px/1 var(--f);transition:all .12s}
.pg-btn:hover{border-color:var(--pr);color:var(--pr)}
.pg-btn.on{background:var(--pr);border-color:var(--pr);color:#FFF}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}

.lk{color:var(--pr);cursor:pointer;text-decoration:none;font-weight:500}
.lk:hover{text-decoration:underline}

@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .25s ease forwards}

.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-ov.on{opacity:1;pointer-events:all}
.modal{background:var(--sf);border-radius:var(--r4);box-shadow:0 20px 60px -15px rgba(0,0,0,.2);width:520px;max-width:90vw;transform:translateY(8px) scale(.98);transition:transform .2s ease}
.modal-ov.on .modal{transform:translateY(0) scale(1)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid var(--dv)}
.modal-hd-t{font:600 15px/1.2 var(--f);color:var(--c9)}
.modal-close{width:28px;height:28px;border-radius:var(--r1);border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--c4);transition:all .12s}
.modal-close:hover{background:var(--c1);color:var(--c7)}
.modal-close svg{width:16px;height:16px}
.modal-bd{padding:18px 22px}
.modal-ft{display:flex;justify-content:flex-end;gap:8px;padding:14px 22px 18px;border-top:1px solid var(--dv)}
</style>
</head>
<body>
<div id="app"></div>
<div id="modalContainer"></div>
<script src="../navigation.js"></script>
<script>
GHR_NAV.init('perf', '目标中心');

var I={
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  download:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
};

var EXPORT_FIELDS={
  roster:{name:'导出名单',fields:[
    {key:'name',label:'姓名',def:true},{key:'emp',label:'工号',def:true},{key:'dept',label:'部门',def:true},
    {key:'position',label:'岗位',def:true},{key:'level',label:'职级',def:false},{key:'relation',label:'考核关系',def:true},{key:'group',label:'考核组',def:false}
  ]},
  goals:{name:'导出目标',fields:[
    {key:'name',label:'姓名',def:true},{key:'emp',label:'工号',def:true},{key:'dept',label:'部门',def:true},
    {key:'goalName',label:'目标名称',def:true},{key:'goalType',label:'目标类型',def:true},{key:'weight',label:'权重',def:true},
    {key:'standard',label:'衡量标准',def:true},{key:'completion',label:'完成情况',def:false}
  ]},
  eval:{name:'导出考核结果',fields:[
    {key:'name',label:'姓名',def:true},{key:'emp',label:'工号',def:true},{key:'dept',label:'部门',def:true},
    {key:'indicator',label:'指标名称',def:true},{key:'target',label:'目标值',def:true},{key:'actual',label:'完成值',def:true},
    {key:'score',label:'得分',def:true},{key:'grade',label:'评价等级',def:true}
  ]},
  ratify:{name:'导出审定结果',fields:[
    {key:'name',label:'姓名',def:true},{key:'emp',label:'工号',def:true},{key:'dept',label:'部门',def:true},
    {key:'evalGrade',label:'初评等级',def:true},{key:'ratifyGrade',label:'审定等级',def:true},{key:'ratifier',label:'审定人',def:true},{key:'ratifyTime',label:'审定时间',def:false}
  ]},
  interview:{name:'导出面谈结果',fields:[
    {key:'name',label:'姓名',def:true},{key:'emp',label:'工号',def:true},{key:'dept',label:'部门',def:true},
    {key:'date',label:'面谈日期',def:true},{key:'content',label:'面谈内容',def:true},{key:'plan',label:'改进计划',def:true},{key:'confirm',label:'员工确认',def:false}
  ]}
};
var exportSettingsOpen=false,exportSettingsTab='roster';
if(!window._exportSettings){window._exportSettings={};for(var k in EXPORT_FIELDS){window._exportSettings[k]={};EXPORT_FIELDS[k].fields.forEach(function(f){window._exportSettings[k][f.key]=f.def;});}}
function openExportSettings(){exportSettingsOpen=true;renderExportSettings();}
function closeExportSettings(){exportSettingsOpen=false;renderExportSettings();}
function toggleExportField(cat,key){window._exportSettings[cat][key]=!window._exportSettings[cat][key];renderExportSettings();}
function renderExportSettings(){
  var mc=document.getElementById('modalContainer');
  if(!mc)return;
  if(!exportSettingsOpen){mc.innerHTML='';return;}
  var tab=exportSettingsTab,cfg=EXPORT_FIELDS[tab];
  var tabs='';for(var k in EXPORT_FIELDS){tabs+='<button style="padding:8px 14px;border:none;border-bottom:2px solid '+(k===tab?'var(--pr)':'transparent')+';background:transparent;font:'+(k===tab?'500':'400')+' 13px/1 var(--f);color:'+(k===tab?'var(--pr)':'var(--c5)')+';cursor:pointer" onclick="exportSettingsTab=\''+k+'\';renderExportSettings()">'+EXPORT_FIELDS[k].name+'</button>';}
  var fields='';cfg.fields.forEach(function(f){var chk=window._exportSettings[tab][f.key];fields+='<label style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--dv);cursor:pointer;font:400 13px/1 var(--f);color:var(--c7)"><input type="checkbox" '+(chk?'checked':'')+' onchange="toggleExportField(\''+tab+'\',\''+f.key+'\')" style="accent-color:var(--pr)">'+f.label+'<span style="font:400 11px/1 var(--f);color:var(--c4);margin-left:auto">'+(f.def?'默认':'')+'</span></label>';});
  var xSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  mc.innerHTML='<div class="modal-ov on" onclick="if(event.target===this)closeExportSettings()"><div class="modal" style="width:560px"><div class="modal-hd"><span class="modal-hd-t">导出设置</span><button class="modal-close" onclick="closeExportSettings()">'+xSvg+'</button></div><div class="modal-bd"><div style="display:flex;gap:0;border-bottom:1px solid var(--dv);margin-bottom:16px">'+tabs+'</div><div style="font:500 13px/1 var(--f);color:var(--c9);margin-bottom:4px">'+cfg.name+' — 选择导出字段</div><div style="max-height:360px;overflow-y:auto">'+fields+'</div></div><div class="modal-ft"><button class="btn btn-s" onclick="closeExportSettings()">关闭</button></div></div></div>';
}
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&exportSettingsOpen){closeExportSettings();}});

// Goal workflow: 目标制定(员工) → 间接上级审批 → 直接上级审批 → 目标生效
// Scenarios:
//   s1: 未开始 — status='未开始', currentNode='', currentHandler=''
//   s2: 员工填写中 — status='填写中', currentNode='目标制定', currentHandler='本人'
//   s3: 双线上级审批中 — status='填写中', currentNode='双线上级审批', currentHandler='刘VP'
//   s4: 直接上级审批中 — status='填写中', currentNode='直接上级审批', currentHandler='王总监'
//   s5: 审批通过/目标生效 — status='已提交', currentNode='目标生效', currentHandler=''

var GOAL_DATA=[
  // === 未开始 (3条) ===
  {empId:'EMP0001',name:'张明',dept:'产品部',period:'2026年6月',activity:'2026年6月-产品部考核',status:'未开始',currentNode:'',currentHandler:''},
  {empId:'EMP0011',name:'钱敏',dept:'产品部',period:'2026年6月',activity:'2026年6月-产品部考核',status:'未开始',currentNode:'',currentHandler:''},
  {empId:'EMP0013',name:'林燕',dept:'市场部',period:'2026年5月',activity:'2026年5月-市场部考核',status:'未开始',currentNode:'',currentHandler:''},

  // === 员工填写中 (3条) ===
  {empId:'EMP0006',name:'刘洋',dept:'产品部',period:'2026年6月',activity:'2026年6月-产品部考核',status:'填写中',currentNode:'目标制定',currentHandler:'刘洋'},
  {empId:'EMP0010',name:'孙鹏',dept:'运营部',period:'2026年6月',activity:'2026年6月-运营部考核',status:'填写中',currentNode:'目标制定',currentHandler:'孙鹏'},
  {empId:'EMP0015',name:'马丽',dept:'运营部',period:'2026年5月',activity:'2026年5月-运营部考核',status:'填写中',currentNode:'目标制定',currentHandler:'马丽'},

  // === 双线上级审批中 (3条) ===
  {empId:'EMP0002',name:'李华',dept:'技术部',period:'2026年6月',activity:'2026年6月-技术部考核',status:'填写中',currentNode:'双线上级审批',currentHandler:'刘VP'},
  {empId:'EMP0008',name:'吴强',dept:'市场部',period:'2026年6月',activity:'2026年6月-市场部考核',status:'填写中',currentNode:'双线上级审批',currentHandler:'刘VP'},
  {empId:'EMP0014',name:'何涛',dept:'设计部',period:'2026年5月',activity:'2026年5月-设计部考核',status:'填写中',currentNode:'双线上级审批',currentHandler:'刘VP'},

  // === 直接上级审批中 (3条) ===
  {empId:'EMP0004',name:'赵磊',dept:'设计部',period:'2026年6月',activity:'2026年6月-设计部考核',status:'填写中',currentNode:'直接上级审批',currentHandler:'王总监'},
  {empId:'EMP0009',name:'郑丽',dept:'设计部',period:'2026年6月',activity:'2026年6月-设计部考核',status:'填写中',currentNode:'直接上级审批',currentHandler:'王总监'},
  {empId:'EMP0012',name:'黄波',dept:'技术部',period:'2026年5月',activity:'2026年5月-技术部考核',status:'填写中',currentNode:'直接上级审批',currentHandler:'王总监'},

  // === 审批通过/目标生效 (5条) ===
  {empId:'EMP0003',name:'王芳',dept:'市场部',period:'2026年6月',activity:'2026年6月-市场部考核',status:'已提交',currentNode:'目标生效',currentHandler:''},
  {empId:'EMP0005',name:'陈静',dept:'运营部',period:'2026年6月',activity:'2026年6月-运营部考核',status:'已提交',currentNode:'目标生效',currentHandler:''},
  {empId:'EMP0007',name:'周婷',dept:'技术部',period:'2026年6月',activity:'2026年6月-技术部考核',status:'已提交',currentNode:'目标生效',currentHandler:''},
  {empId:'EMP0016',name:'朱伟',dept:'产品部',period:'2026年5月',activity:'2026年5月-产品部考核',status:'已提交',currentNode:'目标生效',currentHandler:''},
  {empId:'EMP0017',name:'胡洁',dept:'技术部',period:'2026年5月',activity:'2026年5月-技术部考核',status:'已提交',currentNode:'目标生效',currentHandler:''},
];

var DEPTS=['全部','产品部','技术部','市场部','设计部','运营部'];
var STATUSES=['全部状态','未开始','填写中','已提交'];

var filter={search:'',cycle:'',dept:'',status:''};
var currentPage=1;
var pageSize=10;

function getCycles(){
  var set={};
  for(var i=0;i<GOAL_DATA.length;i++){set[GOAL_DATA[i].period]=1;}
  return Object.keys(set).sort().reverse();
}

function getFiltered(){
  return GOAL_DATA.filter(function(d){
    if(filter.search&&d.name.indexOf(filter.search)===-1&&d.empId.indexOf(filter.search)===-1)return false;
    if(filter.cycle&&d.period!==filter.cycle)return false;
    if(filter.dept&&d.dept!==filter.dept)return false;
    if(filter.status&&filter.status!=='全部状态'&&d.status!==filter.status)return false;
    return true;
  });
}

function statusTag(s){return s==='已提交'?'tag-em':s==='填写中'?'tag-pr':'tag-c5';}
function nodeTag(n){
  if(!n)return '<span style="color:var(--c4)">—</span>';
  if(n==='目标生效')return '<span class="tag tag-em">'+n+'</span>';
  if(n==='目标制定')return '<span class="tag tag-ac">'+n+'</span>';
  return '<span class="tag tag-pr">'+n+'</span>';
}

function render(){
  var data=getFiltered();
  var total=data.length;
  var totalPages=Math.ceil(total/pageSize)||1;
  if(currentPage>totalPages)currentPage=totalPages;
  var start=(currentPage-1)*pageSize;
  var page=data.slice(start,start+pageSize);

  var cycleOptions=getCycles().map(function(c){return '<option value="'+c+'"'+(filter.cycle===c?' selected':'')+'>'+c+'</option>';}).join('');
  var deptOptions=DEPTS.slice(1).map(function(d){return '<option value="'+d+'"'+(filter.dept===d?' selected':'')+'>'+d+'</option>';}).join('');
  var statusOptions=STATUSES.map(function(s){return '<option value="'+s+'"'+(filter.status===s?' selected':'')+'>'+s+'</option>';}).join('');

  var html='<div class="fi">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">'+
      '<div><h1 style="font:700 20px/1.2 var(--f);color:var(--c9);margin-bottom:4px">目标中心</h1><p style="font:400 13px/1 var(--f);color:var(--c5)">查看全员各周期目标数据</p></div>'+
      '<div style="display:flex;gap:8px"><button class="btn btn-s" onclick="handleExport()">'+I.download+' 导出</button><button class="btn btn-s" onclick="openExportSettings()" title="导出设置">'+I.settings+' 导出设置</button></div>'+
    '</div>'+
    '<div class="fl-bar">'+
      '<div class="fl-search">'+I.search+'<input id="flSearch" placeholder="搜索姓名或工号…" value="'+filter.search+'" oninput="onSearch(this.value)"></div>'+
      '<select class="fl-sel" onchange="onCycle(this.value)"><option value="">全部周期</option>'+cycleOptions+'</select>'+
      '<select class="fl-sel" onchange="onDept(this.value)"><option value="">全部部门</option>'+deptOptions+'</select>'+
      '<select class="fl-sel" onchange="onStatus(this.value)">'+statusOptions+'</select>'+
      '<div class="fl-actions"><button class="btn btn-s" onclick="resetFilters()">'+I.x+' 重置</button></div>'+
    '</div>'+
    '<div class="tbl-card">'+
      '<div class="tbl-wrap"><table><thead><tr>'+
        '<th>姓名</th><th>工号</th><th>部门</th><th>周期</th><th>绩效活动</th><th>状态</th><th>当前节点</th><th>当前处理人</th><th>操作</th>'+
      '</tr></thead><tbody>';

  for(var i=0;i<page.length;i++){
    var d=page[i];
    html+='<tr>'+
      '<td style="font-weight:500;color:var(--c9)">'+d.name+'</td>'+
      '<td class="mono">'+d.empId+'</td>'+
      '<td>'+d.dept+'</td>'+
      '<td>'+d.period+'</td>'+
      '<td><a class="lk" href="perf-activity-detail.html">'+d.activity+'</a></td>'+
      '<td><span class="tag '+statusTag(d.status)+'">'+d.status+'</span></td>'+
      '<td>'+nodeTag(d.currentNode)+'</td>'+
      '<td>'+(d.currentHandler||'<span style="color:var(--c4)">—</span>')+'</td>'+
      '<td><a class="lk" href="perf-report-goal-detail.html?id='+d.empId+'" target="_blank">查看详情</a></td>'+
      '</tr>';
  }

  html+='</tbody></table></div>'+
    '<div class="pg-bar">'+
      '<div class="pg-info"><span>第 '+(total?start+1:0)+'-'+Math.min(start+pageSize,total)+' 条，共 '+total+' 条</span></div>'+
      '<div class="pg-nav">';
  for(var p=1;p<=totalPages;p++){
    html+='<button class="pg-btn'+(p===currentPage?' on':'')+'" onclick="goPage('+p+')">'+p+'</button>';
  }
  html+='</div></div></div></div>';

  document.getElementById('app').innerHTML=html;
}

function onSearch(v){filter.search=v;currentPage=1;render();}
function onCycle(v){filter.cycle=v;currentPage=1;render();}
function onDept(v){filter.dept=v;currentPage=1;render();}
function onStatus(v){filter.status=v;currentPage=1;render();}
function goPage(p){currentPage=p;render();}
function resetFilters(){filter={search:'',cycle:'',dept:'',status:''};currentPage=1;render();}
function handleExport(){alert('导出功能（原型占位）');}

render();
</script>
</body>
</html>
