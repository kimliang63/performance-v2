}

var DEPTS=['еЕ®йГ®','дЇІеУБйГ®','жКАжЬѓйГ®','еЄВеЬЇйГ®','иЃЊиЃ°йГ®','ињРиР•йГ®'];
var STATUSES=['еЕ®йГ®зКґжАБ','жЬ™еЉАеІЛ','е°ЂеЖЩдЄ≠','еЈ≤еЃМжИР'];

var filter={search:'',cycle:'',dept:'',status:''};
var currentPage=1;
var pageSize=10;

function getCycles(){
  var set={};
  for(var i=0;i<PROGRESS_DATA.length;i++){set[PROGRESS_DATA[i].period]=1;}
  return Object.keys(set).sort().reverse();
}

function getFiltered(){
  return PROGRESS_DATA.filter(function(d){
    if(filter.search&&d.name.indexOf(filter.search)===-1&&d.empId.indexOf(filter.search)===-1&&d.currentHandler.indexOf(filter.search)===-1)return false;
    if(filter.cycle&&d.period!==filter.cycle)return false;
    if(filter.dept&&d.dept!==filter.dept)return false;
    if(filter.status&&filter.status!=='еЕ®йГ®зКґжАБ'&&d.status!==filter.status)return false;
    return true;
  });
}

function showFlow(empId){
  var d=PROGRESS_DATA.find(function(r){return r.empId===empId;});
  if(!d)return;
  var html='<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">'+
    '<div class="modal-hd"><span class="modal-hd-title">'+d.name+' ¬Ј иАГж†ЄињЫеЇ¶жШОзїЖ</span><button class="modal-close" onclick="closeModal()">вЬХ</button></div>'+
    '<div class="modal-bd"><table class="flow-tbl"><thead><tr><th>зОѓиКВ</th><th>е§ДзРЖдЇЇ</th><th>жµБеЕ•жЧґйЧі</th><th>жµБеЗЇжЧґйЧі</th><th>зКґжАБ</th></tr></thead><tbody>';
  for(var i=0;i<d.flowSteps.length;i++){
    var fs=d.flowSteps[i];
    var sc=fs.done?'var(--em700)':fs.current?'var(--pr)':'var(--c4)';
    html+='<tr><td>'+fs.stage+'</td><td>'+fs.handler+'</td><td>'+fs.inTime+'</td><td>'+fs.outTime+'</td><td style="color:'+sc+'">'+fs.status+'</td></tr>';
  }
  html+='</tbody></table></div><div class="modal-ft"><button class="btn btn-s" onclick="closeModal()">еЕ≥йЧ≠</button></div></div></div>';
  document.getElementById('modalContainer').innerHTML=html;
}
function closeModal(){document.getElementById('modalContainer').innerHTML='';}

function render(){
  var data=getFiltered();
  var total=data.length;
  var totalPages=Math.ceil(total/pageSize)||1;
  if(currentPage>totalPages)currentPage=totalPages;
  var start=(currentPage-1)*pageSize;
  var page=data.slice(start,start+pageSize);

  var cycleOptions=getCycles().map(function(c){return '<option value="'+c+'"'+(filter.cycle===c?' selected':'')+'>'+c+'</option>';}).join('');
  var deptOptions=DEPTS.slice(1).map(function(d){return '<option value="'+d+'"'+(filter.dept===d?' selected':'')+'>'+d+'</option>';}).join('');
  var statusOptions=STATUSES.map(function(s){return '<option value="'+s+'"'+(filter.status===s?' selected':'')+'>'+s+'</option>';}).join('');

  var html='<div class="fi">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">'+
      '<div><h1 style="font:700 20px/1.2 var(--f);color:var(--c9);margin-bottom:4px">иАГж†ЄињЫеЇ¶</h1><p style="font:400 13px/1 var(--f);color:var(--c5)">жЯ•зЬЛеЕ®еСШеРДеС®жЬЯиАГж†ЄињЫеЇ¶</p></div>'+
      '<div style="display:flex;gap:8px"><button class="btn btn-s" onclick="handleExport()">'+I.download+' еѓЉеЗЇ</button><button class="btn btn-s" onclick="openExportSettings()" title="еѓЉеЗЇиЃЊзљЃ">'+I.settings+' еѓЉеЗЇиЃЊзљЃ</button><button class="btn btn-p" onclick="handleRemind()">'+I.bell+' жЙєйЗПеВђеКЮ</button></div>'+
    '</div>'+
    '<div class="fl-bar">'+
      '<div class="fl-search">'+I.search+'<input id="flSearch" placeholder="жРЬзіҐеІУеРНжИЦеЈ•еПЈвА¶" value="'+filter.search+'" oninput="onSearch(this.value)"></div>'+
      '<select class="fl-sel" onchange="onCycle(this.value)"><option value="">еЕ®йГ®еС®жЬЯ</option>'+cycleOptions+'</select>'+
      '<select class="fl-sel" onchange="onDept(this.value)"><option value="">еЕ®йГ®йГ®йЧ®</option>'+deptOptions+'</select>'+
      '<select class="fl-sel" onchange="onStatus(this.value)">'+statusOptions+'</select>'+
      '<div class="fl-actions"><button class="btn btn-s" onclick="resetFilters()">'+I.x+' йЗНзљЃ</button></div>'+
    '</div>'+
    '<div class="tbl-card">'+
      '<div class="tbl-wrap"><table><thead><tr>'+
        '<th>еІУеРН</th><th>еЈ•еПЈ</th><th>йГ®йЧ®</th><th>зї©жХИжіїеК®</th><th>ељУеЙНзОѓиКВ</th><th>ељУеЙНе§ДзРЖдЇЇ</th><th>зКґжАБ</th><th>жУНдљЬ</th>'+
      '</tr></thead><tbody>';

  for(var i=0;i<page.length;i++){
    var d=page[i];
    var sc=d.status==='еЈ≤еЃМжИР'?'tag-em':d.status==='е°ЂеЖЩдЄ≠'?'tag-pr':'tag-c5';
    html+='<tr>'+
      '<td style="font-weight:500;color:var(--c9)">'+d.name+'</td>'+
      '<td class="mono">'+d.empId+'</td>'+
      '<td>'+d.dept+'</td>'+
      '<td><a class="lk" href="perf-activity-detail.html">'+d.activity+'</a></td>'+
      '<td>'+(d.currentStage?'<span class="tag tag-pr">'+d.currentStage+'</span>':'<span style="color:var(--c4)">вАФ</span>')+'</td>'+
      '<td>'+(d.currentHandler||'<span style="color:var(--c4)">вАФ</span>')+'</td>'+
      '<td><span class="tag '+sc+'">'+d.status+'</span></td>'+
      '<td><a class="lk" href="perf-activity.html">жЯ•зЬЛжШОзїЖ</a></td>'+
      '</tr>';
  }

  html+='</tbody></table></div>'+
    '<div class="pg-bar">'+
      '<div class="pg-info"><span>зђђ '+(total?start+1:0)+'-'+Math.min(start+pageSize,total)+' жЭ°пЉМеЕ± '+total+' жЭ°</span></div>'+
      '<div class="pg-nav">';
  for(var p=1;p<=totalPages;p++){
    html+='<button class="pg-btn'+(p===currentPage?' on':'')+'" onclick="goPage('+p+')">'+p+'</button>';
  }
  html+='</div></div></div></div>';

  document.getElementById('app').innerHTML=html;
}

function onSearch(v){filter.search=v;currentPage=1;render();}
function onCycle(v){filter.cycle=v;currentPage=1;render();}
function onDept(v){filter.dept=v;currentPage=1;render();}
function onStatus(v){filter.status=v;currentPage=1;render();}
function goPage(p){currentPage=p;render();}
function resetFilters(){filter={search:'',cycle:'',dept:'',status:''};currentPage=1;render();}
function handleExport(){alert('еѓЉеЗЇеКЯиГљпЉИеОЯеЮЛеН†дљНпЉЙ');}
function handleRemind(){alert('жЙєйЗПеВђеКЮеКЯиГљпЉИеОЯеЮЛеН†дљНпЉЙ');}

render();
</script>
</body>
</html>
