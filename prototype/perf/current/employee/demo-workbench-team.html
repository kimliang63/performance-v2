<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 团队绩效工作台</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
  --sp-xs:4px;--sp-sm:8px;--sp-md:12px;--sp-lg:16px;--sp-xl:20px;--sp-2xl:24px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

.card{background:var(--sf);border-radius:var(--r3);box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:var(--sp-lg)}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-lg) var(--sp-xl);border-bottom:1px solid var(--dv)}
.card-t{font:600 15px/1 var(--f);color:var(--c9)}
.card-action{font:500 13px/1 var(--f);color:var(--pr);cursor:pointer;display:flex;align-items:center;gap:var(--sp-xs);text-decoration:none}
.card-action:hover{color:var(--pr700)}
.card-action svg{width:14px;height:14px}
.card-bd{padding:var(--sp-lg) var(--sp-xl)}

.task{display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-md) 0;border-bottom:1px solid var(--dv);cursor:pointer}
.task:last-child{border-bottom:none}
.task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.task-dot.pr{background:var(--pr)}.task-dot.ac{background:var(--ac)}.task-dot.ro{background:var(--ro)}
.task-info{flex:1;min-width:0}
.task-name{font:500 13px/1 var(--f);color:var(--c8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{font:400 12px/1 var(--f);color:var(--c5);margin-top:var(--sp-xs)}
.task-tag{font:500 11px/1 var(--f);padding:3px 8px;border-radius:4px;flex-shrink:0}
.task-tag.pending{background:var(--ac50);color:var(--ac700)}
.task-tag.active{background:var(--pr50);color:var(--pr)}
.task-tag.ro{background:var(--ro50);color:var(--ro)}

/* Charts */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-lg)}
.chart-box{min-width:0}
.chart-box-title{font:600 13px/1 var(--f);color:var(--c8);margin-bottom:var(--sp-md)}
.chart-box canvas{width:100%!important;height:220px!important}

/* Stat cards */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-md);margin-bottom:var(--sp-lg)}
.stat-card{background:var(--c0);border-radius:var(--r2);padding:var(--sp-md) var(--sp-lg);text-align:center}
.stat-card-val{font:700 22px/1 var(--fm);color:var(--c9)}
.stat-card-label{font:400 12px/1 var(--f);color:var(--c5);margin-top:2px}

/* Legend */
.perf-legend{display:flex;align-items:center;gap:10px;margin-top:var(--sp-md);font:400 11px/1 var(--f);color:var(--c5)}
.perf-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* Member goal card */
.mem-goal{display:grid;grid-template-columns:140px 1fr;gap:0;min-height:280px}
.mem-list{border-right:1px solid var(--dv)}
.mem-item{display:flex;align-items:center;gap:var(--sp-sm);padding:var(--sp-md) var(--sp-lg);cursor:pointer;transition:background 0.12s;border-left:3px solid transparent}
.mem-item:hover{background:var(--c0)}
.mem-item.active{background:var(--pr50);border-left-color:var(--pr)}
.mem-item-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:600 10px/1 var(--f);color:#FFF;flex-shrink:0}
.mem-item-name{font:500 13px/1 var(--f);color:var(--c8)}
.mem-item-info{font:400 11px/1 var(--f);color:var(--c5);margin-top:1px}
.mem-detail{padding:var(--sp-md) var(--sp-xl)}

/* Goal modules (reused from home) */
.mod-sec{border:1px solid var(--dv);border-radius:var(--r2);overflow:hidden}
.mod-sec+.mod-sec{margin-top:var(--sp-md)}
.mod-hd{display:flex;align-items:center;padding:var(--sp-md) var(--sp-lg);gap:var(--sp-sm)}
.mod-hd-title{font:600 13px/1 var(--f);color:var(--c9);flex:1}
.mod-hd-wt{font:500 12px/1 var(--fm);color:var(--c5);padding:2px 8px;border-radius:var(--r1);background:var(--c1)}
.goal-row{border-top:1px solid var(--dv);padding:var(--sp-sm) var(--sp-lg);display:flex;align-items:center;gap:var(--sp-sm)}
.goal-name{flex:1;font:500 13px/1.3 var(--f);color:var(--c8)}
.goal-type{font:500 10px/1 var(--f);padding:2px 7px;border-radius:3px}
.goal-type.q{background:var(--pr50);color:var(--pr)}
.goal-type.d{background:var(--vi50);color:var(--vi)}
.goal-wt{font:500 12px/1 var(--fm);color:var(--c6)}
.goal-val{font:400 12px/1 var(--f);color:var(--c5);min-width:140px;text-align:right}

.toast{position:fixed;top:70px;right:24px;padding:12px 18px;border-radius:var(--r2);font:500 13px/1.3 var(--f);box-shadow:0 10px 40px -10px rgba(0,0,0,.12);z-index:3000;transform:translateX(120%);transition:transform .25s ease}
.toast.on{transform:translateX(0)}
.toast.success{background:var(--em);color:#FFF}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body>

<div style="padding:var(--sp-2xl)">

  <div style="display:grid;grid-template-columns:3fr 7fr;gap:var(--sp-lg);align-items:stretch">

    <!-- 待办任务 -->
    <div class="card" style="margin-bottom:0">
      <div class="card-hd">
        <span class="card-t">待办任务</span>
      </div>
      <div class="card-bd">
        <div class="task" onclick="showToast('跳转至目标填写审核')">
          <span class="task-dot pr"></span>
          <div class="task-info"><div class="task-name">3人待填写目标</div><div class="task-meta">张明、王芳、赵强 — 绩效方案 2026年6月</div></div>
          <span class="task-tag active">进行中</span>
        </div>
        <div class="task" onclick="showToast('跳转至结果确认')">
          <span class="task-dot ac"></span>
          <div class="task-info"><div class="task-name">2人待确认结果</div><div class="task-meta">李华、王芳 — 绩效方案 2026年5月</div></div>
          <span class="task-tag pending">待处理</span>
        </div>
        <div class="task" onclick="showToast('跳转至评分审批')">
          <span class="task-dot ro"></span>
          <div class="task-info"><div class="task-name">1人评分待审批</div><div class="task-meta">赵强 — 绩效方案 2026年5月</div></div>
          <span class="task-tag ro">待审批</span>
        </div>
      </div>
    </div>

    <!-- 右侧：成员目标 -->
    <div class="card" style="margin-bottom:0">
      <div class="card-hd">
        <span class="card-t">成员目标</span>
        <span class="card-action" onclick="showToast('查看更多')">更多 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
      <div class="card-bd" style="padding:0">
        <div class="mem-goal">
          <!-- 左侧员工列表 -->
          <div class="mem-list" id="memList"></div>
          <!-- 右侧目标详情 -->
          <div class="mem-detail" id="memDetail"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- 团队绩效总览（全宽） -->
  <div class="card" style="margin-top:var(--sp-lg)">
    <div class="card-hd">
      <span class="card-t">团队绩效总览</span>
      <span class="card-action" onclick="showToast('查看更多')">更多 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </div>
    <div class="card-bd">
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-card-val">4</div>
          <div class="stat-card-label">团队人数</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-val" style="color:var(--pr)">超出预期</div>
          <div class="stat-card-label">最高等级</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-val" style="color:var(--ac)">符合预期</div>
          <div class="stat-card-label">最低等级</div>
        </div>
      </div>
      <div class="charts-row">
        <div class="chart-box">
          <div class="chart-box-title">本月等级分布</div>
          <canvas id="chartDist"></canvas>
        </div>
        <div class="chart-box">
          <div class="chart-box-title">月度均分趋势</div>
          <canvas id="chartTrend"></canvas>
        </div>
      </div>
      <div class="perf-legend">
        <div class="perf-legend-dot" style="background:#E11D48"></div>远低预期
        <div class="perf-legend-dot" style="background:#F43F5E"></div>低于预期
        <div class="perf-legend-dot" style="background:#F59E0B"></div>符合预期-
        <div class="perf-legend-dot" style="background:#A1A1AA"></div>符合预期
        <div class="perf-legend-dot" style="background:#2563EB"></div>符合预期+
        <div class="perf-legend-dot" style="background:#10B981"></div>超出预期
        <div class="perf-legend-dot" style="background:#047857"></div>远超预期
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success');
  setTimeout(function() { t.classList.add('on'); }, 10);
  setTimeout(function() { t.classList.remove('on'); }, 2500);
}

// ===== 本月等级分布 (bar) =====
(function(){
  var ctx = document.getElementById('chartDist');
  if(!ctx) return;
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['远低预期','低于预期','符合预期-','符合预期','符合预期+','超出预期','远超预期'],
      datasets: [{
        data: [0, 0, 0, 2, 1, 1, 0],
        backgroundColor: ['#E11D48','#F43F5E','#F59E0B','#A1A1AA','#2563EB','#10B981','#047857'],
        borderRadius: 6,
        barPercentage: 0.55,
        categoryPercentage: 0.7
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx){ return ctx.raw + ' 人' }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          max: 4,
          ticks: { stepSize: 1, font: { family: 'JetBrains Mono, SF Mono, monospace', size: 11 }, color: '#A1A1AA' },
          grid: { color: '#E4E4E7', drawTicks: false }
        },
        x: {
          ticks: { font: { family: 'Inter, Noto Sans SC, sans-serif', size: 10 }, color: '#A1A1AA', maxRotation: 0 },
          grid: { display: false }
        }
      }
    }
  });
})();

// ===== 月度均分趋势 (line) =====
(function(){
  var ctx = document.getElementById('chartTrend');
  if(!ctx) return;
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['7月','8月','9月','10月','11月','12月','1月','2月','3月','4月','5月','6月'],
      datasets: [{
        data: [4.25, 3.75, 4.25, 4.5, 4.5, 4.75, 4.25, 4.0, 4.25, 4.75, 4.75, 4.75],
        borderColor: '#2563EB',
        backgroundColor: 'rgba(37,99,235,0.06)',
        borderWidth: 2,
        fill: true,
        pointBackgroundColor: '#2563EB',
        pointRadius: 4,
        tension: 0.3,
        pointHoverRadius: 7
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx){ return '团队均分：' + ctx.raw.toFixed(2) }
          }
        }
      },
      scales: {
        y: {
          min: 1, max: 7,
          ticks: {
            stepSize: 1,
            callback: function(v){
              return ['','远低预期','低于预期','符合预期-','符合预期','符合预期+','超出预期','远超预期'][v] || ''
            },
            font: { family: 'Inter, Noto Sans SC, sans-serif', size: 11 },
            color: '#A1A1AA'
          },
          grid: { color: '#E4E4E7', drawTicks: false }
        },
        x: {
          ticks: { font: { family: 'Inter, Noto Sans SC, sans-serif', size: 11 }, color: '#A1A1AA' },
          grid: { display: false }
        }
      }
    }
  });
})();

// ===== 成员目标数据与切换 =====
var MEMBER_GOALS = {
  zm: {
    name: '张明', dept: '产品部', color: 'var(--pr)',
    modules: [
      {name: 'KPI', weight: 60, goals: [
        {name: 'AI 产品迭代完成率', type: 'q', weight: 25, val: '目标 100% · 挑战 120%'},
        {name: 'AI 新增用户数', type: 'q', weight: 20, val: '目标 5000 · 挑战 7000'},
        {name: '产品营收贡献', type: 'q', weight: 15, val: '目标 200万 · 挑战 300万'}
      ]},
      {name: 'KPA', weight: 40, goals: [
        {name: '主导完成6月产品架构评审', type: 'd', weight: 15, val: '定性'},
        {name: '完成2名新人带教', type: 'd', weight: 10, val: '定性'},
        {name: '推动跨部门协作机制落地', type: 'd', weight: 15, val: '定性'}
      ]}
    ]
  },
  lh: {
    name: '李华', dept: '技术部', color: 'var(--em)',
    modules: [
      {name: 'KPI', weight: 60, goals: [
        {name: '前端代码质量评分', type: 'q', weight: 20, val: '目标 90分 · 挑战 95分'},
        {name: '需求按时交付率', type: 'q', weight: 25, val: '目标 95% · 挑战 100%'},
        {name: 'Bug修复及时率', type: 'q', weight: 15, val: '目标 90% · 挑战 98%'}
      ]},
      {name: 'KPA', weight: 40, goals: [
        {name: '完成前端组件库升级', type: 'd', weight: 20, val: '定性'},
        {name: '技术分享2次', type: 'd', weight: 10, val: '定性'},
        {name: '新人代码Review', type: 'd', weight: 10, val: '定性'}
      ]}
    ]
  },
  wf: {
    name: '王芳', dept: '设计部', color: 'var(--vi)',
    modules: [
      {name: 'KPI', weight: 60, goals: [
        {name: '设计稿按时交付率', type: 'q', weight: 20, val: '目标 95% · 挑战 100%'},
        {name: '设计评审通过率', type: 'q', weight: 20, val: '目标 90% · 挑战 95%'},
        {name: '用户体验满意度', type: 'q', weight: 20, val: '目标 85分 · 挑战 90分'}
      ]},
      {name: 'KPA', weight: 40, goals: [
        {name: '完成HR ONE UI规范制定', type: 'd', weight: 20, val: '定性'},
        {name: '设计系统组件库建设', type: 'd', weight: 15, val: '定性'},
        {name: '竞品分析报告', type: 'd', weight: 5, val: '定性'}
      ]}
    ]
  },
  zq: {
    name: '赵强', dept: '产品部', color: 'var(--ac)',
    modules: [
      {name: 'KPI', weight: 60, goals: [
        {name: '需求评审及时率', type: 'q', weight: 20, val: '目标 95% · 挑战 100%'},
        {name: '产品上线准时率', type: 'q', weight: 20, val: '目标 90% · 挑战 95%'},
        {name: '客户满意度', type: 'q', weight: 20, val: '目标 85分 · 挑战 90分'}
      ]},
      {name: 'KPA', weight: 40, goals: [
        {name: '完成采购系统需求文档', type: 'd', weight: 15, val: '定性'},
        {name: '参与产品评审会', type: 'd', weight: 10, val: '定性'},
        {name: '跨部门需求对接', type: 'd', weight: 15, val: '定性'}
      ]}
    ]
  }
};

function buildMemList() {
  var h = '';
  var keys = ['zm','lh','wf','zq'];
  keys.forEach(function(k, i) {
    var m = MEMBER_GOALS[k];
    h += '<div class="mem-item' + (i===0?' active':'') + '" onclick="selectMember(\'' + k + '\',this)" data-key="' + k + '">';
    h += '<div class="mem-item-av" style="background:' + m.color + '">' + m.name[0] + '</div>';
    h += '<div><div class="mem-item-name">' + m.name + '</div><div class="mem-item-info">' + m.dept + '</div></div>';
    h += '</div>';
  });
  document.getElementById('memList').innerHTML = h;
}

function selectMember(key, el) {
  document.querySelectorAll('.mem-item').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  renderMemDetail(key);
}

function renderMemDetail(key) {
  var d = MEMBER_GOALS[key];
  if (!d) return;
  var h = '';
  d.modules.forEach(function(m) {
    h += '<div class="mod-sec">';
    h += '<div class="mod-hd"><div class="mod-hd-title">' + m.name + '</div><div class="mod-hd-wt">' + m.weight + '%</div></div>';
    m.goals.forEach(function(g) {
      h += '<div class="goal-row">';
      h += '<span class="goal-name">' + g.name + '</span>';
      h += '<span class="goal-type ' + g.type + '">' + (g.type==='q'?'定量':'定性') + '</span>';
      h += '<span class="goal-wt">' + g.weight + '%</span>';
      h += '<span class="goal-val">' + g.val + '</span>';
      h += '</div>';
    });
    h += '</div>';
  });
  document.getElementById('memDetail').innerHTML = h;
}

buildMemList();
renderMemDetail('zm');
</script>
<script src="../navigation.js"></script>
<script>GHR_NAV.init('perf', '团队绩效');</script>
</body>
</html>
