<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 团队绩效工作台</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
  --sp-xs:4px;--sp-sm:8px;--sp-md:12px;--sp-lg:16px;--sp-xl:20px;--sp-2xl:24px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

.card{background:var(--sf);border-radius:var(--r3);box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:var(--sp-lg)}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-lg) var(--sp-xl);border-bottom:1px solid var(--dv)}
.card-t{font:600 15px/1 var(--f);color:var(--c9)}
.card-action{font:500 13px/1 var(--f);color:var(--pr);cursor:pointer;display:flex;align-items:center;gap:var(--sp-xs);text-decoration:none}
.card-action:hover{color:var(--pr700)}
.card-action svg{width:14px;height:14px}
.card-bd{padding:20px 24px}

.task{display:flex;flex-direction:column;padding:14px 0;border-bottom:1px solid var(--dv);cursor:pointer}
.task:last-child{border-bottom:none}
.task-name{font:500 13px/1 var(--f);color:var(--c8);margin-bottom:var(--sp-xs)}
.task-row{display:flex;align-items:center;justify-content:space-between}
.task-meta{font:400 12px/1 var(--f);color:var(--c5)}
.task-action{font:500 12px/1 var(--f);color:var(--pr);cursor:pointer;text-decoration:none}
.task-action:hover{color:var(--pr700)}

/* Month tabs */
.month-tabs{display:flex;gap:4px}
.month-tab{font:500 12px/1 var(--f);padding:3px 10px;border-radius:var(--r1);cursor:pointer;color:var(--c5);transition:all .12s}
.month-tab:hover{color:var(--pr);background:var(--pr50)}
.month-tab.on{background:var(--pr);color:#FFF}

.toast{position:fixed;top:70px;right:24px;padding:12px 18px;border-radius:var(--r2);font:500 13px/1.3 var(--f);box-shadow:0 10px 40px -10px rgba(0,0,0,.12);z-index:3000;transform:translateX(120%);transition:transform .25s ease}
.toast.on{transform:translateX(0)}
.toast.success{background:var(--em);color:#FFF}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body>

<div style="padding:var(--sp-2xl)">

  <!-- 周期切换 -->
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:var(--sp-lg);flex-wrap:wrap">
    <span style="font:500 12px/1 var(--f);color:var(--c5);margin-right:4px">周期</span>
    <select id="yearSelect" style="height:28px;padding:0 24px 0 8px;border:1px solid var(--c2);border-radius:var(--r1);font:400 12px/1 var(--f);color:var(--c7);background:var(--sf) url('data:image/svg+xml,%3Csvg width=%2710%27 height=%276%27 viewBox=%270 0 10 6%27 fill=%27none%27 xmlns=%27http://www.w3.org/2000/svg%27%3E%3Cpath d=%27M1 1L5 5L9 1%27 stroke=%27%23A1A1AA%27 stroke-width=%271.5%27 stroke-linecap=%27round%27/%3E%3C/svg%3E') no-repeat right 6px center;appearance:none;cursor:pointer;outline:none" onchange="switchYear(this.value)">
      <option value="2026">2026</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
    </select>
    <span style="color:var(--c3);margin:0 4px">|</span>
    <span id="cyclePills"></span>
  </div>
  <style>
    .cycle-pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:var(--r1);font:400 12px/1 var(--f);color:var(--c6);cursor:pointer;transition:all .12s;border:1px solid transparent}
    .cycle-pill:hover{color:var(--pr);background:var(--pr50)}
    .cycle-pill.active{color:var(--pr);background:var(--pr50);border-color:var(--pr);font-weight:500}
  </style>

  <div style="display:grid;grid-template-columns:4fr 6fr;gap:var(--sp-lg);align-items:stretch">

    <!-- 待办任务 -->
    <div class="card" style="margin-bottom:0">
      <div class="card-hd">
        <span class="card-t" style="position:relative">待办<span style="position:absolute;top:-4px;right:-22px;min-width:16px;height:16px;border-radius:8px;background:var(--ro);color:#FFF;font:700 10px/16px var(--f);text-align:center;padding:0 4px">6</span></span>
        <span class="card-action" onclick="showToast('查看更多')">更多 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
      <div class="card-bd">
        <div class="task" onclick="showToast('跳转至目标填写')">
          <div class="task-name">张明 — 目标填写</div>
          <div class="task-row">
            <span class="task-meta">截止 6/30</span>
            <span class="task-action">去处理</span>
          </div>
        </div>
        <div class="task" onclick="showToast('跳转至目标填写')">
          <div class="task-name">王芳 — 目标填写</div>
          <div class="task-row">
            <span class="task-meta">截止 6/30</span>
            <span class="task-action">去处理</span>
          </div>
        </div>
        <div class="task" onclick="showToast('跳转至目标填写')">
          <div class="task-name">赵强 — 目标填写</div>
          <div class="task-row">
            <span class="task-meta">截止 6/30</span>
            <span class="task-action">去处理</span>
          </div>
        </div>
        <div class="task" onclick="showToast('跳转至结果确认')">
          <div class="task-name">李华 — 结果确认</div>
          <div class="task-row">
            <span class="task-meta">截止 7/5</span>
            <span class="task-action">去处理</span>
          </div>
        </div>
        <div class="task" onclick="showToast('跳转至结果确认')">
          <div class="task-name">王芳 — 结果确认</div>
          <div class="task-row">
            <span class="task-meta">截止 7/5</span>
            <span class="task-action">去处理</span>
          </div>
        </div>
        <div class="task" onclick="showToast('跳转至评分审批')">
          <div class="task-name">赵强 — 评分审批</div>
          <div class="task-row">
            <span class="task-meta">逾期 2 天</span>
            <span class="task-action" style="color:var(--ro)">去处理</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧：绩效等级分布 -->
    <div class="card" style="margin-bottom:0">
      <div class="card-hd">
        <span class="card-t">绩效等级分布</span>
        <span class="card-action" onclick="showToast('查看更多')">更多 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
      <div class="card-bd">
        <canvas id="chartDist" style="height:300px"></canvas>
      </div>
    </div>

  </div>

  <!-- 团队绩效趋势（全宽） -->
  <div class="card" style="margin-top:var(--sp-lg)">
    <div class="card-hd">
      <span class="card-t">团队绩效趋势</span>
      <span class="card-action" onclick="showToast('查看更多')">更多 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </div>
    <div class="card-bd">
      <canvas id="chartTrend" style="height:300px"></canvas>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success');
  setTimeout(function() { t.classList.add('on'); }, 10);
  setTimeout(function() { t.classList.remove('on'); }, 2500);
}

// ===== 绩效等级分布 (bar) =====
var DIST_DATA = {
  '2026-06': [0, 0, 0, 2, 1, 1, 0],
  '2026-05': [0, 0, 1, 2, 0, 1, 0],
  '2026-04': [0, 1, 0, 1, 1, 1, 0],
};
var GRADE_LABELS = ['远低预期','低于预期','符合预期-','符合预期','符合预期+','超出预期','远超预期'];
var GRADE_COLORS = ['#E11D48','#F43F5E','#F59E0B','#A1A1AA','#2563EB','#10B981','#047857'];

var distChart = new Chart(document.getElementById('chartDist'), {
  type: 'bar',
  data: {
    labels: GRADE_LABELS,
    datasets: [{
      data: DIST_DATA['2026-06'],
      backgroundColor: GRADE_COLORS,
      borderRadius: 6,
      barPercentage: 0.55,
      categoryPercentage: 0.7
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: function(ctx){ return ctx.raw + ' 人' } } }
    },
    scales: {
      y: {
        beginAtZero: true,
        max: 4,
        ticks: { stepSize: 1, font: { family: 'JetBrains Mono, SF Mono, monospace', size: 11 }, color: '#A1A1AA' },
        grid: { color: '#E4E4E7', drawTicks: false }
      },
      x: {
        ticks: { font: { family: 'Inter, Noto Sans SC, sans-serif', size: 10 }, color: '#A1A1AA', maxRotation: 0 },
        grid: { display: false }
      }
    }
  }
});

function switchDistMonth(month) {
  document.querySelectorAll('.month-tab').forEach(function(t){ t.classList.remove('on'); });
  event.target.classList.add('on');
  distChart.data.datasets[0].data = DIST_DATA[month];
  distChart.update();
}

// ===== 团队绩效趋势（分组柱状图 + 团队均值折线） =====
var MONTH_LABELS = ['7月','8月','9月','10月','11月','12月','1月','2月','3月','4月','5月','6月'];
var MEMBER_COLORS = ['#2563EB','#10B981','#8B5CF6','#F59E0B'];
var MEMBER_TREND = {
  '张明': [3.5, 3.8, 4.0, 4.2, 4.5, 4.8, 4.5, 4.2, 4.5, 4.8, 5.0, 4.8],
  '李华': [4.0, 4.2, 4.0, 4.5, 4.8, 5.0, 4.8, 4.5, 4.2, 4.5, 4.8, 4.5],
  '王芳': [3.0, 3.2, 3.5, 3.8, 4.0, 4.2, 4.0, 4.5, 4.8, 5.0, 5.2, 5.5],
  '赵强': [3.8, 3.5, 3.2, 3.5, 3.8, 4.0, 4.2, 4.0, 3.8, 4.0, 4.2, 4.5],
};
var GRADE_Y_LABELS = ['','远低预期','低于预期','符合预期-','符合预期','符合预期+','超出预期','远超预期'];

var members = Object.keys(MEMBER_TREND);
var avgData = [];
for (var m = 0; m < 12; m++) {
  var sum = 0;
  for (var i = 0; i < members.length; i++) { sum += MEMBER_TREND[members[i]][m]; }
  avgData.push(parseFloat((sum / members.length).toFixed(2)));
}

var barDatasets = members.map(function(name, i) {
  return {
    type: 'bar',
    label: name,
    data: MEMBER_TREND[name],
    backgroundColor: MEMBER_COLORS[i] + '99',
    borderColor: MEMBER_COLORS[i],
    borderWidth: 1,
    borderRadius: 4,
    barPercentage: 0.7,
    categoryPercentage: 0.8
  };
});

barDatasets.push({
  type: 'line',
  label: '团队均值',
  data: avgData,
  borderColor: '#F43F5E',
  backgroundColor: 'transparent',
  borderWidth: 2.5,
  borderDash: [6, 3],
  pointRadius: 4,
  pointBackgroundColor: '#F43F5E',
  tension: 0.3
});

new Chart(document.getElementById('chartTrend'), {
  type: 'bar',
  data: { labels: MONTH_LABELS, datasets: barDatasets },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { position: 'bottom', labels: { font: { family: 'Inter, Noto Sans SC, sans-serif', size: 12 }, usePointStyle: true, padding: 16 } },
      tooltip: { callbacks: { label: function(ctx){ return ctx.dataset.label + '：' + ctx.raw.toFixed(1) } } }
    },
    scales: {
      y: {
        min: 1, max: 7,
        ticks: {
          stepSize: 1,
          callback: function(v){ return GRADE_Y_LABELS[v] || '' },
          font: { family: 'Inter, Noto Sans SC, sans-serif', size: 11 },
          color: '#A1A1AA'
        },
        grid: { color: '#E4E4E7', drawTicks: false }
      },
      x: {
        ticks: { font: { family: 'Inter, Noto Sans SC, sans-serif', size: 11 }, color: '#A1A1AA' },
        grid: { display: false }
      }
    }
  }
});
</script>
<script src="../navigation.js"></script>
<script>
/* ═══ 周期切换 ═══ */
var currentYear='2026',currentCycle='2026-06';
var CYCLES_BY_YEAR={
  '2026':[{v:'2026-06',t:'6月'},{v:'2026-05',t:'5月'},{v:'2026-04',t:'4月'},{v:'2026-03',t:'3月'},{v:'2026-02',t:'2月'},{v:'2026-01',t:'1月'},{v:'2026-Q2',t:'Q2'},{v:'2026-Q1',t:'Q1'},{v:'2026-H1',t:'H1'},{v:'2026',t:'全年'}],
  '2025':[{v:'2025-12',t:'12月'},{v:'2025-11',t:'11月'},{v:'2025-10',t:'10月'},{v:'2025-09',t:'9月'},{v:'2025-08',t:'8月'},{v:'2025-07',t:'7月'},{v:'2025-06',t:'6月'},{v:'2025-05',t:'5月'},{v:'2025-04',t:'4月'},{v:'2025-03',t:'3月'},{v:'2025-02',t:'2月'},{v:'2025-01',t:'1月'},{v:'2025-Q4',t:'Q4'},{v:'2025-Q3',t:'Q3'},{v:'2025-Q2',t:'Q2'},{v:'2025-Q1',t:'Q1'},{v:'2025-H2',t:'H2'},{v:'2025-H1',t:'H1'},{v:'2025',t:'全年'}],
  '2024':[{v:'2024-12',t:'12月'},{v:'2024-11',t:'11月'},{v:'2024-10',t:'10月'},{v:'2024-Q4',t:'Q4'},{v:'2024-Q3',t:'Q3'},{v:'2024-Q2',t:'Q2'},{v:'2024-Q1',t:'Q1'},{v:'2024-H2',t:'H2'},{v:'2024-H1',t:'H1'},{v:'2024',t:'全年'}]
};

function switchYear(yr){
  currentYear=yr;
  var cycles=CYCLES_BY_YEAR[yr]||[];
  currentCycle=cycles[0].v;
  switchCycle(currentCycle);
  renderPills();
}

function renderPills(){
  var cycles=CYCLES_BY_YEAR[currentYear]||[];
  var h='';
  for(var i=0;i<cycles.length;i++){
    var c=cycles[i];
    var active=c.v===currentCycle?' active':'';
    h+='<span class="cycle-pill'+active+'" onclick="switchCycle(\''+c.v+'\',this)">'+c.t+'</span>';
    if(i<cycles.length-1&&c.t.indexOf('月')>=0&&cycles[i+1]&&cycles[i+1].t.indexOf('月')<0)h+='<span style="color:var(--c3);margin:0 2px">|</span>';
  }
  document.getElementById('cyclePills').innerHTML=h;
}

function switchCycle(val,el){
  currentCycle=val;
  var pills=document.querySelectorAll('.cycle-pill');
  for(var i=0;i<pills.length;i++)pills[i].classList.remove('active');
  if(el)el.classList.add('active');
}
renderPills();
</script>
<script>GHR_NAV.init('perf', '团队绩效');</script>
</body>
</html>
