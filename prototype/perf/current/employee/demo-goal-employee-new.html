<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 目标制定·填写</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadow-dropdown:0 10px 40px -10px rgba(0,0,0,.12),0 2px 10px -2px rgba(0,0,0,.04);
  --shadow-modal:0 20px 60px -12px rgba(0,0,0,.18),0 4px 16px -4px rgba(0,0,0,.08);
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

.hdr{height:52px;background:var(--sf);border-bottom:1px solid var(--dv);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:1100}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer}
.logo-i{width:28px;height:28px;border-radius:6px;background:var(--pr);display:flex;align-items:center;justify-content:center}
.logo-i svg{width:15px;height:15px;color:#FFF}
.logo-t{font-size:15px;font-weight:700;color:var(--c9);letter-spacing:-.3px}
.hdr-sep{width:1px;height:20px;background:var(--c2);margin:0 2px}
.breadcrumb{display:flex;align-items:center;gap:4px;font:500 13px/1 var(--f);color:var(--c5)}
.breadcrumb span{cursor:pointer;transition:color .12s}
.breadcrumb span:hover{color:var(--pr)}
.breadcrumb .sep{color:var(--c3);cursor:default}
.breadcrumb .cur{color:var(--c8);font-weight:600;cursor:default}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px}

.pg-hd{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:20px 24px;margin-bottom:16px}
.pg-hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pg-hd-title{font:700 20px/1.2 var(--f);color:var(--c9);letter-spacing:-.3px}
.pg-hd-actions{display:flex;gap:8px}
.pg-hd-info{display:flex;align-items:center;gap:24px;font:400 13px/1 var(--f);color:var(--c5);margin-bottom:12px}
.pg-hd-info span{display:flex;align-items:center;gap:4px}
.pg-hd-info strong{font-weight:600;color:var(--c8)}
.pg-hd-summary{display:flex;align-items:center;gap:24px;padding-top:12px;border-top:1px solid var(--dv)}
.pg-hd-summary .sum-item{font:500 13px/1 var(--f);color:var(--c6)}
.pg-hd-summary .sum-val{font-family:var(--m);font-weight:700;color:var(--pr)}
.pg-hd-summary .sum-val.warn{color:var(--ro)}

.mod-section{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden;border-left:3px solid var(--pr)}
.mod-section.em{border-left-color:var(--em)}
.mod-hd{display:flex;align-items:center;padding:14px 20px;cursor:pointer;user-select:none;transition:background .12s;gap:12px}
.mod-hd:hover{background:var(--c0)}
.mod-hd-title{font:600 15px/1 var(--f);color:var(--c9);flex:1}
.mod-hd-stats{display:flex;align-items:center;gap:16px;font:400 13px/1 var(--f);color:var(--c5)}
.mod-hd-stats strong{font-family:var(--m);font-weight:600;color:var(--pr)}
.mod-hd-sep{width:1px;height:16px;background:var(--c2)}
.mod-hd-add{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r1);font:500 12px/1 var(--f);color:var(--pr);background:transparent;border:1px solid var(--pr200);cursor:pointer;transition:all .12s;font-family:inherit}
.mod-hd-add:hover{background:var(--pr50);border-color:var(--pr)}
.mod-hd-add svg{width:12px;height:12px}
.mod-hd-chevron{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--c4);transition:transform .25s;flex-shrink:0}
.mod-hd-chevron.open{transform:rotate(180deg)}
.mod-hd-chevron svg{width:14px;height:14px}
.mod-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.mod-body.open{max-height:2000px}

.goal-row{border-top:1px solid var(--dv);transition:background .1s}
.goal-row:hover{background:var(--c0)}
.goal-row:last-child{border-bottom:none}
.goal-summary{display:flex;align-items:center;padding:12px 20px;gap:12px;cursor:pointer}
.goal-drag{color:var(--c3);cursor:grab;flex-shrink:0;display:flex;align-items:center}
.goal-drag svg{width:14px;height:14px}
.goal-name{flex:1;font:500 14px/1.3 var(--f);color:var(--c8)}
.goal-meta{display:flex;align-items:center;gap:12px;flex-shrink:0}
.goal-type{font:500 11px/1 var(--f);padding:2px 7px;border-radius:3px;background:var(--c1);color:var(--c6)}
.goal-type.quant{background:var(--pr50);color:var(--pr)}
.goal-type.qual{background:var(--vi50);color:var(--vi)}
.goal-weight{font:500 13px/1 var(--m);color:var(--c7)}
.goal-actions{display:flex;align-items:center;gap:4px}
.goal-act{width:26px;height:26px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c4);background:transparent;border:none;transition:all .12s}
.goal-act:hover{background:var(--c1);color:var(--c7)}
.goal-act.edit:hover{color:var(--pr);background:var(--pr50)}
.goal-act.del:hover{color:var(--ro);background:var(--ro50)}
.goal-act svg{width:14px;height:14px}
.goal-detail{padding:0 20px 14px 46px;display:none}
.goal-detail.open{display:block}
.goal-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px}
.gd-item{display:flex;flex-direction:column;gap:2px}
.gd-label{font:400 11px/1 var(--f);color:var(--c5)}
.gd-value{font:400 13px/1.4 var(--f);color:var(--c8)}
.gd-value.mono{font-family:var(--m);font-weight:500}

.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}
.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}
.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}
.btn-o{background:var(--sf);color:var(--pr);border:1px solid var(--pr200)}
.btn-o:hover{background:var(--pr50);border-color:var(--pr)}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-sm svg{width:12px;height:12px}

.action-bar{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--dv);box-shadow:0 -4px 12px rgba(0,0,0,.06);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;z-index:1000}
.action-bar-l{display:flex;align-items:center;gap:16px}
.action-bar-r{display:flex;align-items:center;gap:10px}
.weight-total{display:flex;align-items:center;gap:6px;font:500 13px/1 var(--f);color:var(--c6)}
.weight-total .v{font-family:var(--m);font-weight:700;font-size:16px}
.weight-total .v.ok{color:var(--em700)}
.weight-total .v.err{color:var(--ro)}
.goal-total{font:400 13px/1 var(--f);color:var(--c5)}

.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:1200;opacity:0;pointer-events:none;transition:opacity .25s}
body.edit-open .sb-overlay{opacity:1;pointer-events:all}
.edit-sidebar{position:fixed;top:52px;right:0;bottom:0;width:520px;background:var(--sf);box-shadow:-4px 0 24px rgba(0,0,0,.1);z-index:1300;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
body.edit-open .edit-sidebar{transform:translateX(0)}
body.edit-open .ct{margin-right:0}
body.edit-open .action-bar{right:0}
.esb-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--dv);flex-shrink:0}
.esb-hd-title{font:600 15px/1 var(--f);color:var(--c9)}
.esb-close{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c4);background:transparent;border:none;transition:all .12s}
.esb-close:hover{background:var(--c1);color:var(--c7)}
.esb-close svg{width:16px;height:16px}
.esb-body{flex:1;overflow-y:auto;padding:20px}
.ef-sec{background:var(--c0);border-radius:var(--r2);padding:14px 16px;margin-bottom:12px}
.ef-sec-title{font:600 13px/1 var(--f);color:var(--c8);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ef-sec-title svg{width:14px;height:14px;color:var(--pr)}
.ef-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ef-grid.f3{grid-template-columns:1fr 1fr 1fr}
.ef-grid .full{grid-column:1/-1}
.ef-fi{display:flex;flex-direction:column;gap:3px}
.ef-fi-l{font:400 11px/1 var(--f);color:var(--c5)}
.ef-fi-l .req{color:var(--ro);margin-left:2px}
.inp{width:100%;padding:6px 8px;border:1px solid var(--c2);border-radius:var(--r1);font:400 12px/1 var(--f);color:var(--c9);background:var(--sf);transition:all .12s;outline:none}
.inp:focus{border-color:var(--pr);box-shadow:0 0 0 2px var(--pr50)}
.inp.num{font-family:var(--m);text-align:right}
select.inp{-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23A1A1AA' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 6px center;padding-right:20px;cursor:pointer}
textarea.inp{min-height:48px;resize:vertical;font-family:var(--f)}
.esb-ft{padding:12px 20px;border-top:1px solid var(--dv);display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-shrink:0}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--sf);border-radius:var(--r4);box-shadow:var(--shadow-modal);width:700px;max-height:80vh;display:flex;flex-direction:column;transform:scale(.96);transition:transform .2s ease}
.modal-overlay.open .modal{transform:scale(1)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--dv)}
.modal-title{font:600 16px/1 var(--f);color:var(--c9)}
.modal-close{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c4);background:transparent;border:none;transition:all .12s}
.modal-close:hover{background:var(--c1);color:var(--c7)}
.modal-close svg{width:16px;height:16px}
.modal-body{flex:1;overflow-y:auto;padding:16px 24px}
.modal-footer{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-top:1px solid var(--dv)}
.modal-footer-l{font:400 12px/1 var(--f);color:var(--c5)}
.hist-tbl{width:100%;border-collapse:collapse}
.hist-tbl th{background:var(--c0);padding:8px 12px;font:500 12px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv)}
.hist-tbl th:first-child{width:40px;text-align:center}
.hist-tbl td{padding:10px 12px;font:400 13px/1.4 var(--f);color:var(--c7);border-bottom:1px solid var(--dv)}
.hist-tbl td:first-child{text-align:center}
.hist-tbl tr:last-child td{border-bottom:none}
.hist-tbl tr:hover td{background:var(--pr50)}
.chk{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--c3);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.chk.on{background:var(--pr);border-color:var(--pr)}
.chk svg{width:10px;height:10px;color:#FFF;display:none}
.chk.on svg{display:block}

.sum-err{display:flex;align-items:center;gap:6px;font:400 12px/1 var(--f);color:var(--ro);margin-top:8px;padding:8px 12px;background:var(--ro50);border-radius:var(--r1);border:1px solid var(--ro100)}
.sum-err svg{width:14px;height:14px;flex-shrink:0}
.validate-toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:var(--ro);color:#FFF;padding:10px 20px;border-radius:var(--r2);font:500 13px/1 var(--f);box-shadow:0 8px 24px rgba(244,63,94,.3);z-index:3000;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;align-items:center;gap:8px}
.validate-toast.show{opacity:1;pointer-events:all}
.validate-toast svg{width:16px;height:16px}
.validate-toast.success{background:var(--em);box-shadow:0 8px 24px rgba(16,185,129,.3)}
.validate-toast.warn{background:var(--ac);box-shadow:0 8px 24px rgba(245,158,11,.3)}
.inp-err{border-color:var(--ro)!important;box-shadow:0 0 0 2px var(--ro50)!important}
.field-with-lang{position:relative}
.field-with-lang .inp{padding-right:28px}
.lang-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c3);background:transparent;border:none;transition:all .12s;padding:0}
.lang-btn:hover{color:var(--pr);background:var(--pr50)}
.lang-btn.has{color:var(--pr)}
.lang-btn svg{width:14px;height:14px}

.kpi-cat-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.kpi-cat{padding:4px 10px;border-radius:var(--r1);font:500 12px/1 var(--f);color:var(--c6);background:var(--c1);cursor:pointer;border:1px solid transparent;transition:all .12s}
.kpi-cat.on{background:var(--pr50);color:var(--pr);border-color:var(--pr200)}
.kpi-card{padding:12px 14px;border:1px solid var(--c2);border-radius:var(--r2);cursor:pointer;transition:all .12s;margin-bottom:8px}
.kpi-card:hover{border-color:var(--pr200);background:var(--pr50)}
.kpi-card.selected{border-color:var(--pr);background:var(--pr50);box-shadow:0 0 0 2px var(--pr100)}
.kpi-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.kpi-card-name{font:500 13px/1.3 var(--f);color:var(--c8)}
.kpi-card-cat{font:400 11px/1 var(--f);color:var(--c5);padding:1px 6px;background:var(--c1);border-radius:3px}
.kpi-card-desc{font:400 12px/1.4 var(--f);color:var(--c5);margin-bottom:6px}
.kpi-card-meta{display:flex;gap:16px;font:400 11px/1 var(--f);color:var(--c4)}
.kpi-card-meta span{display:flex;align-items:center;gap:3px}
.goal-type-popup{display:none;flex-direction:row}
.goal-type-popup.show{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}
</style>
</head>
<body>

<div class="sb-overlay" onclick="closeEdit()"></div>
<div class="edit-sidebar" id="editSidebar">
  <div class="esb-hd">
    <span class="esb-hd-title" id="esbTitle">编辑目标</span>
    <button class="esb-close" onclick="closeEdit()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="esb-body" id="esbBody"></div>
  <div class="esb-ft">
    <button class="btn btn-s" onclick="closeEdit()">取消</button>
    <button class="btn btn-p" onclick="saveEdit()">保存</button>
  </div>
</div>

<div class="ct fade-in">
  <div class="pg-hd">
    <div class="pg-hd-top">
      <div style="display:flex;align-items:center;gap:10px">
        <a href="../demo-index.html" style="display:inline-flex;align-items:center;gap:4px;font:500 13px/1 var(--f);color:var(--c5);text-decoration:none;transition:color .12s" onmouseover="this.style.color='var(--pr)'" onmouseout="this.style.color='var(--c5)'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="15 18 9 12 15 6"/></svg>
          返回
        </a>
        <div class="pg-hd-title">目标制定</div>
      </div>
      <div class="pg-hd-actions">
        <button class="btn" onclick="showToast('AI 正在分析目标数据...','success')" style="background:linear-gradient(135deg,var(--pr),var(--vi));color:#FFF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/></svg>
          AI 增强
        </button>
        <button class="btn btn-p" onclick="validateAndSubmit()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          提交
        </button>
      </div>
    </div>
    <div class="pg-hd-info">
      <span>考核周期: <strong>2026年6月</strong></span>
      <span>员工: <strong>张明(EMP20240315)</strong></span>
      <span>部门: <strong>产品部</strong></span>
      <span>职位: <strong>高级产品经理</strong></span>
      <span>发起日期: <strong>2026年6月</strong></span>
    </div>
    <div class="pg-hd-summary">
      <span class="sum-item">总权重: <span class="sum-val" id="sumWeight">100%</span></span>
      <span class="sum-item">总目标数: <strong id="sumGoals" style="font-family:var(--m);font-weight:600;color:var(--c8)">7</strong></span>
    </div>
    <div id="validSummary"></div>
  </div>
  <div id="moduleContainer"></div>
</div>

<div class="action-bar">
  <div class="action-bar-l">
    <span class="weight-total">总权重: <span class="v ok" id="barWeight">100%</span></span>
    <span class="goal-total">总目标数: <strong id="barGoals" style="font-family:var(--m);font-weight:600">7</strong></span>
  </div>
  <div class="action-bar-r">
    <button class="btn btn-s" onclick="showToast('草稿已保存','success')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      保存草稿
    </button>
    <button class="btn btn-p" onclick="validateAndSubmit()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      提交
    </button>
  </div>
</div>

<div class="modal-overlay" id="copyModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">复制历史目标</span>
      <button class="modal-close" onclick="closeModal('copyModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>

function toggleMod(mi){expandedMods.has(mi)?expandedMods.delete(mi):expandedMods.add(mi);render()}
function toggleGoal(id){expandedGoals.has(id)?expandedGoals.delete(id):expandedGoals.add(id);render()}

let addGoalModIdx=null;
function addGoal(mi){
  addGoalModIdx=mi;
  const popup=document.getElementById('addGoalPopup');
  const btn=document.querySelectorAll('.mod-hd-add')[mi*2+1]||document.querySelectorAll('.mod-hd-add')[mi*2];
  if(btn){
    const r=btn.getBoundingClientRect();
    popup.style.top=(r.bottom+4)+'px';
    popup.style.left=(r.left)+'px';
  }
  popup.classList.add('show');
}
function pickGoalType(type){
  const mi=addGoalModIdx;
  const popup=document.getElementById('addGoalPopup');
  popup.classList.remove('show');
  if(mi===null)return;
  const id='g'+Date.now();
  MODULES[mi].goals.push({id,name:'新目标',indicator:'',type,weight:10,desc:'',measure:type==='quant'?'梯度评分':'',measureText:'',target:0,challenge:0,baseline:0,rule:'-',ruleFormula:'',msLevels:[],linkedIndicatorId:null,i18n:{}});
  expandedMods.add(mi);
  expandedGoals.add(id);
  render();
  if(type==='quant'){
    openIndicatorPicker(id,mi);
  }else{
    openEdit(id,mi);
  }
}
function closeGoalTypePopup(){document.getElementById('addGoalPopup').classList.remove('show')}

function deleteGoal(id,mi){
  if(!confirm('确定删除该目标？'))return;
  MODULES[mi].goals=MODULES[mi].goals.filter(g=>g.id!==id);
  expandedGoals.delete(id);
  render();
}

function updateTotals(){
  const tg=MODULES.reduce((s,m)=>s+m.goals.length,0);
  const tw=MODULES.reduce((s,m)=>s+m.goals.reduce((gs,g)=>gs+g.weight,0),0);
  document.getElementById('sumGoals').textContent=tg;
  document.getElementById('sumWeight').textContent=tw+'%';
  document.getElementById('sumWeight').className='sum-val'+(tw===100?'':' warn');
  document.getElementById('barGoals').textContent=tg;
  const bw=document.getElementById('barWeight');
  bw.textContent=tw+'%';
  bw.className='v '+(tw===100?'ok':'err');
  const el=document.getElementById('validSummary');
  if(tw!==100){
    el.innerHTML=`<div class="sum-err"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>总权重 ${tw}%，需等于 100%</div>`;
  }else{
    el.innerHTML=tg>0?`<div style="display:flex;align-items:center;gap:6px;font:400 12px/1 var(--f);color:var(--em700);margin-top:8px;padding:8px 12px;background:var(--em50);border-radius:var(--r1);border:1px solid var(--em100)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>权重校验通过</div>`:'';
  }
}

function findGoal(id){for(const m of MODULES){const g=m.goals.find(g=>g.id===id);if(g)return{mod:m,goal:g}}return null}

function langBtn(fieldKey){
  const has=langStore[fieldKey]&&(langStore[fieldKey].zh||langStore[fieldKey].en);
  return `<button class="lang-btn ${has?'has':''}" onclick="openLangModal('${fieldKey}')" title="多语言编辑">${I.globe}</button>`;
}

function closeEdit(){document.body.classList.remove('edit-open');editGoalId=null}

function saveEdit(){
  if(!editGoalId)return;
  const d=findGoal(editGoalId);if(!d)return;
  const g=d.goal;
  const nameEl=document.getElementById('ef_name');
  const weightEl=document.getElementById('ef_weight');
  document.querySelectorAll('#esbBody .inp-err').forEach(el=>el.classList.remove('inp-err'));
  let firstErr=null;
  if(!nameEl||!nameEl.value.trim()){if(nameEl)nameEl.classList.add('inp-err');if(!firstErr)firstErr='请填写目标名称';}
  if(!weightEl||!weightEl.value||parseInt(weightEl.value)<=0){if(weightEl)weightEl.classList.add('inp-err');if(!firstErr)firstErr='请填写权重';}
  if(g.type==='quant'){
    if(!g.linkedIndicatorId){if(!firstErr)firstErr='请选择关联指标';}
    const targetEl=document.getElementById('ef_target');
    if(!targetEl||!targetEl.value){if(targetEl)targetEl.classList.add('inp-err');if(!firstErr)firstErr='请填写目标值';}
  }else{
    const ms3El=document.getElementById('ef_ms3');
    if(!ms3El||!ms3El.value.trim()){if(ms3El)ms3El.classList.add('inp-err');if(!firstErr)firstErr='请填写衡量标准-评价梯度3（必填）';}
  }
  if(firstErr){showToast(firstErr);return}
  if(nameEl&&!nameEl.readOnly) g.name=nameEl.value;
  if(weightEl) g.weight=parseInt(weightEl.value)||0;
  if(g.type==='quant'){
    const targetEl=document.getElementById('ef_target');
    const challengeEl=document.getElementById('ef_challenge');
    const baselineEl=document.getElementById('ef_baseline');
    if(targetEl&&!targetEl.readOnly) g.target=parseFloat(targetEl.value)||0;
    if(challengeEl&&!challengeEl.readOnly) g.challenge=parseFloat(challengeEl.value)||0;
    if(baselineEl&&!baselineEl.readOnly) g.baseline=parseFloat(baselineEl.value)||0;
  }else{
    if(!g.msLevels)g.msLevels=[];
    const ms2El=document.getElementById('ef_ms2');
    const ms3El=document.getElementById('ef_ms3');
    const ms4El=document.getElementById('ef_ms4');
    if(ms2El){while(g.msLevels.length<1)g.msLevels.push({});g.msLevels[0].condition=ms2El.value;}
    if(ms3El){while(g.msLevels.length<2)g.msLevels.push({});g.msLevels[1].condition=ms3El.value;}
    if(ms4El){while(g.msLevels.length<3)g.msLevels.push({});g.msLevels[2].condition=ms4El.value;}
  }
  closeEdit();
  render();
}

let copyTargetModIdx=0;
function openCopyModal(mi){
  copyTargetModIdx=mi;
  histSelected.clear();
  document.getElementById('histPeriod').value='2026年5月';
  document.getElementById('copyModLabel').textContent='将复制到「'+MODULES[mi].name+'」模块';
  renderHistTable();
  openModal('copyModal');
}
function renderHistTable(){
  const period=document.getElementById('histPeriod').value;
  const goals=HISTORY[period]||[];
  let h=`<thead><tr><th><span class="chk ${histSelected.size===goals.length&&goals.length?'on':''}" onclick="toggleAllHist()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></th><th>目标名称</th><th>模块</th><th>类型</th><th>权重</th><th>目标值</th></tr></thead><tbody>`;
  goals.forEach((g,i)=>{
    h+=`<tr onclick="toggleHistItem(${i})"><td><span class="chk ${histSelected.has(i)?'on':''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></td><td style="font-weight:500;color:var(--c8)">${g.name}</td><td>${g.module}</td><td>${g.type==='quant'?'定量':'定性'}</td><td style="font-family:var(--m)">${g.weight}</td><td style="font-family:var(--m)">${g.target}</td></tr>`;
  });
  h+='</tbody>';
  document.getElementById('histTable').innerHTML=h;
  document.getElementById('histSelCount').textContent='已选 '+histSelected.size+' 项';
}
function toggleHistItem(i){histSelected.has(i)?histSelected.delete(i):histSelected.add(i);renderHistTable()}
function toggleAllHist(){
  const period=document.getElementById('histPeriod').value;
  const goals=HISTORY[period]||[];
  if(histSelected.size===goals.length)histSelected.clear();
  else{histSelected.clear();goals.forEach((_,i)=>histSelected.add(i))}
  renderHistTable();
}
function confirmCopy(){
  if(!histSelected.size){showToast('请至少选择一个目标');return}
  const period=document.getElementById('histPeriod').value;
  const goals=HISTORY[period]||[];
  const mod=MODULES[copyTargetModIdx];
  let count=0;
  histSelected.forEach(i=>{
    const src=goals[i];
    const id='g'+Date.now()+'_'+count;
    mod.goals.push({...src,id,msLevels:src.msLevels||[],linkedIndicatorId:null,i18n:{}});
    count++;
  });
  expandedMods.add(copyTargetModIdx);
  closeModal('copyModal');
  render();
}

function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}

let kpiPickerGoalId=null, kpiPickerModIdx=null;
function openIndicatorPicker(goalId,mi){
  kpiPickerGoalId=goalId;kpiPickerModIdx=mi;
  selectedKpiId=null;kpiFilterCat='全部';
  renderKpiList();
  openModal('indicatorModal');
}
function renderKpiList(){
  const q=(document.getElementById('kpiSearch')?.value||'').toLowerCase();
  const cats=['全部',...new Set(MOCK_INDICATORS.map(k=>k.category))];
  document.getElementById('kpiCatBar').innerHTML=cats.map(c=>`<span class="kpi-cat ${kpiFilterCat===c?'on':''}" onclick="kpiFilterCat='${c}';renderKpiList()">${c}</span>`).join('');
  const filtered=MOCK_INDICATORS.filter(k=>{
    if(kpiFilterCat!=='全部'&&k.category!==kpiFilterCat)return false;
    if(q&&!k.name.toLowerCase().includes(q))return false;
    return true;
  });
  document.getElementById('kpiList').innerHTML=filtered.map(k=>`<div class="kpi-card ${selectedKpiId===k.id?'selected':''}" onclick="selectedKpiId='${k.id}';renderKpiList()">
    <div class="kpi-card-hd"><span class="kpi-card-name">${k.name}</span><span class="kpi-card-cat">${k.category}</span></div>
    <div class="kpi-card-meta">
      <span>${k.dept}</span><span>${k.type}</span><span>${k.nature}</span><span>单位: ${k.unit}</span><span>${k.rule}</span>
    </div>
    <div class="kpi-card-desc">${k.desc}</div>
  </div>`).join('');
  document.getElementById('kpiSelLabel').textContent=selectedKpiId?'已选择 1 项':'未选择';
}
function filterKPI(){renderKpiList()}
function confirmIndicator(){
  if(!selectedKpiId){showToast('请选择一个指标');return}
  const kpi=MOCK_INDICATORS.find(k=>k.id===selectedKpiId);
  if(!kpi)return;
  if(kpiPickerGoalId){
    const d=findGoal(kpiPickerGoalId);if(!d)return;
    const g=d.goal;
    g.name=kpi.name;g.indicator=kpi.name;g.type=kpi.type==='定量'?'quant':'qual';
    g.unit=kpi.unit;g.rule=kpi.rule;g.desc=kpi.desc;
    g.linkedIndicatorId=kpi.id;
    closeModal('indicatorModal');
    render();
    openEdit(kpiPickerGoalId,kpiPickerModIdx);
  }else{
    const mi=kpiPickerModIdx;
    const id='g'+Date.now();
    const isQuant=kpi.type==='定量';
    MODULES[mi].goals.push({
      id,name:kpi.name,indicator:kpi.name,type:isQuant?'quant':'qual',
      weight:10,desc:kpi.desc,measure:isQuant?'梯度评分':'定性评分',
      target:0,challenge:0,baseline:0,unit:kpi.unit,
      rule:kpi.rule,ruleFormula:'',msLevels:[],linkedIndicatorId:kpi.id
    });
    expandedMods.add(mi);
    closeModal('indicatorModal');
    render();
  }
}

function openLangModal(fieldKey){
  langFieldKey=fieldKey;
  const data=langStore[fieldKey]||{zh:'',en:''};
  const label=fieldKey.endsWith('_name')?'目标名称':'衡量标准';

}

function validateAndSubmit(){
  const totalGoals=MODULES.reduce((s,m)=>s+m.goals.length,0);
  if(totalGoals<2){showToast('至少需要填写2个目标');return}
  const tw=MODULES.reduce((s,m)=>s+m.goals.reduce((gs,g)=>gs+g.weight,0),0);
  if(tw!==100){showToast('总权重 '+tw+'%，需等于 100%');return}
  showToast('提交成功','success');
}

function showMeasureDesc(id){const d=findGoal(id);showToast(d?.goal?.desc||'暂无指标描述')}
function showToast(msg,type){
  const t=document.getElementById('validateToast');
  document.getElementById('toastMsg').textContent=msg;
  t.className='validate-toast show'+(type==='success'?' success':type==='warn'?' warn':'');
  setTimeout(()=>t.classList.remove('show'),3000);
}

document.querySelectorAll('.modal-overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')})});
document.addEventListener('click',e=>{const p=document.getElementById('addGoalPopup');if(p.classList.contains('show')&&!p.contains(e.target)&&!e.target.closest('.mod-hd-add'))p.classList.remove('show')});

GHR_NAV.init('perf', '目标制定·填写');
render();
</script>
</body>
</html>
