<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 绩效面谈·填写</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadow-dropdown:0 10px 40px -10px rgba(0,0,0,.12),0 2px 10px -2px rgba(0,0,0,.04);
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

/* ═══ PAGE HEADER ═══ */
.pg-hd{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:20px 24px;margin-bottom:16px}
.pg-hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pg-hd-title{font:700 20px/1.2 var(--f);color:var(--c9);letter-spacing:-.3px}
.pg-hd-actions{display:flex;gap:8px}
.pg-hd-info{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 24px;font:400 13px/1 var(--f);color:var(--c5);padding:12px 16px;background:var(--c0);border-radius:var(--r2)}
.pg-hd-info-item{display:flex;flex-direction:column;gap:2px}
.pg-hd-info-label{font:400 11px/1 var(--f);color:var(--c4);text-transform:uppercase;letter-spacing:.5px}
.pg-hd-info-value{font:500 13px/1.3 var(--f);color:var(--c8)}

/* ═══ SECTION ═══ */
.section{padding:20px 24px;border-bottom:1px solid var(--dv)}
.section:last-child{border-bottom:none}
.section-hd{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.section-icon{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-icon svg{width:14px;height:14px;color:#FFF}
.section-title{font:600 14px/1 var(--f);color:var(--c9)}
.section-desc{font:400 12px/1 var(--f);color:var(--c5);margin-left:8px}

/* ═══ INPUT GROUP ═══ */
.input-group{margin-bottom:12px}
.input-group:last-child{margin-bottom:0}
.input-label{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.input-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:600 10px/1 var(--f);color:#FFF;flex-shrink:0}
.input-field{width:100%;height:40px;border:1px solid var(--c2);border-radius:var(--r1);padding:0 14px;font:400 13px/1 var(--f);color:var(--c8);outline:none;transition:all .12s}
.input-field:focus{border-color:var(--pr);box-shadow:0 0 0 2px var(--pr50)}
.input-field::placeholder{color:var(--c4)}
.textarea-field{width:100%;min-height:100px;border:1px solid var(--c2);border-radius:var(--r1);padding:10px 14px;font:400 13px/1.5 var(--f);color:var(--c8);outline:none;resize:vertical;transition:all .12s;font-family:var(--f)}
.textarea-field:focus{border-color:var(--pr);box-shadow:0 0 0 2px var(--pr50)}
.textarea-field::placeholder{color:var(--c4)}

.tip{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;background:var(--pr50);border-radius:var(--r1);margin-bottom:14px;font:400 12px/1.4 var(--f);color:var(--pr)}
.tip svg{width:14px;height:14px;flex-shrink:0;margin-top:1px}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}
.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}
.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}

/* ═══ TOAST ═══ */
.validate-toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:var(--em);color:#FFF;padding:10px 20px;border-radius:var(--r2);font:500 13px/1 var(--f);box-shadow:0 8px 24px rgba(16,185,129,.3);z-index:3000;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;align-items:center;gap:8px}
.validate-toast.show{opacity:1;pointer-events:all}
.validate-toast svg{width:16px;height:16px}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}
</style>
</head>
<body>

<!-- Navigation will be injected by navigation.js -->

<!-- Main content -->
<div class="ct fade-in">
  <!-- Breadcrumb -->
  <nav style="display:flex;align-items:center;gap:4px;font:500 12px/1 var(--f);color:var(--c5);margin-bottom:12px">
    <a href="../demo-index.html" style="color:var(--c5);text-decoration:none;transition:color .12s" onmouseover="this.style.color='var(--pr)'" onmouseout="this.style.color='var(--c5)'">绩效工作台</a>
    <span style="color:var(--c3)">/</span>
    <span style="color:var(--c8);font-weight:600">绩效面谈</span>
  </nav>

  <!-- Page header -->
  <div class="pg-hd">
    <div class="pg-hd-top">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="pg-hd-title">绩效面谈表</div>
        <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--pr50);color:var(--pr)">
          <span style="width:6px;height:6px;border-radius:50%;background:var(--pr);animation:pulse 2s ease-in-out infinite"></span>
          填写中
        </span>
      </div>
      <div class="pg-hd-actions">
        <button class="btn btn-s" onclick="showToast('草稿已保存','success')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          保存草稿
        </button>
        <button class="btn btn-p" onclick="submitInterview()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          提交
        </button>
      </div>
    </div>
    <div class="pg-hd-info">
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">考核方案</span><span class="pg-hd-info-value">产品部2026年Q2绩效考核</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">考核周期</span><span class="pg-hd-info-value">2026年4-6月</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">面谈类型</span><span class="pg-hd-info-value">定期面谈</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">面谈人</span><span class="pg-hd-info-value">王总监（直接上级）</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">被面谈人</span><span class="pg-hd-info-value">张明</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">面谈时间</span><span class="pg-hd-info-value">2026-06-20 14:00</span></div>
    </div>
  </div>

  <!-- 三个赞 -->
  <div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden">
    <div class="section">
      <div class="section-hd">
        <div class="section-icon" style="background:var(--em)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg></div>
        <span class="section-title">三个赞</span>
        <span class="section-desc">对上级的肯定与感谢</span>
      </div>
      <div class="tip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>请写出三个您想对上级表达肯定或感谢的方面</div>
      <div class="input-group">
        <div class="input-label"><div class="input-num" style="background:var(--em)">1</div><span style="font:500 12px/1 var(--f);color:var(--c7)">赞一</span></div>
        <input class="input-field" placeholder="感谢上级在XX方面的指导" value="感谢王总在产品战略方向上的清晰指导，帮助我更好地理解公司业务全局。">
      </div>
      <div class="input-group">
        <div class="input-label"><div class="input-num" style="background:var(--em)">2</div><span style="font:500 12px/1 var(--f);color:var(--c7)">赞二</span></div>
        <input class="input-field" placeholder="感谢上级在XX方面的支持" value="感谢王总在跨部门协调中的大力支持，为产品推进扫清了障碍。">
      </div>
      <div class="input-group">
        <div class="input-label"><div class="input-num" style="background:var(--em)">3</div><span style="font:500 12px/1 var(--f);color:var(--c7)">赞三</span></div>
        <input class="input-field" placeholder="感谢上级在XX方面的鼓励" value="感谢王总在团队管理方法上的分享，让我在带团队方面有了新的思路。">
      </div>
    </div>
  </div>

  <!-- 三个转 -->
  <div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden">
    <div class="section">
      <div class="section-hd">
        <div class="section-icon" style="background:var(--ac)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></div>
        <span class="section-title">三个转</span>
        <span class="section-desc">希望改进的方面</span>
      </div>
      <div class="tip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>请写出三个您希望在下一阶段改进或转变的方面</div>
      <div class="input-group">
        <div class="input-label"><div class="input-num" style="background:var(--ac)">1</div><span style="font:500 12px/1 var(--f);color:var(--c7)">转一</span></div>
        <input class="input-field" placeholder="希望在XX方面有所改进" value="希望在需求优先级判断上更加果断，减少反复沟通的时间成本。">
      </div>
      <div class="input-group">
        <div class="input-label"><div class="input-num" style="background:var(--ac)">2</div><span style="font:500 12px/1 var(--f);color:var(--c7)">转二</span></div>
        <input class="input-field" placeholder="希望在XX方面有所突破" value="希望提升数据分析能力，用数据驱动产品决策而非仅凭经验。">
      </div>
      <div class="input-group">
        <div class="input-label"><div class="input-num" style="background:var(--ac)">3</div><span style="font:500 12px/1 var(--f);color:var(--c7)">转三</span></div>
        <input class="input-field" placeholder="希望在XX方面有所成长" value="希望加强对行业趋势的洞察，提升产品前瞻性规划能力。">
      </div>
    </div>
  </div>

  <!-- 下阶段规划 -->
  <div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden">
    <div class="section">
      <div class="section-hd">
        <div class="section-icon" style="background:var(--pr)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg></div>
        <span class="section-title">下阶段规划</span>
        <span class="section-desc">Q3工作目标和计划</span>
      </div>
      <div class="tip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>请简要描述您下一阶段的工作目标和重点规划</div>
      <textarea class="textarea-field" placeholder="请描述下阶段工作目标和计划…">Q3工作规划：
1. 继续推进绩效重构项目，完成考核活动管理模块上线
2. 深化AI应用场景，完成采购侧AI应用1.2版本迭代
3. 提升需求评审及时率至98%以上
4. 加强客户满意度管理，NPS评分提升至90+
5. 完成2名下属的季度IDP辅导和评估</textarea>
    </div>
  </div>

  <!-- 需要的支持 -->
  <div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden">
    <div class="section">
      <div class="section-hd">
        <div class="section-icon" style="background:var(--vi)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <span class="section-title">需要的支持</span>
        <span class="section-desc">希望上级提供的帮助</span>
      </div>
      <div class="tip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>请说明您希望上级在哪些方面给予支持或资源</div>
      <textarea class="textarea-field" placeholder="请描述需要的支持…">1. 希望上级在跨部门协调中继续提供支持，特别是与研发团队的资源协调
2. 希望获得更多行业交流机会，提升产品视野
3. 希望上级在绩效重构项目上给予更多指导和反馈</textarea>
    </div>
  </div>
</div>

<div class="validate-toast" id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span id="toastMsg"></span></div>

<script src="../navigation.js"></script>
<script>
GHR_NAV.init('perf', '绩效面谈·填写');

function submitInterview(){
  showToast('面谈记录已提交','success');
}
function showToast(msg,type){
  var t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.className='validate-toast show';
  setTimeout(function(){t.classList.remove('show')},3000);
}
</script>
</body>
</html>
