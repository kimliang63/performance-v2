<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 绩效首页</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
  /* Spacing scale: 4, 8, 12, 16, 20, 24 */
  --sp-xs:4px;--sp-sm:8px;--sp-md:12px;--sp-lg:16px;--sp-xl:20px;--sp-2xl:24px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

/* Card System */
.card{background:var(--sf);border-radius:var(--r3);box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:var(--sp-lg)}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-lg) var(--sp-xl);border-bottom:1px solid var(--dv)}
.card-t{font:600 15px/1 var(--f);color:var(--c9)}
.card-action{font:500 13px/1 var(--f);color:var(--pr);cursor:pointer;display:flex;align-items:center;gap:var(--sp-xs);text-decoration:none}
.card-action:hover{color:var(--pr700)}
.card-action svg{width:14px;height:14px}
.card-bd{padding:var(--sp-lg) var(--sp-xl)}

/* Grid */
.row{display:grid;gap:var(--sp-lg);align-items:stretch}
.row-2{grid-template-columns:1fr 1fr}
.row .card{margin-bottom:0}

/* Task */
.task{display:flex;flex-direction:column;padding:var(--sp-md) 0;border-bottom:1px solid var(--dv);cursor:pointer;transition:background 0.12s}
.task:hover{background:var(--c0)}
.task:last-child{border-bottom:none}
.task-name{font:500 13px/1 var(--f);color:var(--c8);margin-bottom:var(--sp-xs)}
.task-row{display:flex;align-items:center;justify-content:space-between}
.task-meta{font:400 12px/1 var(--f);color:var(--c5)}
.task-action{font:500 12px/1 var(--f);color:var(--pr);cursor:pointer;text-decoration:none}
.task-action:hover{color:var(--pr700)}

/* Score Layer 1 */
.score-layer1{display:flex;align-items:center;gap:var(--sp-xl);padding-bottom:var(--sp-lg);border-bottom:1px solid var(--dv)}
.score-left{display:flex;align-items:flex-end;gap:var(--sp-lg)}
.score-num{font:700 36px/1 var(--fm);color:var(--pr);letter-spacing:-1px}
.score-info{padding-bottom:var(--sp-xs)}
.score-badge{font:500 12px/1 var(--f);color:var(--pr);background:var(--pr50);padding:var(--sp-xs) var(--sp-md);border-radius:var(--r1);display:inline-block;margin-bottom:var(--sp-xs)}
.score-period{font:400 12px/1 var(--f);color:var(--c5)}
.score-compare{display:flex;flex-direction:column;align-items:flex-start;gap:var(--sp-xs);padding-left:var(--sp-xl);border-left:1px solid var(--dv)}
.score-compare-row{display:flex;align-items:center;gap:var(--sp-sm)}
.score-compare-label{font:400 12px/1 var(--f);color:var(--c5);min-width:28px}
.score-compare-val{font:600 13px/1 var(--fm);color:var(--c8)}
.score-compare-change{font:500 12px/1 var(--f);display:inline-flex;align-items:center;gap:2px}
.score-compare-change.up{color:var(--em700)}

/* Score Layer 2 */
.score-layer2{padding-top:var(--sp-lg)}
.score-layer2-title{font:600 13px/1 var(--f);color:var(--c8);margin-bottom:var(--sp-md)}

/* ===== 绩效图表 ===== */
.perf-status{font:500 13px/1.4 var(--f);color:var(--c5);margin-bottom:var(--sp-lg)}
.perf-status .val{font:700 22px/1 var(--fm);color:var(--em)}
.perf-status .sep{color:var(--c3);margin:0 var(--sp-sm)}

.perf-charts{display:grid;grid-template-columns:6fr 4fr;gap:var(--sp-2xl)}

.chart-box{min-width:0}
.chart-box-title{font:600 13px/1 var(--f);color:var(--c8);margin-bottom:var(--sp-md)}
.chart-box canvas{width:100%!important;height:240px!important}

.perf-legend{display:flex;align-items:center;gap:10px;margin-top:var(--sp-lg);font:400 11px/1 var(--f);color:var(--c5)}
.perf-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* Goal Modules */
.mod-sec{border:1px solid var(--dv);border-radius:var(--r2);overflow:hidden}
.mod-sec+.mod-sec{margin-top:var(--sp-md)}
.mod-hd{display:flex;align-items:center;padding:var(--sp-md) var(--sp-lg);gap:var(--sp-sm)}
.mod-hd-title{font:600 13px/1 var(--f);color:var(--c9);flex:1}
.mod-hd-wt{font:500 12px/1 var(--fm);color:var(--c5);padding:2px 8px;border-radius:var(--r1);background:var(--c1)}
.goal-row{border-top:1px solid var(--dv);padding:var(--sp-sm) var(--sp-lg);display:flex;align-items:center;gap:var(--sp-sm)}
.goal-name{flex:1;font:500 13px/1.3 var(--f);color:var(--c8)}
.goal-type{font:500 10px/1 var(--f);padding:2px 7px;border-radius:3px}
.goal-type.q{background:var(--pr50);color:var(--pr)}
.goal-type.d{background:var(--vi50);color:var(--vi)}
.goal-wt{font:500 12px/1 var(--fm);color:var(--c6)}
.goal-val{font:400 12px/1 var(--f);color:var(--c5);min-width:140px;text-align:right}

/* Goal Footer */
.goal-footer{display:flex;align-items:center;gap:var(--sp-lg);margin-top:var(--sp-md);padding-top:var(--sp-md);border-top:1px solid var(--dv)}
.goal-footer-label{font:400 12px/1 var(--f);color:var(--c5)}
.goal-footer-val{font:600 14px/1 var(--fm);color:var(--em700)}

/* AI Suggest */
.ai-suggest-item{padding:var(--sp-md);border:1px solid var(--dv);border-radius:var(--r2);cursor:pointer;transition:all .12s}
.ai-suggest-item:hover{border-color:var(--pr200);background:var(--pr50)}
.ai-suggest-item-t{font:500 13px/1.3 var(--f);color:var(--c8);margin-bottom:var(--sp-xs)}
.ai-suggest-item-d{font:400 12px/1.4 var(--f);color:var(--c5)}
.ai-suggest-item-action{margin-top:var(--sp-sm);font:500 11px/1 var(--f);color:var(--pr);display:inline-flex;align-items:center;gap:3px}

/* Badge */
.badge{font:500 11px/1 var(--f);color:var(--vi);background:var(--vi50);padding:2px 8px;border-radius:10px}

.toast{position:fixed;top:70px;right:24px;padding:12px 18px;border-radius:var(--r2);font:500 13px/1.3 var(--f);box-shadow:0 10px 40px -10px rgba(0,0,0,.12);z-index:3000;transform:translateX(120%);transition:transform .25s ease}
.toast.on{transform:translateX(0)}
.toast.success{background:var(--em);color:#FFF}

/* Month Performance Badge */
.mp-badge{display:inline-block;padding:3px 10px;border-radius:4px;font:600 12px/1 var(--f);white-space:nowrap}
.mp-badge.excellent{background:var(--em50);color:var(--em700)}
.mp-badge.far-exceed{background:var(--em100);color:var(--em700)}
.mp-badge.good{background:var(--pr50);color:var(--pr)}
.mp-badge.normal{background:var(--c1);color:var(--c6)}
.mp-badge.poor{background:var(--ac50);color:var(--ac700)}
.mp-badge.bad{background:var(--ro50);color:var(--ro)}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body>

<div style="padding:var(--sp-2xl)">

    .cycle-pill:hover{color:var(--pr);background:var(--pr50)}

          </div>
        </div>
        <div class="task" onclick="location.href='demo-confirm-employee.html'">
          <div class="task-name">确认5月绩效结果</div>
          <div class="task-row">
            <span class="task-meta">截止 7/5</span>
            <span class="task-action">去处理</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 我的目标 -->
    <div class="card">
      <div class="card-hd">
        <span class="card-t">我的目标</span>
        <span class="card-action">更多 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
      <div class="card-bd">
        <div class="mod-sec">
          <div class="mod-hd">
            <div class="mod-hd-title">KPI</div>
            <div class="mod-hd-wt">60%</div>
          </div>
          <div class="goal-row" onclick="location.href='demo-goal-employee.html'">
            <span class="goal-name">AI 产品迭代完成率</span>
            <span class="goal-val">目标 100% · 挑战 120%</span>
            <span class="goal-wt">25%</span>
          </div>
          <div class="goal-row" onclick="location.href='demo-goal-employee.html'">
            <span class="goal-name">AI 新增用户数</span>
            <span class="goal-val">目标 5000 · 挑战 7000</span>
            <span class="goal-wt">20%</span>
          </div>
          <div class="goal-row" onclick="location.href='demo-goal-employee.html'">
            <span class="goal-name">产品营收贡献</span>
            <span class="goal-val">目标 200万 · 挑战 300万</span>
            <span class="goal-wt">15%</span>
          </div>
        </div>
        <div class="mod-sec">
          <div class="mod-hd">
            <div class="mod-hd-title">KPA</div>
            <div class="mod-hd-wt">40%</div>
          </div>
          <div class="goal-row" onclick="location.href='demo-goal-employee.html'">
            <span class="goal-name">主导完成6月产品架构评审</span>
            <span class="goal-val">定性</span>
            <span class="goal-wt">15%</span>
          </div>
          <div class="goal-row" onclick="location.href='demo-goal-employee.html'">
            <span class="goal-name">完成2名新人带教</span>
            <span class="goal-val">定性</span>
            <span class="goal-wt">10%</span>
          </div>
          <div class="goal-row" onclick="location.href='demo-goal-employee.html'">
            <span class="goal-name">推动跨部门协作机制落地</span>
            <span class="goal-val">定性</span>
            <span class="goal-wt">15%</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Row 2: 绩效趋势 -->
  <div class="card" style="margin-top:var(--sp-lg)">
    <div class="card-hd">
      <span class="card-t">绩效趋势</span>
    </div>
    <div class="card-bd">
      <div class="perf-status">
        <span id="perfStatus"><span style="font:700 22px/1 var(--fm);color:var(--em700)">超出预期</span> <span style="color:var(--c4)">|</span> 2026年6月</span>
      </div>
      <div class="perf-charts">
        <div class="chart-box">
          <canvas id="chartMonthly"></canvas>
        </div>
        <div class="chart-box">
          <canvas id="chartAnnual"></canvas>
        </div>
      </div>
      <div class="perf-legend">
        <div class="perf-legend-dot" style="background:#E11D48"></div>远低预期
        <div class="perf-legend-dot" style="background:#F43F5E"></div>低于预期
        <div class="perf-legend-dot" style="background:#F59E0B"></div>符合预期-
        <div class="perf-legend-dot" style="background:#A1A1AA"></div>符合预期

        <div class="perf-legend-dot" style="background:#10B981"></div>超出预期

</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success');
  setTimeout(function() { t.classList.add('on'); }, 10);
  setTimeout(function() { t.classList.remove('on'); }, 2500);
}

// ===== Chart.js 年度绩效柱状图 =====
(function(){
  var ctx1 = document.getElementById('chartAnnual');
  if (!ctx1) return;
  new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: ['2021', '2022', '2023', '2024', '2025'],
      datasets: [{
        data: [3, 4, 4, 5, 6],
        backgroundColor: ['#A1A1AA', '#2563EB', '#2563EB', '#10B981', '#047857']
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx){ return '年度等级：' + ['符合预期','符合预期+','符合预期+','超出预期','远超预期'][ctx.dataIndex] }
          }
        }
      },
      scales: {
        y: {
          min: 0, max: 7,
          ticks: {
            stepSize: 1,
            callback: function(v){
              return ['','远低预期','低于预期','符合预期-','符合预期','符合预期+','超出预期','远超预期'][v] || ''
            },
            font: { family: 'Inter, Noto Sans SC, sans-serif', size: 11 },
            color: '#A1A1AA'
          },
          grid: { color: '#E4E4E7', drawTicks: false }
        },
        x: {
          ticks: { font: { family: 'Inter, Noto Sans SC, sans-serif', size: 11 }, color: '#A1A1AA' },
          grid: { display: false }
        }
      }
    }
  });
})();

// ===== Chart.js 月度绩效柱状图 =====
(function(){
  var ctx2 = document.getElementById('chartMonthly');
  if (!ctx2) return;
  new Chart(ctx2, {
    type: 'bar',
    data: {
      labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
      datasets: [{
        data: [3, 4, 2, 5, 6, 5, 4, 3, 5, 4, 6, 5],
        backgroundColor: ['#F43F5E','#E11D48','#F59E0B','#A1A1AA','#A1A1AA','#2563EB','#2563EB','#A1A1AA','#10B981','#2563EB','#10B981','#047857']
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx){ return '月度等级：' + ['','远低预期','低于预期','符合预期-','符合预期','符合预期+','超出预期','远超预期'][ctx.raw] }
          }
        }
      },
      scales: {
        y: {
          min: 0, max: 7,
          ticks: {
            stepSize: 1,
            callback: function(v){
              return ['','远低预期','低于预期','符合预期-','符合预期','符合预期+','超出预期','远超预期'][v] || ''
            },
            font: { family: 'Inter, Noto Sans SC, sans-serif', size: 11 },
            color: '#A1A1AA'
          },
          grid: { color: '#E4E4E7', drawTicks: false }
        },
        x: {
          ticks: { font: { family: 'Inter, Noto Sans SC, sans-serif', size: 11 }, color: '#A1A1AA' },
          grid: { display: false }
        }
      }
    }
  });
})();

/* ═══ 周期切换 ═══ */
var currentYear='2026',currentCycle='2026-06';
var CYCLES_BY_YEAR={
  '2026':[{v:'2026-06',t:'6月'},{v:'2026-05',t:'5月'},{v:'2026-04',t:'4月'},{v:'2026-03',t:'3月'},{v:'2026-02',t:'2月'},{v:'2026-01',t:'1月'},{v:'2026-Q2',t:'Q2'},{v:'2026-Q1',t:'Q1'},{v:'2026-H1',t:'H1'},{v:'2026',t:'全年'}],
  '2025':[{v:'2025-12',t:'12月'},{v:'2025-11',t:'11月'},{v:'2025-10',t:'10月'},{v:'2025-09',t:'9月'},{v:'2025-08',t:'8月'},{v:'2025-07',t:'7月'},{v:'2025-06',t:'6月'},{v:'2025-05',t:'5月'},{v:'2025-04',t:'4月'},{v:'2025-03',t:'3月'},{v:'2025-02',t:'2月'},{v:'2025-01',t:'1月'},{v:'2025-Q4',t:'Q4'},{v:'2025-Q3',t:'Q3'},{v:'2025-Q2',t:'Q2'},{v:'2025-Q1',t:'Q1'},{v:'2025-H2',t:'H2'},{v:'2025-H1',t:'H1'},{v:'2025',t:'全年'}],
  '2024':[{v:'2024-12',t:'12月'},{v:'2024-11',t:'11月'},{v:'2024-10',t:'10月'},{v:'2024-Q4',t:'Q4'},{v:'2024-Q3',t:'Q3'},{v:'2024-Q2',t:'Q2'},{v:'2024-Q1',t:'Q1'},{v:'2024-H2',t:'H2'},{v:'2024-H1',t:'H1'},{v:'2024',t:'全年'}]
};

function switchYear(yr){
  currentYear=yr;
  var cycles=CYCLES_BY_YEAR[yr]||[];
  currentCycle=cycles[0].v;
  switchCycle(currentCycle);
  renderPills();
}

function renderPills(){
  var cycles=CYCLES_BY_YEAR[currentYear]||[];
  var h='';
  for(var i=0;i<cycles.length;i++){
    var c=cycles[i];
    var active=c.v===currentCycle?' active':'';
    h+='<span class="cycle-pill'+active+'" onclick="switchCycle(\''+c.v+'\',this)">'+c.t+'</span>';
    if(i<cycles.length-1&&c.t.indexOf('月')>=0&&cycles[i+1]&&cycles[i+1].t.indexOf('月')<0)h+='<span style="color:var(--c3);margin:0 2px">|</span>';
  }
  document.getElementById('cyclePills').innerHTML=h;
}
renderPills();

var CYCLE_DATA={
  '2026-06':{period:'2026年6月',goalPeriod:'6月',status:'超出预期',tasks:[
    {name:'填写6月绩效目标',meta:'截止 6/30'},
    {name:'确认5月绩效结果',meta:'截止 7/5'}
  ]},
  '2026-05':{period:'2026年5月',goalPeriod:'5月',status:'符合预期+',tasks:[
    {name:'填写5月绩效目标',meta:'截止 5/31'},

function switchCycle(val,el){
  currentCycle=val;
  var pills=document.querySelectorAll('.cycle-pill');
  for(var i=0;i<pills.length;i++)pills[i].classList.remove('active');
  if(el)el.classList.add('active');
  var d=CYCLE_DATA[val];if(!d)return;
  var tasks=document.querySelectorAll('.task');
  var goalNames=document.querySelectorAll('.goal-name');
  for(var i=0;i<tasks.length&&i<d.tasks.length;i++){
    var t=d.tasks[i];
    var el=tasks[i];
    el.querySelector('.task-name').textContent=t.name;
    el.querySelector('.task-meta').textContent=t.meta;
  }
  var periodEl=document.querySelector('.score-period');
  if(periodEl)periodEl.textContent=d.period;
  var statusEl=document.getElementById('perfStatus');
  if(statusEl){
    var g=d.status||'超出预期';
    var gc=g==='超出预期'||g==='远超预期'?'var(--em700)':g==='符合预期'||g==='符合预期+'?'var(--pr)':g==='符合预期-'?'var(--ac700)':'var(--c6)';
    statusEl.innerHTML='<span style="font:700 22px/1 var(--fm);color:'+gc+'">'+g+'</span> <span style="color:var(--c4)">|</span> '+d.period;
  }
  if(goalNames.length>0)goalNames[0].parentElement.parentElement.previousElementSibling.querySelector('.card-t').textContent='我的目标 · '+d.goalPeriod;
}
