<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 我的目标</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadow-card-hover:0 8px 20px -4px rgba(0,0,0,.08),0 2px 6px -2px rgba(0,0,0,.04);
  --shadow-dropdown:0 10px 40px -10px rgba(0,0,0,.12),0 2px 10px -2px rgba(0,0,0,.04);
  --shadow-modal:0 20px 60px -12px rgba(0,0,0,.18),0 4px 16px -4px rgba(0,0,0,.08);
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}






/* HEADER */
.hdr{height:52px;background:var(--sf);border-bottom:1px solid var(--dv);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:1100}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer}
.logo-i{width:28px;height:28px;border-radius:6px;background:var(--pr);display:flex;align-items:center;justify-content:center}
.logo-i svg{width:15px;height:15px;color:#FFF}
.logo-t{font-size:15px;font-weight:700;color:var(--c9);letter-spacing:-.3px}
.hdr-sep{width:1px;height:20px;background:var(--c2);margin:0 2px}
.breadcrumb{display:flex;align-items:center;gap:4px;font:500 13px/1 var(--f);color:var(--c5)}
.breadcrumb span{cursor:pointer;transition:color .12s}
.breadcrumb span:hover{color:var(--pr)}
.breadcrumb .sep{color:var(--c3);cursor:default}
.breadcrumb .cur{color:var(--c8);font-weight:600;cursor:default}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.flow-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--r1);background:var(--pr50);border:1px solid var(--pr200);font:500 12px/1 var(--f);color:var(--pr)}
.flow-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--pr);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Page header */
.pg-hd{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:20px 24px;margin-bottom:16px}
.pg-hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pg-hd-title{font:700 20px/1.2 var(--f);color:var(--c9);letter-spacing:-.3px}
.pg-hd-actions{display:flex;gap:8px}
.pg-hd-info{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 24px;font:400 13px/1 var(--f);color:var(--c5);margin-bottom:12px;padding:12px 16px;background:var(--c0);border-radius:var(--r2)}
.pg-hd-info-item{display:flex;flex-direction:column;gap:2px}
.pg-hd-info-label{font:400 11px/1 var(--f);color:var(--c4);text-transform:uppercase;letter-spacing:.5px}
.pg-hd-info-value{font:500 13px/1.3 var(--f);color:var(--c8)}
.pg-hd-summary{display:flex;align-items:center;gap:24px;padding-top:12px;border-top:1px solid var(--dv)}
.pg-hd-summary .sum-item{font:500 13px/1 var(--f);color:var(--c6)}
.pg-hd-summary .sum-val{font-family:var(--m);font-weight:700;color:var(--pr)}
.pg-hd-summary .sum-val.warn{color:var(--ro)}
.pg-hd-summary .sum-err{display:inline-flex;align-items:center;gap:4px;font:500 11px/1 var(--f);color:var(--ro);background:var(--ro50);padding:3px 8px;border-radius:3px}
.pg-hd-summary .sum-err svg{width:12px;height:12px}
.pg-hd-summary .sum-ok{display:inline-flex;align-items:center;gap:4px;font:500 11px/1 var(--f);color:var(--em700);background:var(--em50);padding:3px 8px;border-radius:3px}
.pg-hd-summary .sum-ok svg{width:12px;height:12px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}
.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}
.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}
.btn-o{background:var(--sf);color:var(--pr);border:1px solid var(--pr200)}
.btn-o:hover{background:var(--pr50);border-color:var(--pr)}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-sm svg{width:12px;height:12px}

/* FORM STATUS */
.form-status{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r1);font:500 12px/1 var(--f)}
.form-status .dot{width:7px;height:7px;border-radius:50%}
.form-status.active{background:var(--em50);color:var(--em700)}
.form-status.active .dot{background:var(--em);animation:pulse 2s ease-in-out infinite}
.form-status.submitted{background:var(--pr50);color:var(--pr)}
.form-status.submitted .dot{background:var(--pr);animation:pulse 2s ease-in-out infinite}
.form-status.approved{background:var(--em50);color:var(--em700)}
.form-status.approved .dot{background:var(--em)}
.form-status.rejected{background:var(--ro50);color:var(--ro)}
.form-status.rejected .dot{background:var(--ro)}

/* MODULE SECTION */
.mod-section{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden;border:1px solid var(--c2)}
.mod-section.em{}
.mod-section.ac{}
.mod-section.vi{}
.mod-section.ro{}

.mod-hd{display:flex;align-items:center;padding:14px 20px;cursor:pointer;user-select:none;transition:background .12s;gap:12px}
.mod-hd:hover{background:var(--c0)}
.mod-hd-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#FFF}
.mod-hd-icon svg{width:13px;height:13px;color:#FFF}
.mod-hd-title{font:500 12px/1 var(--f);color:var(--c5);flex:1;text-transform:uppercase;letter-spacing:.5px}
.mod-hd-stats{display:flex;align-items:center;gap:12px;font:400 12px/1 var(--f);color:var(--c5)}
.mod-hd-stats strong{font-family:var(--m);font-weight:600;color:var(--c8)}
.mod-hd-sep{width:1px;height:14px;background:var(--c2)}
.mod-hd-add{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r1);font:500 12px/1 var(--f);color:var(--pr);background:transparent;border:1px solid var(--pr200);cursor:pointer;transition:all .12s;font-family:inherit}
.mod-hd-add:hover{background:var(--pr50);border-color:var(--pr)}
.mod-hd-add svg{width:12px;height:12px}
.mod-hd-chevron{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--c4);transition:transform .25s;flex-shrink:0}
.mod-hd-chevron.open{transform:rotate(180deg)}
.mod-hd-chevron svg{width:14px;height:14px}

.mod-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.mod-body.open{max-height:2000px}

/* GOAL ROW */
.goal-row{border-top:1px solid var(--dv);transition:background .1s}
.goal-row:hover{background:var(--c0)}
.goal-row:last-child{border-bottom:none}

.goal-summary{display:flex;align-items:center;padding:14px 20px;gap:10px;cursor:pointer}
.goal-drag{color:var(--c3);cursor:grab;flex-shrink:0;display:flex;align-items:center;user-select:none}
.goal-drag:active{cursor:grabbing;color:var(--pr)}
.goal-drag svg{width:14px;height:14px}
.goal-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.goal-name{flex:1;font:600 14px/1.3 var(--f);color:var(--c9)}
.goal-type{font:500 11px/1 var(--f);padding:2px 7px;border-radius:3px;background:var(--c1);color:var(--c6)}
.goal-type.quant{background:var(--pr50);color:var(--pr)}
.goal-type.qual{background:var(--vi50);color:var(--vi)}
.goal-weight{font:700 14px/1 var(--m);color:var(--pr);background:var(--pr50);padding:3px 8px;border-radius:var(--r1);flex-shrink:0}
.goal-actions{display:flex;align-items:center;gap:4px}
.goal-act{width:26px;height:26px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c4);background:transparent;border:none;transition:all .12s}
.goal-act:hover{background:var(--c1);color:var(--c7)}
.goal-act.edit:hover{color:var(--pr);background:var(--pr50)}
.goal-act.del:hover{color:var(--ro);background:var(--ro50)}
.goal-act svg{width:14px;height:14px}
.goal-chevron{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:var(--c4);transition:transform .2s;flex-shrink:0}
.goal-chevron.open{transform:rotate(180deg)}
.goal-chevron svg{width:12px;height:12px}

/* GOAL EDIT (read-only view) */
.goal-edit{padding:0 20px 16px 82px;display:none}
.goal-edit.open{display:block;animation:fadeIn .2s ease}
.ge-form{padding:12px 0}
.ge-sec{margin-bottom:14px}
.ge-sec:last-child{margin-bottom:0}
.ge-sec-title{font:600 12px/1 var(--f);color:var(--c8);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ge-sec-title::before{content:'';width:3px;height:12px;background:var(--pr);border-radius:2px;flex-shrink:0}
.ge-row{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.ge-row.f3{grid-template-columns:100px 100px 100px}
.ge-row .full{grid-column:1/-1}
.ge-fi{display:flex;flex-direction:column;gap:3px}
.ge-fi-l{font:400 11px/1 var(--f);color:var(--c5)}
.ge-fi-val{font:500 13px/1.4 var(--f);color:var(--c8);padding:7px 0}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}

.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-10px);padding:10px 20px;border-radius:var(--r2);font:500 13px/1 var(--f);background:var(--em);color:#FFF;box-shadow:0 8px 24px rgba(16,185,129,.3);z-index:3000;opacity:0;pointer-events:none;transition:all .25s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- Navigation will be injected by navigation.js -->

<div class="ct fade-in">
  <nav style="display:flex;align-items:center;gap:4px;font:500 12px/1 var(--f);color:var(--c5);margin-bottom:12px">
    <a href="../demo-index.html" style="color:var(--c5);text-decoration:none;transition:color .12s" onmouseover="this.style.color='var(--pr)'" onmouseout="this.style.color='var(--c5)'">绩效工作台</a>
    <span style="color:var(--c3)">/</span>

  <div class="pg-hd">

        <span class="cycle-pill" data-cy="2026-05" onclick="switchCycle('2026-05',this)">5月</span>
        <span class="cycle-pill" data-cy="2026-04" onclick="switchCycle('2026-04',this)">4月</span>
        <span class="cycle-pill" data-cy="2026-03" onclick="switchCycle('2026-03',this)">3月</span>
        <span class="cycle-pill" data-cy="2026-02" onclick="switchCycle('2026-02',this)">2月</span>
        <span class="cycle-pill" data-cy="2026-01" onclick="switchCycle('2026-01',this)">1月</span>

      </div>
      <style>
        .cycle-pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:var(--r1);font:400 12px/1 var(--f);color:var(--c6);cursor:pointer;transition:all .12s;border:1px solid transparent}
        .cycle-pill:hover{color:var(--pr);background:var(--pr50)}
        .cycle-pill.active{color:var(--pr);background:var(--pr50);border-color:var(--pr);font-weight:500}
      </style>
    </div>
    <div class="pg-hd-info">
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">考核周期</span><span class="pg-hd-info-value" id="hdCycle">2026年6月</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">员工</span><span class="pg-hd-info-value">张明 (EMP20240315)</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">部门</span><span class="pg-hd-info-value">产品部</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">职位</span><span class="pg-hd-info-value">高级产品经理</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">目标周期</span><span class="pg-hd-info-value">2026年6月</span></div>
      <div class="pg-hd-info-item"><span class="pg-hd-info-label">状态</span><span class="pg-hd-info-value" id="hdStatus" style="color:var(--pr)">直线上级审批中</span></div>
    </div>
    <div class="pg-hd-summary" id="summary"></div>
  </div>

  <div id="moduleContainer"></div>

  <div id="approvalLog"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const I={
  chevron:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
  drag:'<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="5" r="1.5"/><circle cx="15" cy="5" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="19" r="1.5"/><circle cx="15" cy="19" r="1.5"/></svg>',
  target:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
  users:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
};

const MODULES=[
  {name:'KPI',weight:30,icon:'target',color:'var(--pr)',accent:'',goals:[
    {id:'g1',name:'资源利用率（通用）',indicator:'资源利用率',type:'quant',weight:5,desc:'1.指标定义：人员的实际工作量饱和情况，数据来源：Devops\n2.计算逻辑：公式=当月实际任务工时（人天）/EHR实际出勤天数*100%',measure:'梯度评分',target:105,challenge:110,baseline:100,unit:'%',rule:'标准梯度计算',ruleFormula:'IF(实际>=挑战,120,IF(实际>=目标,100,IF(实际>=保底,80,0)))',msLevels:[{level:'优秀',color:'var(--em)',score:'120分',condition:'利用率 >= 110%'},{level:'良好',color:'var(--pr)',score:'100分',condition:'利用率 >= 105%'},{level:'合格',color:'var(--ac)',score:'80分',condition:'利用率 >= 100%'},{level:'不合格',color:'var(--ro)',score:'0分',condition:'利用率 < 100%'}]},
    {id:'g2',name:'HRASUAT用户验收首次通过率(产品)',indicator:'UAT首次通过率',type:'quant',weight:10,desc:'1.指标定义：需求首次业务验收通过的概率\n2.计算逻辑：公式=当月需求首次业务验收通过的迭代数量/当月业务验收的迭代总数*100%',measure:'梯度评分',target:98,challenge:100,baseline:95,unit:'%',rule:'标准梯度计算',ruleFormula:'IF(实际>=挑战,120,IF(实际>=目标,100,IF(实际>=保底,80,0)))',msLevels:[{level:'优秀',color:'var(--em)',score:'120分',condition:'通过率 >= 100%'},{level:'良好',color:'var(--pr)',score:'100分',condition:'通过率 >= 98%'},{level:'合格',color:'var(--ac)',score:'80分',condition:'通过率 >= 95%'},{level:'不合格',color:'var(--ro)',score:'0分',condition:'通过率 < 95%'}]},
    {id:'g3',name:'HRAS需求评审及时率(产品)',indicator:'需求评审及时率',type:'quant',weight:15,desc:'1.迭代版本评审的及时性情况\n2.计算逻辑：公式=统计周期内按时需求评审迭代数/计划评审迭代*100%\n备注：按需求个数的维度。',measure:'梯度评分',target:98,challenge:100,baseline:95,unit:'%',rule:'标准梯度计算',ruleFormula:'IF(实际>=挑战,120,IF(实际>=目标,100,IF(实际>=保底,80,0)))',msLevels:[{level:'优秀',color:'var(--em)',score:'120分',condition:'及时率 >= 100%'},{level:'良好',color:'var(--pr)',score:'100分',condition:'及时率 >= 98%'},{level:'合格',color:'var(--ac)',score:'80分',condition:'及时率 >= 95%'},{level:'不合格',color:'var(--ro)',score:'0分',condition:'及时率 < 95%'}]},
  ]},
  {name:'KPA',weight:70,icon:'users',color:'var(--em)',accent:'em',goals:[
    {id:'g4',name:'HRAS产品管理规范',indicator:'产品管理规范',type:'qual',weight:10,desc:'1、需求管理流程尊从规范（受理-澄清-方案-业务内审-技术评审-研发交付-产品验收-用户验收）\n2、产品需求规范（需求池需求管理、文档规范）\n3、迭代火车管理规范\n4、周会/月会前事项准时完成更新',measure:'定性评分',target:1,challenge:1,baseline:1,rule:'-',ruleFormula:'',msLevels:[{level:'符合预期',color:'var(--em)',score:'100分',condition:'4项全部符合规范'},{level:'低于预期',color:'var(--ro)',score:'0分',condition:'4项任何1项不符合规范'}]},
    {id:'g5',name:'【产品设计】日常滚动需求响应',indicator:'日常需求响应',type:'qual',weight:10,desc:'根据业务日会需求优先级，滚动响应日常需求，输出产品解决方案，计划事项如下：\n05/18 已完成GOFO6月双周上半月迭代需求评审：费控系统对接需求、签字报表支持按薪酬制度区分\n06/12 完成GOFO6月双周上半月迭代需求验收',measure:'定性评分',target:1,challenge:1,baseline:1,rule:'-',ruleFormula:'',msLevels:[{level:'符合预期',color:'var(--em)',score:'100分',condition:'按时完成需求响应和验收'},{level:'低于预期',color:'var(--ro)',score:'0分',condition:'未按时完成'}]},
    {id:'g6',name:'【产品设计】HR ONE 绩效重构事项推进',indicator:'绩效重构推进',type:'qual',weight:25,desc:'计划事项：\n06-10 输出AI+绩效核心用户页面原型，给新哥、蔡老师汇报整体内容，并确认后续版本页面落地方式\n06-19 完成绩效版本4（考核活动管理）需求内审\n06-24 完成绩效版本4（考核活动管理）需求评审',measure:'定性评分',target:1,challenge:1,baseline:1,rule:'-',ruleFormula:'',msLevels:[{level:'符合预期',color:'var(--em)',score:'100分',condition:'按时完成各里程碑'},{level:'低于预期',color:'var(--ro)',score:'0分',condition:'未按时完成'}]},
    {id:'g7',name:'【应用探索】AI应用项目探索与落地推广',indicator:'AI应用落地',type:'qual',weight:25,desc:'06-05 输出ASSC采购侧AI项目管理应用1.0版本（登录、项目管理、节点管理），进行测试试用阶段\n06-12 对接LBU AI 应用场景需求，启动第一个试点应用落地\n06-26 完成ASSC采购侧AI项目管理应用1.1版本（私聊/群聊场景的对话式更新项目、节点进度）',measure:'定性评分',target:1,challenge:1,baseline:1,rule:'-',ruleFormula:'',msLevels:[{level:'符合预期',color:'var(--em)',score:'100分',condition:'按时完成各版本交付'},{level:'低于预期',color:'var(--ro)',score:'0分',condition:'未按时完成'}]},
  ]},
];

const STATUS_CFG={active:{label:'直线上级审批中',cls:'submitted'},completed:{label:'已完成',cls:'approved'},rejected:{label:'已驳回',cls:'rejected'}};
const CURRENT_STATUS={status:'active',statusLabel:'直线上级审批中'};

const APPROVAL_FLOW=[
  {node:'目标填写',handler:'张明',inTime:'2026-06-15 09:00',outTime:'2026-06-15 09:00',status:'completed',remark:'—'},
  {node:'直线上级审批',handler:'李经理（技术部）',inTime:'2026-06-15 09:00',outTime:'—',status:'active',remark:'当前节点'},
  {node:'间接上级审批',handler:'王总监（产品部）',inTime:'—',outTime:'—',status:'pending',remark:'—'},
  {node:'HR确认',handler:'赵敏',inTime:'—',outTime:'—',status:'pending',remark:'—'},
];

let expandedMods=new Set([0,1]);
let expandedGoals=new Set();

function render(){
  const st=STATUS_CFG[CURRENT_STATUS.status];
  document.getElementById('formStatus').innerHTML=`<span class="dot"></span>${st.label}`;
  document.getElementById('formStatus').className='form-status '+st.cls;
  document.getElementById('hdStatus').textContent=CURRENT_STATUS.statusLabel;

  let count=0,weight=0;
  MODULES.forEach(m=>m.goals.forEach(g=>{count++;weight+=g.weight}));
  document.getElementById('summary').innerHTML=`
    <span class="sum-item">总权重: <span class="sum-val ${weight===100?'':'warn'}" id="sumWeight">${weight}%</span></span>
    <span class="sum-item">总目标数: <strong style="font-family:var(--m);font-weight:600;color:var(--c8)" id="sumGoals">${count}</strong></span>
    ${weight!==100?`<span class="sum-err"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>总权重需等于 100%</span>`:`<span class="sum-ok"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>权重校验通过</span>`}`;

  // Approval flow
  const statusBadge={
    active:'<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--pr50);color:var(--pr)"><span style="width:6px;height:6px;border-radius:50%;background:var(--pr);animation:pulse 2s ease-in-out infinite"></span>处理中</span>',
    completed:'<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--em50);color:var(--em700)"><span style="width:6px;height:6px;border-radius:50%;background:var(--em)"></span>已完成</span>',
    pending:'<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--c1);color:var(--c5)">待处理</span>',
    rejected:'<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f);background:var(--ro50);color:var(--ro)"><span style="width:6px;height:6px;border-radius:50%;background:var(--ro)"></span>已驳回</span>'
  };

  let approvalHtml=`<div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:24px;overflow:hidden">
    <div style="padding:16px 20px;border-bottom:1px solid var(--dv);display:flex;align-items:center;justify-content:space-between">
      <span style="font:600 15px/1 var(--f);color:var(--c9)">审批流程</span>
    </div>
    <div style="padding:0">
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="background:var(--c0)">
            <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">节点</th>
            <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">处理人</th>
            <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">流入时间</th>
            <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">流出时间</th>
            <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">状态</th>
            <th style="padding:10px 16px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px">原因/备注</th>
          </tr>
        </thead>
        <tbody>`;

  APPROVAL_FLOW.forEach((f,i)=>{
    const isLast=i===APPROVAL_FLOW.length-1;
    const rowBg=f.status==='active'?'background:var(--pr50)':'';
    approvalHtml+=`<tr style="${rowBg}">
      <td style="padding:12px 16px;font:500 13px/1.4 var(--f);color:${f.status==='pending'?'var(--c6)':'var(--c8)'};border-bottom:${isLast?'none':'1px solid var(--dv)'}">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:50%;background:${f.status==='active'?'var(--pr)':f.status==='pending'?'var(--c3)':f.status==='rejected'?'var(--ro)':'var(--em)'};flex-shrink:0"></span>
          ${f.node}
        </div>
      </td>
      <td style="padding:12px 16px;border-bottom:${isLast?'none':'1px solid var(--dv)'}">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="width:22px;height:22px;border-radius:50%;background:${f.status==='pending'?'var(--c1)':'var(--pr)'};display:flex;align-items:center;justify-content:center;font:600 10px/1 var(--f);color:${f.status==='pending'?'var(--c5)':'#FFF'};flex-shrink:0">${f.handler.charAt(0)}</span>
          <span style="font:400 13px/1 var(--f);color:${f.status==='pending'?'var(--c6)':'var(--c8)'}">${f.handler}</span>
        </div>
      </td>
      <td style="padding:12px 16px;font:400 13px/1 var(--f);color:${f.inTime==='—'?'var(--c4)':'var(--c7)'};border-bottom:${isLast?'none':'1px solid var(--dv)'}">${f.inTime}</td>
      <td style="padding:12px 16px;font:400 13px/1 var(--f);color:${f.outTime==='—'?'var(--c4)':'var(--c7)'};border-bottom:${isLast?'none':'1px solid var(--dv)'}">${f.outTime}</td>
      <td style="padding:12px 16px;border-bottom:${isLast?'none':'1px solid var(--dv)'}">${statusBadge[f.status]||''}</td>
      <td style="padding:12px 16px;font:400 13px/1 var(--f);color:${f.remark==='—'?'var(--c4)':'var(--c5)'};border-bottom:${isLast?'none':'1px solid var(--dv)'}">${f.remark}</td>
    </tr>`;
  });
  approvalHtml+=`</tbody></table></div></div>`;
  document.getElementById('approvalLog').innerHTML=approvalHtml;

  // Module + goals
  let h='';
  MODULES.forEach((m,mi)=>{
    const open=expandedMods.has(mi);
    const tw=m.goals.reduce((s,g)=>s+g.weight,0);
    h+=`<div class="mod-section ${m.accent}">
      <div class="mod-hd" onclick="toggleMod(${mi})">
        <div class="mod-hd-icon" style="background:${m.color}">${I[m.icon]||I.target}</div>
        <div class="mod-hd-title">${m.name}</div>
        <div class="mod-hd-stats">
          <span>权重 <strong>${tw}%</strong></span>
          <span>${m.goals.length} 个目标</span>
        </div>
        <div class="mod-hd-sep"></div>
        <button class="mod-hd-add" onclick="event.stopPropagation()" title="从指标库选择（查看模式不可用）" disabled style="opacity:.5;cursor:not-allowed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          指标库选择
        </button>
        <button class="mod-hd-add" onclick="event.stopPropagation()" title="复制历史（查看模式不可用）" disabled style="opacity:.5;cursor:not-allowed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          复制历史
        </button>
        <div class="mod-hd-chevron ${open?'open':''}">${I.chevron}</div>
      </div>
      <div class="mod-body ${open?'open':''}">`;
    m.goals.forEach((g,gi)=>{
      const gOpen=expandedGoals.has(g.id);
      const isQ=g.type==='quant';
      h+=`<div class="goal-row">
        <div class="goal-summary" onclick="toggleGoal('${g.id}')">
          <div class="goal-drag" onclick="event.stopPropagation()" title="拖拽排序">${I.drag}</div>
          <div class="goal-icon" style="background:var(--pr50);color:var(--pr);font:700 12px/1 var(--m)">${gi+1}</div>
          <span class="goal-name">${g.name}</span>
          <span class="goal-weight">${g.weight}%</span>
          <span class="goal-type ${isQ?'quant':'qual'}">${isQ?'定量':'定性'}</span>
          <div class="goal-chevron ${gOpen?'open':''}">${I.chevron}</div>
        </div>
        <div class="goal-edit ${gOpen?'open':''}">
          <div class="ge-form">
            ${isQ?`
            <div class="ge-sec">
              <div class="ge-row f3" style="grid-template-columns:100px 100px 100px 1fr">
                <div class="ge-fi"><span class="ge-fi-l">挑战值</span><span class="ge-fi-val" style="font-family:var(--m)">${g.challenge} ${g.unit||''}</span></div>
                <div class="ge-fi"><span class="ge-fi-l">目标值 <span class="req">*</span></span><span class="ge-fi-val" style="font-family:var(--m)">${g.target} ${g.unit||''}</span></div>
                <div class="ge-fi"><span class="ge-fi-l">保底值</span><span class="ge-fi-val" style="font-family:var(--m)">${g.baseline} ${g.unit||''}</span></div>
                <div class="ge-fi"><span class="ge-fi-l">指标描述</span><span class="ge-fi-val">${g.desc||'—'}</span></div>
              </div>
            </div>
            `:`
            <div class="ge-sec">
              <div class="ge-fi"><span class="ge-fi-l">衡量标准-评价梯度2</span><span class="ge-fi-val">${(g.msLevels&&g.msLevels[0])?g.msLevels[0].condition:'—'}</span></div>
              <div class="ge-fi" style="margin-top:8px"><span class="ge-fi-l">衡量标准-评价梯度3 <span class="req">*</span></span><span class="ge-fi-val">${(g.msLevels&&g.msLevels[1])?g.msLevels[1].condition:'—'}</span></div>
              <div class="ge-fi" style="margin-top:8px"><span class="ge-fi-l">衡量标准-评价梯度4</span><span class="ge-fi-val">${(g.msLevels&&g.msLevels[2])?g.msLevels[2].condition:'—'}</span></div>
            </div>
            `}
          </div>
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  document.getElementById('moduleContainer').innerHTML=h;
}

function toggleMod(mi){expandedMods.has(mi)?expandedMods.delete(mi):expandedMods.add(mi);render()}
function toggleGoal(id){expandedGoals.has(id)?expandedGoals.delete(id):expandedGoals.add(id);render()}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

render();

/* ═══ 周期切换 ═══ */
var CYCLE_LABELS={
  '2026-06':'2026年6月','2026-05':'2026年5月','2026-04':'2026年4月',
  '2026-03':'2026年3月','2026-02':'2026年2月','2026-01':'2026年1月',
  '2026-Q2':'2026年Q2','2026-Q1':'2026年Q1','2026-H1':'2026年H1','2026':'2026年度'
};
function switchCycle(val,el){
  /* Update pills */
  var pills=document.querySelectorAll('.cycle-pill');
  for(var i=0;i<pills.length;i++)pills[i].classList.remove('active');
  if(el)el.classList.add('active');
  var label=CYCLE_LABELS[val]||val;
  var els=document.querySelectorAll('.pg-hd-info-value');
  if(els[0])els[0].textContent=label;
  if(els[3])els[3].textContent=label;
}
</script>
