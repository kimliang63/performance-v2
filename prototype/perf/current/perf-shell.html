<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHR 绩效管理 - 原型导航</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadow-dropdown:0 10px 40px -10px rgba(0,0,0,.12),0 2px 10px -2px rgba(0,0,0,.04);
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
  --sidebar-w:240px;
  --header-h:44px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

/* ═══ LAYOUT ═══ */
.shell{display:flex;height:100vh}

/* ═══ SIDEBAR ═══ */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--sf);border-right:1px solid var(--dv);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-hd{
  padding:14px 16px;border-bottom:1px solid var(--dv);
  display:flex;align-items:center;gap:10px;
}
.logo{display:flex;align-items:center;gap:8px}
.logo-i{width:26px;height:26px;border-radius:6px;background:var(--pr);display:flex;align-items:center;justify-content:center}
.logo-i svg{width:14px;height:14px;color:#FFF}
.logo-t{font-size:14px;font-weight:700;color:var(--c9);letter-spacing:-.3px}
.logo-sep{width:1px;height:18px;background:var(--c2)}
.logo-sub{font:500 12px/1 var(--f);color:var(--c5)}

.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-group{margin-bottom:4px}
.nav-group-t{
  padding:6px 16px;font:600 10px/1 var(--f);color:var(--c4);
  text-transform:uppercase;letter-spacing:.8px;
}
.nav-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 16px;cursor:pointer;
  transition:all .1s;text-decoration:none;color:inherit;
  border-left:3px solid transparent;
}
.nav-item:hover{background:var(--c0)}
.nav-item.on{
  background:var(--pr50);border-left-color:var(--pr);
  color:var(--pr);
}
.nav-item-ic{
  width:20px;height:20px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.nav-item-ic svg{width:12px;height:12px}
.nav-item.on .nav-item-ic svg{color:var(--pr)}
.nav-item-t{font:500 12px/1.3 var(--f);color:var(--c6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item.on .nav-item-t{color:var(--pr);font-weight:600}
.nav-item-v{
  margin-left:auto;font:500 9px/1 var(--f);
  padding:1px 5px;border-radius:3px;flex-shrink:0;
}
.nav-item-v.v2{color:var(--pr);background:var(--pr50)}
.nav-item-v.v3{color:var(--vi);background:var(--vi50)}

.sidebar-ft{
  padding:10px 16px;border-top:1px solid var(--dv);
  font:400 11px/1 var(--f);color:var(--c4);text-align:center;
}

/* ═══ MAIN ═══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.topbar{
  height:var(--header-h);background:var(--sf);
  border-bottom:1px solid var(--dv);
  display:flex;align-items:center;
  padding:0 16px;gap:12px;flex-shrink:0;
}
.topbar-title{font:600 13px/1 var(--f);color:var(--c9)}
.topbar-desc{font:400 12px/1 var(--f);color:var(--c4);margin-left:4px}
.topbar-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.topbar-link{
  font:500 11px/1 var(--f);color:var(--pr);text-decoration:none;
  padding:4px 10px;border-radius:var(--r1);border:1px solid var(--pr200);
  transition:all .12s;
}
.topbar-link:hover{background:var(--pr50)}

.frame-wrap{flex:1;overflow:hidden;position:relative}
.frame-wrap iframe{
  width:100%;height:100%;border:none;
  background:var(--bg);
}
.frame-loading{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);z-index:1;
  transition:opacity .2s;
}
.frame-loading.hide{opacity:0;pointer-events:none}
.frame-loading-dot{
  width:24px;height:24px;border:3px solid var(--c2);
  border-top-color:var(--pr);border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.frame-loading-text{font:400 12px/1 var(--f);color:var(--c4);margin-top:10px}
</style>
</head>
<body>

<div class="shell">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-hd">
      <div class="logo">
        <div class="logo-i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
        <span class="logo-t">GHR</span>
      </div>
      <div class="logo-sep"></div>
      <span class="logo-sub">绩效管理</span>
    </div>

    <nav class="sidebar-nav" id="sidebarNav"></nav>

    <div class="sidebar-ft">原型 v2+v3 · 2026-05-27</div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topTitle">选择页面</span>
      <span class="topbar-desc" id="topDesc">点击左侧导航查看原型</span>
      <div class="topbar-r">
        <a class="topbar-link" id="topLink" href="#" target="_blank">新窗口打开</a>
      </div>
    </div>
    <div class="frame-wrap">
      <div class="frame-loading" id="loading">
        <div class="frame-loading-dot"></div>
        <div class="frame-loading-text">加载中...</div>
      </div>
      <iframe id="frame" src="about:blank"></iframe>
    </div>
  </div>
</div>

<script>
const SECTIONS = [
  {
    label: 'V2 方案设计',
    items: [
      {f:'perf-scheme-list.html', n:'绩效方案列表', d:'方案 CRUD、启用/停用、复制'},
      {f:'perf-scheme-wizard.html', n:'方案新增/编辑向导', d:'3步向导：基本信息→考核组→环节设计'},
      {f:'perf-scheme-detail.html', n:'方案详情', d:'只读查看方案配置 + 关联活动'},
      {f:'perf-form-templates.html', n:'预置考核表单', d:'表单模板列表（4类表单）'},
    ]
  },
  {
    label: 'V3 考核表单',
    items: [
      {f:'perf-form-pbc.html', n:'PBC目标制定', d:'模块概览 + 目标填写 + 复制历史'},
      {f:'perf-form-evaluation.html', n:'绩效考核', d:'单人评分 + 批量对比 + 批量导入'},
      {f:'perf-form-ratification.html', n:'结果审定', d:'等级调整 + 强制分布 + 批量对比'},
      {f:'perf-form-confirmation.html', n:'员工确认', d:'绩效结果展示 + 确认/不确认'},
    ]
  },
  {
    label: 'AI 智能应用',
    items: [
      {f:'perf-ai-form-assistant.html', n:'AI 表单辅助', d:'智能目标填充 + 合规检查 + 聊天助手'},
      {f:'perf-ai-monitor.html', n:'AI 进程监控', d:'风险预测 + 智能提醒 + 流程追踪'},
      {f:'perf-ai-analytics.html', n:'AI 绩效分析', d:'分布分析 + 人岗匹配 + 归因分析'},
    ]
  }
];

const I = {
  file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
  settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  eye: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
  chart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  target: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
  user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
};

const ICON_MAP = {
  'perf-scheme-list.html': 'file',
  'perf-scheme-wizard.html': 'settings',
  'perf-scheme-detail.html': 'eye',
  'perf-form-templates.html': 'file',
  'perf-forced-distribution.html': 'chart',
  'perf-form-pbc.html': 'target',
  'perf-form-evaluation.html': 'check',
  'perf-form-ratification.html': 'chart',
  'perf-form-confirmation.html': 'user',
  'perf-ai-form-assistant.html': 'settings',
  'perf-ai-monitor.html': 'eye',
  'perf-ai-analytics.html': 'chart',
};

let activeFile = null;

// Build sidebar
const nav = document.getElementById('sidebarNav');
nav.innerHTML = SECTIONS.map(sec => `
  <div class="nav-group">
    <div class="nav-group-t">${sec.label}</div>
    ${sec.items.map(item => `
      <a class="nav-item" data-file="${item.f}" onclick="loadPage('${item.f}','${item.n}','${item.d}')" title="${item.d}">
        <div class="nav-item-ic">${I[ICON_MAP[item.f]] || I.file}</div>
        <span class="nav-item-t">${item.n}</span>
        <span class="nav-item-v ${item.f.includes('scheme')||item.f.includes('template')||item.f.includes('forced')?'v2':'v3'}">${item.f.includes('scheme')||item.f.includes('template')||item.f.includes('forced')?'V2':'V3'}</span>
      </a>
    `).join('')}
  </div>
`).join('');

function loadPage(file, title, desc) {
  if (activeFile === file) return;
  activeFile = file;

  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('on', el.dataset.file === file);
  });

  // Update topbar
  document.getElementById('topTitle').textContent = title;
  document.getElementById('topDesc').textContent = desc;
  document.getElementById('topLink').href = file;

  // Show loading, load iframe
  const loading = document.getElementById('loading');
  const frame = document.getElementById('frame');
  loading.classList.remove('hide');
  frame.onload = () => { loading.classList.add('hide'); };
  frame.src = file + '?t=' + Date.now();
}

// Load first page by default
const first = SECTIONS[0].items[0];
loadPage(first.f, first.n, first.d);
</script>
</body>
</html>
