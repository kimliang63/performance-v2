<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 目标填写</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadow-card-hover:0 8px 20px -4px rgba(0,0,0,.08),0 2px 6px -2px rgba(0,0,0,.04);
  --shadow-dropdown:0 10px 40px -10px rgba(0,0,0,.12),0 2px 10px -2px rgba(0,0,0,.04);
  --shadow-modal:0 20px 60px -12px rgba(0,0,0,.18),0 4px 16px -4px rgba(0,0,0,.08);
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

/* ═══ HEADER ═══ */
.hdr{height:52px;background:var(--sf);border-bottom:1px solid var(--dv);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:1100}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer}
.logo-i{width:28px;height:28px;border-radius:6px;background:var(--pr);display:flex;align-items:center;justify-content:center}
.logo-i svg{width:15px;height:15px;color:#FFF}
.logo-t{font-size:15px;font-weight:700;color:var(--c9);letter-spacing:-.3px}
.hdr-sep{width:1px;height:20px;background:var(--c2);margin:0 2px}
.breadcrumb{display:flex;align-items:center;gap:4px;font:500 13px/1 var(--f);color:var(--c5)}
.breadcrumb span{cursor:pointer;transition:color .12s}
.breadcrumb span:hover{color:var(--pr)}
.breadcrumb .sep{color:var(--c3);cursor:default}
.breadcrumb .cur{color:var(--c8);font-weight:600;cursor:default}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.flow-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--r1);background:var(--pr50);border:1px solid var(--pr200);font:500 12px/1 var(--f);color:var(--pr)}
.flow-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--pr);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.pg{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);width:100%;overflow:hidden}
.pg-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--dv)}
.pg-hd-l{display:flex;align-items:center;gap:14px}
.pg-hd-t{font:700 18px/1.2 var(--f);color:var(--c9);letter-spacing:-.2px}
.pg-hd-s{font:400 12px/1 var(--f);color:var(--c5);margin-top:3px}
.pg-a{display:flex;align-items:center;gap:8px}

/* ═══ SPLIT LAYOUT ═══ */
.split{display:flex;height:calc(100vh - 52px)}

/* ═══ LEFT PANEL ═══ */
.left{width:320px;background:var(--sf);border-right:1px solid var(--dv);display:flex;flex-direction:column;flex-shrink:0}
.left-hd{padding:16px;border-bottom:1px solid var(--dv)}
.left-hd-title{font:600 14px/1 var(--f);color:var(--c9);margin-bottom:10px}
.left-hd-stats{display:flex;gap:12px}
.left-hd-stat{font:400 12px/1 var(--f);color:var(--c5)}
.left-hd-stat strong{font-weight:600;color:var(--c8);font-family:var(--m)}

.left-bd{flex:1;overflow-y:auto;padding:8px}

/* Module group */
.mod-group{margin-bottom:4px}
.mod-group-hd{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r1);cursor:pointer;transition:all .12s;font:600 13px/1 var(--f);color:var(--c7)}
.mod-group-hd:hover{background:var(--c0)}
.mod-group-hd.open{color:var(--c9)}
.mod-group-hd .expand{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:var(--c4);transition:transform .2s;flex-shrink:0}
.mod-group-hd.open .expand{transform:rotate(90deg)}
.mod-group-hd .mod-icon{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mod-group-hd .mod-icon svg{width:11px;height:11px;color:#FFF}
.mod-group-hd .mod-badge{font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px;margin-left:auto}
.mod-group-hd .weight-badge{font:500 11px/1 var(--m);padding:2px 6px;border-radius:3px;background:var(--pr50);color:var(--pr);margin-left:auto}

.mod-group-items{max-height:0;overflow:hidden;transition:max-height .25s ease}
.mod-group-items.open{max-height:600px}

.goal-item{display:flex;align-items:center;gap:8px;padding:8px 12px 8px 42px;border-radius:var(--r1);cursor:pointer;transition:all .12s;font:400 13px/1.3 var(--f);color:var(--c6);position:relative}
.goal-item:hover{background:var(--pr50);color:var(--pr)}
.goal-item.active{background:var(--pr50);color:var(--pr);font-weight:500}
.goal-item.active::before{content:'';position:absolute;left:12px;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--pr);border-radius:0 2px 2px 0}
.goal-item .gw{font:500 11px/1 var(--m);color:var(--c4);margin-left:auto}
.goal-item.active .gw{color:var(--pr)}

.empty-mod{padding:12px 42px;font:400 12px/1.3 var(--f);color:var(--c4);font-style:italic}

/* Add goal btn */
.add-goal-btn{display:flex;align-items:center;gap:6px;padding:8px 12px 8px 42px;font:500 12px/1 var(--f);color:var(--pr);cursor:pointer;border-radius:var(--r1);transition:all .12s;border:none;background:transparent;width:100%;text-align:left;font-family:inherit}
.add-goal-btn:hover{background:var(--pr50)}
.add-goal-btn svg{width:12px;height:12px}

/* Left footer */
.left-ft{padding:12px 16px;border-top:1px solid var(--dv);display:flex;align-items:center;justify-content:space-between}
.weight-display{font:500 12px/1 var(--f);color:var(--c5)}
.weight-display strong{font-family:var(--m);font-weight:600;color:var(--em700)}
.weight-display strong.invalid{color:var(--ro)}

/* ═══ RIGHT PANEL ═══ */
.right{flex:1;overflow-y:auto;padding:24px}

/* Detail header */
.detail-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.detail-hd-l{display:flex;align-items:center;gap:12px}
.detail-mod-badge{font:500 11px/1 var(--f);padding:3px 8px;border-radius:3px}
.detail-hd-t{font:700 20px/1.2 var(--f);color:var(--c9);letter-spacing:-.3px}
.detail-hd-s{font:400 12px/1 var(--f);color:var(--c5);margin-top:4px}
.detail-actions{display:flex;gap:8px}

/* Sections */
.detail-sec{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden}
.detail-sec-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--dv);cursor:pointer;transition:background .12s}
.detail-sec-hd:hover{background:var(--c0)}
.detail-sec-title{font:600 14px/1 var(--f);color:var(--c8);display:flex;align-items:center;gap:8px}
.detail-sec-title svg{width:16px;height:16px;color:var(--pr)}
.detail-sec-bd{padding:16px 20px}

/* Form grid */
.fg{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.fg.f3{grid-template-columns:repeat(3,1fr)}
.fg .full{grid-column:1/-1}
.fi{display:flex;flex-direction:column;gap:4px}
.fi-l{font:400 12px/1 var(--f);color:var(--c5)}
.fi-l .req{color:var(--ro);margin-left:2px}
.fi-v{font:400 13px/1.4 var(--f);color:var(--c8)}

/* Inputs */
.inp{width:100%;padding:7px 10px;border:1px solid var(--c2);border-radius:var(--r1);font:400 13px/1 var(--f);color:var(--c9);background:var(--sf);transition:all .12s;outline:none}
.inp:focus{border-color:var(--pr);box-shadow:0 0 0 2px var(--pr50)}
.inp:read-only{background:var(--c0);color:var(--c6);cursor:default}
.inp:read-only:focus{border-color:var(--c2);box-shadow:none}
.inp.num{font-family:var(--m);text-align:right}

select.inp{-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23A1A1AA' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center;padding-right:24px;cursor:pointer}

textarea.inp{min-height:60px;resize:vertical;font-family:var(--f)}

/* Measurement standards table */
.ms-table{width:100%;border-collapse:collapse;margin-top:8px}
.ms-table th{background:var(--c0);padding:8px 12px;font:500 12px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv)}
.ms-table td{padding:10px 12px;font:400 13px/1.4 var(--f);color:var(--c7);border-bottom:1px solid var(--dv)}
.ms-table tr:last-child td{border-bottom:none}
.ms-table tr:hover td{background:var(--c0)}
.ms-table .level{display:inline-flex;align-items:center;gap:4px}
.ms-table .level-dot{width:8px;height:8px;border-radius:50%}

/* Calculation rule */
.rule-box{background:var(--c0);border:1px solid var(--c2);border-radius:var(--r2);padding:12px 16px;margin-top:8px}
.rule-box-code{font:400 13px/1.5 var(--m);color:var(--c8);white-space:pre-wrap;word-break:break-all}
.rule-box-label{font:500 11px/1 var(--f);color:var(--c4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}
.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}
.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}
.btn-d{background:transparent;color:var(--c5);border:1px solid transparent;padding:0 8px;height:28px}
.btn-d:hover{color:var(--ro);background:var(--ro50)}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-sm svg{width:12px;height:12px}

/* Total weight */
.total-weight{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--c0);border-radius:var(--r1);font:500 13px/1 var(--f);color:var(--c6)}
.total-weight .value{font-family:var(--m);font-weight:600;font-size:15px}
.total-weight .value.valid{color:var(--em700)}
.total-weight .value.invalid{color:var(--ro)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--sf);border-radius:var(--r4);box-shadow:var(--shadow-modal);width:560px;max-height:80vh;display:flex;flex-direction:column;transform:scale(.96);transition:transform .2s ease}
.modal-overlay.open .modal{transform:scale(1)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--dv)}
.modal-title{font:600 16px/1 var(--f);color:var(--c9)}
.modal-close{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c4);background:transparent;border:none;transition:all .12s}
.modal-close:hover{background:var(--c1);color:var(--c7)}
.modal-close svg{width:16px;height:16px}
.modal-body{flex:1;overflow-y:auto;padding:16px 24px}
.modal-footer{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:14px 24px;border-top:1px solid var(--dv)}

/* Picker list */
.picker-list{border:1px solid var(--c2);border-radius:var(--r2);max-height:400px;overflow-y:auto}
.picker-item{padding:12px 16px;border-bottom:1px solid var(--dv);cursor:pointer;transition:background .12s}
.picker-item:last-child{border-bottom:none}
.picker-item:hover{background:var(--pr50)}
.picker-item.selected{background:var(--pr50);border-left:3px solid var(--pr)}
.picker-item-name{font:500 13px/1.3 var(--f);color:var(--c8);margin-bottom:4px}
.picker-item-desc{font:400 12px/1.4 var(--f);color:var(--c5)}
.picker-item-preview{margin-top:8px;padding:8px 10px;background:var(--c0);border-radius:var(--r1);font:400 12px/1.4 var(--m);color:var(--c6);border:1px solid var(--c2)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}

/* ═══ AI Chat ═══ */
body.chat-open .pg{margin-right:380px;transition:margin .3s ease}
.ai-chat{position:fixed;top:52px;right:0;width:380px;height:calc(100vh - 52px);background:var(--sf);border-left:1px solid var(--dv);z-index:900;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease}
body.chat-open .ai-chat{transform:translateX(0)}
.ai-chat-hd{padding:16px 20px;border-bottom:1px solid var(--dv);display:flex;align-items:center;gap:10px}
.ai-chat-hd-ic{width:32px;height:32px;border-radius:var(--r2);background:linear-gradient(135deg,var(--pr) 0%,var(--vi) 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-chat-hd-ic svg{width:16px;height:16px;color:#FFF}
.ai-chat-hd-t{font:600 14px/1.2 var(--f);color:var(--c9)}
.ai-chat-hd-s{font:400 11px/1 var(--f);color:var(--c5)}
.ai-chat-close{margin-left:auto;width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:transparent;color:var(--c5);transition:all .12s}
.ai-chat-close:hover{background:var(--c1);color:var(--c7)}
.ai-chat-bd{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.ai-msg{max-width:92%;animation:aiMsgIn .3s ease}
@keyframes aiMsgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ai-msg.bot{align-self:flex-start}
.ai-msg.user{align-self:flex-end}
.ai-msg-bd{padding:12px 16px;border-radius:var(--r3);font:400 13px/1.6 var(--f)}
.ai-msg.bot .ai-msg-bd{background:var(--c0);color:var(--c8);border-bottom-left-radius:4px}
.ai-msg.user .ai-msg-bd{background:var(--pr);color:#FFF;border-bottom-right-radius:4px}
.ai-msg-time{font:400 10px/1 var(--f);color:var(--c4);margin-top:4px}
.ai-msg.user .ai-msg-time{text-align:right}
.ai-msg-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ai-msg-btn{font:500 11px/1 var(--f);padding:5px 10px;border-radius:var(--r1);border:1px solid var(--c2);background:var(--sf);color:var(--c6);cursor:pointer;transition:all .12s}
.ai-msg-btn:hover{border-color:var(--pr);color:var(--pr);background:var(--pr50)}
.ai-msg-btn.primary{border-color:var(--pr);color:var(--pr);background:var(--pr50)}
.ai-msg-card{background:var(--sf);border:1px solid var(--c2);border-radius:var(--r2);padding:12px;margin-top:8px}
.ai-msg-card-t{font:600 12px/1.3 var(--f);color:var(--c8);margin-bottom:4px}
.ai-msg-card-d{font:400 12px/1.5 var(--f);color:var(--c5)}
.ai-msg-card-tag{display:inline-block;font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px;margin-top:6px}
.ai-msg-card-tag.em{color:var(--em700);background:var(--em50)}
.ai-msg-card-tag.pr{color:var(--pr);background:var(--pr50)}
.ai-msg-card-tag.ac{color:var(--ac);background:var(--ac50)}
.ai-msg-card-tag.ro{color:var(--ro);background:var(--ro50)}
.ai-chat-ft{padding:12px 16px;border-top:1px solid var(--dv);display:flex;gap:8px;align-items:center}
.ai-chat-input{flex:1;height:36px;border:1px solid var(--c2);border-radius:var(--r2);padding:0 12px;font:400 13px/1 var(--f);color:var(--c8);outline:none;transition:border .15s}
.ai-chat-input:focus{border-color:var(--pr)}
.ai-chat-send{width:36px;height:36px;border-radius:var(--r2);background:var(--pr);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#FFF;transition:all .12s}
.ai-chat-send:hover{background:var(--pr700)}
.ai-toggle{position:fixed;bottom:80px;right:24px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--pr) 0%,var(--vi) 100%);border:none;box-shadow:0 4px 16px rgba(37,99,235,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:950;transition:all .2s}
.ai-toggle:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(37,99,235,.4)}
.ai-toggle svg{width:22px;height:22px;color:#FFF}
body.chat-open .ai-toggle{display:none}
/* AI Suggest Banner */
.ai-suggest{background:linear-gradient(135deg,var(--pr50) 0%,var(--vi50) 100%);border:1px solid var(--pr100);border-radius:var(--r3);padding:16px 20px;margin-bottom:16px;display:flex;align-items:flex-start;gap:14px}
.ai-suggest-ic{width:40px;height:40px;border-radius:var(--r2);background:linear-gradient(135deg,var(--pr) 0%,var(--vi) 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-suggest-ic svg{width:20px;height:20px;color:#FFF}
.ai-suggest-t{font:600 14px/1.3 var(--f);color:var(--c9);margin-bottom:4px}
.ai-suggest-d{font:400 13px/1.5 var(--f);color:var(--c6);margin-bottom:10px}
.ai-suggest-actions{display:flex;gap:8px}
/* AI Filled Tag */
.ai-tag{display:inline-flex;align-items:center;gap:3px;font:600 9px/1 var(--f);color:var(--vi);background:var(--vi50);border:1px solid rgba(139,92,246,.2);padding:2px 5px;border-radius:3px;vertical-align:middle;margin-left:4px;white-space:nowrap}
.ai-tag svg{width:9px;height:9px}
</style>
</head>
<body>

<!-- Navigation will be injected by navigation.js -->

<div class="pg" style="margin:16px">
  <div class="ai-suggest">
    <div class="ai-suggest-ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/><path d="M12 14v4"/><path d="M8 18h8"/><path d="M6 22h12"/></svg>
    </div>
    <div style="flex:1">
      <div class="ai-suggest-t">AI 已基于历史目标 + 指标库预填 6 条目标</div>
      <div class="ai-suggest-d">参考了你 Q1 目标、部门指标库和团队 OKR，自动匹配关联指标、填写目标值三值体系、配置计算规则和等级标准。</div>
      <div class="ai-suggest-actions">
        <button class="btn btn-p btn-sm" onclick="confirmAiGoals()">一键确认全部</button>
        <button class="btn btn-o btn-sm" onclick="toggleAiChat()">逐项审核</button>
        <button class="btn btn-s btn-sm">撤销 AI 填写</button>
      </div>
    </div>
  </div>
  <div class="pg-hd">
    <div class="pg-hd-l">
      <div>
        <div class="pg-hd-t">目标填写</div>
        <div class="pg-hd-s">考核周期：2026年度</div>
      </div>
    </div>
    <div class="pg-a">
      <div class="total-weight" style="margin-right:8px">
        总权重: <span class="value valid" id="headerWeight">100%</span>

    const isOpen = expandedMods.has(mi);
    const goalCount = mod.goals.length;
    html += `
    <div class="mod-group">
      <div class="mod-group-hd ${isOpen?'open':''}" onclick="toggleMod(${mi})">
        <span class="expand">${I.chevron}</span>
        <span class="mod-icon" style="background:${mod.colorVar}">${I[mod.icon]||I.target}</span>
        <span>${mod.name}</span>
        <span class="weight-badge">${mod.weight}%</span>
      </div>
      <div class="mod-group-items ${isOpen?'open':''}">`;
    if (goalCount === 0) {
      html += `<div class="empty-mod">暂无目标</div>`;
    } else {
      mod.goals.forEach(g => {
        html += `<div class="goal-item ${g.id===activeGoalId?'active':''}" onclick="selectGoal('${g.id}')">${g.name}<span class="gw">${g.weight}%</span></div>`;
      });
    }
    html += `
        <button class="add-goal-btn" onclick="event.stopPropagation();addGoal(${mi})">${I.plus} 添加目标</button>
      </div>
    </div>`;
  });
  panel.innerHTML = html;

  const totalGoals = MODULES.reduce((s,m) => s + m.goals.length, 0);
  const totalWeight = MODULES.reduce((s,m) => s + m.weight, 0);
  document.getElementById('goalCount').textContent = totalGoals;
  document.getElementById('totalWeightL').textContent = totalWeight;
  document.getElementById('weightSumL').textContent = totalWeight + '%';
  document.getElementById('weightSumL').className = totalWeight === 100 ? '' : 'invalid';
  const hw = document.getElementById('headerWeight');
  hw.textContent = totalWeight + '%';
  hw.className = 'value ' + (totalWeight === 100 ? 'valid' : 'invalid');
}

function toggleMod(mi) {
  expandedMods.has(mi) ? expandedMods.delete(mi) : expandedMods.add(mi);
  renderLeft();
}

function selectGoal(id) {
  activeGoalId = id;
  renderLeft();
  renderRight();
}

function addGoal(mi) {
  const id = 'g' + Date.now();
  MODULES[mi].goals.push({id,name:'新目标',indicator:'',weight:10,desc:'',measure:'梯度评分',target:0,challenge:0,baseline:0,rule:'-',ruleFormula:'',msLevels:[]});
  expandedMods.add(mi);
  activeGoalId = id;
  renderLeft();
  renderRight();
}

  return null;
}

    </div>
    <div class="detail-sec-bd">
      ${g.rule !== '-' ? `
      <div style="font:500 13px/1 var(--f);color:var(--c8);margin-bottom:8px">${g.rule}</div>
      <div class="rule-box">
        <div class="rule-box-label">计算公式</div>
        <div class="rule-box-code">${g.ruleFormula}</div>
      </div>
      ` : '<div style="color:var(--c4);font:400 13px/1.3 var(--f);padding:8px 0">暂未关联计算规则</div>'}
    </div>
  </div>`;
}

function updateGoal(field, val) {
  const data = getActiveGoal();
  if (!data) return;
  data.goal[field] = val;
  renderLeft();
}

function deleteGoal(id) {
  if (!confirm('确定删除该目标？')) return;
  for (const mod of MODULES) {
    const idx = mod.goals.findIndex(g => g.id === id);
    if (idx >= 0) {mod.goals.splice(idx, 1); break;}
  }
  activeGoalId = null;
  renderLeft();
  renderRight();
}

// ═══ MODALS ═══
function openModal(id) {document.getElementById(id).classList.add('open')}
function closeModal(id) {document.getElementById(id).classList.remove('open')}

function openMeasureModal() {
  modalCtx = 'measure';
  selectedMeasure = getActiveGoal()?.goal.measure || null;
  const list = document.getElementById('measureList');
  list.innerHTML = MEASURES.map(m => `
    <div class="picker-item ${selectedMeasure===m.name?'selected':''}" onclick="pickMeasure('${m.name}',this)">
      <div class="picker-item-name">${m.name}</div>
      <div class="picker-item-desc">${m.desc}</div>
      <div class="picker-item-preview">${m.preview}</div>
    </div>`).join('');
  openModal('measureModal');
}

function pickMeasure(name, el) {
  selectedMeasure = name;
  document.querySelectorAll('#measureList .picker-item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
}

function confirmMeasure() {
  if (selectedMeasure) updateGoal('measure', selectedMeasure);
  closeModal('measureModal');
}

function openRuleModal() {
  modalCtx = 'rule';
  selectedRule = getActiveGoal()?.goal.rule || null;
  const list = document.getElementById('ruleList');
  list.innerHTML = RULES.map(r => `
    <div class="picker-item ${selectedRule===r.name?'selected':''}" onclick="pickRule('${r.name}',this)">
      <div class="picker-item-name">${r.name}</div>
      <div class="picker-item-desc">${r.desc}</div>
      <div class="picker-item-preview">${r.formula}</div>
    </div>`).join('');
  openModal('ruleModal');
}

function pickRule(name, el) {
  selectedRule = name;
  document.querySelectorAll('#ruleList .picker-item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
}

function confirmRule() {
  if (selectedRule) {
    const rule = RULES.find(r => r.name === selectedRule);
    updateGoal('rule', selectedRule);
    if (rule) updateGoal('ruleFormula', rule.formula);
  }
  closeModal('ruleModal');
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => {if (e.target === o) o.classList.remove('open')});
});

// ═══ INIT ═══
renderLeft();
renderRight();

// Initialize navigation
GHR_NAV.init('perf', '绩效表单');

function renderAiChat(){
  const bd=document.getElementById('chatBd');
  if(!bd)return;
  bd.innerHTML=AI_MSGS.map(m=>`
    <div class="ai-msg ${m.role}">
      <div class="ai-msg-bd">${m.text.replace(/\n/g,'<br/>')}</div>
      ${m.cards?m.cards.map(c=>`<div class="ai-msg-card"><div class="ai-msg-card-t">${c.t}</div><div class="ai-msg-card-d">${c.d}</div><span class="ai-msg-card-tag ${c.tc}">${c.tag}</span></div>`).join(''):''}

function sendAiMsg(){
