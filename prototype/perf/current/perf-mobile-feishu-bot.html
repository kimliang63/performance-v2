<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HR ONE - AI绩效助手(对话式)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Design tokens */
:root{
  --pr:#2563EB;--pr700:#1D4ED8;--pr50:#F0F5FF;--pr100:#E0EAFF;
  --em:#10B981;--em50:#ECFDF5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac700:#B45309;
  --ro:#F43F5E;--ro100:#FFE4E6;--ro50:#FFF1F2;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
}

/* Reset */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--f);background:var(--bg);color:var(--c8);-webkit-font-smoothing:antialiased}

/* Shell */
.shell{display:flex;flex-direction:column;max-width:520px;height:100vh;height:100dvh;margin:0 auto;background:var(--sf);box-shadow:0 0 40px rgba(0,0,0,.08)}

/* Header */
.hdr{padding:14px 18px;border-bottom:1px solid var(--c2);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--sf)}
.hdr-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--vi));display:flex;align-items:center;justify-content:center;font-size:18px;color:#FFF;flex-shrink:0}
.hdr-info{flex:1;min-width:0}
.hdr-name{font:600 14px/1.2 var(--f);color:var(--c9)}
.hdr-desc{font:400 11px/1 var(--f);color:var(--c5);margin-top:2px}
.hdr-status{display:flex;align-items:center;gap:5px;font:500 11px/1 var(--f);color:var(--em700);flex-shrink:0}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--em)}

/* Chat area */
.chat{flex:1;overflow-y:auto;padding:16px 18px;scroll-behavior:smooth;background:var(--c0)}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:var(--c3);border-radius:4px}
.chat>*+*{margin-top:4px}

/* Messages */
.msg{display:flex;gap:8px;max-width:440px;animation:fadeIn .3s ease}
.msg.user{flex-direction:row-reverse;margin-left:auto}
.msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font:600 12px/1 var(--f);color:#FFF}
.msg-av.bot{background:linear-gradient(135deg,var(--pr),var(--vi))}
.msg-av.user{background:var(--c6)}
.msg-bd{display:flex;flex-direction:column;gap:2px}
.msg-name{font:500 11px/1 var(--f);color:var(--c5)}
.msg.user .msg-name{text-align:right}
.msg-text{padding:10px 14px;border-radius:var(--r2);font:400 13px/1.6 var(--f);color:var(--c8);background:var(--sf);border:1px solid var(--c2);white-space:pre-line}
.msg.user .msg-text{background:var(--pr);color:#FFF;border-color:var(--pr)}
.msg-text strong{font-weight:600;color:var(--c9)}
.msg.user .msg-text strong{color:#FFF}
.msg-time{font:400 10px/1 var(--f);color:var(--c4);margin-top:2px}
.msg.user .msg-time{text-align:right}

/* Typing indicator */
.typing{display:flex;gap:8px;max-width:440px;margin:4px 0;animation:fadeIn .3s ease}
.typing .msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font:600 12px/1 var(--f);color:#FFF;background:linear-gradient(135deg,var(--pr),var(--vi))}
.typing-dots{display:flex;align-items:center;gap:4px;padding:10px 14px;background:var(--sf);border:1px solid var(--c2);border-radius:var(--r2)}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--c4);animation:bounce .6s infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Cards */
.fc{background:var(--sf);border:1px solid var(--c2);border-radius:8px;overflow:hidden;margin:4px 0;max-width:420px;width:100%;animation:fadeIn .3s ease}
.fc-tall{display:flex;flex-direction:column}
.fc-tall{max-height:70vh}
.fc-tall .fc-hd{flex-shrink:0}
.fc-tall .fc-bd{flex:1;overflow-y:auto;min-height:0}
.fc-tall .fc-bd::-webkit-scrollbar{width:3px}
.fc-tall .fc-bd::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}
.fc-tall .fc-ft{flex-shrink:0}
.fc-hd{padding:12px 14px;border-left:4px solid var(--pr);display:flex;align-items:center;gap:8px;flex-shrink:0}
.fc-hd.em{border-left-color:var(--em)}
.fc-hd.vi{border-left-color:var(--vi)}
.fc-hd.ac{border-left-color:var(--ac)}
.fc-hd-icon{font-size:16px;flex-shrink:0}
.fc-hd-t{font:600 13px/1.2 var(--f);color:var(--c8)}
.fc-hd-s{font:400 11px/1 var(--f);color:var(--c5);margin-top:2px}
.fc-bd{padding:0 14px 12px}
.fc-section{margin-top:8px}
.fc-section-title{font:600 11px/1 var(--f);color:var(--c6);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--dv)}
.fc-row{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid var(--dv);gap:8px;font-size:12px}
.fc-row:last-child{border-bottom:none}
.fc-row-name{flex:1;font:400 12px/1.3 var(--f);color:var(--c8)}
.fc-row-val{font:500 12px/1 var(--fm);color:var(--c7)}
.fc-tag{display:inline-block;font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px;white-space:nowrap}
.fc-tag.ai{color:var(--vi);background:var(--vi50)}
.fc-tag.em{color:var(--em700);background:var(--em50)}
.fc-tag.ac{color:var(--ac700);background:var(--ac50)}
.fc-tag.ro{color:var(--ro);background:var(--ro50)}
.fc-ft{padding:10px 14px;border-top:1px solid var(--dv);display:flex;gap:6px;flex-wrap:wrap}
.fc-btn{font:500 12px/1 var(--f);padding:6px 14px;border-radius:var(--r1);border:1px solid var(--c2);background:var(--sf);color:var(--c7);cursor:pointer;transition:all .15s}
.fc-btn:hover{border-color:var(--pr);color:var(--pr);background:var(--pr50)}
.fc-btn.primary{background:var(--pr);color:#FFF;border-color:var(--pr)}
.fc-btn.primary:hover{background:var(--pr700)}
.fc-btn.danger{color:var(--ro);border-color:var(--ro100)}
.fc-btn.danger:hover{background:var(--ro50)}

/* Goal card */
.goal-group{margin-bottom:6px}
.goal-group-hd{font:600 11px/1 var(--f);color:var(--pr);padding:6px 0 4px;border-bottom:1px solid var(--pr100)}
.goal-item{padding:5px 0;font-size:12px}
.goal-item .gi-name{font:500 12px/1.3 var(--f);color:var(--c8)}
.goal-item .gi-meta{font:400 11px/1.4 var(--f);color:var(--c5)}
.goal-item .gi-vals{display:flex;gap:12px;font:400 11px/1 var(--fm);color:var(--c6);margin-top:2px}
.goal-empty{font:400 12px/1.4 var(--f);color:var(--c4);padding:6px 0}

/* Score card */
.score-section{margin-bottom:8px}
.score-hd{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--dv)}
.score-hd-left{font:600 12px/1 var(--f);color:var(--c8)}
.score-hd-right{font:600 14px/1 var(--fm);color:var(--pr)}
.score-row{display:flex;align-items:center;padding:4px 0;font-size:12px;gap:6px}
.score-row .sr-name{flex:1;font:400 12px/1.3 var(--f);color:var(--c7)}
.score-row .sr-wt{font:400 11px/1 var(--fm);color:var(--c4);width:32px;text-align:right}
.score-row .sr-tag{font:500 11px/1 var(--f);padding:2px 8px;border-radius:3px;color:var(--em700);background:var(--em50)}
.score-total{margin-top:8px;padding-top:8px;border-top:2px solid var(--c2);display:flex;justify-content:space-between;align-items:center}
.score-total-left{font:600 13px/1 var(--f);color:var(--c8)}
.score-total-right{display:flex;align-items:baseline;gap:8px}
.score-total-val{font:700 20px/1 var(--fm);color:var(--pr)}
.score-total-grade{font:600 12px/1 var(--f);color:var(--em700);background:var(--em50);padding:3px 8px;border-radius:4px}

/* Ratification card */
.ratify-section{margin-bottom:8px}
.ratify-grade-hd{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--dv);gap:8px}
.ratify-grade-hd .rg-name{font:600 12px/1 var(--f);color:var(--c8)}
.ratify-grade-hd .rg-info{font:400 11px/1 var(--f);color:var(--c5)}
.ratify-grade-hd .rg-warn{font:500 10px/1 var(--f);color:var(--ac700);background:var(--ac50);padding:2px 6px;border-radius:3px}
.ratify-row{display:flex;align-items:center;padding:4px 0;font-size:12px;gap:6px}
.ratify-row .rr-name{width:56px;font:500 12px/1.3 var(--f);color:var(--c8)}
.ratify-row .rr-dept{width:48px;font:400 11px/1 var(--f);color:var(--c5)}
.ratify-row .rr-score{width:36px;font:500 12px/1 var(--fm);color:var(--c7);text-align:center}
.ratify-row .rr-arrow{color:var(--c4)}
.ratify-row .rr-grade{font:600 12px/1 var(--f);color:var(--pr);background:var(--pr50);padding:2px 8px;border-radius:3px;width:28px;text-align:center}
.ratify-row .rr-tag{margin-left:auto}
.ratify-alert{margin-top:8px;padding:8px 10px;background:var(--ac50);border-radius:var(--r1);font:400 12px/1.5 var(--f);color:var(--ac700)}

/* Recommend card */
.rec-item{padding:8px 0;border-bottom:1px solid var(--dv)}
.rec-item:last-child{border-bottom:none}
.rec-item .ri-head{display:flex;align-items:center;gap:6px}
.rec-item .ri-icon{font-size:16px}
.rec-item .ri-name{font:600 13px/1.2 var(--f);color:var(--c8)}
.rec-item .ri-wt{font:500 11px/1 var(--fm);color:var(--pr);background:var(--pr50);padding:2px 6px;border-radius:3px}
.rec-item .ri-desc{font:400 12px/1.4 var(--f);color:var(--c5);margin-top:4px;padding-left:22px}
.rec-item .ri-kpi{font:400 11px/1.4 var(--fm);color:var(--c6);margin-top:2px;padding-left:22px}

/* Compliance card */
.comp-item{display:flex;align-items:center;gap:6px;padding:3px 0;font:400 12px/1 var(--f);color:var(--c6)}
.comp-ck{width:14px;height:14px;border-radius:50%;background:var(--em);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.comp-ck svg{width:8px;height:8px;color:#FFF}

/* Bottom area */
.bottom{flex-shrink:0;background:var(--sf);border-top:1px solid var(--c2)}

/* Tabs */
.tabs{display:flex;align-items:center;padding:8px 14px;gap:4px;border-bottom:1px solid var(--dv)}
.tab{font:500 12px/1 var(--f);padding:7px 14px;border-radius:var(--r1);border:none;background:transparent;color:var(--c6);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab:hover{background:var(--c1);color:var(--c8)}
.tab.active{background:var(--pr50);color:var(--pr)}
.tab-replay{margin-left:auto;font:500 12px/1 var(--f);padding:7px 12px;border-radius:var(--r1);border:1px solid var(--c2);background:var(--sf);color:var(--c6);cursor:pointer;transition:all .15s}
.tab-replay:hover{border-color:var(--pr);color:var(--pr)}

/* Input */
.input-bar{display:flex;align-items:center;gap:8px;padding:10px 14px}
.input-bar input{flex:1;padding:9px 14px;border:1px solid var(--c2);border-radius:var(--r2);font:400 13px/1 var(--f);color:var(--c8);background:var(--c0);outline:none}
.input-bar input::placeholder{color:var(--c4)}
.input-bar button{padding:9px 20px;border:none;border-radius:var(--r2);background:var(--pr);color:#FFF;font:500 13px/1 var(--f);cursor:pointer;transition:all .15s}
.input-bar button:hover{background:var(--pr700)}
.input-bar button:disabled{opacity:.4;cursor:not-allowed}
.input-actions{display:flex;gap:4px;flex-shrink:0}
.input-icon-btn{width:36px;height:36px;border-radius:var(--r2);border:1px solid var(--c2);background:var(--sf);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:var(--c6)}
.input-icon-btn:hover{border-color:var(--pr);color:var(--pr);background:var(--pr50)}
.input-icon-btn svg{width:18px;height:18px}

/* Document card */
.doc-preview{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--c0);border-radius:var(--r2);margin-top:6px;border:1px solid var(--c2)}
.doc-icon{width:36px;height:44px;background:linear-gradient(135deg,var(--pr),var(--pr700));border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-icon svg{width:18px;height:18px;color:#FFF}
.doc-info{flex:1;min-width:0}
.doc-name{font:500 12px/1.3 var(--f);color:var(--c8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font:400 11px/1 var(--f);color:var(--c5);margin-top:2px}
.doc-status{font:500 11px/1 var(--f);padding:2px 8px;border-radius:3px;flex-shrink:0}
.doc-status.parsed{color:var(--em700);background:var(--em50)}
.doc-status.loading{color:var(--ac700);background:var(--ac50)}

/* Parsed result card */
.parsed-section{margin-top:8px}
.parsed-section-hd{font:600 11px/1 var(--f);color:var(--c6);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--dv);display:flex;align-items:center;gap:6px}
.parsed-section-hd .count{font:400 11px/1 var(--f);color:var(--c5);font-weight:400;text-transform:none;letter-spacing:0}
.parsed-row{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid var(--dv);gap:8px;font-size:12px}
.parsed-row:last-child{border-bottom:none}
.parsed-row-name{flex:1;font:400 12px/1.3 var(--f);color:var(--c8)}
.parsed-row-val{font:500 12px/1 var(--fm);color:var(--c7)}
.parsed-row-tag{font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px}
.parsed-row-tag.new{color:var(--vi);background:var(--vi50)}
.parsed-row-tag.upd{color:var(--ac700);background:var(--ac50)}
</style>
</head>
<body>
<div class="shell">
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-av">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/><path d="M12 14v4"/><path d="M8 18h8"/><path d="M6 22h12"/></svg>
    </div>
    <div class="hdr-info">
      <div class="hdr-name">HR ONE 绩效助手</div>
      <div class="hdr-desc">智能绩效管理 · 目标填写 · 评分 · 审定</div>
    </div>
    <div class="hdr-status"><span class="hdr-dot"></span>在线</div>
  </div>

  <!-- Chat area -->
  <div class="chat" id="chat"></div>

  <!-- Bottom -->
  <div class="bottom">
    <div class="tabs">
      <button class="tab active" data-tab="goal">目标填写</button>
      <button class="tab" data-tab="eval">绩效评分</button>
      <button class="tab" data-tab="ratify">审定</button>
      <button class="tab-replay" id="replayBtn">重播</button>
    </div>
    <div class="input-bar">
      <div class="input-actions">
        <div class="input-icon-btn" onclick="triggerUpload()" title="上传文件">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </div>
      </div>
      <input type="text" id="userInput" placeholder="输入消息...（演示模式）" onkeydown="if(event.key==='Enter')sendUserMsg()">
      <button onclick="sendUserMsg()">发送</button>
    </div>
  </div>
</div>

<script>
/* Helpers */
const $=s=>document.querySelector(s),chat=$('#chat');
let timers=[],currentTab='goal',isPlaying=false;

function clearTimers(){timers.forEach(clearTimeout);timers=[];isPlaying=false}

function scrollToBottom(){
  requestAnimationFrame(()=>chat.scrollTop=chat.scrollHeight);
}

function addTyping(){
  const el=document.createElement('div');
  el.className='typing';
  el.innerHTML='<div class="msg-av"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/><path d="M12 14v4"/><path d="M8 18h8"/><path d="M6 22h12"/></svg></div><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  chat.appendChild(el);
  scrollToBottom();
  return el;
}
function removeTyping(el){if(el&&el.parentNode)el.parentNode.removeChild(el)}

function addMsg(role,text,time){
  const names={bot:'HR ONE 绩效助手',user:'张明'};
  const avSvg='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/><path d="M12 14v4"/><path d="M8 18h8"/><path d="M6 22h12"/></svg>';
  const avatars={bot:avSvg,user:'张'};
  const el=document.createElement('div');
  el.className='msg '+role;
  el.innerHTML=`<div class="msg-av ${role}">${avatars[role]}</div><div class="msg-bd"><div class="msg-name">${names[role]}</div><div class="msg-text">${text}</div><div class="msg-time">${time||''}</div></div>`;
  chat.appendChild(el);
  scrollToBottom();
}

function addCard(html){
  const wrap=document.createElement('div');
  wrap.innerHTML=html;
  const el=wrap.firstElementChild;
  chat.appendChild(el);
  scrollToBottom();
  return el;
}

/* Card builders */
function infoCard(){
  return `<div class="fc"><div class="fc-hd"><div class="fc-hd-icon">👤</div><div><div class="fc-hd-t">员工信息</div></div></div><div class="fc-bd"><div class="fc-row"><div class="fc-row-name">张明 · 高级产品经理 · 产品部</div></div><div class="fc-row"><div class="fc-row-name">考核周期</div><div class="fc-row-val">2026年Q2</div></div><div class="fc-row"><div class="fc-row-name">考核方案</div><div class="fc-row-val">PBC季度考核</div></div></div></div>`;

/* Tab -> initial sequence mapping */
const TAB_SEQ={goal:'goal',eval:'eval',ratify:'ratify'};

/* Button action -> next sequence mapping */
const BTN_MAP={
  '确认全部':'goal_confirm',
  '逐项审核':null,'调整权重':'goal_weight_adjust',
  '提交目标':'goal_submit',
  '返回修改':null,
  '确认调整':'goal_weight_done',
  '取消调整':null,
  '继续调整':'goal_add',
  '帮我推荐几个新的业绩目标':'goal_add',
  '添加到业绩目标':'goal_add_confirm',
  '跳过推荐':null,
  '自动平衡权重':null,
  '确认提交':'eval_submit',
  '逐项调整':null,'查看依据':'eval_detail','关闭':'eval',
  '人才培养那条改成90分':'eval_adjust',
  '责任心改成符合预期+':'eval_adjust2',
  '继续调整':null,

  '调整分布':null,'查看偏离':null,

  '查看审定报告':null,'导出结果':null,'返回首页':null,
  /* Upload actions */
  '应用到目标表单':'goal_upload_apply',
  '应用到评分表单':'eval_upload_apply',
  '应用到审定表单':'ratify_upload_apply',
  '仅参考不填入':null
};

/* Play a sequence */
function playSequence(seqKey,append){
  const seq=TABS[seqKey];
  if(!seq)return;
  isPlaying=true;

  seq.forEach(item=>{
    const tid=setTimeout(()=>{
      if(item.type==='typing'){
        const el=addTyping();
        const rmTid=setTimeout(()=>removeTyping(el),800);
        timers.push(rmTid);
      } else if(item.type==='msg'){
        document.querySelectorAll('.typing').forEach(e=>removeTyping(e));
        addMsg(item.role,item.text,item.time);
      } else if(item.type==='card'){
        document.querySelectorAll('.typing').forEach(e=>removeTyping(e));
        addCard(item.html());
      }
    },item.t);
    timers.push(tid);
  });

  const lastDelay=seq[seq.length-1].t+200;
  const doneTid=setTimeout(()=>{isPlaying=false},lastDelay);
  timers.push(doneTid);
}

/* Handle button clicks */
function handleBtn(el,text){
  const card=el.closest('.fc');
  if(card)card.querySelectorAll('.fc-btn').forEach(b=>{b.disabled=true;b.style.opacity='.5';b.style.cursor='default'});
  addMsg('user',text,'');
  const nextSeq=BTN_MAP[text];
  if(nextSeq){
    setTimeout(()=>playSequence(nextSeq),400);
  }
}

/* Tab switching */
function switchTab(tab){
  if(isPlaying)return;
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  chat.innerHTML='';
  playSequence(TAB_SEQ[tab]);
}

document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>switchTab(btn.dataset.tab));
});

$('#replayBtn').addEventListener('click',()=>{
  if(isPlaying)return;
  clearTimers();
  chat.innerHTML='';
  playSequence(TAB_SEQ[currentTab]);
});

/* User text input -> auto-match sequence */
const INPUT_MAP=[
  {keywords:['上传','文件','述职','报告','文档'],seq:'goal_upload'},
  {keywords:['权重','调整权重','管理目标','业绩目标'],seq:'goal_weight_adjust'},
  {keywords:['推荐','新目标','新增','添加目标'],seq:'goal_add'},
  {keywords:['确认全部','确认','提交目标','提交'],seq:'goal_confirm'},
  {keywords:['上传','文件','述职','报告','文档'],seq:'eval_upload'},
  {keywords:['改成','调整','评分','分数'],seq:'eval_adjust'},
  {keywords:['依据','评分明细','查看依据'],seq:'eval_detail'},
  {keywords:['等级','责任心'],seq:'eval_adjust2'},
  {keywords:['提交评分','确认提交'],seq:'eval_submit'},
  {keywords:['上传','文件','汇总','绩效表'],seq:'ratify_upload'},
  {keywords:['占比','太低','太高','分布'],seq:'ratify_adjust'},
  {keywords:['C级','调','自定义'],seq:'ratify_custom'},
  {keywords:['确认审定','提交审定','审定'],seq:'ratify_confirm'},
];

function matchInput(text){
  for(const m of INPUT_MAP){
    if(m.keywords.some(k=>text.includes(k))) return m.seq;
  }
  return null;
}

const UPLOAD_NAMES={goal:'Q1述职报告_张明.pdf',eval:'Q1述职报告_张明.pdf',ratify:'部门绩效汇总_产品部.xlsx'};

  if(isPlaying) return;

function sendUserMsg(){
  if(isPlaying) return;
  const inp=$('#userInput');
  const text=inp.value.trim();
  if(!text) return;
  inp.value='';
  clearTimers();

  const seq=matchInput(text);
  if(seq){
    playSequence(seq);
  } else {
    addMsg('user',text,'');
    setTimeout(()=>{
      addTyping();
      setTimeout(()=>{
        document.querySelectorAll('.typing').forEach(e=>removeTyping(e));
        addMsg('bot',`收到「${text}」。\n\n当前处于演示模式，你可以尝试：\n- "调整权重"\n- "推荐新目标"\n- "改成90分"\n- "查看依据"\n- "A级占比太低"\n- "自定义调整"`,'');
      },1200);
    },400);
  }
  inp.focus();
}

/* Init */
playSequence('goal');
