<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 绩效评分</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;
  --em:#10B981;--em50:#ECFDF5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#0F172A;--c8:#1E293B;--c7:#334155;--c6:#475569;--c5:#64748B;--c4:#94A3B8;--c3:#CBD5E1;--c2:#E2E8F0;--c1:#F1F5F9;--c0:#F8FAFC;
  --sf:#FFF;--bg:#F0F4F8;--dv:#E2E8F0;
  --r1:10px;--r2:12px;--r3:14px;--r4:18px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
  --sx:0 1px 2px rgba(0,0,0,.04);--sm:0 2px 8px rgba(0,0,0,.06);
  --bd:rgba(15,23,42,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:#E5E7EB;color:var(--c7);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}
.phone{width:393px;height:852px;background:var(--bg);border-radius:48px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.05),inset 0 0 0 1px rgba(255,255,255,.1);overflow:hidden;position:relative;display:flex;flex-direction:column}
.phone-notch{width:126px;height:34px;background:#000;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:100}
.phone-status{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 8px;font:600 14px/1 var(--f);color:var(--c9)}
.phone-status-r{display:flex;gap:4px;align-items:center}
.phone-nav{height:50px;display:flex;align-items:center;padding:0 16px;gap:10px}
.phone-nav-back{width:32px;height:32px;border-radius:8px;background:var(--c1);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--c7);flex-shrink:0}
.phone-nav-back svg{width:16px;height:16px}
.phone-nav-t{flex:1;font:600 17px/1 var(--f);color:var(--c9)}
.phone-body{flex:1;overflow-y:auto;padding:0 16px}
.phone-body::-webkit-scrollbar{width:0}

/* Person Card */
.person-card{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.person-av{width:44px;height:44px;border-radius:50%;background:var(--pr);display:flex;align-items:center;justify-content:center;font:600 16px/1 var(--f);color:#FFF;flex-shrink:0}
.person-info{flex:1}
.person-name{font:600 15px/1 var(--f);color:var(--c9)}
.person-dept{font:400 12px/1 var(--f);color:var(--c5);margin-top:3px}

/* Module */
.module{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);margin-bottom:10px;overflow:hidden}
.module-hd{padding:12px 14px;background:var(--c0);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.module-title{font:600 13px/1 var(--f);color:var(--c8)}
.module-weight{font:500 11px/1 var(--f);color:var(--pr);background:var(--pr50);padding:3px 8px;border-radius:10px}

/* Goal Item */
.goal-item{padding:12px 14px;border-bottom:1px solid var(--bd)}
.goal-item:last-child{border-bottom:none}
.goal-title{font:500 13px/1 var(--f);color:var(--c8)}
.goal-desc{font:400 11px/1.4 var(--f);color:var(--c5);margin-bottom:6px}
.score-row{display:flex;align-items:center;gap:10px}
.score-label{font:400 12px/1 var(--f);color:var(--c6);flex-shrink:0;width:40px}
.score-input{width:60px;height:32px;border:1px solid var(--c2);border-radius:8px;text-align:center;font:600 14px/1 var(--fm);color:var(--c9);outline:none;transition:border-color .15s}
.score-input:focus{border-color:var(--pr)}
.score-max{font:400 11px/1 var(--f);color:var(--c4)}
.grade-select{height:32px;border:1px solid var(--c2);border-radius:8px;padding:0 10px;font:500 12px/1 var(--f);color:var(--c7);background:var(--sf);outline:none;cursor:pointer}

/* Summary */
.summary{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:14px;margin-bottom:14px}
.summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.summary-row:last-child{margin-bottom:0}
.summary-label{font:400 12px/1 var(--f);color:var(--c6)}
.summary-value{font:700 18px/1 var(--fm);color:var(--c9)}
.summary-grade{font:600 14px/1 var(--f);color:var(--em);background:var(--em50);padding:4px 12px;border-radius:10px}

/* Actions */
.actions{display:flex;gap:8px;margin-bottom:20px}
.btn{flex:1;padding:12px;border-radius:var(--r2);font:600 14px/1 var(--f);text-align:center;cursor:pointer;border:none;transition:all .12s}
.btn:active{transform:scale(.97)}
.btn-save{background:var(--c1);color:var(--c6)}
.btn-submit{background:var(--pr);color:#FFF;box-shadow:0 2px 8px rgba(37,99,235,.25)}

.toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:var(--c9);color:#FFF;padding:10px 22px;border-radius:22px;font:500 13px/1 var(--f);z-index:900;opacity:0;pointer-events:none;transition:opacity .2s}

/* AI */
.ai-panel{position:fixed;bottom:0;left:0;right:0;height:70%;background:var(--sf);border-radius:16px 16px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);z-index:9999;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.ai-panel.open{transform:translateY(0)}
.ai-hd{padding:14px 16px;border-bottom:1px solid var(--dv);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ai-hd-ic{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--pr),var(--vi));display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.ai-hd-ic svg{width:16px;height:16px}
.ai-hd-info{flex:1}
.ai-hd-t{font:600 14px/1.2 var(--f);color:var(--c9)}
.ai-hd-s{font:400 11px/1 var(--f);color:var(--c5)}
.ai-hd-close{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--c5);cursor:pointer;flex-shrink:0}
.ai-bd{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:88%;animation:fadeIn .25s ease}
.ai-msg.bot{align-self:flex-start}
.ai-msg.user{align-self:flex-end}
.ai-msg-bd{padding:10px 14px;border-radius:var(--r3);font:400 13px/1.6 var(--f);word-break:break-word}
.ai-msg.bot .ai-msg-bd{background:var(--c0);color:var(--c8);border-bottom-left-radius:4px}
.ai-msg.user .ai-msg-bd{background:var(--pr);color:#fff;border-bottom-right-radius:4px}
.ai-msg-time{font:400 10px/1 var(--f);color:var(--c4);margin-top:4px}
.ai-msg-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ai-msg-btn{font:500 11px/1 var(--f);padding:5px 10px;border-radius:var(--r1);border:1px solid var(--c2);background:var(--sf);color:var(--c6);cursor:pointer}
.ai-msg-btn:active{border-color:var(--pr);color:var(--pr);background:var(--pr50)}
.ai-msg-card{background:var(--sf);border:1px solid var(--c2);border-radius:var(--r2);padding:12px;margin-top:8px}
.ai-msg-card-t{font:600 12px/1.3 var(--f);color:var(--c8);margin-bottom:6px}
.ai-msg-card-d{font:400 12px/1.5 var(--f);color:var(--c5)}
.ai-msg-card-tag{display:inline-block;font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px;margin-top:4px}
.ai-shortcuts{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.ai-shortcut{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--sf);border:1px solid var(--c2);border-radius:var(--r2);cursor:pointer}
.ai-shortcut:active{border-color:var(--pr200);background:var(--pr50)}
.ai-shortcut-icon{font-size:18px;flex-shrink:0}
.ai-shortcut-label{font:500 13px/1.2 var(--f);color:var(--c8)}
.ai-ft{padding:12px 16px;border-top:1px solid var(--dv);display:flex;gap:8px;align-items:center;flex-shrink:0}
.ai-input{flex:1;height:36px;border:1px solid var(--c2);border-radius:var(--r2);padding:0 12px;font:400 13px/1 var(--f);color:var(--c8);outline:none;transition:border .15s}
.ai-input:focus{border-color:var(--pr)}
.ai-send{width:36px;height:36px;border-radius:var(--r2);background:var(--pr);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#FFF;transition:all .12s}
.ai-send:active{background:var(--pr700)}
.ai-fab{position:fixed;bottom:100px;right:calc(50% - 180px);width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--vi));border:none;box-shadow:0 4px 16px rgba(37,99,235,.35);display:flex;align-items:center;justify-content:center;z-index:960;transition:transform .2s}
.ai-fab:active{transform:scale(.92)}
.ai-fab svg{width:22px;height:22px;color:#FFF}
.ai-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9998;opacity:0;pointer-events:none;transition:opacity .25s}
.ai-overlay.open{opacity:1;pointer-events:all}
</style>
</head>
<body>

<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-status">
    <span>9:41</span>
    <div class="phone-status-r">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--c9)"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="1.5" width="3" height="10.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="none" stroke="var(--c9)" stroke-width="1.2"><rect x="0.5" y="0.5" width="12" height="11" rx="2"/><line x1="13" y1="4" x2="13" y2="8"/><rect x="2" y="2.5" width="7" height="7" rx="1" fill="var(--c9)"/></svg>
    </div>
  </div>
  <div class="phone-nav">
    <a href="../demo-index.html" class="phone-nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="phone-nav-t">绩效评分</span>
  </div>
  <div class="phone-body" id="phoneBody"></div>
  <div class="toast" id="toast"></div>
</div>

<script>
const PERSON = {name:'张明',dept:'产品部',role:'高级产品经理'};

const MODULES = [
  {
    title:'关键指标',weight:30,
    goals:[
      {id:1,title:'资源利用率（通用）',desc:'人员实际工作量饱和情况',type:'quant',weight:5,completed:'108%',score:4.0,grade:'符合预期+'},
      {id:2,title:'HRAS UAT用户验收首次通过率',desc:'需求首次业务验收通过的概率',type:'quant',weight:10,completed:'97%',score:3.5,grade:'符合预期'},
      {id:3,title:'HRAS需求评审及时率',desc:'迭代版本评审的及时性情况',type:'quant',weight:15,completed:'96%',score:3.5,grade:'符合预期'}
    ]
  },
  {
    title:'关键行动',weight:70,
    goals:[
      {id:4,title:'HRAS产品管理规范',desc:'需求管理流程规范、产品需求规范、迭代火车管理规范、周会/月会准时完成',type:'qual',weight:10,completed:'4项规范全部符合',score:null,grade:'符合预期+'},
      {id:5,title:'日常滚动需求响应',desc:'根据业务日会需求优先级，滚动响应日常需求，输出产品解决方案',type:'qual',weight:10,completed:'按时完成GOFO迭代',score:null,grade:'符合预期+'},
      {id:6,title:'HR ONE 绩效重构事项推进',desc:'3个里程碑按时交付',type:'qual',weight:25,completed:'3个里程碑按时交付',score:null,grade:'符合预期+'},
      {id:7,title:'AI应用项目探索与落地推广',desc:'3个版本按时发布',type:'qual',weight:25,completed:'3个版本按时发布',score:null,grade:'符合预期+'}
    ]
  }
];

const GRADES = ['超出预期','符合预期+','符合预期','符合预期-','低于预期'];
const GRADE_COLORS = {'超出预期':'var(--em700)','符合预期+':'var(--pr)','符合预期':'var(--c7)','符合预期-':'var(--ac)','低于预期':'var(--ro)'};
const GRADE_BG = {'超出预期':'var(--em50)','符合预期+':'var(--pr50)','符合预期':'var(--c1)','符合预期-':'var(--ac50)','低于预期':'var(--ro50)'};

const EMPLOYEE_COMMENT = '本季度完成了产品迭代核心功能上线，整体进度符合预期。在跨部门协作和业务理解方面还有提升空间。';
const INDIRECT_COMMENT = '整体表现良好，产品交付质量稳定。建议重点关注团队协作和业务视野拓展。';
let directComment = '';

function calcTotal(){
  let total = 0, wSum = 0;
  MODULES.forEach(m => {
    m.goals.forEach(g => {
      if(g.score !== null && g.score !== undefined) {
        total += g.score * g.weight;
        wSum += g.weight;
      }
    });
  });
  return wSum > 0 ? Math.round(total / wSum * 10) / 10 : 0;
}

function suggestGrade(score){
  if(score >= 4.5) return '超出预期';
  if(score >= 3.8) return '符合预期+';
  if(score >= 3.0) return '符合预期';
  if(score >= 2.0) return '符合预期-';
  return '低于预期';
}

function render(){
  const el = document.getElementById('phoneBody');
  let h = '';

  h += `<div class="person-card">
    <div class="person-av">${PERSON.name[0]}</div>
    <div class="person-info">
      <div class="person-name">${PERSON.name}</div>
      <div class="person-dept">${PERSON.dept} · ${PERSON.role}</div>
    </div>
  </div>`;

  MODULES.forEach((m,mi) => {
    h += `<div class="module">
      <div class="module-hd">
        <span class="module-title">${m.title}</span>
        <span class="module-weight">权重 ${m.weight}%</span>
      </div>`;
    m.goals.forEach(g => {
      const isQuant = g.type === 'quant';
      h += `<div class="goal-item">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span class="goal-title">${g.title}</span>
          <span style="font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px;background:${isQuant?'var(--pr50)':'var(--em50)'};color:${isQuant?'var(--pr)':'var(--em700)'}">${isQuant?'定量':'定性'}</span>
          <span style="font:500 11px/1 var(--f);color:var(--c5);margin-left:auto">${g.weight}%</span>
        </div>
        <div class="goal-desc">${g.desc}</div>
        <div style="font:400 12px/1 var(--f);color:var(--c6);margin-bottom:8px">完成情况：${g.completed||'—'}</div>
        <div class="score-row">
          ${isQuant?`<span class="score-label">得分</span>
          <input class="score-input" type="number" value="${g.score||''}" min="0" max="5" step="0.1" onchange="updateScore(${mi},${g.id},this.value)">
          <span class="score-max">/ 5</span>`:''}
          <span class="score-label" style="margin-left:auto">等级</span>
          <select class="grade-select" onchange="updateGrade(${mi},${g.id},this.value)">
            <option value="">请选择</option>
            ${GRADES.map(gr=>`<option value="${gr}" ${gr===g.grade?'selected':''}>${gr}</option>`).join('')}
          </select>
        </div>
      </div>`;
    });
    h += '</div>';
  });

  const total = calcTotal();
  const grade = suggestGrade(total);
  const gradeColor = GRADE_COLORS[grade]||'var(--c5)';
  const gradeBg = GRADE_BG[grade]||'var(--c1)';

  h += `<div class="summary">
    <div class="summary-row">
      <span class="summary-label">加权总分</span>
      <span class="summary-value">${total}</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">建议等级</span>
      <span class="summary-grade" style="background:${gradeBg};color:${gradeColor}">${grade}</span>
    </div>
  </div>`;

  // 评语区域
  h += `<div style="background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);margin-bottom:14px;overflow:hidden">
    <div style="padding:12px 14px;border-bottom:1px solid var(--bd);font:600 13px/1 var(--f);color:var(--c8)">评语</div>
    <div style="padding:12px 14px">
      <div style="font:500 11px/1 var(--f);color:var(--c5);margin-bottom:6px">员工评语</div>
      <div style="font:400 13px/1.5 var(--f);color:var(--c7);padding:10px;background:var(--c0);border-radius:var(--r1);border-left:3px solid var(--pr)">${EMPLOYEE_COMMENT}</div>
      <div style="font:500 11px/1 var(--f);color:var(--c5);margin:12px 0 6px">双线上级评语</div>
      <div style="font:400 13px/1.5 var(--f);color:var(--c7);padding:10px;background:var(--c0);border-radius:var(--r1);border-left:3px solid var(--vi)">${INDIRECT_COMMENT}</div>
      <div style="font:500 11px/1 var(--f);color:var(--c5);margin:12px 0 6px">直线上级评语 <span style="color:var(--ro)">*</span></div>
      <textarea style="width:100%;min-height:80px;border:1px solid var(--c2);border-radius:var(--r1);padding:10px;font:400 13px/1.5 var(--f);color:var(--c8);outline:none;resize:vertical;font-family:var(--f)" placeholder="请输入直线上级评语…" oninput="directComment=this.value">${directComment}</textarea>
    </div>
  </div>`;

  h += `<div class="actions">
    <button class="btn btn-save" onclick="showToast('已暂存')">暂存</button>
    <button class="btn btn-submit" onclick="showToast('已提交评分')">提交</button>
  </div>`;

  h += '<div style="height:8px"></div>';
  el.innerHTML = h;
}

function updateScore(mi,gi,val){
  MODULES[mi].goals.find(g=>g.id===gi).score = Number(val);
  render();
}

function updateGrade(mi,gi,val){
  MODULES[mi].goals.find(g=>g.id===gi).grade = val;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2000);
}

render();

// ═══ AI ═══
var AI_S={open:false,msgs:[{role:'bot',text:'👋 AI评分助手\n\n• 辅助批量评分\n• 一致性校验\n• 生成评语',time:'刚刚',shortcuts:true}]};
var AI_S_SHORTCUTS=[
  {icon:'📊',label:'辅助评分'},
  {icon:'🔍',label:'一致性校验'},
  {icon:'💬',label:'生成评语'}
];
function toggleAI(){AI_S.open=!AI_S.open;document.getElementById('aiPanel').classList.toggle('open',AI_S.open);document.getElementById('aiOverlay').classList.toggle('open',AI_S.open);if(AI_S.open)renderAI();}
function closeAI(){AI_S.open=false;document.getElementById('aiPanel').classList.remove('open');document.getElementById('aiOverlay').classList.remove('open');}
function renderAI(){
  var bd=document.getElementById('aiBd');
  bd.innerHTML=AI_S.msgs.map(function(m){
    var h='<div class="ai-msg '+m.role+'"><div class="ai-msg-bd">'+m.text.replace(/\n/g,'<br/>')+'</div>';
    if(m.shortcuts){h+='<div class="ai-shortcuts">'+AI_S_SHORTCUTS.map(function(s){return '<div class="ai-shortcut" onclick="aiAction(\''+s.label+'\')"><span class="ai-shortcut-icon">'+s.icon+'</span><span class="ai-shortcut-label">'+s.label+'</span></div>';}).join('')+'</div>';}
    if(m.card){h+='<div class="ai-msg-card"><div class="ai-msg-card-t">'+m.card.t+'</div><div class="ai-msg-card-d">'+m.card.d+'</div><span class="ai-msg-card-tag" style="background:var(--em50);color:var(--em700)">'+m.card.tag+'</span></div>';}
    if(m.acts){h+='<div class="ai-msg-actions">'+m.acts.map(function(a){return '<button class="ai-msg-btn" onclick="aiAction(\''+a+'\')">'+a+'</button>';}).join('')+'</div>';}
    if(m.time){h+='<div class="ai-msg-time">'+m.time+'</div>';}
    return h+'</div>';
  }).join('');
  bd.scrollTop=bd.scrollHeight;
}
function aiSend(){var inp=document.getElementById('aiInput');var t=inp.value.trim();if(!t)return;AI_S.msgs.push({role:'user',text:t});inp.value='';renderAI();setTimeout(function(){AI_S.msgs.push({role:'bot',text:'收到，正在分析…',time:'刚刚',acts:['辅助评分','一致性校验','生成评语']});renderAI();},600);}
function aiAction(a){
  AI_S.msgs.push({role:'user',text:a});
  setTimeout(function(){
    if(a==='辅助评分'){AI_S.msgs.push({role:'bot',text:'📊 AI评分建议：\n• 资源利用率108% → 符合预期+\n• UAT通过率97% → 符合预期\n• 评审及时率96% → 符合预期',time:'刚刚',card:{t:'评分建议',d:'7项指标已分析',tag:'AI推荐'}});}
    else if(a==='一致性校验'){AI_S.msgs.push({role:'bot',text:'🔍 一致性校验：\n• 你评的等级与评分一致 ✓\n• 无明显偏差',time:'刚刚',card:{t:'校验结果',d:'评分一致性通过',tag:'通过'}});}
    else if(a==='生成评语'){AI_S.msgs.push({role:'bot',text:'💬 推荐评语：\n张明本季度整体表现优秀，关键指标达成率高，关键行动按时完成。建议加强需求评审及时率。',time:'刚刚',acts:['应用到评语']});}
    else{AI_S.msgs.push({role:'bot',text:'收到，正在分析…',time:'刚刚'});}
    renderAI();
  },600);
}
</script>
