<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - AI 绩效活动</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}

/* TOP INFO BAR */
.top-bar{background:var(--sf);border-bottom:1px solid var(--dv);padding:20px 24px;display:flex;align-items:center;gap:16px}
.top-bar-l{flex:1;min-width:0}
.top-bar-name{font:700 20px/1.3 var(--f);color:var(--c9);margin-bottom:6px}
.top-bar-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.top-bar-meta .sep{width:1px;height:14px;background:var(--c3)}
.top-bar-meta span{font:400 12px/1 var(--f);color:var(--c5)}
.top-bar-meta .tag{display:inline-flex;align-items:center;gap:4px;font:500 11px/1 var(--f);padding:3px 10px;border-radius:var(--r1)}
.tag-pr{color:var(--pr);background:var(--pr50)}
.tag-em{color:var(--em700);background:var(--em50)}
.tag-ac{color:var(--ac700);background:var(--ac50)}
.top-bar-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.act-switch{height:32px;padding:0 30px 0 12px;border:1px solid var(--c2);border-radius:var(--r1);font:500 13px/1 var(--f);color:var(--c8);background:var(--sf) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23A1A1AA' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center;appearance:none;cursor:pointer;outline:none;min-width:180px}
.act-switch:focus{border-color:var(--pr)}

/* TABS */
.act-tabs{display:flex;padding:0 24px;border-bottom:1px solid var(--dv);gap:0;background:var(--sf)}
.act-tab{padding:12px 20px;font:500 13px/1 var(--f);color:var(--c5);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;margin-bottom:-1px}
.act-tab:hover{color:var(--c7)}
.act-tab.on{color:var(--pr);border-bottom-color:var(--pr);font-weight:600}

/* TAB CONTENT AREA */
.tab-ct{padding:24px;overflow-y:auto;flex:1}
.tab-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:12px}
.tab-placeholder svg{width:48px;height:48px;color:var(--c3)}
.tab-placeholder .t{font:500 14px/1 var(--f);color:var(--c5)}
.tab-placeholder .s{font:400 12px/1 var(--f);color:var(--c4)}

/* INFO BANNER */
.info-banner{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--pr50);border:1px solid var(--pr100);border-radius:var(--r2);margin-bottom:20px;font:400 13px/1.4 var(--f);color:var(--pr)}
.info-banner svg{width:16px;height:16px;flex-shrink:0;color:var(--pr)}

/* FORM SECTIONS */
.form-sec{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:20px 24px;margin-bottom:16px}
.form-sec-t{font:600 14px/1.3 var(--f);color:var(--c9);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.form-sec-t::before{content:'';width:3px;height:14px;background:var(--pr);border-radius:2px}

/* GRID LAYOUTS */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.form-grp{display:flex;flex-direction:column;gap:5px}
.form-lb{font:500 12px/1 var(--f);color:var(--c6)}
.ro-val{font:400 13px/1.4 var(--f);color:var(--c9);padding:7px 10px;background:var(--c0);border:1px solid var(--dv);border-radius:var(--r1);min-height:34px;display:flex;align-items:center}

/* TAGS */
.tag-sm{display:inline-flex;align-items:center;font:500 11px/1 var(--f);padding:3px 10px;border-radius:var(--r1)}
.tag-green{color:var(--em700);background:var(--em50)}
.tag-gray{color:var(--c5);background:var(--c1)}

/* GRADE TAGS */
.grade-tags{display:flex;gap:6px;flex-wrap:wrap}
.grade-tag{display:inline-flex;align-items:center;font:600 12px/1 var(--f);padding:4px 12px;border-radius:var(--r1);color:var(--sf);background:var(--pr)}
.grade-tag.g-a{background:var(--ro)}
.grade-tag.g-bp{background:var(--ac)}
.grade-tag.g-b{background:var(--em)}
.grade-tag.g-bm{background:var(--vi)}
.grade-tag.g-c{background:var(--c5)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font:600 12px/1 var(--f);color:var(--c5);text-align:left;padding:10px 12px;border-bottom:1px solid var(--dv);background:var(--c0)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--dv);font:400 13px/1.3 var(--f);color:var(--c7)}
.tbl tr:hover td{background:var(--c0)}

/* EXPANDABLE SECTION */
.exp-sec{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:12px;overflow:hidden}
.exp-sec-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;transition:background .12s;user-select:none}
.exp-sec-hd:hover{background:var(--c0)}
.exp-sec-hd-l{display:flex;align-items:center;gap:10px}
.exp-sec-hd-dot{width:8px;height:8px;border-radius:50%;background:var(--pr)}
.exp-sec-hd-t{font:600 14px/1.3 var(--f);color:var(--c9)}
.exp-sec-hd-s{font:400 12px/1 var(--f);color:var(--c5)}
.exp-sec-hd svg{width:14px;height:14px;color:var(--c4);transition:transform .2s;flex-shrink:0}
.exp-sec.open .exp-sec-hd svg{transform:rotate(180deg)}
.exp-sec-bd{padding:0 20px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease}
.exp-sec.open .exp-sec-bd{max-height:1200px;padding:16px 20px}
.cfg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 24px}
.cfg-item{display:flex;flex-direction:column;gap:3px}
.cfg-item .k{font:500 12px/1 var(--f);color:var(--c5)}
.cfg-item .v{font:400 13px/1.4 var(--f);color:var(--c9)}
.cfg-item .v.mono{font-family:var(--fm);font-size:12px}
.cfg-divider{grid-column:1/-1;height:1px;background:var(--dv);margin:4px 0}
.cfg-sub-hd{grid-column:1/-1;font:600 13px/1 var(--f);color:var(--c8);margin-top:4px}

/* WEIGHT NODES */
.wt-nodes{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.wt-node{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--c0);border:1px solid var(--dv);border-radius:var(--r1);font:400 12px/1 var(--f);color:var(--c7)}
.wt-node .pct{font-family:var(--fm);font-weight:600;color:var(--pr)}

/* GRADE RATIO */
.grade-ratio{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.grade-ratio-item{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r1);font:500 12px/1 var(--f)}
.grade-ratio-item .label{color:var(--c7)}
.grade-ratio-item .limit{font-family:var(--fm);color:var(--pr);font-weight:600}
.grade-ratio-item.a{background:var(--ro50);border:1px solid var(--ro100)}
.grade-ratio-item.a .label{color:var(--ro)}
.grade-ratio-item.bp{background:var(--ac50);border:1px solid var(--ac100)}
.grade-ratio-item.bp .label{color:var(--ac700)}
.grade-ratio-item.b{background:var(--em50);border:1px solid var(--em100)}
.grade-ratio-item.b .label{color:var(--em700)}
.grade-ratio-item.bm{background:var(--vi50);border:1px solid #DDD6FE}
.grade-ratio-item.bm .label{color:var(--vi)}
.grade-ratio-item.c{background:var(--c1);border:1px solid var(--c2)}
.grade-ratio-item.c .label{color:var(--c5)}

/* MAIN WRAPPER */
.page-wrap{display:flex;flex-direction:column;height:calc(100vh - 52px)}

/* STAT CARDS (Tab 2) */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:16px 20px;display:flex;flex-direction:column;gap:4px;border-left:3px solid var(--c3)}
.stat-card .stat-num{font:700 28px/1.1 var(--f)}
.stat-card .stat-label{font:500 12px/1 var(--f);color:var(--c5)}
.stat-card.sc-blue{border-left-color:var(--pr)}.stat-card.sc-blue .stat-num{color:var(--pr)}
.stat-card.sc-green{border-left-color:var(--em)}.stat-card.sc-green .stat-num{color:var(--em)}
.stat-card.sc-amber{border-left-color:var(--ac)}.stat-card.sc-amber .stat-num{color:var(--ac)}
.stat-card.sc-red{border-left-color:var(--ro)}.stat-card.sc-red .stat-num{color:var(--ro)}
.stat-card.sc-gray{border-left-color:var(--c4)}.stat-card.sc-gray .stat-num{color:var(--c4)}

/* STAGE CARDS (Tab 2) */
.stage-card{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:12px;overflow:hidden}
.stage-card.dimmed{opacity:.5}
.stage-card-hd{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--dv)}
.stage-card-hd-name{font:600 14px/1.3 var(--f);color:var(--c9)}
.stage-card-hd-meta{display:flex;align-items:center;gap:8px;margin-left:4px}
.stage-card-hd-meta .sm{font:400 12px/1 var(--f);color:var(--c5)}
.stage-card-hd-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.stage-card-bd{padding:16px 20px}
.stage-tag{display:inline-flex;align-items:center;font:500 11px/1 var(--f);padding:3px 10px;border-radius:var(--r1)}
.stage-tag.st-green{color:var(--em700);background:var(--em50)}
.stage-tag.st-blue{color:var(--pr);background:var(--pr50)}
.stage-tag.st-amber{color:var(--ac700);background:var(--ac50)}
.stage-tag.st-gray{color:var(--c5);background:var(--c1)}

/* PROGRESS (Tab 2) */
.progress-wrap{margin-bottom:16px}
.progress-bar-bg{height:8px;background:var(--c2);border-radius:4px;overflow:hidden;margin-bottom:8px}
.progress-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--pr),#60A5FA);transition:width .4s ease}
.progress-text{font:400 13px/1.3 var(--f);color:var(--c7);margin-bottom:12px}
.group-breakdown{display:flex;flex-direction:column;gap:8px}
.group-row{display:flex;align-items:center;gap:12px}
.group-row .group-name{font:400 12px/1 var(--f);color:var(--c6);width:80px;flex-shrink:0}
.group-row .group-bar-bg{flex:1;height:6px;background:var(--c2);border-radius:3px;overflow:hidden}
.group-row .group-bar-fill{height:100%;border-radius:3px;background:var(--pr)}
.group-row .group-bar-fill.gb-green{background:var(--em)}
.group-row .group-bar-fill.gb-amber{background:var(--ac)}
.group-row .group-pct{font:500 12px/1 var(--fm);color:var(--c6);width:44px;text-align:right;flex-shrink:0}
.group-row .group-count{font:400 12px/1 var(--f);color:var(--c4);width:60px;text-align:right;flex-shrink:0}

/* PENDING HINT (Tab 2) */
.pending-hint{padding:12px 16px;background:var(--c0);border:1px solid var(--dv);border-radius:var(--r2);font:400 12px/1.4 var(--f);color:var(--c5)}

/* BATCH BAR (Tab 2) */
.batch-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.batch-bar-title{font:600 14px/1.3 var(--f);color:var(--c9);display:flex;align-items:center;gap:8px}
.batch-bar-title::before{content:'';width:3px;height:14px;background:var(--pr);border-radius:2px}
.batch-bar-btns{display:flex;gap:8px}
.btn-outline-p{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;background:var(--sf);color:var(--pr);border:1px solid var(--pr)}.btn-outline-p:hover{background:var(--pr50)}
.btn-outline-s{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;background:var(--sf);color:var(--c6);border:1px solid var(--c2)}.btn-outline-s:hover{border-color:var(--c3);color:var(--c8)}
.btn-outline-s.danger{color:var(--ro);border-color:var(--ro100)}.btn-outline-s.danger:hover{background:var(--ro50);border-color:var(--ro)}
.btn-disabled{opacity:.45;cursor:not-allowed;pointer-events:none}

/* ═══ Tab 3: 考核人 ═══ */
.rv-filter{display:flex;align-items:center;gap:10px;padding:0 0 16px;flex-wrap:wrap}
.rv-filter .btn{height:30px;font-size:12px}
.rv-filter input{height:30px;border:1px solid var(--c2);border-radius:var(--r1);padding:0 10px;font:400 12px/1 var(--f);color:var(--c7);outline:none;width:200px}
.rv-filter input:focus{border-color:var(--pr)}
.rv-tags{display:flex;gap:8px;padding:0 0 16px;flex-wrap:wrap}
.rv-tag{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:var(--r1);font:500 12px/1 var(--f);cursor:pointer;transition:all .12s;background:var(--sf);color:var(--c6);border:1px solid var(--c2);user-select:none}
.rv-tag:hover{border-color:var(--c3);color:var(--c8)}
.rv-tag.on{background:var(--pr50);color:var(--pr);border-color:var(--pr200)}
.rv-tag .cnt{font-family:var(--fm);font-weight:600;margin-left:2px}
.rv-table{width:100%;border-collapse:collapse}
.rv-table th{font:600 12px/1 var(--f);color:var(--c5);text-align:left;padding:10px 12px;border-bottom:1px solid var(--dv);background:var(--c0)}
.rv-table td{padding:10px 12px;border-bottom:1px solid var(--dv);font:400 13px/1.3 var(--f);color:var(--c7)}
.rv-table tr:hover td{background:var(--c0)}
.rv-table .name-link{color:var(--pr);cursor:pointer;font-weight:500}
.rv-table .name-link:hover{text-decoration:underline}
.rv-table input[type="checkbox"]{width:14px;height:14px;cursor:pointer;accent-color:var(--pr)}
.rv-ops{display:flex;gap:6px}
.rv-ops a{font:500 12px/1 var(--f);color:var(--pr);cursor:pointer;white-space:nowrap}
.rv-ops a:hover{text-decoration:underline}
.rv-ops a.danger{color:var(--ro)}
.rv-batch{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-top:4px;border-top:1px solid var(--dv)}
.rv-batch .left{font:400 12px/1 var(--f);color:var(--c5);display:flex;align-items:center;gap:8px}
.rv-batch .left .cnt{font-family:var(--fm);font-weight:600;color:var(--pr)}
.rv-batch .right{display:flex;gap:8px}
.rv-detail{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);overflow:hidden}
.rv-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--dv)}
.rv-hd-l{display:flex;align-items:center;gap:16px}
.rv-hd-name{font:700 18px/1.3 var(--f);color:var(--c9)}
.rv-hd-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rv-hd-meta span{font:400 12px/1 var(--f);color:var(--c5)}
.rv-hd-meta .sep{width:1px;height:12px;background:var(--c3)}
.rv-hd-r{display:flex;gap:8px}
.tl-body{padding:24px}
.tl-stage{border-left:2px solid var(--c2);padding:0 0 20px 20px;position:relative}
.tl-stage:last-child{border-left-color:transparent;padding-bottom:0}
.tl-stage::before{content:'';position:absolute;left:-6px;top:0;width:10px;height:10px;border-radius:50%;background:var(--c3);border:2px solid var(--sf)}
.tl-stage.tl-done::before{background:var(--em)}
.tl-stage.tl-active::before{background:var(--pr);box-shadow:0 0 0 3px var(--pr100)}
.tl-stage-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.tl-stage-hd-name{font:600 14px/1.3 var(--f);color:var(--c9)}
.tl-stage-hd-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-stage-hd-meta .sm{font:400 12px/1 var(--f);color:var(--c5)}
.tl-node{margin-left:16px;border-left:1px solid var(--c2);padding:0 0 16px 16px;position:relative}
.tl-node:last-child{border-left-color:transparent;padding-bottom:0}
.tl-node::before{content:'';position:absolute;left:-5px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--c3);border:2px solid var(--sf)}
.tl-node.tl-done::before{background:var(--em)}
.tl-node.tl-pending::before{background:var(--ac)}
.tl-node-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.tl-node-hd-name{font:500 13px/1 var(--f);color:var(--c8)}
.tl-node-hd-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-node-hd-meta .sm{font:400 11px/1 var(--f);color:var(--c5)}
.tl-content{background:var(--c0);border:1px solid var(--dv);padding:12px 14px;border-radius:var(--r2);font:400 12px/1.6 var(--f);color:var(--c7);white-space:pre-line}
.tl-content.pending-content{color:var(--c4);font-style:italic}

/* ═══ Tab 4: 异常排查 ═══ */
.an-subtabs{display:flex;border-bottom:1px solid var(--dv);gap:0;background:var(--sf);margin:-24px -24px 20px;padding:0 24px}
.an-subtab{padding:12px 20px;font:500 13px/1 var(--f);color:var(--c5);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;margin-bottom:-1px}
.an-subtab:hover{color:var(--c7)}
.an-subtab.on{color:var(--pr);border-bottom-color:var(--pr);font-weight:600}
.an-filter{display:flex;align-items:center;gap:10px;padding:0 0 16px;flex-wrap:wrap}
.an-filter select{height:30px;border:1px solid var(--c2);border-radius:var(--r1);padding:0 10px;font:400 12px/1 var(--f);color:var(--c7);outline:none;background:var(--sf);cursor:pointer}
.an-filter select:focus{border-color:var(--pr)}
.an-filter input{height:30px;border:1px solid var(--c2);border-radius:var(--r1);padding:0 10px;font:400 12px/1 var(--f);color:var(--c7);outline:none;width:200px}
.an-filter input:focus{border-color:var(--pr)}
.an-table{width:100%;border-collapse:collapse}
.an-table th{font:600 12px/1 var(--f);color:var(--c5);text-align:left;padding:10px 12px;border-bottom:1px solid var(--dv);background:var(--c0)}
.an-table td{padding:10px 12px;border-bottom:1px solid var(--dv);font:400 13px/1.3 var(--f);color:var(--c7)}
.an-table tr:hover td{background:var(--c0)}
.an-table input[type="checkbox"]{width:14px;height:14px;cursor:pointer;accent-color:var(--pr)}
.an-tag{display:inline-block;padding:3px 10px;border-radius:var(--r1);font:500 11px/1 var(--f)}
.an-ops{display:flex;gap:6px}

// ═══ Tab 2: 考核过程 ═══
// Stage templates per plan type
const STAGE_TEMPLATES = {
  '年度绩效方案': ['ratify','confirm','interview'],
  '半年度方案':   ['interview'],
  '月度方案':     ['goal','eval','ratify','confirm'],
};
const STAGE_DEFS = {
  goal:      { id:'goal',      name:'目标制定', hint:'建议在目标制定环节完成率达到 80% 后开启' },
  eval:      { id:'eval',      name:'绩效考核', hint:'建议在目标制定环节完成率达到 80% 后开启' },
  ratify:    { id:'ratify',    name:'结果审定' },
  confirm:   { id:'confirm',   name:'结果确认' },
  interview: { id:'interview', name:'绩效面谈' },
};

function initStages() {
  const planKey = Object.keys(STAGE_TEMPLATES).find(k => ACTIVITY.plan.includes(k)) || '年度绩效方案';
  const ids = STAGE_TEMPLATES[planKey];
  return ids.map((id, idx) => {
    const def = STAGE_DEFS[id];
    // Give the first stage a running head start for demo
    if (idx === 0) {
      return { ...def, status:'active', openTime:'2026/04/01 09:00',
        progress:{done:92,total:128},
        groups:[{name:'管理层组',done:10,total:12},{name:'员工组',done:72,total:98},{name:'默认组',done:10,total:18}] };
    }
    return { ...def, status:'pending', openTime:null, progress:null, groups:[] };
  });
}
let STAGES = initStages();

function stageIsEnabled(i){ return i===0 || ['active','paused','closed'].includes(STAGES[i-1].status); }
function stageStatusInfo(s){
  if(s==='active') return {label:'进行中',cls:'st-green'};
  if(s==='paused') return {label:'已暂停',cls:'st-amber'};
  if(s==='closed') return {label:'已关闭',cls:'st-gray'};
  return {label:'待开启',cls:'st-blue'};
}
function stageButtons(stage,i){
  if(stage.status==='pending'){
    const en=stageIsEnabled(i);
    return [{label:'开启',cls:'btn-outline-p'+(en?'':' btn-disabled'),action:'open'}];
  }
  if(stage.status==='active') return [{label:'暂停',cls:'btn-outline-s',action:'pause'},{label:'关闭',cls:'btn-outline-s',action:'close'}];
  if(stage.status==='paused') return [{label:'恢复',cls:'btn-outline-p',action:'resume'},{label:'关闭',cls:'btn-outline-s',action:'close'}];
  if(stage.status==='closed') return [{label:'重开',cls:'btn-outline-p',action:'reopen'}];
  return [];
}
function stagePct(s){ return s.progress&&s.progress.total?Math.round(s.progress.done/s.progress.total*100):0; }
function formatNow(){ const d=new Date(),p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }

let progressTimers = {};
function startProgressSim(sid){
  if(progressTimers[sid]) return;
  const st=STAGES.find(s=>s.id===sid);
  if(!st||st.status!=='active') return;
  progressTimers[sid]=setInterval(()=>{
    if(st.status!=='active'){clearInterval(progressTimers[sid]);delete progressTimers[sid];return;}
    const g=st.groups[Math.floor(Math.random()*st.groups.length)];
    if(g.done<g.total){g.done++;st.progress.done=st.groups.reduce((a,x)=>a+x.done,0);}
    updateProgressDOM(st);
    if(st.progress.done>=st.progress.total){clearInterval(progressTimers[sid]);delete progressTimers[sid];}
  },2500);
}
function stopProgressSim(sid){ if(progressTimers[sid]){clearInterval(progressTimers[sid]);delete progressTimers[sid];} }
function updateProgressDOM(st){
  const pct=stagePct(st);
  const card=document.getElementById('sp-'+st.id);
  if(!card) return;
  const fill=card.querySelector('.progress-bar-fill');
  if(fill) fill.style.width=pct+'%';
  const txt=card.querySelector('.progress-text');
  if(txt) txt.textContent=`${st.progress.done} / ${st.progress.total}（${pct}%）`;
  st.groups.forEach((g,gi)=>{
    const gp=g.total?Math.round(g.done/g.total*100):0;
    const gfill=card.querySelectorAll('.group-bar-fill')[gi];
    if(gfill) gfill.style.width=gp+'%';
    const gpct=card.querySelectorAll('.group-pct')[gi];
    if(gpct) gpct.textContent=gp+'%';
    const gc=card.querySelectorAll('.group-count')[gi];
    if(gc) gc.textContent=g.done+'/'+g.total;
  });
  // Update stats row
  const nums=document.querySelectorAll('.stat-card .stat-num');
  if(nums.length>=3){nums[1].textContent=String(st.progress.done);nums[2].textContent=String(Math.max(0,128-st.progress.done));}
}

function handleStageAction(sid,action){
  const st=STAGES.find(s=>s.id===sid);
  if(!st) return;
  if(action==='close'){
    showConfirm('确认关闭',`确定要关闭「${st.name}」环节吗？关闭后该环节所有待处理流程将被终止。`,()=>{
      st.status='closed';stopProgressSim(sid);
      GHR_NAV.showToast(st.name+' 环节已关闭');
      const el=document.getElementById('tabCt');if(el) el.innerHTML=renderProcessTab();
    });
    return;
  }
  if(action==='reopen'){
    showConfirm('重开环节',`确定要重新开启「${st.name}」环节吗？`,()=>{
      st.status='active';st.openTime=formatNow();
      if(!st.progress){st.progress={done:0,total:128};st.groups=[{name:'管理层组',done:0,total:12},{name:'员工组',done:0,total:98},{name:'默认组',done:0,total:18}];}
      startProgressSim(sid);
      GHR_NAV.showToast(st.name+' 环节已重开');
      const el=document.getElementById('tabCt');if(el) el.innerHTML=renderProcessTab();
    });
    return;
  }
  if(action==='open'){
    st.status='active';st.openTime=formatNow();
    st.progress={done:0,total:128};
    st.groups=[{name:'管理层组',done:0,total:12},{name:'员工组',done:0,total:98},{name:'默认组',done:0,total:18}];
    st.hint=null;
    startProgressSim(sid);
  } else if(action==='pause'){
    st.status='paused';stopProgressSim(sid);
  } else if(action==='resume'){
    st.status='active';startProgressSim(sid);
  }
  GHR_NAV.showToast(st.name+' 环节已'+({open:'开启',pause:'暂停',resume:'恢复',close:'关闭',reopen:'重开'}[action]));
  const el=document.getElementById('tabCt');
  if(el) el.innerHTML=renderProcessTab();
}

function batchOpenStages(){
  const pending=STAGES.filter(s=>s.status==='pending');
  if(!pending.length){GHR_NAV.showToast('没有待开启的环节');return;}
  showConfirm('批量开启',`确定要开启 ${pending.length} 个环节吗？`,()=>{
    pending.forEach(s=>{s.status='active';s.openTime=formatNow();s.progress={done:0,total:128};s.groups=[{name:'管理层组',done:0,total:12},{name:'员工组',done:0,total:98},{name:'默认组',done:0,total:18}];startProgressSim(s.id);});
    GHR_NAV.showToast(`已开启 ${pending.length} 个环节`);
    const el=document.getElementById('tabCt');if(el) el.innerHTML=renderProcessTab();
  });
}
function batchCloseStages(){
  const active=STAGES.filter(s=>s.status==='active'||s.status==='paused');
  if(!active.length){GHR_NAV.showToast('没有可关闭的环节');return;}
  showConfirm('批量关闭',`确定要关闭 ${active.length} 个环节吗？关闭后待处理流程将被终止。`,()=>{
    active.forEach(s=>{s.status='closed';stopProgressSim(s.id);});
    GHR_NAV.showToast(`已关闭 ${active.length} 个环节`);
    const el=document.getElementById('tabCt');if(el) el.innerHTML=renderProcessTab();
  });
}

  </div></div>`;

  STAGES.forEach((stage,i) => {
    const enabled=stageIsEnabled(i);
    const dimmed=!enabled&&stage.status==='pending';
    const si=stageStatusInfo(stage.status);
    const btns=stageButtons(stage,i);
    const pct=stagePct(stage);

    html += `<div class="stage-card${dimmed?' dimmed':''}" id="sp-${stage.id}">`;
    html += `<div class="stage-card-hd"><span class="stage-card-hd-name">${stage.name}</span>`;
    html += `<span class="stage-tag ${si.cls}">${si.label}</span>`;
    html += `<div class="stage-card-hd-meta"><span class="sm">开放时间：${stage.openTime||'-'}</span></div>`;
    html += `<div class="stage-card-hd-r">`;
    btns.forEach(b=>{ html+=`<button class="${b.cls}" onclick="handleStageAction('${stage.id}','${b.action}')">${b.label}</button>`; });
    html += `</div></div>`;

    html += `<div class="stage-card-bd">`;
    if((stage.status==='active'||stage.status==='paused')&&stage.progress){
      html += `<div class="progress-wrap">`;
      html += `<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>`;
      html += `<div class="progress-text">${stage.progress.done} / ${stage.progress.total}（${pct}%）</div>`;
      html += `<div class="group-breakdown">`;
      stage.groups.forEach(g=>{
        const gp=g.total?Math.round(g.done/g.total*100):0;
        const bc=gp>=80?'gb-green':gp>=60?'':'gb-amber';
        html += `<div class="group-row"><span class="group-name">${g.name}</span><div class="group-bar-bg"><div class="group-bar-fill ${bc}" style="width:${gp}%"></div></div><span class="group-pct">${gp}%</span><span class="group-count">${g.done}/${g.total}</span></div>`;
      });
      html += `</div></div>`;
    }
    if(stage.hint) html += `<div class="pending-hint">${stage.hint}</div>`;
    html += `</div></div>`;
  });

  html += '</div>';
  return html;
}

function getPersonDetail(name) {
  const p = PERSONS.find(x => x.name === name);
  if (!p) return null;
  const stageOrder = ['目标制定','绩效考核','结果审定','结果确认','绩效面谈'];
  const si = stageOrder.indexOf(p.stage);
  const stages = stageOrder.map((sname, idx) => {
    let status, start, end, duration, nodes;
    if (idx < si) {
      status = 'done'; start = '2026/04/0'+(idx+1)+' 09:00'; end = '2026/04/0'+(idx+2)+' 10:30'; duration = '1天1小时';
      nodes = [{name:sname+'节点',status:'done',handler:p.name+'（本人）',start:'04/0'+(idx+1)+' 09:00',end:'04/0'+(idx+1)+' 10:00',duration:'1小时',content:'已完成'}];
    } else if (idx === si) {
      if (p.status === 'submitted') {
        status = 'done'; start = '2026/04/0'+(idx+1)+' 09:00'; end = '2026/04/0'+(idx+2)+' 10:30'; duration = '1天1小时';
        nodes = [{name:sname+'提交',status:'done',handler:p.name+'（本人）',start:'04/03 14:20',end:'04/03 14:45',duration:'25分钟',content:p.goal||'已完成提交'}];
      } else if (p.status === 'suspended') {
        status = 'active'; start = '2026/05/08 09:00'; end = '-'; duration = '已挂起';
        nodes = [{name:sname+'处理',status:'pending',handler:p.name+'（本人）',start:'05/08 09:00',end:'-',duration:'-',content:'已挂起，等待恢复'}];
      } else if (p.status === 'timeout') {
        status = 'active'; start = '2026/04/01 09:00'; end = '-'; duration = '已超时';
        nodes = [{name:sname+'处理',status:'pending',handler:p.name+'（本人）',start:'04/01 09:00',end:'-',duration:'-',content:'超时未处理'}];
      } else if (p.status === 'terminated') {
        status = 'done'; start = '2026/04/01 09:00'; end = '2026/04/05 11:00'; duration = '已终止';
        nodes = [{name:sname+'处理',status:'done',handler:'管理员',start:'04/01 09:00',end:'04/05 11:00',duration:'4天',content:'已被管理员强制终止'}];
      } else {
        status = 'notstarted'; start = '-'; end = '-'; duration = '-'; nodes = [];
      }
    } else {
      status = 'notstarted'; start = '-'; end = '-'; duration = '-'; nodes = [];
    }
    return {name:sname, status, start, end, duration, nodes};
  });
  return {name:p.name, emp:p.emp, group:p.group, role:p.role, dept:p.dept, stages};
}

function rvOps(status, personName) {
  const parts = [];
  if (status === 'submitted') {
    parts.push(`<a onclick="showOpDialog('remind','${personName}')">催办</a>`);
    parts.push(`<a onclick="showOpDialog('suspend','${personName}')">挂起</a>`);
  } else if (status === 'pending') {
    parts.push(`<a onclick="showOpDialog('remind','${personName}')">催办</a>`);
    parts.push(`<a onclick="showOpDialog('transfer','${personName}')">转交</a>`);
    parts.push(`<a onclick="showOpDialog('suspend','${personName}')">挂起</a>`);
  } else if (status === 'timeout') {
    parts.push(`<a onclick="showOpDialog('remind','${personName}')">催办</a>`);
    parts.push(`<a onclick="showOpDialog('transfer','${personName}')">转交</a>`);
    parts.push(`<a class="danger" onclick="confirmTerminate('${personName}')">强制终止</a>`);
  } else if (status === 'suspended') {
    parts.push(`<a onclick="showOpDialog('resume','${personName}')">恢复</a>`);
    parts.push(`<a onclick="showOpDialog('transfer','${personName}')">转交</a>`);
    parts.push(`<a class="danger" onclick="confirmTerminate('${personName}')">强制终止</a>`);
  } else {
    return '<span style="color:var(--c4)">-</span>';
  }
  return `<div class="rv-ops">${parts.join('')}</div>`;
}

}

function stageStatusTag(status) {
  if (status === 'done') return '<span class="stage-tag st-green">已完成</span>';
  if (status === 'active') return '<span class="stage-tag st-blue">进行中</span>';
  return '<span class="tag-sm tag-gray">未开始</span>';
}

function nodeStatusTag(status) {
  if (status === 'done') return '<span class="tag-sm tag-green">已完成</span>';
  if (status === 'pending') return '<span class="tag-sm tag-ac">待处理</span>';
  return '<span class="tag-sm tag-gray">未开始</span>';
}

function toggleRvSelect(id) {
  if (rvSelectedIds.has(id)) rvSelectedIds.delete(id);
  else rvSelectedIds.add(id);
  render();
}
function toggleRvSelectAll() {
  let filtered = PERSONS;
  if (rvGroup !== 'all') filtered = filtered.filter(p => p.group === rvGroup);
  if (rvSearch) { const q = rvSearch.toLowerCase(); filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || p.emp.toLowerCase().includes(q)); }
  const allChecked = filtered.length > 0 && filtered.every(p => rvSelectedIds.has(p.id));
  if (allChecked) filtered.forEach(p => rvSelectedIds.delete(p.id));
  else filtered.forEach(p => rvSelectedIds.add(p.id));
  render();
}

function renderPersonList() {
  // Compute group counts from PERSONS
  const groupCounts = { 'all': PERSONS.length };
  PERSONS.forEach(p => { groupCounts[p.group] = (groupCounts[p.group]||0) + 1; });
  const groups = [
    { name:'all', label:'全部', count: groupCounts['all']||0 },
    { name:'管理层组', label:'管理层组', count: groupCounts['管理层组']||0 },
    { name:'员工组', label:'员工组', count: groupCounts['员工组']||0 },
    { name:'默认组', label:'默认组', count: groupCounts['默认组']||0 },
  ];

  // Filter persons
  let filtered = PERSONS;
  if (rvGroup !== 'all') filtered = filtered.filter(p => p.group === rvGroup);
  if (rvSearch) {
    const q = rvSearch.toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || p.emp.toLowerCase().includes(q));
  }

  const stages = ['全部','目标制定','绩效考核','结果审定','结果确认','绩效面谈'];

  // Stage-based column definitions
  const stageColumns = {
    '全部':     ['姓名','工号','部门','考核组','角色','当前环节','状态','操作'],
    '目标制定': ['姓名','工号','部门','考核组','角色','目标内容','提交时间','状态','操作'],
    '绩效考核': ['姓名','工号','部门','考核组','角色','评分','等级','状态','操作'],
    '结果审定': ['姓名','工号','部门','考核组','角色','评分','等级','审定等级','状态','操作'],
    '结果确认': ['姓名','工号','部门','考核组','角色','审定等级','确认状态','状态','操作'],
    '绩效面谈': ['姓名','工号','部门','考核组','角色','审定等级','面谈状态','面谈日期','操作'],
  };

  const cols = stageColumns[rvStage] || stageColumns['全部'];

  function getCellValue(p, col) {
    switch(col) {
      case '姓名': return `<span class="name-link" onclick="openPersonDetail('${p.name}')">${p.name}</span>`;
      case '工号': return `<span style="font-family:var(--fm);font-size:12px">${p.emp}</span>`;
      case '部门': return p.dept;
      case '考核组': return `<span class="tag-sm" style="color:${p.groupColor};background:${p.groupColor}14">${p.group}</span>`;
      case '角色': return p.role;
      case '当前环节': return p.stage;
      case '状态': return rvStatusTag(p.status);
      case '操作': return rvOps(p.status, p.name);
      case '目标内容': return `<span style="color:var(--c7);font-size:12px">${p.goal}</span>`;
      case '提交时间': return `<span style="font-family:var(--fm);font-size:12px;color:${p.goalTime==='-'?'var(--c4)':'var(--c7)'}">${p.goalTime}</span>`;
      case '评分': return `<span style="font-family:var(--fm);font-size:12px;font-weight:600;color:${p.score==='-'?'var(--c4)':'var(--pr)'}">${p.score}</span>`;
      case '等级': return `<span class="tag-sm" style="${p.grade==='-'?'color:var(--c4);background:var(--c1)':'color:var(--pr);background:var(--pr50)'}">${p.grade}</span>`;
      case '审定等级': return `<span class="tag-sm" style="${p.审定等级==='-'?'color:var(--c4);background:var(--c1)':'color:var(--em);background:var(--em50)'}">${p.审定等级}</span>`;
      case '确认状态': return p.confirmStatus==='-' ? '<span style="color:var(--c4)">-</span>' : `<span class="tag-sm tag-green">${p.confirmStatus}</span>`;
      case '面谈状态': return p.面谈状态==='-' ? '<span style="color:var(--c4)">-</span>' : `<span class="tag-sm tag-ac">${p.面谈状态}</span>`;
      case '面谈日期': return `<span style="font-family:var(--fm);font-size:12px;color:${p.面谈日期==='-'?'var(--c4)':'var(--c7)'}">${p.面谈日期}</span>`;
      default: return '-';
    }
  }

  let html = '<div class="fi">';

  // Filter bar
  html += `<div class="rv-filter">
    <input type="text" placeholder="搜索姓名 / 工号..." value="${rvSearch}" oninput="rvSearch=this.value;render()" />
    <select onchange="rvStage=this.value;render()" style="height:30px;border:1px solid var(--c2);border-radius:var(--r1);padding:0 10px;font:400 12px/1 var(--f);color:var(--c7);background:var(--sf)">
      ${stages.map(s => `<option value="${s}"${rvStage===s?' selected':''}>${s}</option>`).join('')}
    </select>
    <button class="btn btn-s" onclick="openReviewerWizard('import')">${I.upload} 导入</button>
    <button class="btn btn-s" onclick="showExportDlg('person')">${I.download} 导出</button>
    <button class="btn btn-p" onclick="openReviewerWizard()">添加考核人</button>
  </div>`;

  // Group tags
  html += `<div class="rv-tags">`;
  groups.forEach(g => {
    html += `<div class="rv-tag${rvGroup===g.name?' on':''}" onclick="rvGroup='${g.name}';render()">${g.label} <span class="cnt">${g.count}人</span></div>`;
  });
  html += `</div>`;

  // Table
  html += `<div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);overflow:hidden">`;
  const allChecked = filtered.length > 0 && filtered.every(p => rvSelectedIds.has(p.id));

  html += `<table class="rv-table"><thead><tr>
    <th style="width:36px"><input type="checkbox" ${allChecked?'checked':''} onchange="toggleRvSelectAll()" /></th>
    ${cols.map(c => `<th>${c}</th>`).join('')}
  </tr></thead><tbody>`;

  filtered.forEach(p => {
    html += `<tr>
      <td><input type="checkbox" ${rvSelectedIds.has(p.id)?'checked':''} onchange="toggleRvSelect(${p.id})" /></td>
      ${cols.map(c => `<td>${getCellValue(p, c)}</td>`).join('')}
    </tr>`;
  });

  html += `</tbody></table></div>`;

  // Batch bar - aligned with row operations
  html += `<div class="rv-batch">
    <div class="left"><input type="checkbox" ${allChecked?'checked':''} onchange="toggleRvSelectAll()" /> 已选 <span class="cnt">${rvSelectedIds.size}</span> 人</div>
    <div class="right">
      <button class="btn-outline-s${rvSelectedIds.size?'':' btn-disabled'}" onclick="batchRemind()">批量催办</button>
      <button class="btn-outline-s${rvSelectedIds.size?'':' btn-disabled'}" onclick="batchTransfer()">批量转交</button>
      <button class="btn-outline-s danger${rvSelectedIds.size?'':' btn-disabled'}" onclick="batchTerminate()">批量强制终止</button>
    </div>
  </div>`;

  html += '</div>';
  return html;
}

function renderPersonDetail() {
  const d = getPersonDetail(selectedPerson);
  if (!d) return renderPersonList();
  let html = '<div class="fi">';

  html += `<div class="rv-detail">`;

  // Header
  html += `<div class="rv-hd">
    <div class="rv-hd-l">
      <div class="rv-hd-name">${d.name}</div>
      <div class="rv-hd-meta">
        <span>${d.emp}</span><div class="sep"></div>
        <span>${d.dept}</span><div class="sep"></div>
        <span class="tag-sm" style="color:#10B981;background:#ECFDF5">${d.group}</span><div class="sep"></div>
        <span>${d.role}</span>
      </div>
    </div>
    <div class="rv-hd-r">
      <button class="btn btn-s" onclick="backToList()">返回列表</button>
    </div>
  </div>`;

  // Timeline body
  html += `<div class="tl-body">`;

  d.stages.forEach(stage => {
    const stageCls = stage.status === 'done' ? 'tl-done' : stage.status === 'active' ? 'tl-active' : '';
    html += `<div class="tl-stage ${stageCls}">`;
    html += `<div class="tl-stage-hd">
      <span class="tl-stage-hd-name">${stage.name}</span>
      ${stageStatusTag(stage.status)}
      <div class="tl-stage-hd-meta">
        <span class="sm">开始：${stage.start}</span>
        <span class="sm">结束：${stage.end}</span>
        <span class="sm">耗时：${stage.duration}</span>
      </div>
    </div>`;

    if (stage.nodes.length === 0) {
      html += `<div style="margin-left:16px;font:400 12px/1 var(--f);color:var(--c4);padding:8px 0">暂无节点数据</div>`;
    } else {
      stage.nodes.forEach(node => {
        const nodeCls = node.status === 'done' ? 'tl-done' : node.status === 'pending' ? 'tl-pending' : '';
        html += `<div class="tl-node ${nodeCls}">`;
        html += `<div class="tl-node-hd">
          <span class="tl-node-hd-name">${node.name}</span>
          ${nodeStatusTag(node.status)}
          <div class="tl-node-hd-meta">
            <span class="sm">处理人：${node.handler}</span>
            <span class="sm">开始：${node.start}</span>
            <span class="sm">结束：${node.end}</span>
            <span class="sm">耗时：${node.duration}</span>
          </div>
        </div>`;
        html += `<div class="tl-content${node.status === 'pending' || node.status === 'notstarted' ? ' pending-content' : ''}">${node.content}</div>`;
        html += `</div>`;
      });
    }

    html += `</div>`;
  });

  html += `</div>`; // tl-body
  html += `</div>`; // rv-detail
  html += `</div>`; // fi
  return html;
}

function anOps(status) {
  const parts = [];
  if (status === '待处理') {
    parts.push(`<a onclick="showConfirm('处理异常','确认处理该异常？',()=>{GHR_NAV.showToast('异常已处理');render()})">处理</a>`);
  } else if (status === '已通知') {
    parts.push(`<a onclick="showOpDialog('remind',PERSONS[0])">催办</a>`);
    parts.push(`<a onclick="showOpDialog('transfer',PERSONS[0])">转交</a>`);
  } else if (status === '已处理') {
    parts.push(`<a onclick="GHR_NAV.showToast('查看异常详情')">查看</a>`);
  } else {
    return '<span style="color:var(--c4)">-</span>';
  }
  return `<div class="an-ops">${parts.join('')}</div>`;
}

  }
  h += `<button class="pg-btn" ${pickPage>=totalPages?'disabled':''} onclick="pickPage++;render()">下一页</button>
      </div>
    </div>
  </div>`;

  return h;

function pickToggle(emp){

function pickToggleAll(checked){

        <div class="ai-chat-hd-ic">${AI_IC}</div>
        <div><div class="ai-chat-hd-t">AI 绩效助手</div><div class="ai-chat-hd-s">基于活动数据 + 历史绩效</div></div>
        <button class="ai-chat-close" onclick="toggleAiChat()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="ai-chat-bd" id="chatBd"></div>
      <div class="ai-chat-ft">
        <input class="ai-chat-input" id="chatInput" placeholder="询问绩效相关问题..." onkeydown="if(event.key==='Enter')sendAiMsg()"/>
        <button class="ai-chat-send" onclick="sendAiMsg()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
    </div>
  `);
  renderAiChat();
}

function renderAiChat(){
  const bd=document.getElementById('chatBd');if(!bd)return;
  bd.innerHTML=AI_MSGS.map(m=>{
    let html=`<div class="ai-msg ${m.role}"><div class="ai-msg-bd">${m.text.replace(/\n/g,'<br/>')}</div>`;
    if(m.cards) html+=m.cards.map(c=>`<div class="ai-msg-card"><div class="ai-msg-card-t">${c.t}</div><div class="ai-msg-card-d">${c.d}</div><span class="ai-msg-card-tag ${c.tc}">${c.tag}</span></div>`).join('');
    if(m.actions) html+=`<div class="ai-msg-actions">${m.actions.map(a=>`<button class="ai-msg-btn${a.includes('查看')||a.includes('生成')?' primary':''}" onclick="handleAiAction('${a}')">${a}</button>`).join('')}</div>`;
    if(m.time) html+=`<div class="ai-msg-time">${m.time}</div>`;
    html+=`</div>`;
    return html;
  }).join('');
  bd.scrollTop=bd.scrollHeight;
}

function toggleAiChat(){
  aiChatOpen=!aiChatOpen;
  document.body.classList.toggle('chat-open',aiChatOpen);
}

function handleAiAction(action){
  AI_MSGS.push({role:'user',text:action,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
  renderAiChat();
  setTimeout(()=>{
    const responses={
      '查看风险详情':'已为你生成风险分析报告：\n\n1. 技术部 3 人超时未提交（高风险）\n2. 评分偏差较大需关注（中风险）\n3. 默认组完成率偏低（中风险）\n\n建议优先处理超时问题。',
      '生成催办通知':'已生成催办通知模板：\n\n📋 目标制定超时提醒\n发送对象：技术部 3 人\n内容：您的目标制定已超时 7 天，请尽快完成。',
      '分析当前活动进度风险':'当前活动风险分析：\n\n⚠️ 目标制定环节进度 72%，预计 3 天后完成\n⚠️ 技术部完成率 58%，低于平均\n✅ 管理层组进度正常（83%）',
      '哪些部门完成率偏低？':'部门完成率排名：\n\n1. 技术部：58% ⚠️\n2. 运营部：65% ⚠️\n3. 产品部：78%\n4. 市场部：82%\n5. 财务部：90%',
      '强制分布是否合规？':'强制分布检查：\n\n✅ A 等级：8%（上限 10%）\n⚠️ B+ 等级：22%（上限 15%）超标\n✅ B 等级：35%（下限 30%）\n✅ B- 等级：28%\n✅ C 等级：3%（上限 5%）\n\n建议调整 B+ 等级分布。',
      '生成催办建议':'催办建议：\n\n1. 技术部张三：目标制定超时 7 天\n2. 技术部王五：目标制定超时 5 天\n3. 技术部郑十一：目标制定超时 3 天\n\n建议发送催办通知并设置 3 天截止日期。',
    };
    AI_MSGS.push({role:'bot',text:responses[action]||'收到，正在处理你的请求...',time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
    renderAiChat();
  },800);
}

function sendAiMsg(){
  const input=document.getElementById('chatInput');const text=input.value.trim();if(!text)return;
  AI_MSGS.push({role:'user',text,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});input.value='';renderAiChat();
  setTimeout(()=>{AI_MSGS.push({role:'bot',text:'收到，正在分析你的需求...\n\n已根据当前活动数据为你生成分析报告，请查看左侧风险预警面板。',time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});renderAiChat();},800);
}

// ═══ Init ═══
GHR_NAV.init('perf', 'AI 绩效活动');
initAiChatSidebar();
render();
</script>
</body>
</html>
