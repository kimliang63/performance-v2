<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 移动端目标制定</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#EFF6FF;--pr100:#DBEAFE;--pr700:#1D4ED8;
  --em:#10B981;--em50:#ECFDF5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#0F172A;--c8:#1E293B;--c7:#334155;--c6:#52525B;--c5:#64748B;--c4:#94A3B8;--c3:#CBD5E1;--c2:#E2E8F0;--c1:#F1F5F8;--c0:#F8FAFC;
  --sf:#FFF;--bg:#F0F4F8;--dv:#F1F5F9;
  --r1:10px;--r2:14px;--r3:18px;--r4:16px;
  --f:'Inter','Noto Sans SC',system-ui,sans-serif;
  --fm:'JetBrains Mono',monospace;
  --sx:0 1px 2px rgba(0,0,0,.04);--sm:0 2px 8px rgba(0,0,0,.06);
  --bd:rgba(15,23,42,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:#E8E8ED;color:var(--c7);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}

/* ===== Phone Frame ===== */
.phone{width:393px;height:852px;background:var(--bg);border-radius:48px;box-shadow:0 25px 60px rgba(0,0,0,.3),0 0 0 5px #0F172A,0 0 0 8px #1E293B;overflow:hidden;position:relative;display:flex;flex-direction:column}
.phone-notch{width:126px;height:34px;background:#0F172A;border-radius:0 0 18px 18px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10}
.phone-status{height:54px;background:var(--sf);display:flex;align-items:center;justify-content:space-between;padding:14px 24px 0;font:600 15px/1 var(--f);color:var(--c9)}
.phone-status-r{display:flex;align-items:center;gap:6px}
.phone-nav{height:44px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:12px}
.phone-nav-back{width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c7);flex-shrink:0}
.phone-nav-back svg{width:20px;height:20px}
.phone-nav-t{flex:1;font:600 17px/1 var(--f);color:var(--c9);text-align:center}
.phone-body{flex:1;overflow-y:auto;padding:16px 20px 100px;background:var(--bg)}
.phone-body::-webkit-scrollbar{width:0}

/* ===== AI FAB ===== */
.m-fab{position:absolute;bottom:96px;right:16px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--vi));border:none;box-shadow:0 4px 14px rgba(37,99,235,.35);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:700;transition:transform .2s}
.m-fab:active{transform:scale(.92)}
.m-fab svg{width:20px;height:20px;color:#FFF}

/* ===== AI Banner ===== */
.ai-banner{background:linear-gradient(135deg,var(--pr50),var(--vi50));border:1px solid var(--pr100);border-radius:var(--r4);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.ai-banner:active{transform:scale(.98)}
.ai-banner-ic{width:32px;height:32px;border-radius:var(--r1);background:linear-gradient(135deg,var(--pr),var(--vi));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-banner-ic svg{width:16px;height:16px;color:#FFF}
.ai-banner-t{font:600 13px/1.3 var(--f);color:var(--c8)}
.ai-banner-d{font:400 11px/1.3 var(--f);color:var(--c5);margin-top:2px}

/* ===== Overview Card ===== */
.ov-card{background:var(--sf);border-radius:var(--r4);box-shadow:var(--sx);border:1px solid var(--bd);padding:16px 20px;margin-bottom:16px}
.ov-top{display:flex;align-items:center;gap:12px}
.ov-avatar{width:44px;height:44px;border-radius:50%;background:var(--pr50);display:flex;align-items:center;justify-content:center;font:700 17px/1 var(--f);color:var(--pr);flex-shrink:0}
.ov-info{flex:1;min-width:0}
.ov-name{font:600 18px/1.2 var(--f);color:var(--c9)}
.ov-role{font:400 13px/1 var(--f);color:var(--c5);margin-top:2px}
.ov-cycle{font:600 13px/1 var(--f);color:var(--pr);background:var(--pr50);padding:4px 12px;border-radius:8px;flex-shrink:0;align-self:flex-start}
.ov-meta{display:flex;align-items:center;gap:16px;margin-top:16px;padding-top:14px;border-top:1px solid var(--dv)}
.ov-meta-item{font:500 13px/1 var(--f);color:var(--c6)}
.ov-meta-item b{font-family:var(--fm);font-weight:600;color:var(--c9)}
.ov-warn{display:flex;align-items:center;gap:6px;margin-top:10px;padding:8px 12px;background:var(--ac50);border-radius:var(--r1);font:400 12px/1.4 var(--f);color:var(--ac700)}
.ov-warn svg{width:16px;height:16px;flex-shrink:0}

/* ===== Section Title ===== */
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sec-name{font:600 14px/1 var(--f);color:var(--c8)}
.sec-right{margin-left:auto;font:500 12px/1 var(--f);color:var(--c5)}

/* ===== Module Card ===== */
.mod{background:var(--sf);border-radius:var(--r4);box-shadow:var(--sx);border:1px solid var(--bd);margin-bottom:10px;overflow:hidden}
.mod-hd{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:10px;transition:background .1s}
.mod-hd:active{background:var(--c0)}
.mod-ic{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mod-ic svg{width:14px;height:14px;color:#FFF}
.mod-info{flex:1;min-width:0}
.mod-name{font:600 13px/1 var(--f);color:var(--c8)}
.mod-meta{font:400 11px/1 var(--f);color:var(--c5);margin-top:3px}
.mod-chevron{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--c4);transition:transform .2s}
.mod-chevron.open{transform:rotate(180deg)}
.mod-chevron svg{width:14px;height:14px}
.mod-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.mod-body.open{max-height:2000px}

/* ===== Goal Item ===== */
.goal{border-top:1px solid var(--dv);padding:12px 14px;cursor:pointer;transition:background .1s}
.goal:first-child{border-top:none}
.goal:active{background:var(--c0)}
.goal-hd{display:flex;align-items:center;gap:8px}
.goal-name{flex:1;font:500 13px/1.3 var(--f);color:var(--c8);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.goal-name .ai-badge{font:700 9px/1 var(--f);color:var(--vi);background:var(--vi50);padding:2px 5px;border-radius:3px;margin-left:4px}
.goal-type{font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px}
.goal-type.q{background:var(--pr50);color:var(--pr)}
.goal-type.w{background:var(--vi50);color:var(--vi)}
.goal-weight{font:500 11px/1 var(--fm);color:var(--c6)}
.goal-val{display:flex;align-items:baseline;gap:4px;margin-top:8px;font:500 13px/1 var(--f);color:var(--c5)}
.goal-val .v{font-family:var(--fm);font-weight:700;font-size:13px}
.goal-val .v.challenge{color:var(--ac700)}
.goal-val .v.target{color:var(--pr)}
.goal-val .v.baseline{color:var(--c5)}
.goal-val .sep{color:var(--c3);font-size:11px;margin:0 2px}

/* ===== Compliance ===== */
.comp{background:var(--sf);border-radius:var(--r4);box-shadow:var(--sx);border:1px solid var(--bd);margin-top:16px;padding:14px 16px}
.comp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.comp-t{font:600 13px/1 var(--f);color:var(--c8);display:flex;align-items:center;gap:6px}
.comp-t svg{width:14px;height:14px;color:var(--em)}
.comp-cnt{font:600 12px/1 var(--f);color:var(--em700)}
.comp-item{display:flex;align-items:center;gap:8px;padding:5px 0;font:400 12px/1 var(--f);color:var(--c6)}
.comp-ck{width:14px;height:14px;border-radius:50%;background:var(--em);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.comp-ck svg{width:8px;height:8px;color:#FFF}

/* ===== Bottom Action Bar ===== */
.action-bar{position:absolute;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);display:flex;align-items:center;padding:10px 20px;gap:10px;padding-bottom:34px;z-index:10}
.action-bar .btn{height:44px;border-radius:var(--r4);font:600 14px/1 var(--f);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s}
.action-bar .btn:active{transform:scale(.97)}
.btn-draft{flex:1;background:var(--c1);color:var(--c7);border:1px solid var(--c2)}
.btn-draft svg{width:16px;height:16px}
.btn-submit{flex:1;background:var(--pr);color:#FFF;box-shadow:0 2px 8px rgba(37,99,235,.25)}

/* ===== Sheet ===== */
.sheet-ov{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:800;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-ov.on{opacity:1;pointer-events:auto}
.sheet{position:absolute;bottom:0;left:0;right:0;background:var(--sf);border-radius:20px 20px 0 0;z-index:810;transform:translateY(100%);transition:transform .3s ease;display:flex;flex-direction:column}
.sheet-ov.on .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--c3);border-radius:2px;margin:8px auto 0}
.sheet-hd{padding:14px 20px;border-bottom:1px solid var(--dv);display:flex;align-items:center;justify-content:space-between}
.sheet-title{font:600 15px/1 var(--f);color:var(--c9)}
.sheet-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c5);background:none;border:none}
.sheet-close svg{width:18px;height:18px}
.sheet-bd{padding:20px;flex:1;overflow-y:auto}
.sheet-ft{padding:12px 20px 34px;border-top:1px solid var(--dv);display:flex;gap:10px}
.sheet-ft .btn{flex:1;height:44px;border-radius:var(--r4);font:600 14px/1 var(--f);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-ft .btn-cancel{background:var(--c1);color:var(--c7);border:1px solid var(--c2)}
.sheet-ft .btn-confirm{background:var(--pr);color:#FFF}

/* Edit field */
.eff{display:flex;align-items:center;min-height:48px;border-bottom:1px solid var(--dv)}
.eff:last-child{border-bottom:none}
.eff-l{width:80px;flex-shrink:0;font:400 13px/1 var(--f);color:var(--c5)}
.eff-r{flex:1;display:flex;justify-content:flex-end}
.eff-input{width:100%;max-width:200px;border:none;background:transparent;font:500 14px/1.4 var(--f);color:var(--c9);text-align:right;outline:none;padding:12px 0}
.eff-input::placeholder{color:var(--c4)}

/* Indicator item */
.ind-item{display:flex;align-items:center;min-height:48px;border-bottom:1px solid var(--dv);cursor:pointer;transition:background .1s}
.ind-item:active{background:var(--c0)}
.ind-item-name{flex:1;font:500 14px/1.3 var(--f);color:var(--c9)}
.ind-item-cat{font:400 11px/1 var(--f);color:var(--c5);margin-top:2px}
.ind-item-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--c3);flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.ind-item-check.on{border-color:var(--pr);background:var(--pr)}
.ind-item-check svg{width:12px;height:12px;color:#FFF;opacity:0}
.ind-item-check.on svg{opacity:1}

/* Toast */
.toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:var(--c9);color:#FFF;padding:10px 22px;border-radius:22px;font:500 13px/1 var(--f);z-index:900;opacity:0;pointer-events:none;transition:opacity .2s}
</style>
</head>
<body>

<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-status">
    <span>9:41</span>
    <div class="phone-status-r">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--c9)"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="1.5" width="3" height="10.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--c9)"><path d="M8 2.4C5.6 2.4 3.4 3.3 1.8 4.8L0 3C2 1.1 4.9 0 8 0s6 1.1 8 3l-1.8 1.8C12.6 3.3 10.4 2.4 8 2.4z"/><path d="M8 6.4c-1.6 0-3 .6-4.1 1.6L2.1 6.2C3.6 4.8 5.7 4 8 4s4.4.8 5.9 2.2l-1.8 1.8C11 7 9.6 6.4 8 6.4z"/><path d="M8 10.4c-.8 0-1.6.3-2.1.9L8 14l2.1-2.7c-.5-.6-1.3-.9-2.1-.9z"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x=".5" y=".5" width="21" height="11" rx="2" stroke="var(--c9)"/><rect x="2" y="2" width="16" height="8" rx="1" fill="var(--c9)"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="var(--c9)"/></svg>
    </div>
  </div>

  <div class="phone-nav">
    <div class="phone-nav-back" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="phone-nav-t">目标制定</div>
  </div>

  <div class="phone-body" id="phoneBody"></div>

  <!-- AI FAB -->
  <button class="m-fab" onclick="toggleDrawer()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/><path d="M12 14v4"/><path d="M8 18h8"/><path d="M6 22h12"/></svg>
  </button>

  <!-- Action Bar -->
  <div class="action-bar">
    <button class="btn btn-draft" onclick="showToast('已保存草稿')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      保存草稿
    </button>
    <button class="btn btn-submit" onclick="showToast('已提交，进入审批流程')">提交审批</button>
  </div>

  <!-- Edit Goal Sheet -->
  <div class="sheet-ov" id="editSheet" onclick="if(event.target===this)closeSheet('edit')">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-hd">
        <span class="sheet-title" id="editTitle">编辑目标</span>
        <button class="sheet-close" onclick="closeSheet('edit')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="sheet-bd" id="editBody"></div>
      <div class="sheet-ft">
        <button class="btn btn-cancel" onclick="closeSheet('edit')">取消</button>
        <button class="btn btn-confirm" onclick="saveGoal()">保存</button>
      </div>
    </div>
  </div>

  <!-- Indicator Selection Sheet -->
  <div class="sheet-ov" id="indSheet" onclick="if(event.target===this)closeSheet('ind')">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-hd">
        <span class="sheet-title">选择关联指标</span>
        <button class="sheet-close" onclick="closeSheet('ind')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="sheet-bd" id="indBody"></div>
      <div class="sheet-ft">
        <button class="btn btn-confirm" onclick="confirmIndicator()">确认选择</button>
      </div>
    </div>
  </div>

  <!-- AI Drawer -->
  <div class="sheet-ov" id="drawerOv" onclick="if(event.target===this)toggleDrawer()">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-hd">
        <span class="sheet-title">AI 填写助手</span>
        <button class="sheet-close" onclick="toggleDrawer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="sheet-bd" id="drawerBd" style="padding:12px 0;display:flex;flex-direction:column;gap:12px"></div>
      <div class="sheet-ft">
        <div style="flex:1;display:flex;gap:8px">
          <input style="flex:1;height:44px;border:1px solid var(--c2);border-radius:var(--r4);padding:0 14px;font:400 13px/1 var(--f);outline:none" id="drawerInput" placeholder="描述你的目标，AI 帮你填写…" onkeydown="if(event.key==='Enter')sendDrawerMsg()"/>
          <button style="width:44px;height:44px;border-radius:var(--r4);background:var(--pr);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#FFF;flex-shrink:0" onclick="sendDrawerMsg()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const IC={
  chevron:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  target:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
  users:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  star:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
  warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
};

/* ===== DATA ===== */
const EMP={name:'张明',emp:'EMP20240315',dept:'产品部',position:'高级产品经理',cycle:'2026Q2'};

const MODULES=[
  {name:'业绩目标',weight:50,color:'var(--pr)',icon:IC.target,goals:[
    {name:'完成Q2产品迭代',indicator:'产品迭代完成率',type:'q',weight:30,aiFill:true,target:100,challenge:120,baseline:80,rule:'标准梯度计算',measure:'按季度迭代计划统计完成百分比',
     indDetail:{def:'统计季度内迭代计划的完成百分比',rule:'标准梯度计算',measure:'迭代完成率',measureDetail:'按季度迭代计划统计完成百分比',levels:[{l:'优秀',s:'120分',d:'≥120%'},{l:'良好',s:'100分',d:'≥100%'},{l:'合格',s:'80分',d:'≥80%'},{l:'不合格',s:'0分',d:'<80%'}]}},
    {name:'用户增长目标',indicator:'新增用户数',type:'q',weight:20,aiFill:true,target:5000,challenge:7000,baseline:3000,rule:'线性插值计算',measure:'按月统计新增注册用户总量',
     indDetail:{def:'统计月度新增注册用户总量',rule:'线性插值计算',measure:'新增用户数',measureDetail:'按月统计新增注册用户总量',levels:[{l:'优秀',s:'120分',d:'≥7000'},{l:'良好',s:'100分',d:'≥5000'},{l:'合格',s:'80分',d:'≥3000'},{l:'不合格',s:'0分',d:'<3000'}]}},
  ]},
  {name:'管理目标',weight:20,color:'var(--em)',icon:IC.users,goals:[
    {name:'团队效能提升',indicator:'团队产出效率',type:'q',weight:10,aiFill:true,target:110,challenge:130,baseline:100,rule:'标准梯度计算',measure:'团队产出/投入比值',
     indDetail:{def:'团队产出与投入的比值',rule:'标准梯度计算',measure:'产出效率比',measureDetail:'团队产出/投入比值',levels:[{l:'优秀',s:'120分',d:'≥130%'},{l:'良好',s:'100分',d:'≥110%'},{l:'合格',s:'80分',d:'≥100%'},{l:'不合格',s:'0分',d:'<100%'}]}},
    {name:'人才培养',indicator:'下属成长指标',type:'w',weight:10,aiFill:true,measure:'培养团队骨干，提升下属能力',
     indDetail:{def:'季度内获得晋升或能力认证的下属人数',rule:'-',measure:'成长人数',measureDetail:'季度内获得晋升或能力认证的下属人数'}},
  ]},
  {name:'能力发展目标',weight:15,color:'var(--ac)',icon:IC.star,goals:[
    {name:'技术能力提升',indicator:'技术认证',type:'w',weight:8,aiFill:true,measure:'完成指定技术领域的专业认证',
     indDetail:{def:'获得行业认可的技术认证证书数',rule:'-',measure:'认证数量',measureDetail:'获得行业认可的技术认证证书数'}},
    {name:'业务理解深化',indicator:'业务分析报告',type:'q',weight:7,target:2,challenge:3,baseline:1,rule:'加权汇总计算',measure:'提交业务分析报告',
     indDetail:{def:'季度内提交的业务分析报告数',rule:'加权汇总计算',measure:'报告数量',measureDetail:'季度内提交的业务分析报告数',levels:[{l:'优秀',s:'120分',d:'≥3份'},{l:'良好',s:'100分',d:'≥2份'},{l:'合格',s:'80分',d:'≥1份'},{l:'不合格',s:'0分',d:'<1份'}]}},
  ]},
  {name:'价值观目标',weight:15,color:'var(--vi)',icon:IC.book,goals:[]},
];

const COMPLIANCE=[
  {t:'必填字段完整性',s:1},{t:'总权重和 = 100%',s:1},{t:'每条目标已关联指标',s:1},
  {t:'定量目标三值完整',s:1},{t:'计算规则已配置',s:1},{t:'等级标准覆盖完整',s:1},
  {t:'目标层级 ≤ 3 级',s:1},{t:'权重分配均匀性',s:1},{t:'团队 OKR 对齐度',s:1},{t:'历史目标重复率检查',s:1},
];

const INDICATORS=[
  {name:'产品迭代完成率',cat:'产品类'},{name:'新增用户数',cat:'增长类'},
  {name:'团队产出效率',cat:'管理类'},{name:'下属成长指标',cat:'管理类'},
  {name:'技术认证',cat:'能力类'},{name:'业务分析报告',cat:'能力类'},
  {name:'客户满意度',cat:'服务类'},{name:'NPS 净推荐值',cat:'服务类'},
  {name:'营收贡献',cat:'业绩类'},{name:'需求交付周期',cat:'效率类'},
];

const openMods=new Set([0,1]);
let editingGoalIdx=-1;
let selectedIndIdx=-1;

/* ===== RENDER ===== */
function render(){
  const el=document.getElementById('phoneBody');
  const allGoals=MODULES.flatMap(m=>m.goals);
  const totalWeight=MODULES.reduce((s,m)=>s+m.weight,0);
  const weightOk=totalWeight===100;
  let h='';

  // AI Banner
  h+=`<div class="ai-banner" onclick="toggleDrawer()">
    <div class="ai-banner-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/><path d="M12 14v4"/><path d="M8 18h8"/><path d="M6 22h12"/></svg></div>
    <div><div class="ai-banner-t">AI 已预填 ${allGoals.length} 条目标</div><div class="ai-banner-d">基于 Q1 目标 + 指标库 + 团队 OKR，点击查看</div></div>
  </div>`;

  // Overview card
  h+=`<div class="ov-card">
    <div class="ov-top">
      <div class="ov-avatar">${EMP.name[0]}</div>
      <div class="ov-info">
        <div class="ov-name">${EMP.name}</div>
        <div class="ov-role">${EMP.position} · ${EMP.dept}</div>
      </div>
      <div class="ov-cycle">${EMP.cycle}</div>
    </div>
    <div class="ov-meta">
      <span class="ov-meta-item">目标 <b>${allGoals.length}</b> 个</span>
      <span class="ov-meta-item">总权重 <b>${totalWeight}%</b></span>
    </div>
    ${!weightOk?`<div class="ov-warn">${IC.warn}当前目标总权重未达到100%，还差${100-totalWeight}%</div>`:''}
  </div>`;

  // Modules
  MODULES.forEach((m,mi)=>{
    const tw=m.goals.reduce((s,g)=>s+g.weight,0);
    const isOpen=openMods.has(mi);
    h+=`<div class="mod">
      <div class="mod-hd" onclick="toggleMod(${mi})">
        <div class="mod-ic" style="background:${m.color}">${m.icon}</div>
        <div class="mod-info">
          <div class="mod-name">${m.name}</div>
          <div class="mod-meta">权重 ${tw}% · ${m.goals.length} 条目标</div>
        </div>
        <div class="mod-chevron${isOpen?' open':''}">${IC.chevron}</div>
      </div>
      <div class="mod-body${isOpen?' open':''}">`;
    if(!m.goals.length){
      h+=`<div style="padding:16px;text-align:center;font:400 12px/1.3 var(--f);color:var(--c4)">暂无目标，AI 可自动生成</div>`;
    }else{
      m.goals.forEach((g,gi)=>{
        const typeLabel=g.type==='q'?'定量':'定性';
        const typeCls=g.type==='q'?'q':'w';
        h+=`<div class="goal" onclick="openEditSheet(${mi},${gi})">
          <div class="goal-hd">
            <span class="goal-name">${g.name}${g.aiFill?'<span class="ai-badge">AI</span>':''}</span>
            <span class="goal-type ${typeCls}">${typeLabel}</span>
            <span class="goal-weight">${g.weight}%</span>
          </div>
          ${g.type==='q'?`<div class="goal-val">
            <span>挑战</span><span class="v challenge">${g.challenge}</span>
            <span class="sep">·</span>
            <span>目标</span><span class="v target">${g.target}</span>
            <span class="sep">·</span>
            <span>保底</span><span class="v baseline">${g.baseline}</span>
          </div>`:`<div class="goal-val"><span class="v" style="font-family:var(--f);font-weight:400;color:var(--c5)">${g.measure}</span></div>`}
        </div>`;
      });
    }
    h+=`</div></div>`;
  });

  // Compliance
  h+=`<div class="comp">
    <div class="comp-hd">
      <div class="comp-t">${IC.check} AI 合规检查</div>
      <span class="comp-cnt">${COMPLIANCE.length}/${COMPLIANCE.length} 通过</span>
    </div>
    ${COMPLIANCE.map(c=>`<div class="comp-item"><div class="comp-ck">${IC.check}</div>${c.t}</div>`).join('')}
  </div>`;

  h+=`<div style="height:16px"></div>`;
  el.innerHTML=h;
}

function toggleMod(mi){
  if(openMods.has(mi)) openMods.delete(mi); else openMods.add(mi);
  render();
}

/* ===== EDIT SHEET ===== */
function openEditSheet(mi,gi){
  const g=MODULES[mi].goals[gi];
  editingGoalIdx={mi,gi};
  document.getElementById('editTitle').textContent='编辑';
  let h=`
    <div class="eff"><div class="eff-l">目标名称</div><div class="eff-r"><input class="eff-input" id="ef_name" value="${g.name}"></div></div>
    <div class="eff"><div class="eff-l">关联指标</div><div class="eff-r"><input class="eff-input" id="ef_ind" value="${g.indicator}" readonly onclick="openIndicatorSheet(${mi},${gi})" style="cursor:pointer;color:var(--pr)"></div></div>
    <div class="eff"><div class="eff-l">权重</div><div class="eff-r"><span style="display:inline-flex;align-items:center;gap:4px"><input class="eff-input" id="ef_weight" type="number" value="${g.weight}" style="width:60px;text-align:center"><span style="font:500 14px/1 var(--f);color:var(--c7)">%</span></span></div></div>`;
  if(g.type==='q'){
    h+=`<div class="eff"><div class="eff-l">目标值</div><div class="eff-r"><input class="eff-input" id="ef_target" type="number" value="${g.target}" style="font-family:var(--fm);font-weight:600"></div></div>
    <div class="eff"><div class="eff-l">挑战值</div><div class="eff-r"><input class="eff-input" id="ef_challenge" type="number" value="${g.challenge}" style="font-family:var(--fm);font-weight:600"></div></div>
    <div class="eff"><div class="eff-l">保底值</div><div class="eff-r"><input class="eff-input" id="ef_baseline" type="number" value="${g.baseline}" style="font-family:var(--fm);font-weight:600"></div></div>`;
  }else{
    h+=`<div class="eff"><div class="eff-l">衡量标准</div><div class="eff-r"><input class="eff-input" id="ef_measure" value="${g.measure}"></div></div>`;
  }
  h+=`<div class="eff" style="cursor:default"><div class="eff-l">计算规则</div><div class="eff-r"><span class="eff-input" style="color:var(--c5)">${g.indDetail.rule}</span></div></div>
  <div class="eff" style="cursor:default"><div class="eff-l">衡量方式</div><div class="eff-r"><span class="eff-input" style="color:var(--c5)">${g.indDetail.measure}</span></div></div>
  <div class="eff" style="cursor:default"><div class="eff-l">指标定义</div><div class="eff-r"><span class="eff-input" style="color:var(--c5)">${g.indDetail.def}</span></div></div>`;
  document.getElementById('editBody').innerHTML=h;
  document.getElementById('editSheet').classList.add('on');
}

function saveGoal(){
  const{mi,gi}=editingGoalIdx;
  const g=MODULES[mi].goals[gi];
  g.name=document.getElementById('ef_name').value;
  g.indicator=document.getElementById('ef_ind').value;
  g.weight=parseInt(document.getElementById('ef_weight').value)||0;
  g.target=parseFloat(document.getElementById('ef_target').value)||0;
  g.challenge=parseFloat(document.getElementById('ef_challenge').value)||0;
  if(g.type==='q') g.baseline=parseFloat(document.getElementById('ef_baseline').value)||0;
  if(g.type==='w') g.measure=document.getElementById('ef_measure')?.value||'';
  closeSheet('edit');
  showToast('已保存');
  render();
}

/* ===== INDICATOR SHEET ===== */
function openIndicatorSheet(mi,gi){
  editingGoalIdx={mi,gi};
  selectedIndIdx=-1;
  let h='';
  INDICATORS.forEach((ind,i)=>{
    h+=`<div class="ind-item" onclick="selectIndicator(${i})">
      <div style="flex:1"><div class="ind-item-name">${ind.name}</div><div class="ind-item-cat">${ind.cat}</div></div>
      <div class="ind-item-check" id="indCheck${i}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
    </div>`;
  });
  document.getElementById('indBody').innerHTML=h;
  document.getElementById('indSheet').classList.add('on');
}

function selectIndicator(i){
  selectedIndIdx=i;
  INDICATORS.forEach((_,j)=>{document.getElementById('indCheck'+j).classList.toggle('on',j===i);});
}

function confirmIndicator(){
  if(selectedIndIdx<0){showToast('请选择一个指标');return;}
  const{mi,gi}=editingGoalIdx;
  MODULES[mi].goals[gi].indicator=INDICATORS[selectedIndIdx].name;
  closeSheet('ind');
  openEditSheet(mi,gi);
  showToast('已选择：'+INDICATORS[selectedIndIdx].name);
}

/* ===== UTILS ===== */
function closeSheet(id){document.getElementById(id+'Sheet').classList.remove('on');}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';
  setTimeout(()=>{t.style.opacity='0';},2000);
}

/* ===== DRAWER ===== */
let drawerOpen=false;
function toggleDrawer(){
  drawerOpen=!drawerOpen;
  document.getElementById('drawerOv').classList.toggle('on',drawerOpen);
  if(drawerOpen) renderDrawerChat();
}

const MSGS=[
  {role:'bot',text:'你好！我是 AI 填写助手。我可以帮你快速完成目标制定：自动匹配指标库、填充目标值三值、配置计算规则。',time:'09:30',actions:['从 Q1 目标继承','基于指标库推荐','对话式创建新目标']},
  {role:'user',text:'帮我基于 Q1 目标生成 Q2 PBC'},
  {role:'bot',text:'已读取你 Q1 的目标数据，为你继承并优化了 5 条目标：',time:'09:31',cards:[
    {t:'业绩目标: 2/2 条已填充',d:'产品迭代完成率(30%) + 新增用户数(20%)',tag:'已填充',tc:'em'},
    {t:'管理目标: 2/2 条已填充',d:'团队产出效率(10%) + 下属成长指标(10%)',tag:'已填充',tc:'em'},
    {t:'能力发展: 1/2 条已填充',d:'技术认证(8%)',tag:'部分填充',tc:'pr'},
  ]},
];

function renderDrawerChat(){
  const bd=document.getElementById('drawerBd');
  bd.innerHTML=MSGS.map(m=>{
    let h=`<div style="max-width:88%;${m.role==='user'?'align-self:flex-end':'align-self:flex-start'}">
      <div style="padding:10px 14px;border-radius:var(--r4);font:400 13px/1.5 var(--f);${m.role==='bot'?'background:var(--c0);color:var(--c8);border-bottom-left-radius:4px':'background:var(--pr);color:#FFF;border-bottom-right-radius:4px'}">${m.text.replace(/\n/g,'<br/>')}`;
    if(m.cards) m.cards.forEach(c=>{
      h+=`<div style="background:var(--sf);border:1px solid var(--c2);border-radius:var(--r1);padding:10px;margin-top:6px"><div style="font:600 12px/1.3 var(--f);color:var(--c8);margin-bottom:3px">${c.t}</div><div style="font:400 11px/1.4 var(--f);color:var(--c5)">${c.d}</div><span style="display:inline-block;font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px;margin-top:4px;${c.tc==='em'?'color:var(--em700);background:var(--em50)':'color:var(--pr);background:var(--pr50)'}">${c.tag}</span></div>`;
    });
    h+=`</div>`;
    if(m.actions) h+=`<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">${m.actions.map(a=>`<button style="font:500 11px/1 var(--f);padding:5px 10px;border-radius:var(--r1);border:1px solid var(--c2);background:var(--sf);color:var(--c6);cursor:pointer" onclick="drawerAction('${a}')">${a}</button>`).join('')}</div>`;
    if(m.time) h+=`<div style="font:400 10px/1 var(--f);color:var(--c4);margin-top:3px;${m.role==='user'?'text-align:right':''}">${m.time}</div>`;
    h+=`</div>`;
    return h;
  }).join('');
  bd.scrollTop=bd.scrollHeight;
}

function sendDrawerMsg(){
  const inp=document.getElementById('drawerInput');
  const txt=inp.value.trim();
  if(!txt)return;
  MSGS.push({role:'user',text:txt});
  inp.value='';
  renderDrawerChat();
  setTimeout(()=>{
    MSGS.push({role:'bot',text:'收到，正在分析你的需求…',time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
    renderDrawerChat();
  },800);
}

function drawerAction(label){
  MSGS.push({role:'user',text:label});
  renderDrawerChat();
  setTimeout(()=>{
    MSGS.push({role:'bot',text:`已执行「${label}」，请在页面上查看更新结果。`,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
    renderDrawerChat();
  },600);
}

render();
</script>
</body>
</html>
