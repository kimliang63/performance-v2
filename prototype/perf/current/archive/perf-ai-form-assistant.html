<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - AI 表单辅助</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#4461d2;--pr50:#F0F3FB;--pr100:#DEE5F7;--pr200:#B8C5EE;--pr700:#3249a8;--pr900:#1E2F6E;
  --em:#3da453;--em50:#EFF8F1;--em100:#D4EEDB;--em200:#A8DDB6;--em700:#2D7E3F;
  --ac:#e8930c;--ac50:#FDF6E8;--ac100:#F9E6BD;--ac200:#F0CC7A;--ac700:#B06D06;
  --ro:#d94059;--ro50:#FDF0F2;--ro100:#F8D5DA;--ro200:#F0AAB5;--ro700:#A52F42;
  --vi:#7c5cfc;--vi50:#F3F0FE;--vi100:#E1DAFD;--vi200:#C2B4FB;--vi700:#5A3CD0;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#f3f4f6;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05);
  --shadow-card-hover:0 8px 20px -4px rgba(0,0,0,.08),0 2px 6px -2px rgba(0,0,0,.04);
  --shadow-dropdown:0 10px 40px -10px rgba(0,0,0,.12),0 2px 10px -2px rgba(0,0,0,.04);
  --shadow-modal:0 20px 60px -12px rgba(0,0,0,.18),0 4px 16px -4px rgba(0,0,0,.08);
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',sans-serif;
  --fm:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

/* Tab Bar */
.demo-tabs{display:flex;align-items:center;gap:0;padding:0 20px;background:var(--sf);border-bottom:1px solid var(--dv)}
.demo-tab{padding:12px 20px;font:500 13px/1 var(--f);color:var(--c5);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.demo-tab:hover{color:var(--c8)}
.demo-tab.on{color:var(--pr);border-bottom-color:var(--pr);font-weight:600}

/* Page Header */
.pg{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);width:100%;overflow:hidden}
.pg-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--dv)}
.pg-hd-l{display:flex;align-items:center;gap:14px}
.pg-hd-t{font:700 17px/1.2 var(--f);color:var(--c9);letter-spacing:-.2px}
.pg-hd-s{font:400 12px/1 var(--f);color:var(--c5);margin-top:3px}
.pg-a{display:flex;gap:8px;align-items:center}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}
.btn-w{background:var(--ac);color:#FFF}.btn-w:hover{background:var(--ac700)}
.btn-o{background:var(--sf);color:var(--pr);border:1px solid var(--pr200)}
.btn-o:hover{background:var(--pr50);border-color:var(--pr)}
.btn-d{background:transparent;color:var(--c5);border:1px solid transparent;padding:0 8px;height:28px}
.btn-d:hover{color:var(--ro);background:var(--ro50)}
.btn-sm{height:28px;padding:0 10px;font-size:12px}.btn-sm svg{width:12px;height:12px}

/* Inputs */
.inp{width:100%;padding:7px 10px;border:1px solid var(--c2);border-radius:var(--r1);font:400 13px/1 var(--f);color:var(--c9);background:var(--sf);transition:all .12s;outline:none}
.inp:focus{border-color:var(--pr);box-shadow:0 0 0 2px var(--pr50)}
.inp.num{font-family:var(--fm);text-align:right}
select.inp{-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23A1A1AA' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center;padding-right:24px;cursor:pointer}
textarea.inp{min-height:60px;resize:vertical;font-family:var(--f)}
.edit-cell{width:100%;border:1px solid var(--c2);border-radius:4px;padding:6px 8px;font:400 13px/1 var(--f);color:var(--c9);background:var(--sf);transition:all .12s;font-family:inherit}
.edit-cell:focus{outline:none;border-color:var(--pr);box-shadow:0 0 0 3px rgba(68,97,210,.1)}
select.edit-cell{-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23A1A1AA' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center;padding-right:24px}
textarea.edit-cell{resize:vertical;min-height:36px;line-height:1.4}

/* Module Section */
.mod-section{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:16px;overflow:hidden;border-left:3px solid var(--pr)}
.mod-section.em{border-left-color:var(--em)}
.mod-section.ac{border-left-color:var(--ac)}
.mod-section.vi{border-left-color:var(--vi)}
.mod-section.ro{border-left-color:var(--ro)}

.mod-hd{display:flex;align-items:center;padding:14px 20px;cursor:pointer;user-select:none;transition:background .12s;gap:12px}
.mod-hd:hover{background:var(--c0)}
.mod-hd-title{font:600 15px/1 var(--f);color:var(--c9);flex:1}
.mod-hd-weight{font:500 13px/1 var(--fm);color:var(--c5);padding:3px 10px;border-radius:var(--r1);background:var(--c1)}
.mod-hd-add{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r1);font:500 12px/1 var(--f);color:var(--pr);background:transparent;border:1px solid var(--pr200);cursor:pointer;transition:all .12s;font-family:inherit}
.mod-hd-add:hover{background:var(--pr50);border-color:var(--pr)}
.mod-hd-add svg{width:12px;height:12px}
.mod-hd-chevron{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--c4);transition:transform .25s;flex-shrink:0}
.mod-hd-chevron.open{transform:rotate(180deg)}
.mod-hd-chevron svg{width:14px;height:14px}

.mod-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.mod-body.open{max-height:4000px}

/* Goal Row */
.goal-row{border-top:1px solid var(--dv);transition:background .1s}
.goal-row:hover{background:var(--c0)}

.goal-summary{display:flex;align-items:center;padding:12px 20px;gap:12px;cursor:pointer}
.goal-name{flex:1;font:500 14px/1.3 var(--f);color:var(--c8)}
.goal-meta{display:flex;align-items:center;gap:12px;flex-shrink:0}
.goal-type{font:500 11px/1 var(--f);padding:2px 7px;border-radius:3px;background:var(--c1);color:var(--c6)}
.goal-type.quant{background:var(--pr50);color:var(--pr)}
.goal-type.qual{background:var(--vi50);color:var(--vi)}
.goal-weight{font:500 13px/1 var(--fm);color:var(--c7)}
.goal-chevron{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--c4);transition:transform .25s;flex-shrink:0}
.goal-chevron.open{transform:rotate(90deg)}
.goal-chevron svg{width:14px;height:14px}
.goal-actions{display:flex;align-items:center;gap:4px}
.goal-act{width:26px;height:26px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c4);background:transparent;border:none;transition:all .12s}
.goal-act:hover{background:var(--c1);color:var(--c7)}
.goal-act.del:hover{color:var(--ro);background:var(--ro50)}
.goal-act svg{width:14px;height:14px}

/* Goal Detail */
.goal-detail{padding:0 20px 16px 20px;display:none;border-top:1px solid var(--dv)}
.goal-detail.open{display:block}
.goal-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;margin-bottom:16px}
.gd-item{display:flex;flex-direction:column;gap:2px}
.gd-label{font:400 11px/1 var(--f);color:var(--c5)}
.gd-value{font:400 13px/1.4 var(--f);color:var(--c7)}
.gd-value.mono{font-family:var(--fm);font-weight:500}
.gd-value strong{font-weight:600;color:var(--c8)}

/* Measure Table */
.ms-table{width:100%;border-collapse:collapse;margin-top:8px}
.ms-table th{background:var(--c0);padding:8px 12px;font:500 12px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv)}
.ms-table td{padding:10px 12px;font:400 13px/1.4 var(--f);color:var(--c7);border-bottom:1px solid var(--dv)}
.ms-table tr:last-child td{border-bottom:none}
.ms-table tr:hover td{background:var(--c0)}
.ms-table .level{display:inline-flex;align-items:center;gap:4px}
.ms-table .level-dot{width:8px;height:8px;border-radius:50%}

/* Rule Box */
.rule-box{background:var(--c0);border:1px solid var(--c2);border-radius:var(--r2);padding:12px 16px;margin-top:8px}
.rule-box-code{font:400 13px/1.5 var(--fm);color:var(--c8);white-space:pre-wrap;word-break:break-all}
.rule-box-label{font:500 11px/1 var(--f);color:var(--c4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* Detail Sub-Section */
.detail-sub{margin-top:16px}
.detail-sub-hd{font:600 13px/1 var(--f);color:var(--c8);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.detail-sub-hd svg{width:14px;height:14px;color:var(--pr)}

/* Total Weight */
.total-weight{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--c0);border-radius:var(--r1);font:500 13px/1 var(--f);color:var(--c6)}
.total-weight .value{font-family:var(--fm);font-weight:600;font-size:15px}
.total-weight .value.valid{color:var(--em700)}
.total-weight .value.invalid{color:var(--ro)}

/* Info Grid */
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px 24px;border-bottom:1px solid var(--dv)}
.info-item{display:flex;flex-direction:column;gap:4px}
.info-label{font:500 11px/1 var(--f);color:var(--c4);text-transform:uppercase;letter-spacing:.5px}
.info-value{font:500 14px/1.3 var(--f);color:var(--c9)}

/* Indicator Table */
.ind-table{width:100%;border-collapse:collapse}
.ind-table th{background:var(--c0);padding:10px 12px;font:600 11px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--dv);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.ind-table td{padding:10px 12px;font:400 13px/1.4 var(--f);color:var(--c7);border-bottom:1px solid var(--dv);vertical-align:top}
.ind-table tr:last-child td{border-bottom:none}
.ind-table tr:hover td{background:var(--c0)}
.ind-name{font-weight:500;color:var(--c9)}
.ind-weight{font-family:var(--fm);font-weight:500;color:var(--c6);font-size:12px}
.ind-target{color:var(--c6);font-size:12px}
.module-row td{background:var(--pr50);font:600 12px/1 var(--f);color:var(--pr);padding:8px 12px;border-bottom:1px solid var(--pr100)}
.module-row td:first-child{border-left:3px solid var(--pr)}

/* Bottom Section */
.bottom-section{padding:20px 24px;border-top:1px solid var(--dv);background:var(--c0)}

/* Stats Row */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;padding:20px 24px}
.stats-card{display:flex;flex-direction:column;gap:4px;padding:16px;background:var(--c0);border-radius:var(--r2)}
.stats-card-label{font:500 12px/1 var(--f);color:var(--c5)}
.stats-card-value{font:700 24px/1 var(--fm);color:var(--c9)}
.stats-card-sub{font:400 11px/1 var(--f);color:var(--c4)}
.stats-card.highlight{background:var(--vi50);border:1px solid var(--vi100)}
.stats-card.highlight .stats-card-value{color:var(--vi)}

/* Distribution Bars */
.dist-bars{padding:16px 24px;margin-bottom:16px}
.dist-bars-hd{font:600 14px/1 var(--f);color:var(--c9);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dist-bars-hd svg{width:16px;height:16px;color:var(--pr)}
.dist-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.dist-bar-label{font:500 12px/1 var(--f);color:var(--c7);width:80px;text-align:right;flex-shrink:0}
.dist-bar-track{flex:1;height:24px;background:var(--c1);border-radius:4px;position:relative;overflow:hidden}
.dist-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.dist-bar-nums{font:500 12px/1 var(--fm);color:var(--c5);width:100px;flex-shrink:0;display:flex;gap:8px}
.dist-bar-cur{font-weight:600}
.dist-bar-cur.ok{color:var(--em700)}.dist-bar-cur.warn{color:var(--ac700)}.dist-bar-cur.error{color:var(--ro)}

/* Status Tabs */
.status-tabs{display:flex;align-items:center;gap:6px;padding:0 24px 12px}
.status-tab{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r1);font:500 12px/1 var(--f);color:var(--c5);cursor:pointer;border:1px solid var(--c2);background:var(--sf);transition:all .12s;font-family:inherit}
.status-tab:hover{border-color:var(--c3);color:var(--c7)}
.status-tab.on{background:var(--pr50);border-color:var(--pr200);color:var(--pr)}
.status-tab-count{font-family:var(--fm);font-size:11px;padding:1px 5px;border-radius:3px;background:var(--c1);color:var(--c6)}
.status-tab.on .status-tab-count{background:var(--pr100);color:var(--pr)}

/* Grade Tags */
.grade-tag{padding:2px 8px;border-radius:var(--r1);font:500 11px/1 var(--f)}
.grade-tag.exceed{background:var(--ac50);color:var(--ac700)}
.grade-tag.expect-plus{background:var(--em50);color:var(--em700)}
.grade-tag.expect{background:var(--pr50);color:var(--pr)}
.grade-tag.expect-minus{background:var(--vi50);color:var(--vi700)}
.grade-tag.below{background:var(--ro50);color:var(--ro)}
.grade-exceed{color:var(--ac700);background:var(--ac50)}
.grade-meet-plus{color:var(--em700);background:var(--em50)}
.grade-meet{color:var(--pr);background:var(--pr50)}
.grade-meet-minus{color:var(--vi700);background:var(--vi50)}
.grade-fail{color:var(--ro);background:var(--ro50)}

.change-mark{display:inline-flex;align-items:center;gap:4px;font:500 11px/1 var(--f);color:var(--ac);background:var(--ac50);padding:2px 8px;border-radius:var(--r1)}
.change-mark svg{width:12px;height:12px}
.emp-status-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r1);font:500 11px/1 var(--f)}
.emp-status-tag.submitted{background:var(--em50);color:var(--em700)}
.emp-status-tag.not-submitted{background:var(--ro50);color:var(--ro)}
.emp-status-tag.pending{background:var(--ac50);color:var(--ac700)}

/* Batch Table */
.batch-table{width:100%;border-collapse:collapse}
.batch-table th{position:sticky;top:0;z-index:10;background:var(--c0);font:600 12px/1 var(--f);color:var(--c5);padding:12px 16px;text-align:left;border-bottom:1px solid var(--c2);white-space:nowrap}
.batch-table td{padding:12px 16px;font:400 13px/1.4 var(--f);color:var(--c7);border-bottom:1px solid var(--dv);transition:background .1s}
.batch-table tr:hover td{background:var(--c0)}
.batch-table .name-cell{font-weight:500;color:var(--c9);cursor:pointer}
.batch-table .name-cell:hover{color:var(--pr)}
.batch-table .score-cell{font-family:var(--fm);font-weight:600}

/* Expanded Row */
.expand-row td{padding:0!important;background:var(--pr50)}
.expand-content{padding:16px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.expand-item{display:flex;flex-direction:column;gap:4px}
.expand-item-label{font:500 11px/1 var(--f);color:var(--c5)}
.expand-item-value{font:400 13px/1.3 var(--f);color:var(--c9)}

/* Batch Container */
.batch-container{display:flex;gap:20px;padding:0 24px 24px}
.batch-table-wrap{flex:1;overflow:auto;max-height:500px}

/* Action Cell */
.action-cell{display:flex;gap:4px}
.action-btn{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;border:none;background:transparent;color:var(--c4)}
.action-btn:hover{background:var(--pr50);color:var(--pr)}
.action-btn svg{width:14px;height:14px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--sf);border-radius:var(--r4);box-shadow:var(--shadow-modal);width:560px;max-height:80vh;display:flex;flex-direction:column;transform:scale(.96);transition:transform .2s ease}
.modal-overlay.open .modal{transform:scale(1)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--dv)}
.modal-title{font:600 16px/1 var(--f);color:var(--c9)}
.modal-close{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c4);background:transparent;border:none;transition:all .12s}
.modal-close:hover{background:var(--c1);color:var(--c7)}
.modal-close svg{width:16px;height:16px}
.modal-body{flex:1;overflow-y:auto;padding:16px 24px}
.modal-footer{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:14px 24px;border-top:1px solid var(--dv)}

/* Picker */
.picker-list{border:1px solid var(--c2);border-radius:var(--r2);max-height:400px;overflow-y:auto}
.picker-item{padding:12px 16px;border-bottom:1px solid var(--dv);cursor:pointer;transition:background .12s}
.picker-item:last-child{border-bottom:none}
.picker-item:hover{background:var(--pr50)}
.picker-item.selected{background:var(--pr50);border-left:3px solid var(--pr)}
.picker-item-name{font:500 13px/1.3 var(--f);color:var(--c8);margin-bottom:4px}
.picker-item-desc{font:400 12px/1.4 var(--f);color:var(--c5)}
.picker-item-preview{margin-top:8px;padding:8px 10px;background:var(--c0);border-radius:var(--r1);font:400 12px/1.4 var(--fm);color:var(--c6);border:1px solid var(--c2)}

/* Toast */
.toast{position:fixed;top:70px;right:24px;padding:12px 18px;border-radius:var(--r2);font:500 13px/1.3 var(--f);box-shadow:var(--shadow-dropdown);z-index:3000;transform:translateX(120%);transition:transform .25s ease}
.toast.on{transform:translateX(0)}
.toast.success{background:var(--em);color:#FFF}
.toast.error{background:var(--ro);color:#FFF}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}
.hidden{display:none!important}

/* AI Chat Sidebar */
body.chat-open #ct{margin-right:380px;transition:margin .3s ease}
.ai-chat{position:fixed;top:52px;right:0;width:380px;height:calc(100vh - 52px);background:var(--sf);border-left:1px solid var(--dv);z-index:900;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease}
body.chat-open .ai-chat{transform:translateX(0)}
.ai-chat-hd{padding:16px 20px;border-bottom:1px solid var(--dv);display:flex;align-items:center;gap:10px}
.ai-chat-hd-ic{width:32px;height:32px;border-radius:var(--r2);background:linear-gradient(135deg,var(--pr) 0%,var(--vi) 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-chat-hd-ic svg{width:16px;height:16px;color:#FFF}
.ai-chat-hd-t{font:600 14px/1.2 var(--f);color:var(--c9)}
.ai-chat-hd-s{font:400 11px/1 var(--f);color:var(--c5)}

function renderPage(){
  const ct=document.getElementById('ct');
  let html='<div class="demo-tabs">';
  [['goal','目标制定'],['eval','绩效评分'],['ratify','结果审定']].forEach(([k,l])=>{

  });
  html+='</div><div id="tabContent"></div>';
  ct.innerHTML=html;
  renderTabContent();
}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.demo-tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===tab));
  // Re-render tabs to update on state
  document.querySelectorAll('.demo-tab').forEach(t=>{
    const map={goal:'目标制定',eval:'绩效评分',ratify:'结果审定'};
    t.classList.toggle('on',t.textContent.trim()===map[tab]);
  });
  document.getElementById('tabContent').innerHTML='';
  renderTabContent();
  updateAiChat();
}

function renderTabContent(){
  const el=document.getElementById('tabContent');
  if(activeTab==='goal') renderGoalTab(el);
  else if(activeTab==='eval') renderEvalTab(el);

}

function goalUpdateTotals(){
  const tg=GOAL_MODULES.reduce((s,m)=>s+m.goals.length,0);
  const tw=GOAL_MODULES.reduce((s,m)=>s+m.goals.reduce((gs,g)=>gs+g.weight,0),0);
  const sumWeightEl=document.getElementById('sumWeight');
  const sumGoalsEl=document.getElementById('sumGoals');
  if(sumWeightEl){sumWeightEl.textContent=tw+'%';sumWeightEl.className='sum-val'+(tw===100?'':' warn');}
  if(sumGoalsEl)sumGoalsEl.textContent=tg;
  const barWeightEl=document.getElementById('barWeight');
  const barGoalsEl=document.getElementById('barGoals');
  if(barWeightEl){barWeightEl.textContent=tw+'%';barWeightEl.className='v '+(tw===100?'ok':'warn');}
  if(barGoalsEl)barGoalsEl.textContent=tg;
  const el=document.getElementById('validSummary');
  if(el){
    if(tw!==100){
      el.innerHTML=`<div class="sum-err"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>总权重 ${tw}%，需等于 100%</div>`;
    }else{
      el.innerHTML=tg>0?`<div style="display:flex;align-items:center;gap:6px;font:400 12px/1 var(--f);color:var(--em700);margin-top:8px;padding:8px 12px;background:var(--em50);border-radius:var(--r1);border:1px solid var(--em100)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>权重校验通过</div>`:'';
    }
  }
}

function goalValidateWeights(){
  const tw=GOAL_MODULES.reduce((s,m)=>s+m.goals.reduce((gs,g)=>gs+g.weight,0),0);
  if(tw!==100)return[`总权重 ${tw}%，需等于 100%`];
  return [];
}

function goalValidateAndSubmit(){
  const totalGoals=GOAL_MODULES.reduce((s,m)=>s+m.goals.length,0);
  if(totalGoals<2){showToast('至少需要填写2个目标');return}
  const errs=goalValidateWeights();
  if(errs.length){showToast(errs[0]);return}
  showToast('提交成功','success');
}

}

function saveEdit(){
  if(!editGoalId) return;
  const g = GOAL_MODULES[editModIdx].goals.find(g => g.id === editGoalId);
  if(!g) return;

  const nameEl = document.getElementById('ef_name');
  const weightEl = document.getElementById('ef_weight');

  // Clear previous error borders
  document.querySelectorAll('#esbBody .inp-err').forEach(el=>el.classList.remove('inp-err'));

  // Validate required fields
  let firstErr = null;
  if(!nameEl || !nameEl.value.trim()) { if(nameEl) nameEl.classList.add('inp-err'); if(!firstErr) firstErr = '请填写目标名称'; }
  if(!weightEl || !weightEl.value || parseInt(weightEl.value) <= 0) { if(weightEl) weightEl.classList.add('inp-err'); if(!firstErr) firstErr = '请填写权重'; }
  if(g.type==='quant'){
    if(!g.linkedIndicatorId){if(!firstErr)firstErr='请选择关联指标';}
    const targetEl=document.getElementById('ef_target');
    if(!targetEl||!targetEl.value){if(targetEl)targetEl.classList.add('inp-err');if(!firstErr)firstErr='请填写目标值';}
  }
  if(firstErr) { showToast(firstErr); return; }

  if(nameEl && !nameEl.readOnly) g.name = nameEl.value;
  if(weightEl) g.weight = parseInt(weightEl.value) || 0;

  if(g.type === 'quant'){
    const targetEl = document.getElementById('ef_target');
    const challengeEl = document.getElementById('ef_challenge');
    const baselineEl = document.getElementById('ef_baseline');
    if(targetEl && !targetEl.readOnly) g.target = parseFloat(targetEl.value) || 0;
    if(challengeEl && !challengeEl.readOnly) g.challenge = parseFloat(challengeEl.value) || 0;
    if(baselineEl && !baselineEl.readOnly) g.baseline = parseFloat(baselineEl.value) || 0;
  } else {
    const measureEl = document.getElementById('ef_measure');
    if(measureEl) g.measureText = measureEl.value;
  }

  closeEdit();
  renderTabContent();
}

  return html;
}

function getGradeClass(g){if(g==='远超预期')return'grade-exceed';if(g==='符合预期+')return'grade-meet-plus';if(g==='符合预期')return'grade-meet';if(g==='符合预期-')return'grade-meet-minus';if(g==='未达预期')return'grade-fail';return'';}

function evalSwitchMode(m){evalMode=m;renderTabContent();}
function evalSelectEmp(id){evalSelectedEmp=id;renderEvalEmpList();}
function evalSearchEmp(q){
  // Simple filter for batch mode
  renderEvalEmpList();
}
function evalUpdateScore(empId,modName,idx,field,value){const s=empScores[empId];const mod=s.find(m=>m.name===modName);if(mod){mod.indicators[idx][field]=value;if(field==='bonusType'){const v=Math.abs(parseFloat(mod.indicators[idx].bonus)||0);mod.indicators[idx].bonus=value==='penalty'?-v:v;}evalCalcTotal(empId);if(evalMode==='batch')renderEvalEmpList();}}
function evalCalcTotal(empId){const s=empScores[empId];let tw=0,tv=0,bs=0;s.forEach(m=>m.indicators.forEach(ind=>{if(ind.type==='bonus'){bs+=(ind.bonus||0);return;}const sc=gradeScores[ind.grade]||0;if(sc>0){tv+=sc*(ind.weight/100);tw+=ind.weight;}}));const base=tw>0?(tv/tw*100):0;const total=(base+bs).toFixed(1);const emp=EVAL_EMPLOYEES.find(e=>e.id===empId);if(emp)emp.score=parseFloat(total)||0;const el=document.getElementById('evalTotalScore');if(el)el.textContent=total;}
function confirmAiScore(){const s=empScores[evalSelectedEmp];s.forEach(m=>m.indicators.forEach(ind=>{if(ind.type!=='bonus')ind.aiFilled=true;}));renderTabContent();showToast('AI 评分已确认','success');}
function evalSubmitSingle(){const emp=EVAL_EMPLOYEES.find(e=>e.id===evalSelectedEmp);if(!emp)return;if(emp.score===0){showToast('请先完成评分再提交','error');return;}emp.status='scored';showToast(`已提交 ${emp.name} 的评分`,'success');}

// ========== TAB 3: RATIFICATION ==========
function gradeClass(g){if(g==='远超预期')return'exceed';if(g==='符合预期+')return'expect-plus';if(g==='符合预期')return'expect';if(g==='符合预期-')return'expect-minus';if(g==='低于预期')return'below';return'';}
function ratCalcDist(){const dist={};GRADES.forEach(g=>dist[g]=0);ratEmployees.forEach(e=>dist[e.adjusted]++);return dist;}
function distStatus(req,cur){if(req===0)return'ok';const r=cur/req;if(r>1)return'error';if(r>.8)return'warn';return'ok';}

function renderRatifyTab(container){
  const dist=ratCalcDist();
  const counts={all:ratEmployees.length,'已提交':0,'未提交':0,'待提交':0};
  ratEmployees.forEach(e=>{if(counts[e.status]!==undefined)counts[e.status]++;});

  let html=`<div class="pg fi" style="min-height:auto">`;

          提交

      </div>
    </div>
    <div class="pg-hd-info">
      <span>绩效周期: <strong>2026年Q2</strong></span>
      <span>发起日期: <strong>2026年5月</strong></span>
      <span>处理人: <strong>张明</strong></span>
      <span>部门: <strong>产品部</strong></span>
      <span>职位: <strong>高级产品经理</strong></span>
    </div>
  </div>`;

  // AI Suggest
  html+=`<div style="padding:16px 24px 0"><div class="ai-suggest" style="margin-bottom:0"><div class="ai-suggest-ic">${AI_IC}</div><div style="flex:1"><div class="ai-suggest-t">AI 已为 10 人自动分配审定等级</div><div class="ai-suggest-d">基于评分 + 强制分布规则，所有等级已分配。强制分布达标。</div><div class="ai-suggest-actions"><button class="btn btn-p btn-sm" onclick="ratConfirmAi()">确认全部</button><button class="btn btn-s btn-sm" onclick="toggleAiChat()">逐项审核</button><button class="btn btn-s btn-sm">撤销 AI 分配</button></div></div></div></div>`;

  // Stats Row (5-column grid)
  const totalAssigned=ratEmployees.filter(e=>e.adjusted).length;
  const totalUnassigned=ratEmployees.length-totalAssigned;
  const distOk=DISTRIBUTION.every(d=>(dist[d.grade]||0)<=d.requiredN);
  html+=`<div class="stats-row">`;
  html+=`<div class="stats-card"><span class="stats-card-label">总人数</span><span class="stats-card-value">${ratEmployees.length}</span></div>`;
  html+=`<div class="stats-card"><span class="stats-card-label">已分配</span><span class="stats-card-value" style="color:var(--em)">${totalAssigned}</span></div>`;
  html+=`<div class="stats-card"><span class="stats-card-label">未分配</span><span class="stats-card-value" style="color:${totalUnassigned>0?'var(--ac)':'var(--c4)'}">${totalUnassigned}</span></div>`;
  html+=`<div class="stats-card"><span class="stats-card-label">分布状态</span><span class="stats-card-value" style="font-size:14px;color:${distOk?'var(--em)':'var(--ro)'}">${distOk?'达标':'偏离'}</span></div>`;
  html+=`<div class="stats-card highlight"><span class="stats-card-label">AI 建议</span><span class="stats-card-value" style="font-size:14px">2 项调整</span><span class="stats-card-sub">点击查看建议</span></div>`;
  html+=`</div>`;

  html+=`<div style="padding:0 24px 24px;overflow-x:auto"><table class="batch-table"><thead><tr><th><input type="checkbox" onclick="toggleCheckAll(this)"></th><th>姓名</th><th>部门</th><th>职位</th><th>考核得分</th><th>当前等级</th><th>调整后等级</th><th>提交状态</th><th>变更</th><th>操作</th></tr></thead><tbody>`;

  filtered.forEach(emp=>{
    const idx=ratEmployees.indexOf(emp);
    html+=`<tr><td><input type="checkbox"></td>`;
    html+=`<td class="name-cell" onclick="ratToggleExpand(${idx})">${emp.name}${emp.aiFilled?AI_TAG:''}</td>`;
    html+=`<td>${emp.dept}</td><td>${emp.title}</td>`;
    html+=`<td class="score-cell">${emp.score}</td>`;
    html+=`<td><span class="grade-tag ${gradeClass(emp.grade)}">${emp.grade}</span></td>`;
    html+=`<td><select style="font:400 12px/1 var(--f);padding:4px 24px 4px 8px;height:28px;border-radius:4px;border:1px solid var(--c2)" onchange="ratGradeChange(${idx},this.value)">${GRADES.map(g=>`<option value="${g}" ${g===emp.adjusted?'selected':''}>${g}</option>`).join('')}</select></td>`;
    html+=`<td><span class="emp-status-tag ${{'已提交':'submitted','未提交':'not-submitted','待提交':'pending'}[emp.status]}">${emp.status}</span></td>`;
    html+=`<td>${emp.changed?'<span class="change-mark">'+I.arrowRight+' 已调整</span>':'<span style="color:var(--c4);font:400 11px/1 var(--f)">-</span>'}</td>`;
    html+=`<td class="action-cell"><button class="action-btn" onclick="ratToggleExpand(${idx})" title="详情">${I.eye}</button></td></tr>`;

      html+=`<div class="expand-item"><span class="expand-item-label">调整后等级</span><span class="expand-item-value"><span class="grade-tag ${gradeClass(emp.adjusted)}">${emp.adjusted}</span></span></div>`;

      html+=`</div></td></tr>`;

  html+=`</tbody></table></div></div>`;
  container.innerHTML=html;
}

function ratToggleExpand(idx){ratExpandedRows.has(idx)?ratExpandedRows.delete(idx):ratExpandedRows.add(idx);renderTabContent();}
function ratGradeChange(idx,val){ratEmployees[idx].adjusted=val;ratEmployees[idx].changed=val!==ratEmployees[idx].grade;renderTabContent();}
function ratSetFilter(f){ratStatusFilter=f;renderTabContent();}
function ratReset(){ratEmployees=JSON.parse(JSON.stringify(RAT_EMPLOYEES));ratExpandedRows.clear();renderTabContent();}
function ratConfirmAi(){ratEmployees.forEach(e=>{e.aiFilled=true;});renderTabContent();showToast('AI 分配已确认','success');}
function ratExport(){showToast('模板已导出','success');}
function toggleCheckAll(el){/* no-op for prototype */}
function ratSubmit(){
  const dist=ratCalcDist();
  const warnings=[];
  DISTRIBUTION.forEach(d=>{const actual=dist[d.grade]||0;if(actual>d.requiredN)warnings.push(`${d.grade}：要求<=${d.requiredN}人，当前${actual}人`);});
  if(warnings.length>0){
    const ov=document.createElement('div');ov.className='modal-overlay open';
    ov.innerHTML=`<div class="modal" style="width:400px"><div class="modal-header"><span class="modal-title">强制分布校验</span><button class="modal-close" onclick="this.closest('.modal-overlay').remove()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="modal-body"><p>以下等级超出强制分布限制：</p><ul style="margin:12px 0;padding-left:20px">${warnings.map(w=>`<li style="color:var(--ac);margin-bottom:6px;font:500 13px/1.4 var(--f)">${w}</li>`).join('')}</ul><p style="color:var(--ac);font-weight:500;margin-top:8px">弱控制模式下可继续提交但需确认。</p></div><div class="modal-footer"><button class="btn btn-s" onclick="this.closest('.modal-overlay').remove()">返回修改</button><button class="btn btn-w" onclick="this.closest('.modal-overlay').remove();showToast('已强制提交','success')">确认提交</button></div></div>`;
    document.body.appendChild(ov);
  } else {
    showToast('批量提交成功！','success');
  }
}

// ========== TOAST ==========
function showToast(msg,type){
  const t=document.getElementById('validateToast');
  if(t){
    document.getElementById('toastMsg').textContent=msg;
    t.className='validate-toast show'+(type==='success'?' success':type==='warn'?' warn':'');
    setTimeout(()=>t.classList.remove('show'),3000);
  }else{
    let t2=document.getElementById('toast');
    if(!t2){t2=document.createElement('div');t2.id='toast';t2.className='toast';document.body.appendChild(t2);}
    t2.textContent=msg;t2.className='toast '+(type||'success');
    setTimeout(()=>t2.classList.add('on'),10);setTimeout(()=>t2.classList.remove('on'),2500);
  }
}

    <div class="ai-chat-ft">
      <div class="ai-chat-upload" onclick="openUploadModal()" title="上传文件">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </div>
      <input class="ai-chat-input" id="chatInput" placeholder="描述你的目标，AI 帮你填写..." onkeydown="if(event.key==='Enter')sendAiMsg()"/>
      <button class="ai-chat-send" onclick="sendAiMsg()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>
  </div>
  <button class="ai-toggle" onclick="toggleAiChat()">${AI_IC}</button>`;
}

function renderAiChat(){
  const bd=document.getElementById('chatBd');if(!bd)return;
  const msgs=AI_MSGS[activeTab]||[];
  bd.innerHTML=msgs.map(m=>{
    let html=`<div class="ai-msg ${m.role}"><div class="ai-msg-bd">${m.text.replace(/\n/g,'<br/>')}</div>`;
    if(m.cards) html+=m.cards.map(c=>`<div class="ai-msg-card"><div class="ai-msg-card-t">${c.t}</div><div class="ai-msg-card-d">${c.d}</div><span class="ai-msg-card-tag ${c.tc}">${c.tag}</span></div>`).join('');
    if(m.actions) html+=`<div class="ai-msg-actions">${m.actions.map(a=>`<button class="ai-msg-btn${a.includes('确认')||a.includes('采纳')?' primary':''}">${a}</button>`).join('')}</div>`;
    if(m.time) html+=`<div class="ai-msg-time">${m.time}</div>`;
    html+=`</div>`;
    return html;
  }).join('');
  bd.scrollTop=bd.scrollHeight;
}

function updateAiChat(){
  const titles={goal:'AI 填写助手',eval:'AI 评分助手',ratify:'AI 审定助手'};
  const subs={goal:'基于历史目标 + 指标库 + 业务规则',eval:'基于目标完成度 + 历史评分',ratify:'基于评分 + 强制分布规则'};
  const placeholders={goal:'描述你的目标，AI 帮你填写...',eval:'输入评分指令...',ratify:'输入审定指令...'};
  const t=document.getElementById('chatHdTitle');if(t)t.textContent=titles[activeTab];
  const s=document.getElementById('chatHdSub');if(s)s.textContent=subs[activeTab];
  const p=document.getElementById('chatInput');if(p)p.placeholder=placeholders[activeTab];
  renderAiChat();
}

function sendAiMsg(){
  const input=document.getElementById('chatInput');const text=input.value.trim();if(!text)return;
  AI_MSGS[activeTab].push({role:'user',text});input.value='';renderAiChat();
  setTimeout(()=>{AI_MSGS[activeTab].push({role:'bot',text:'收到，正在分析你的需求...\n\n已根据你的描述更新内容，请查看表单中的变更。',time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});renderAiChat();},800);
}

function toggleAiChat(){document.body.classList.toggle('chat-open');}

/* ========== FILE UPLOAD ========== */
const PC_UPLOAD_DOCS={
  0:{name:'Q1述职报告_张明.pdf',size:'2.3 MB',
    title:'文档解析完成 — 目标数据',
    result:'已从述职报告中提取 6 条目标 + Q1 完成数据',
    detail:'产品迭代完成率(30%)、新增用户数(20%)、团队效能提升(10%)、人才培养(10%)、技术能力提升(8%)、业务理解深化(7%)'},
  1:{name:'Q1述职报告_张明.pdf',size:'2.3 MB',
    title:'文档解析完成 — 评分数据',
    result:'已从述职报告中提取完成数据，生成评分建议',
    detail:'产品迭代 108%→符合预期+、用户增长 4800→符合预期、营收 245万→远超预期'},
  2:{name:'部门绩效汇总_产品部.xlsx',size:'156 KB',
    title:'文档解析完成 — 审定数据',
    result:'已从汇总表中提取 10 人评分 + 等级建议',
    detail:'张三92→A、李四85→B+、赵六88→A、王五78→B、周八91→A'}
};

let uploadTimer=null;

function openUploadModal(){
  const doc=PC_UPLOAD_DOCS[activeTab];
  const modal=document.getElementById('uploadModal');
  document.getElementById('uploadFileName').textContent=doc.name;
  document.getElementById('uploadFileMeta').textContent=doc.size+' · PDF 文档';
  document.getElementById('uploadBar').style.width='0';
  document.getElementById('uploadBar').style.background='var(--pr)';
  document.getElementById('uploadResult').classList.remove('on');
  document.getElementById('uploadProgress').style.display='block';
  document.getElementById('uploadDropArea').style.display='none';
  document.getElementById('uploadFileArea').style.display='flex';
  document.getElementById('uploadApplyBtn').style.display='none';
  modal.classList.add('on');
  /* Animate progress */
  setTimeout(()=>document.getElementById('uploadBar').style.width='40%',100);
  setTimeout(()=>document.getElementById('uploadBar').style.width='70%',600);
  setTimeout(()=>document.getElementById('uploadBar').style.width='100%',1200);
  setTimeout(()=>{
    document.getElementById('uploadBar').style.background='var(--em)';
    document.getElementById('uploadProgress').style.display='none';
    const res=document.getElementById('uploadResult');
    res.classList.add('on');
    document.getElementById('uploadResultT').textContent=doc.title;
    document.getElementById('uploadResultD').textContent=doc.result+'\n'+doc.detail;
    document.getElementById('uploadApplyBtn').style.display='inline-flex';
  },1600);
}

function closeUploadModal(){
  document.getElementById('uploadModal').classList.remove('on');
}

function applyUploadData(){
  const doc=PC_UPLOAD_DOCS[activeTab];
  closeUploadModal();
  /* Add user message in chat */
  AI_MSGS[activeTab].push({role:'user',text:'📎 已上传 '+doc.name,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
  if(activeTab===0){
    /* Goal tab: fill goals */
    const vg=MODULES.find(m=>m.name==='价值观目标');
    if(vg&&vg.goals.length===0){
      vg.goals.push({name:'客户第一',indicator:'客户满意度',type:'q',weight:8,target:4.5,challenge:5,baseline:4,rule:'标准梯度计算',levels:[{l:'优秀',c:'var(--em)',s:'120分',d:'≥5.0'},{l:'良好',c:'var(--pr)',s:'100分',d:'≥4.5'},{l:'合格',c:'var(--ac)',s:'80分',d:'≥4.0'},{l:'不合格',c:'var(--ro)',s:'0分',d:'<4.0'}]});
      vg.goals.push({name:'团队协作',indicator:'跨部门协作项目',type:'q',weight:7,target:2,challenge:3,baseline:1,rule:'标准梯度计算',levels:[{l:'优秀',c:'var(--em)',s:'120分',d:'≥3个'},{l:'良好',c:'var(--pr)',s:'100分',d:'≥2个'},{l:'合格',c:'var(--ac)',s:'80分',d:'≥1个'},{l:'不合格',c:'var(--ro)',s:'0分',d:'<1个'}]});
    }
    renderGoalTab(document.getElementById('tabContent'));
    AI_MSGS[activeTab].push({role:'bot',text:'文档解析完成！已从 '+doc.name+' 中提取 6 条目标 + Q1 完成数据。\n\n价值观目标「客户第一」「团队协作」已自动填入，请查看表单。',time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
  } else if(activeTab===1){
    /* Eval tab: apply AI grades */
    EVAL_MODULES.forEach(m=>{m.items.forEach(it=>{it.grade=it.aiFill?'符合预期+':'符合预期';it.score=GRADE_SCORES[it.grade];});});
    renderEvalTab(document.getElementById('tabContent'));
    AI_MSGS[activeTab].push({role:'bot',text:'文档解析完成！已从述职报告中提取完成数据：\n\n- 产品迭代 108% → 符合预期+\n- 用户增长 4800 → 符合预期\n- 营收 245万 → 远超预期\n\n评分已自动更新，请查看表单。',time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
  } else {
    /* Ratify tab: apply AI grades */
    RAT_PERSONS.forEach(p=>{p.grade=p.aiGrade;p.aiMatch=true;});
    recalcDistribution();
    renderRatifyTab(document.getElementById('tabContent'));
    AI_MSGS[activeTab].push({role:'bot',text:'文档解析完成！已从汇总表中提取 10 人评分数据，等级已自动分配。\n\n强制分布已校验，发现 2 处偏离，AI 已给出调整建议。',time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
  }
  renderAiChat();
  showToast('已应用文档数据','success');
}

function triggerPcUpload(){
  closeUploadModal();
  openUploadModal();
}
</script>

<!-- Upload Modal -->
<div class="upload-modal" id="uploadModal" onclick="if(event.target===this)closeUploadModal()">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
