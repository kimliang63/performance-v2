<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1440"/>
<title>纵腾HRMS · 绩效管理</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ═══════════════════════════════════════
   Design System · 纵腾HRMS 绩效管理
   ═══════════════════════════════════════ */
:root {
  --primary: #0E66FB;
  --primary-light: #EBF2FF;
  --primary-hover: #0D5BD4;
  --success: #03B615;
  --success-light: #E6F9E8;
  --warning: #F5A623;
  --warning-light: #FFF7E6;
  --danger: #D9001B;
  --danger-light: #FFEBEE;
  --text-primary: #1A1D21;
  --text-secondary: #595E69;
  --text-tertiary: #8C9097;
  --text-placeholder: #BFBFBF;
  --bg-page: #F5F7FA;
  --bg-card: #FFFFFF;
  --bg-sidebar: #FFFFFF;
  --bg-header: #FFFFFF;
  --bg-hover: #F5F7FA;
  --bg-selected: #EBF2FF;
  --border: #E8ECF0;
  --border-light: #F0F2F5;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --sidebar-width: 220px;
  --header-height: 56px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', monospace;
  --grade-excellent: #03B615;
  --grade-good-plus: #1677FF;
  --grade-good: #0E66FB;
  --grade-good-minus: #F5A623;
  --grade-poor: #D9001B;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-sans);
  font-size: 14px;
  color: var(--text-primary);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
}
#root { height: 100vh; display: flex; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  z-index: 10;
}
.sidebar-logo {
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  border-bottom: 1px solid var(--border-light);
}
.sidebar-logo .logo-icon {
  width: 28px; height: 28px;
  background: var(--primary);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 14px;
}
.sidebar-logo .logo-text {
  font-size: 16px; font-weight: 600; color: var(--text-primary);
}
.sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
.nav-group { margin-bottom: 4px; }
.nav-group-title {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; height: 40px; cursor: pointer;
  color: var(--text-secondary); font-size: 13px; font-weight: 500;
  transition: all 0.15s;
  user-select: none;
}
.nav-group-title:hover { color: var(--text-primary); background: var(--bg-hover); }
.nav-group-title .arrow {
  transition: transform 0.2s; font-size: 10px; color: var(--text-tertiary);
}
.nav-group-title .arrow.open { transform: rotate(90deg); }
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px 0 28px; height: 36px; cursor: pointer;
  color: var(--text-secondary); font-size: 13px;
  transition: all 0.15s; position: relative;
}
.nav-item:hover { color: var(--text-primary); background: var(--bg-hover); }
.nav-item.active {
  color: var(--primary); background: var(--bg-selected); font-weight: 500;
}
.nav-item.active::before {
  content: '';
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 16px; background: var(--primary);
  border-radius: 0 2px 2px 0;
}
.nav-icon { width: 16px; height: 16px; opacity: 0.6; }
.nav-item.active .nav-icon { opacity: 1; }

/* ── Main Content ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.main-header {
  height: var(--header-height);
  background: var(--bg-header);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; flex-shrink: 0;
}
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.breadcrumb span { color: var(--text-tertiary); }
.breadcrumb a {
  color: var(--text-tertiary); text-decoration: none; cursor: pointer;
  transition: color 0.15s;
}
.breadcrumb a:hover { color: var(--primary); }
.breadcrumb .current { color: var(--text-primary); font-weight: 500; }
.header-right { display: flex; align-items: center; gap: 16px; }
.user-info {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  padding: 4px 8px; border-radius: var(--radius-sm);
  transition: background 0.15s;
}
.user-info:hover { background: var(--bg-hover); }
.user-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--primary-light); color: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
}
.user-name { font-size: 13px; color: var(--text-secondary); }
.main-content { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* ── Page Title ── */
.page-title {
  font-size: 18px; font-weight: 600; color: var(--text-primary);
  margin-bottom: 16px;
}

/* ── Cards ── */
.card {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 15px; font-weight: 600; color: var(--text-primary);
  margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  height: 32px; padding: 0 16px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: 1px solid transparent; transition: all 0.15s;
  white-space: nowrap; user-select: none;
  font-family: var(--font-sans);
}
.btn-primary {
  background: var(--primary); color: #fff; border-color: var(--primary);
}
.btn-primary:hover { background: var(--primary-hover); }
.btn-secondary {
  background: #fff; color: var(--text-secondary); border-color: var(--border);
}
.btn-secondary:hover { color: var(--text-primary); border-color: #d0d5dd; }
.btn-text {
  background: transparent; color: var(--primary); border-color: transparent;
  padding: 0 8px; height: 28px;
}
.btn-text:hover { background: var(--primary-light); }
.btn-danger-text {
  background: transparent; color: var(--danger); border-color: transparent;
  padding: 0 8px; height: 28px;
}
.btn-danger-text:hover { background: var(--danger-light); }
.btn-sm { height: 28px; padding: 0 12px; font-size: 12px; }
.btn-icon {
  width: 32px; height: 32px; padding: 0;
  background: #fff; border: 1px solid var(--border); border-radius: var(--radius-sm);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); transition: all 0.15s;
}
.btn-icon:hover { border-color: var(--primary); color: var(--primary); }

/* ── Form Elements ── */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 13px; color: var(--text-secondary);
  margin-bottom: 6px; font-weight: 500;
}
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-input {
  width: 100%; height: 32px; padding: 0 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; color: var(--text-primary);
  font-family: var(--font-sans);
  transition: border-color 0.15s, box-shadow 0.15s;
  outline: none;
}
.form-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(14,102,251,0.1);
}
.form-input::placeholder { color: var(--text-placeholder); }
.form-select {
  width: 100%; height: 32px; padding: 0 32px 0 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; color: var(--text-primary);
  font-family: var(--font-sans);
  background: #fff url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238C9097' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 12px center;
  appearance: none; cursor: pointer; outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(14,102,251,0.1);
}
.form-textarea {
  width: 100%; min-height: 80px; padding: 8px 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; color: var(--text-primary);
  font-family: var(--font-sans);
  resize: vertical; outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(14,102,251,0.1);
}
.form-radio-group { display: flex; gap: 20px; }
.form-radio {
  display: flex; align-items: center; gap: 6px; cursor: pointer;
  font-size: 13px; color: var(--text-primary);
}
.form-radio input[type="radio"] {
  width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer;
}
.form-row { display: flex; gap: 16px; }
.form-row .form-group { flex: 1; }

/* ── Table ── */
.table-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
thead th {
  background: #F8F9FA; color: var(--text-secondary); font-weight: 500;
  text-align: left; padding: 10px 12px; white-space: nowrap;
  border-bottom: 1px solid var(--border); font-size: 12px;
  letter-spacing: 0.02em;
}
tbody td {
  padding: 10px 12px; border-bottom: 1px solid var(--border-light);
  color: var(--text-primary); vertical-align: middle;
}
tbody tr { transition: background 0.1s; }
tbody tr:hover { background: var(--bg-hover); }
tbody tr:last-child td { border-bottom: none; }

/* ── Status Badge ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 10px;
  font-size: 12px; font-weight: 500;
}
.badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
}
.badge-progress { background: var(--primary-light); color: var(--primary); }
.badge-progress::before { background: var(--primary); }
.badge-success { background: var(--success-light); color: var(--success); }
.badge-success::before { background: var(--success); }
.badge-warning { background: var(--warning-light); color: #B26D00; }
.badge-warning::before { background: var(--warning); }
.badge-danger { background: var(--danger-light); color: var(--danger); }
.badge-danger::before { background: var(--danger); }
.badge-default { background: #F5F5F5; color: var(--text-tertiary); }
.badge-default::before { background: var(--text-tertiary); }

/* ── Grade Badge ── */
.grade {
  display: inline-flex; align-items: center;
  padding: 2px 10px; border-radius: 4px;
  font-size: 12px; font-weight: 600;
}
.grade-excellent { background: #E6F9E8; color: var(--grade-excellent); }
.grade-good-plus { background: #E6F0FF; color: var(--grade-good-plus); }
.grade-good { background: var(--primary-light); color: var(--grade-good); }
.grade-good-minus { background: #FFF7E6; color: #B26D00; }
.grade-poor { background: var(--danger-light); color: var(--grade-poor); }

/* ── Pagination ── */
.pagination {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; font-size: 13px; color: var(--text-secondary);
}
.pagination-pages { display: flex; gap: 4px; }
.pagination-pages button {
  width: 32px; height: 32px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); background: #fff; cursor: pointer;
  font-size: 13px; color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-family: var(--font-sans);
}
.pagination-pages button:hover { border-color: var(--primary); color: var(--primary); }
.pagination-pages button.active {
  background: var(--primary); color: #fff; border-color: var(--primary);
}

/* ── Stepper ── */
.stepper {
  display: flex; align-items: flex-start; gap: 0;
  padding: 20px 0; margin-bottom: 8px;
}
.step-item {
  display: flex; flex-direction: column; align-items: center;
  flex: 1; position: relative; cursor: pointer;
}
.step-item:not(:last-child)::after {
  content: '';
  position: absolute; top: 14px; left: calc(50% + 16px);
  width: calc(100% - 32px); height: 2px;
  background: var(--border);
}
.step-item.completed:not(:last-child)::after { background: var(--primary); }
.step-number {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  border: 2px solid var(--border); color: var(--text-tertiary);
  background: #fff; position: relative; z-index: 1;
  transition: all 0.2s;
}
.step-item.active .step-number {
  border-color: var(--primary); color: #fff; background: var(--primary);
}
.step-item.completed .step-number {
  border-color: var(--primary); color: #fff; background: var(--primary);
}
.step-label {
  margin-top: 8px; font-size: 12px; color: var(--text-tertiary);
  text-align: center; transition: color 0.2s;
  white-space: nowrap;
}
.step-item.active .step-label { color: var(--primary); font-weight: 600; }
.step-item.completed .step-label { color: var(--text-primary); }

/* ── Goal Card ── */
.goal-card {
  border: 1px solid var(--border); border-radius: var(--radius-md);
  margin-bottom: 12px; overflow: hidden;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.goal-card:hover { border-color: #d0d5dd; }
.goal-card.expanded { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
.goal-card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; cursor: pointer; user-select: none;
}
.goal-card-header:hover { background: var(--bg-hover); }
.goal-card-left { display: flex; align-items: center; gap: 12px; }
.goal-card-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.goal-card-meta {
  display: flex; align-items: center; gap: 12px; font-size: 12px;
}
.goal-card-meta .type-tag {
  padding: 1px 8px; border-radius: 3px;
  font-size: 11px; font-weight: 500;
}
.type-tag-quantitative { background: #E6F0FF; color: #1677FF; }
.type-tag-qualitative { background: #FFF7E6; color: #B26D00; }
.goal-card-weight { color: var(--text-secondary); }
.goal-card-actions { display: flex; gap: 4px; }
.goal-card-body {
  padding: 0 16px 16px;
  border-top: 1px solid var(--border-light);
}
.goal-detail-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px 24px; margin-top: 12px;
}
.goal-detail-item {}
.goal-detail-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 2px; }
.goal-detail-value { font-size: 13px; color: var(--text-primary); }

/* ── Section Summary ── */
.section-summary {
  display: flex; align-items: center; gap: 16px;
  padding: 10px 16px; background: var(--bg-page);
  border-radius: var(--radius-sm); margin-bottom: 12px;
  font-size: 13px; color: var(--text-secondary);
}
.section-summary .count { font-weight: 600; color: var(--primary); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 100;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.15s ease;
}
.modal {
  background: #fff; border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  width: 560px; max-height: 80vh; overflow-y: auto;
  animation: slideUp 0.2s ease;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border-light);
}
.modal-title { font-size: 15px; font-weight: 600; }
.modal-close {
  width: 28px; height: 28px; border: none; background: transparent;
  cursor: pointer; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary); font-size: 18px;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }
.modal-body { padding: 20px; }
.modal-footer {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 12px 20px; border-top: 1px solid var(--border-light);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ── Search Bar ── */
.search-bar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px;
}
.search-input-wrap {
  position: relative; width: 280px;
}
.search-input-wrap .search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-tertiary); font-size: 14px; pointer-events: none;
}
.search-input-wrap input {
  width: 100%; height: 32px; padding: 0 12px 0 32px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; outline: none; font-family: var(--font-sans);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-input-wrap input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(14,102,251,0.1);
}

/* ── Wizard Layout ── */
.wizard-layout {
  display: flex; gap: 24px; min-height: calc(100vh - 56px - 40px);
}
.wizard-sidebar {
  width: 200px; flex-shrink: 0;
}
.wizard-sidebar .progress-ring {
  width: 80px; height: 80px; margin: 0 auto 16px;
  position: relative;
}
.wizard-sidebar .progress-ring svg { transform: rotate(-90deg); }
.wizard-sidebar .progress-text {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: var(--primary);
}
.wizard-sidebar .progress-text small { font-size: 10px; color: var(--text-tertiary); font-weight: 400; }
.wizard-sidebar .step-list { list-style: none; }
.wizard-sidebar .step-list li {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; color: var(--text-secondary);
  transition: all 0.15s; margin-bottom: 2px;
}
.wizard-sidebar .step-list li:hover { background: var(--bg-hover); }
.wizard-sidebar .step-list li.active {
  color: var(--primary); background: var(--bg-selected); font-weight: 500;
}
.wizard-sidebar .step-list li.completed { color: var(--text-primary); }
.wizard-sidebar .step-list li .step-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0; transition: all 0.15s;
}
.step-dot-status-pending { background: var(--border); }
.step-dot-status-active { background: var(--primary); box-shadow: 0 0 0 3px rgba(14,102,251,0.2); }
.step-dot-status-done { background: var(--success); }
.step-dot-status-skipped { background: var(--text-tertiary); }
.step-dot-status-disabled { background: var(--border-light); }
.wizard-sidebar .step-list li.active {
  color: var(--primary); background: var(--bg-selected); font-weight: 500;
}
.wizard-sidebar .step-list li.done { color: var(--text-primary); }
.wizard-sidebar .step-list li .node-toggle {
  width: 16px; height: 16px; border-radius: 3px;
  border: 1.5px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; margin-left: auto;
}
.wizard-sidebar .step-list li .node-toggle:hover { border-color: var(--primary); }
.wizard-sidebar .step-list li .node-toggle.checked {
  background: var(--primary); border-color: var(--primary);
}
.wizard-sidebar .step-list li .node-toggle.checked svg { color: #fff; }
.wizard-main { flex: 1; min-width: 0; }

/* ── Distribution Chart ── */
.dist-chart { display: flex; gap: 12px; margin: 16px 0; }
.dist-bar {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.dist-bar-fill {
  width: 100%; border-radius: 4px 4px 0 0;
  transition: height 0.5s ease;
}
.dist-bar-label { font-size: 11px; color: var(--text-secondary); text-align: center; }
.dist-bar-value { font-size: 13px; font-weight: 600; }

/* ── Flow Diagram ── */
.flow-diagram {
  display: flex; align-items: center; gap: 0;
  padding: 24px; background: var(--bg-page);
  border-radius: var(--radius-md); margin: 16px 0;
  justify-content: center;
}
.flow-node {
  padding: 8px 20px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; white-space: nowrap;
}
.flow-node-start, .flow-node-end {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;

/* ── Wizard: Performance Assessment ── */
const WizardAssess = () => {
  const [weightEnabled, setWeightEnabled] = useState(false);
  const [weights, setWeights] = useState([
    { name: '员工自评', type: '处理', value: 0 },
    { name: '双线上级评分', type: '处理', value: 0 },
    { name: '直线上级评分', type: '处理', value: 0 },
    { name: '区域BP审批', type: '审批', value: -1 },
  ]);
  const editableWeights = weights.filter(w => w.value >= 0);
  const weightSum = editableWeights.reduce((s, w) => s + w.value, 0);
  const updateWeight = (i, val) => {
    const next = [...weights];
    next[i].value = Math.max(0, Math.min(100, parseInt(val) || 0));
    setWeights(next);
  };
  return (
    <AssessmentStepConfig title="考核环节｜绩效考核" stepKey="assess" extra={
      <div className="card">
        <div className="card-title">
          评分权重分配
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,fontWeight:400,cursor:'pointer'}}>
            <div onClick={() => setWeightEnabled(!weightEnabled)} style={{
              width:36,height:20,borderRadius:10,position:'relative',cursor:'pointer',
              background:weightEnabled?'var(--primary)':'var(--border)',
              transition:'background 0.2s',
            }}>
              <div style={{
                width:16,height:16,borderRadius:'50%',background:'#fff',
                position:'absolute',top:2,left:weightEnabled?18:2,
                transition:'left 0.2s',boxShadow:'0 1px 3px rgba(0,0,0,0.15)',
              }}/>
            </div>
            {weightEnabled ? '已开启' : '已关闭'}
          </label>
        </div>
        {weightEnabled && (
          <>
            <table>
              <thead><tr><th>#</th><th>节点名称</th><th>节点类型</th><th>评分权重 %</th></tr></thead>
              <tbody>
                {weights.map((w, i) => (
                  <tr key={i}>
                    <td>{i + 1}</td>
                    <td>{w.name}</td>
                    <td>{w.type}</td>
                    <td>
                      {w.value < 0 ? (
                        <span style={{color:'var(--text-tertiary)',fontSize:12}}>不参与评分</span>
                      ) : (
                        <input className="form-input" type="number" style={{width:80,height:28}}
                          value={w.value} min={0} max={100}
                          onChange={e => updateWeight(i, e.target.value)}/>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{
              marginTop:12,display:'flex',alignItems:'center',gap:8,
              fontSize:13,color:'var(--text-secondary)',
            }}>
              权重合计：
              <strong style={{color: weightSum === 100 ? 'var(--success)' : 'var(--danger)', fontSize:15}}>
                {weightSum}%
              </strong>
              {weightSum !== 100 && (
                <span style={{color:'var(--danger)',fontSize:12}}>(权重需合计100%)</span>
              )}
            </div>
          </>
        )}
      </div>
    }/>
  );
};

  const configNodes = WIZARD_STEPS.filter(s => s.isConfig);
  const enabledConfigNodes = configNodes.filter(s => nodeEnabled[s.key]);
  const doneCount = enabledConfigNodes.filter(s => nodeStates[s.key] === 'done').length;
  const progress = enabledConfigNodes.length > 0 ? Math.round((doneCount / enabledConfigNodes.length) * 100) : 0;
  const circumference = 2 * Math.PI * 34;
  const dashOffset = circumference - (progress / 100) * circumference;

  const toggleNode = (key) => {
    setNodeEnabled(prev => {
      const next = { ...prev, [key]: !prev[key] };
      // If disabling, also set state to disabled
      if (!next[key]) {
        setNodeStates(ns => ({ ...ns, [key]: 'disabled' }));
      } else {
        setNodeStates(ns => ({ ...ns, [key]: 'pending' }));
      }
      return next;
    });
  };

  const renderStep = () => {
    switch(step) {
      case 0: return <WizardBasic/>;
      case 1: return <WizardGroup/>;
      case 2: return <WizardGoal/>;
      case 3: return <WizardAssess/>;
      case 4: return <WizardReview/>;
      case 5: return <WizardSimpleStep title="结果确认" stepKey="confirm"/>;
      case 6: return <WizardSimpleStep title="绩效面谈" stepKey="interview"/>;
      default: return null;
    }
  };

  return (
    <>
      <Header breadcrumb={['绩效方案','新增绩效方案']}/>
      <div className="main-content">
        <div className="page-title">新增绩效方案</div>
        <div className="wizard-layout">
          <div className="wizard-sidebar">
            <div className="progress-ring">
              <svg width="80" height="80">
                <circle cx="40" cy="40" r="34" stroke="var(--border-light)" strokeWidth="6" fill="none"/>
                <circle cx="40" cy="40" r="34" stroke="var(--primary)" strokeWidth="6" fill="none"
                  strokeDasharray={circumference} strokeDashoffset={dashOffset}
                  strokeLinecap="round"/>
              </svg>
              <div className="progress-text">{progress}%<small>总进度</small></div>
            </div>
            <div style={{fontSize:11,color:'var(--text-tertiary)',margin:'0 0 12px',textAlign:'center'}}>
              配置完成 {doneCount}/{enabledConfigNodes.length}
            </div>
            <ul className="step-list">
              {WIZARD_STEPS.map((s, i) => {
                const status = nodeStates[s.key];
                const enabled = nodeEnabled[s.key];
                const isActive = i === step;
                const statusClass = !enabled ? 'disabled' : status;
                return (
                  <li key={s.key}
                    className={`${isActive ? 'active' : ''} ${status === 'done' ? 'done' : ''}`}
                    style={{opacity: enabled ? 1 : 0.45}}
                    onClick={() => enabled && setStep(i)}>
                    <span className={`step-dot step-dot-status-${statusClass}`}/>
                    <span style={{flex:1}}>{s.label}</span>
                    {s.isConfig && (
                      <span className={`node-toggle ${enabled ? 'checked' : ''}`}
                        onClick={(e) => { e.stopPropagation(); toggleNode(s.key); }}>
                        {enabled && <Icon name="check" size={10}/>}
                      </span>
                    )}
                  </li>
                );
              })}
            </ul>
            <div style={{
              marginTop:16, padding:'10px 12px',
              background:'var(--bg-page)', borderRadius:'var(--radius-sm)',
              fontSize:11, color:'var(--text-tertiary)', lineHeight:1.6,
            }}>
              <div style={{fontWeight:600,fontSize:12,color:'var(--text-secondary)',marginBottom:4}}>状态说明</div>
              <div className="flex items-center gap-6" style={{marginBottom:2}}>
                <span className="step-dot step-dot-status-done" style={{width:6,height:6}}/> 已完成
              </div>
              <div className="flex items-center gap-6" style={{marginBottom:2}}>
                <span className="step-dot step-dot-status-active" style={{width:6,height:6}}/> 进行中
              </div>
              <div className="flex items-center gap-6" style={{marginBottom:2}}>
                <span className="step-dot step-dot-status-pending" style={{width:6,height:6}}/> 未开始
              </div>
              <div className="flex items-center gap-6">
                <span className="step-dot step-dot-status-disabled" style={{width:6,height:6}}/> 已跳过
              </div>
            </div>
          </div>
          <div className="wizard-main">
            {renderStep()}
            <div style={{display:'flex',justifyContent:'space-between',marginTop:16}}>
              <button className="btn btn-secondary" onClick={() => step > 0 ? setStep(step - 1) : onNavigate('plan-list')}>
                {step === 0 ? '返回列表' : '上一步'}
              </button>
              <div className="flex gap-8">
                <button className="btn btn-secondary">保存草稿</button>
                {step < WIZARD_STEPS.length - 1 ? (
                  <button className="btn btn-primary" onClick={() => {
                    // Mark current step as done, next as active
                    setNodeStates(prev => ({
                      ...prev,
                      [WIZARD_STEPS[step].key]: 'done',
                      [WIZARD_STEPS[step + 1].key]: 'active',
                    }));
                    setStep(step + 1);
                  }}>下一步</button>
                ) : (
                  <button className="btn btn-primary" onClick={() => {
                    setNodeStates(prev => ({ ...prev, [WIZARD_STEPS[step].key]: 'done' }));
                    onNavigate('plan-list');
                  }}>提交</button>
                )}
              </div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
};
