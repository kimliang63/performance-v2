<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - AI 绩效分析</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5;transition:margin-right .3s ease}
body.chat-open{margin-right:380px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

/* Page Header */
.pg-hd{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:20px 24px;margin-bottom:20px}
.pg-hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.pg-hd-t{font:700 18px/1.3 var(--f);color:var(--c9)}
.pg-hd-tabs{display:flex;gap:2px;background:var(--c1);border-radius:var(--r1);padding:3px}
.pg-hd-tab{font:500 12px/1 var(--f);padding:6px 14px;border-radius:var(--r1);cursor:pointer;color:var(--c5);transition:all .12s;user-select:none}
.pg-hd-tab.on{background:var(--sf);color:var(--c8);box-shadow:0 1px 3px rgba(0,0,0,.06)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:18px 20px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat.pr::before{background:var(--pr)}.stat.em::before{background:var(--em)}.stat.vi::before{background:var(--vi)}.stat.ac::before{background:var(--ac)}
.stat-t{font:400 12px/1 var(--f);color:var(--c5);margin-bottom:8px}
.stat-v{font:700 28px/1 var(--f);color:var(--c9);margin-bottom:4px}
.stat-d{font:400 11px/1 var(--f);color:var(--c4);display:flex;align-items:center;gap:4px}
.stat-d svg{width:12px;height:12px}
.stat-d.up{color:var(--em700)}.stat-d.down{color:var(--ro)}
.stat-ic{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center}
.stat-ic svg{width:18px;height:18px}
.stat-ic.pr{background:var(--pr50);color:var(--pr)}
.stat-ic.em{background:var(--em50);color:var(--em)}
.stat-ic.vi{background:var(--vi50);color:var(--vi)}
.stat-ic.ac{background:var(--ac50);color:var(--ac)}

/* Section */
.sec{margin-bottom:24px}
.sec-t{font:600 15px/1.3 var(--f);color:var(--c9);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-t::before{content:'';width:3px;height:16px;background:var(--pr);border-radius:2px}

/* Chart Grid */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-card{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);overflow:hidden}
.chart-card-hd{padding:14px 20px;border-bottom:1px solid var(--dv);display:flex;align-items:center;justify-content:space-between}
.chart-card-t{font:600 14px/1.3 var(--f);color:var(--c8)}
.chart-card-body{padding:20px;min-height:200px}

/* Bar Chart */
.bar-chart{display:flex;align-items:flex-end;gap:12px;height:160px;padding:0 10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .5s ease;min-height:4px}
.bar-label{font:500 11px/1 var(--f);color:var(--c5);text-align:center}
.bar-value{font:600 12px/1 var(--f);color:var(--c8)}

/* Distribution */
.dist-row{display:flex;align-items:center;gap:12px;padding:8px 0}
.dist-label{font:500 13px/1 var(--f);color:var(--c7);width:40px;flex-shrink:0}
.dist-bar-wrap{flex:1;max-width:300px;height:24px;background:var(--c1);border-radius:var(--r1);overflow:hidden;position:relative}
.dist-bar{height:100%;border-radius:var(--r1);display:flex;align-items:center;padding-left:8px;transition:width .5s ease;max-width:100%}
.dist-bar span{font:600 11px/1 var(--f);color:#FFF;white-space:nowrap}
.dist-target{position:absolute;top:0;height:100%;width:2px;background:var(--c9);opacity:.5}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font:600 12px/1 var(--f);color:var(--c5);text-align:left;padding:10px 16px;background:var(--c0);border-bottom:1px solid var(--dv);position:sticky;top:0}
.tbl td{font:400 13px/1.4 var(--f);color:var(--c7);padding:12px 16px;border-bottom:1px solid var(--dv)}
.tbl tr:hover td{background:var(--c0)}
.tag{font:500 10px/1 var(--f);padding:2px 7px;border-radius:3px;display:inline-block}
.tag.pr{color:var(--pr);background:var(--pr50)}
.tag.em{color:var(--em700);background:var(--em50)}
.tag.ac{color:var(--ac700);background:var(--ac50)}
.tag.ro{color:var(--ro);background:var(--ro50)}
.tag.vi{color:var(--vi);background:var(--vi50)}

/* AI Insight Card */
.insight{background:linear-gradient(135deg,var(--pr50) 0%,var(--vi50) 100%);border:1px solid var(--pr100);border-radius:var(--r3);padding:20px;margin-bottom:20px}
.insight-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.insight-ic{width:36px;height:36px;border-radius:var(--r2);background:linear-gradient(135deg,var(--pr) 0%,var(--vi) 100%);display:flex;align-items:center;justify-content:center}
.insight-ic svg{width:18px;height:18px;color:#FFF}
.insight-t{font:600 14px/1.3 var(--f);color:var(--c9)}
.insight-items{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.insight-item{background:var(--sf);border-radius:var(--r2);padding:14px;border:1px solid var(--pr100)}
.insight-item-t{font:600 12px/1.3 var(--f);color:var(--c8);margin-bottom:4px}
.insight-item-d{font:400 12px/1.5 var(--f);color:var(--c6)}

/* Role Match Cards */
.role-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.role-card{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);padding:16px;text-align:center}
.role-card-ic{width:48px;height:48px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font:700 16px/1 var(--f);color:#FFF}
.role-card-n{font:600 13px/1.3 var(--f);color:var(--c8);margin-bottom:2px}
.role-card-d{font:400 11px/1.4 var(--f);color:var(--c5);margin-bottom:8px}
.role-card-score{font:700 24px/1 var(--f)}
.role-card-label{font:400 10px/1 var(--f);color:var(--c4);margin-top:2px}

/* Dropdown */
.dropdown{height:32px;padding:0 28px 0 12px;border:1px solid var(--c2);border-radius:var(--r1);font:500 13px/1 var(--f);color:var(--c8);background:var(--sf) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23A1A1AA' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center;appearance:none;cursor:pointer;outline:none;min-width:140px}
.dropdown:focus{border-color:var(--pr)}

/* Trend bars */
.trend-bars{display:flex;align-items:flex-end;gap:20px;height:140px;padding:0 20px}
.trend-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.trend-bar{width:100%;border-radius:4px 4px 0 0;transition:height .5s ease}
.trend-label{font:500 12px/1 var(--f);color:var(--c5)}
.trend-val{font:600 13px/1 var(--f);color:var(--c8)}

/* AI Chat Sidebar */
body.chat-open .ct-wrap{margin-right:380px;transition:margin .3s ease}
.ai-chat{position:fixed;top:0;right:0;width:380px;height:100vh;background:var(--sf);border-left:1px solid var(--dv);z-index:900;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease}
body.chat-open .ai-chat{transform:translateX(0)}
.ai-chat-hd{padding:16px 20px;border-bottom:1px solid var(--dv);display:flex;align-items:center;gap:10px}
.ai-chat-hd-ic{width:32px;height:32px;border-radius:var(--r2);background:linear-gradient(135deg,var(--pr) 0%,var(--vi) 100%);display:flex;align-items:center;justify-content:center}
.ai-chat-hd-ic svg{width:16px;height:16px;color:#FFF}
.ai-chat-hd-info{flex:1;min-width:0}
.ai-chat-hd-t{font:600 14px/1.2 var(--f);color:var(--c9)}
.ai-chat-hd-s{font:400 11px/1 var(--f);color:var(--c5)}
.ai-chat-close{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:transparent;color:var(--c5);transition:all .12s}
.ai-chat-close:hover{background:var(--c1);color:var(--c7)}
.ai-chat-bd{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.ai-msg{max-width:92%;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ai-msg.bot{align-self:flex-start}
.ai-msg.user{align-self:flex-end}
.ai-msg-bd{padding:12px 16px;border-radius:var(--r3);font:400 13px/1.6 var(--f)}
.ai-msg.bot .ai-msg-bd{background:var(--c0);color:var(--c8);border-bottom-left-radius:4px}
.ai-msg.user .ai-msg-bd{background:var(--pr);color:#FFF;border-bottom-right-radius:4px}
.ai-msg-time{font:400 10px/1 var(--f);color:var(--c4);margin-top:4px}
.ai-msg.user .ai-msg-time{text-align:right}
.ai-msg-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ai-msg-btn{font:500 11px/1 var(--f);padding:5px 10px;border-radius:var(--r1);border:1px solid var(--c2);background:var(--sf);color:var(--c6);cursor:pointer;transition:all .12s}
.ai-msg-btn:hover{border-color:var(--pr);color:var(--pr);background:var(--pr50)}
.ai-msg-btn.primary{border-color:var(--pr);color:var(--pr);background:var(--pr50)}
.ai-msg-card{background:var(--sf);border:1px solid var(--c2);border-radius:var(--r2);padding:12px;margin-top:8px}
.ai-msg-card-t{font:600 12px/1.3 var(--f);color:var(--c8);margin-bottom:6px}
.ai-msg-card-row{display:flex;justify-content:space-between;padding:4px 0;font:400 12px/1.4 var(--f);color:var(--c6)}
.ai-msg-card-row .v{font-weight:600;color:var(--c8)}
.ai-msg-card-tag{display:inline-block;font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px;margin-top:6px}
.ai-msg-card-tag.em{color:var(--em700);background:var(--em50)}
.ai-msg-card-tag.pr{color:var(--pr);background:var(--pr50)}
.ai-msg-card-tag.ac{color:var(--ac700);background:var(--ac50)}
.ai-chat-ft{padding:12px 16px;border-top:1px solid var(--dv);display:flex;gap:8px;align-items:center}
.ai-chat-input{flex:1;height:36px;border:1px solid var(--c2);border-radius:var(--r2);padding:0 12px;font:400 13px/1 var(--f);color:var(--c8);outline:none;transition:border .15s}
.ai-chat-input:focus{border-color:var(--pr)}
.ai-chat-send{width:36px;height:36px;border-radius:var(--r2);background:var(--pr);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#FFF;transition:all .12s}
.ai-chat-send:hover{background:var(--pr700)}

/* AI Toggle */
.ai-toggle{position:fixed;bottom:80px;right:24px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--pr) 0%,var(--vi) 100%);border:none;box-shadow:0 4px 16px rgba(37,99,235,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:950;transition:all .2s}
.ai-toggle:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(37,99,235,.4)}
.ai-toggle svg{width:22px;height:22px;color:#FFF}
body.chat-open .ai-toggle{display:none}
</style>
</head>

// ═══ Tab 2: Team Analysis ═══

function renderDeptDetail(dept) {

  return `<div class="chart-grid" style="margin-bottom:16px">
    <div class="chart-card">
      <div class="chart-card-hd"><div class="chart-card-t">${dept.name} - 绩效等级分布</div><span class="tag pr">AI</span></div>
      <div class="chart-card-body">
        ${dist.map(r => `
        <div class="dist-row">
          <span class="dist-label" style="font-weight:700;color:${colors[r.grade]||'var(--c6)'}">${r.grade}</span>
          <div class="dist-bar-wrap">
            <div class="dist-bar" style="width:${r.pct}%;background:${colors[r.grade]||'var(--c4)'}"><span>${r.pct}%</span></div>
          </div>
        </div>`).join('')}
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-card-hd"><div class="chart-card-t">${dept.name} - 关键指标</div><span class="tag pr">AI</span></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">

            { label:'平均绩效分', value: dept.avgScore, suffix:'' },
            { label:'完成率', value: dept.completion, suffix:'%' },
            { label:'人数', value: dept.headcount, suffix:' 人' },
            { label:'趋势', value: { up:'上升 ↑', down:'下降 ↓', stable:'平稳 →' }[dept.trend], suffix:'' },

            <div style="font:700 22px/1 var(--f);color:var(--c9)">${m.value}${m.suffix}</div>
          </div>`).join('')}
        </div>
        <div style="margin-top:12px;font:400 12px/1.5 var(--f);color:var(--c5)">
          AI 建议: ${dept.suggestion}
        </div>
      </div>
    </div>
  </div>`;
}

// ═══ Tab 3: Role Matching ═══

// ═══ Tab 4: Trend Insights ═══
function renderTrendTab() {
  const maxScore = 90;
  const priorityLabel = { high:'高', medium:'中', low:'低' };
  const priorityColor = { high:'ro', medium:'ac', low:'em' };

  return `<div class="sec">
    <div class="sec-t">绩效归因分析 — AI 识别关键影响因子</div>
    <div style="background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);overflow:hidden">
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr>
            <th>影响因子</th><th>相关系数</th><th>影响方向</th><th>AI 建议</th><th>优先级</th>
          </tr></thead>
          <tbody>
            ${TREND_FACTORS.map(f => `<tr>
              <td><b>${f.name}</b><br/><span style="font-size:11px;color:var(--c5)">${f.desc}</span></td>
              <td><span class="tag ${f.coef>=0?'em':'ac'}">${f.coef>0?'+':''}${f.coef.toFixed(2)}</span></td>
              <td style="color:${f.dir==='up'?'var(--em700)':'var(--ro)'}">${f.dir==='up'?'正相关 ↑':'负相关 ↓'}</td>
              <td style="font-size:12px;color:var(--c6)">${f.suggestion}</td>
              <td><span class="tag ${priorityColor[f.priority]}">${priorityLabel[f.priority]}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-t">季度绩效趋势</div>
    <div class="chart-card">
      <div class="chart-card-hd">
        <div class="chart-card-t">全公司平均绩效得分趋势 (2026)</div>
        <span class="tag pr">AI 分析</span>
      </div>
      <div class="chart-card-body">
        <div class="trend-bars">
          ${TREND_QUARTERS.map((q, i) => {
            const h = (q.score / maxScore) * 100;
            return `<div class="trend-col">
              <div class="trend-val">${q.score}</div>
              <div class="trend-bar" style="height:${h}%;background:${i===TREND_QUARTERS.length-1?'var(--pr)':'var(--pr200)'}"></div>
              <div class="trend-label">${q.q}</div>
            </div>`;
          }).join('')}
        </div>
        <div style="margin-top:16px;font:400 12px/1.5 var(--f);color:var(--c5)">
          AI 趋势分析: 全公司绩效呈稳步上升趋势，Q1→Q2 提升最为显著(+2.5分)。Q3→Q4 增速放缓，建议关注目标挑战性设置。
        </div>
      </div>

  </div>`;
}

// ═══ Tab Switching ═══
function switchTab(id) {
  curTab = id;
  render();
}

// ═══ AI Chat ═══
function toggleChat() {
  chatOpen = !chatOpen;
  document.body.classList.toggle('chat-open', chatOpen);
  renderChat();
}

function renderChat() {
  const el = document.getElementById('aiChat');
  if (!el) return;
  el.innerHTML = `
    <div class="ai-chat-hd">
      <div class="ai-chat-hd-ic">${I.brain}</div>
      <div class="ai-chat-hd-info">
        <div class="ai-chat-hd-t">AI 分析助手</div>
        <div class="ai-chat-hd-s">深度洞察 · 智能归因 · 决策支持</div>
      </div>
      <button class="ai-chat-close" onclick="toggleChat()">${I.close}</button>
    </div>
    <div class="ai-chat-bd" id="chatBd">
      ${CHAT_MSGS.map(m => renderChatMsg(m)).join('')}
    </div>
    <div class="ai-chat-ft">
      <input class="ai-chat-input" id="chatInput" placeholder="输入分析指令，如「按司龄分析」「生成报告」..." onkeydown="if(event.key==='Enter')sendMsg()" />
      <button class="ai-chat-send" onclick="sendMsg()">${I.send}</button>
    </div>`;
  scrollChatBottom();
}

function renderChatMsg(m) {
  let html = `<div class="ai-msg ${m.role}">
    <div class="ai-msg-bd">${m.text}</div>`;
  if (m.card) {
    html += `<div class="ai-msg-card">
      <div class="ai-msg-card-t">${m.card.title}</div>
      ${m.card.rows.map(r => `<div class="ai-msg-card-row"><span>${r.label}</span><span class="v">${r.value}</span> <span class="ai-msg-card-tag ${r.tagCls}">${r.tag}</span></div>`).join('')}
      ${m.card.note ? `<div style="margin-top:8px;font:400 11px/1.5 var(--f);color:var(--c5)">${m.card.note}</div>` : ''}
    </div>`;
  }
  if (m.buttons) {
    html += `<div class="ai-msg-actions">
      ${m.buttons.map((b, i) => `<button class="ai-msg-btn${i===0?' primary':''}" onclick="clickSuggest('${b}')">${b}</button>`).join('')}
    </div>`;
  }
  html += `<div class="ai-msg-time">${m.role==='bot'?'AI · ':'你 · '}刚刚</div></div>`;
  return html;
}

function scrollChatBottom() {
  const bd = document.getElementById('chatBd');
  if (bd) setTimeout(() => bd.scrollTop = bd.scrollHeight, 50);
}

function clickSuggest(text) {
  const input = document.getElementById('chatInput');
  if (input) { input.value = text; sendMsg(); }
}

function sendMsg() {
  const input = document.getElementById('chatInput');
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();
  input.value = '';

  CHAT_MSGS.push({ role: 'user', text });
  renderChatMsgs();

  setTimeout(() => {
    CHAT_MSGS.push({
      role: 'bot',
      text: `已为你分析「${text}」。基于当前 232 人绩效数据，AI 正在生成深度分析报告，预计 3 秒后完成。`,
      card: { title: '分析结果预览', rows: [
        { label: '覆盖人数', value: '232 人', tag: '全量', tagCls: 'pr' },
        { label: '数据维度', value: '6 个部门', tag: '完整', tagCls: 'em' },
        { label: '分析深度', value: '多维交叉', tag: 'AI 驱动', tagCls: 'ac' },
      ]}
    });
    renderChatMsgs();
    scrollChatBottom();
  }, 600);
}

function renderChatMsgs() {
  const bd = document.getElementById('chatBd');
  if (!bd) return;
  bd.innerHTML = CHAT_MSGS.map(m => renderChatMsg(m)).join('');
  scrollChatBottom();
}

// ═══ Init ═══
GHR_NAV.init('perf', 'AI 绩效分析');
render();
</script>
