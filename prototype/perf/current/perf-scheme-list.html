<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 绩效方案</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   GHR 绩效方案列表 — Quiet Precision
   ═══════════════════════════════════════════════════════ */
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadow-card-hover:0 8px 20px -4px rgba(0,0,0,.08),0 2px 6px -2px rgba(0,0,0,.04);
  --shadow-dropdown:0 10px 40px -10px rgba(0,0,0,.12),0 2px 10px -2px rgba(0,0,0,.04);
  --header-h:52px;
  --r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--f);background:var(--bg);color:var(--c7);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;line-height:1.5;
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}

/* Header styles moved to navigation.js */

/* ═══ BUTTONS ═══ */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:0 14px;height:32px;border-radius:var(--r1);
  font:500 13px/1 var(--f);cursor:pointer;
  transition:all .12s;border:none;font-family:inherit;
}
.btn svg{width:13px;height:13px}
.btn-p{background:var(--pr);color:#FFF}
.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}
.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}
.btn-d{background:var(--sf);color:var(--ro);border:1px solid var(--ro100)}
.btn-d:hover{background:var(--ro50);border-color:var(--ro)}
.btn-w{background:var(--sf);color:var(--ac700);border:1px solid var(--ac100)}
.btn-w:hover{background:var(--ac50);border-color:var(--ac)}
.btn-t{background:transparent;color:var(--c6);border:none;padding:0 8px;height:28px;font-size:12px}
.btn-t:hover{color:var(--pr);background:var(--pr50)}
.btn-t.danger{color:var(--ro)}.btn-t.danger:hover{background:var(--ro50)}

/* ═══ STATS ═══ */
.st-g{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:12px;margin-bottom:20px;
}
.st{
  background:var(--sf);border-radius:var(--r3);
  padding:16px 18px;transition:all .2s;
  box-shadow:var(--shadow-card);position:relative;overflow:hidden;
}
.st::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.st:nth-child(1)::before{background:var(--pr)}
.st:nth-child(2)::before{background:var(--em)}
.st:nth-child(3)::before{background:var(--c4)}
.st:nth-child(4)::before{background:var(--ac)}
.st:hover{box-shadow:var(--shadow-card-hover);transform:translateY(-1px)}
.st-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.st-ic{
  width:32px;height:32px;border-radius:var(--r1);
  display:flex;align-items:center;justify-content:center;
}
.st-ic svg{width:16px;height:16px;color:#FFF}
.st-ic.b{background:var(--pr)}
.st-ic.g{background:var(--em)}
.st-ic.gr{background:var(--c5)}
.st-ic.y{background:var(--ac)}
.st-v{font-family:var(--m);font-size:24px;font-weight:700;color:var(--c9);line-height:1;margin-bottom:4px;letter-spacing:-.3px}
.st-l{font:400 13px/1 var(--f);color:var(--c5)}

/* ═══ FILTER BAR ═══ */
.fl-bar{
  background:var(--sf);border-radius:var(--r3);
  box-shadow:var(--shadow-card);
  padding:16px 20px;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.fl-search{
  display:flex;align-items:center;gap:6px;
  background:var(--c0);border:1px solid var(--c2);
  border-radius:var(--r1);padding:0 10px;height:32px;
  min-width:200px;transition:all .15s;
}
.fl-search:focus-within{background:var(--sf);border-color:var(--pr)}
.fl-search svg{color:var(--c4);flex-shrink:0;width:13px;height:13px}
.fl-search input{
  border:none;background:transparent;outline:none;
  font:13px/1 var(--f);width:100%;color:var(--c9);
}
.fl-search input::placeholder{color:var(--c4)}
.fl-sel{
  height:32px;padding:0 28px 0 10px;border:1px solid var(--c2);
  border-radius:var(--r1);font:400 13px/1 var(--f);color:var(--c7);
  background:var(--sf) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23A1A1AA' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center;
  appearance:none;cursor:pointer;transition:all .12s;outline:none;
  -webkit-appearance:none;-moz-appearance:none;
}
.fl-sel:focus{border-color:var(--pr)}
.fl-date{
  height:32px;padding:0 10px;border:1px solid var(--c2);
  border-radius:var(--r1);font:400 13px/1 var(--f);color:var(--c7);
  background:var(--sf);transition:all .12s;outline:none;width:130px;
}
.fl-date:focus{border-color:var(--pr)}
.fl-sep{font:400 12px/1 var(--f);color:var(--c4);padding:0 2px}
.fl-actions{display:flex;gap:6px;margin-left:auto}

/* ═══ TABLE CARD ═══ */
.tbl-card{
  background:var(--sf);border-radius:var(--r3);
  box-shadow:var(--shadow-card);overflow:hidden;
}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
thead{position:sticky;top:0;z-index:2}
thead th{
  background:var(--c0);font:600 12px/1 var(--f);color:var(--c5);
  text-align:left;padding:10px 14px;border-bottom:1px solid var(--dv);
  white-space:nowrap;letter-spacing:.2px;
  text-transform:uppercase;
}
tbody td{
  font:400 13px/1.4 var(--f);color:var(--c7);
  padding:12px 14px;border-bottom:1px solid var(--dv);
  vertical-align:middle;
}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--c0)}
tbody tr:nth-child(even){background:var(--c0)}
tbody tr:nth-child(even):hover{background:var(--pr50)}
tbody tr:last-child td{border-bottom:none}

/* ═══ TABLE CELL STYLES ═══ */
.cell-name{font-weight:500;color:var(--c9);min-width:180px}
.cell-code{font-family:var(--m);font-size:12px;color:var(--c5);letter-spacing:.3px}
.cell-cycle{
  display:inline-flex;align-items:center;gap:4px;
  font:500 11px/1 var(--f);padding:3px 8px;border-radius:var(--r1);
  background:var(--pr50);color:var(--pr);
}
.cell-status{
  display:inline-flex;align-items:center;gap:4px;
  font:500 11px/1 var(--f);padding:3px 10px;border-radius:var(--r1);
  white-space:nowrap;
}
.cell-status.enabled{color:var(--em700);background:var(--em50)}
.cell-status.disabled{color:var(--c5);background:var(--c1)}
.cell-status.draft{color:var(--ac700);background:var(--ac50)}
.cell-act{font:500 12px/1 var(--f);color:var(--c6)}
.cell-act-count{font-family:var(--m);font-weight:600;color:var(--pr)}
.cell-progress{display:flex;align-items:center;gap:8px;min-width:100px}
.progress-bar{flex:1;height:6px;background:var(--c1);border-radius:3px;overflow:hidden;max-width:80px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s ease}
.progress-fill.high{background:var(--em)}
.progress-fill.mid{background:var(--ac)}
.progress-fill.low{background:var(--ro)}
.progress-text{font:600 11px/1 var(--m);color:var(--c6);min-width:28px;text-align:right}
.cell-creator{font:400 12px/1 var(--f);color:var(--c6)}
.cell-date{font:400 12px/1 var(--f);color:var(--c5);font-family:var(--m);font-size:11px}
.cell-actions{display:flex;align-items:center;gap:2px;white-space:nowrap}

/* ═══ PAGINATION ═══ */
.pg-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-top:1px solid var(--dv);
  font:400 12px/1 var(--f);color:var(--c5);
}
.pg-info{display:flex;align-items:center;gap:16px}
.pg-nav{display:flex;align-items:center;gap:4px}
.pg-btn{
  width:28px;height:28px;border-radius:var(--r1);
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--c2);background:var(--sf);cursor:pointer;
  color:var(--c5);font:500 12px/1 var(--f);transition:all .12s;
}
.pg-btn:hover{border-color:var(--pr);color:var(--pr)}
.pg-btn.on{background:var(--pr);border-color:var(--pr);color:#FFF}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-btn svg{width:12px;height:12px}

/* ═══ MODAL ═══ */
.modal-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.35);
  z-index:2000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-ov.on{opacity:1;pointer-events:all}
.modal{
  background:var(--sf);border-radius:var(--r4);
  box-shadow:0 20px 60px -15px rgba(0,0,0,.2);
  width:420px;max-width:90vw;
  transform:translateY(8px) scale(.98);transition:transform .2s ease;
}
.modal-ov.on .modal{transform:translateY(0) scale(1)}
.modal-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px 14px;border-bottom:1px solid var(--dv);
}
.modal-hd-t{font:600 15px/1.2 var(--f);color:var(--c9)}
.modal-close{
  width:28px;height:28px;border-radius:var(--r1);border:none;
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--c4);transition:all .12s;
}
.modal-close:hover{background:var(--c1);color:var(--c7)}
.modal-close svg{width:16px;height:16px}
.modal-bd{padding:18px 22px}
.modal-ft{
  display:flex;justify-content:flex-end;gap:8px;
  padding:14px 22px 18px;border-top:1px solid var(--dv);
}
.modal-label{font:500 13px/1 var(--f);color:var(--c7);margin-bottom:8px}
.modal-input{
  width:100%;height:36px;padding:0 12px;border:1px solid var(--c2);
  border-radius:var(--r1);font:400 13px/1 var(--f);color:var(--c9);
  outline:none;transition:border-color .12s;
}
.modal-input:focus{border-color:var(--pr)}
.modal-warn{
  display:flex;gap:10px;padding:14px 16px;
  background:var(--ro50);border-radius:var(--r2);
  border:1px solid var(--ro100);
}
.modal-warn svg{width:18px;height:18px;color:var(--ro);flex-shrink:0;margin-top:1px}
.modal-warn-t{font:500 13px/1.4 var(--f);color:var(--c8)}
.modal-warn-d{font:400 12px/1.4 var(--f);color:var(--c6);margin-top:4px}
.modal-confirm-bd{font:400 13px/1.5 var(--f);color:var(--c7)}
.modal-confirm-bd strong{color:var(--c9);font-weight:600}

/* ═══ TOGGLE ═══ */
.toggle-wrap{display:inline-flex;align-items:center;gap:6px}
.toggle{
  width:36px;height:20px;border-radius:10px;border:none;
  cursor:pointer;position:relative;transition:all .2s;
}
.toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:14px;height:14px;border-radius:50%;
  background:#FFF;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.15);
}
.toggle.on{background:var(--em)}
.toggle.on::after{left:19px}
.toggle.off{background:var(--c3)}
.toggle.off::after{left:3px}

/* ═══ ANIMATION ═══ */
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .25s ease forwards}

/* ═══ RESPONSIVE ═══ */
@media(max-width:1200px){
  .st-g{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .st-g{grid-template-columns:1fr}
  .fl-bar{flex-direction:column;align-items:stretch}
  .fl-search{min-width:auto}
  .fl-actions{margin-left:0}
}
</style>
</head>

  {id:'S007',name:'2026年Q3绩效考核方案',code:'PERF-2026-006',desc:'Q3季度考核方案（配置中）',status:'draft',version:1,groups:0,activities:0,modifier:'李HR',modified:'2026-06-20 09:00'},
];

const STATUS_MAP={
  draft:{label:'草稿',cls:'draft'},
  enabled:{label:'已启用',cls:'enabled'},
  disabled:{label:'已停用',cls:'disabled'},
};

// ═══ 状态 ═══
let filter={search:'',status:''};
let modalState={type:null,data:null};

// ═══ 渲染主入口 ═══
function renderAll(){
  renderHeader();
  renderApp();
}

function renderHeader(){
  // Header actions are now part of the navigation
  // This function is kept for compatibility but does nothing
}

function getFiltered(){
  return SCHEMES.filter(s=>{
    if(filter.search && !s.name.toLowerCase().includes(filter.search.toLowerCase()) && !s.code.toLowerCase().includes(filter.search.toLowerCase())) return false;
    if(filter.status && s.status!==filter.status) return false;
    return true;
  });
}

function renderApp(){
  const data=getFiltered();

  // Get the content container from navigation
  const ct = document.getElementById('ct') || document.getElementById('app');
  if (!ct) return;

  ct.innerHTML=`
    <div class="fi">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div>
          <h1 style="font:700 20px/1.2 var(--f);color:var(--c9);margin-bottom:4px">绩效方案</h1>
          <p style="font:400 13px/1 var(--f);color:var(--c5)">管理绩效考核方案配置</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-p" onclick="createNew()">${I.plus} 新建方案</button>
        </div>
      </div>
      ${renderFilterBar()}
      ${renderTable(data)}
    </div>
    ${renderModals()}
  `;
}

function renderFilterBar(){
  return `<div class="fl-bar">
    <div class="fl-search">
      ${I.search}
      <input id="flSearch" placeholder="搜索方案名称或编号…" value="${filter.search}" oninput="onSearchInput(this.value)" />
    </div>
    <select class="fl-sel" id="flStatus" onchange="onStatusChange(this.value)">
      <option value=""${filter.status===''?' selected':''}>全部状态</option>
      <option value="draft"${filter.status==='draft'?' selected':''}>草稿</option>
      <option value="enabled"${filter.status==='enabled'?' selected':''}>已启用</option>
      <option value="disabled"${filter.status==='disabled'?' selected':''}>已停用</option>
    </select>
    <div class="fl-actions">
      <button class="btn btn-s" onclick="resetFilters()">${I.x} 重置</button>
    </div>
  </div>`;
}

function renderTable(data){
  const rows=data.map(s=>{
    const st=STATUS_MAP[s.status];
    const isDraft=s.status==='draft';
    const toggleLabel=s.status==='enabled'?'停用':s.status==='draft'?'启用':'启用';
    return `<tr>
      <td class="cell-name">${s.name}</td>
      <td class="cell-code">${s.code}</td>
      <td><span style="font-family:var(--m);font-size:11px;color:var(--c5);padding:2px 6px;background:var(--c1);border-radius:3px">v${s.version}</span></td>
      <td style="font:400 12px/1.4 var(--f);color:var(--c6);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.desc}</td>
      <td><span class="cell-status ${st.cls}">${st.label}</span></td>
      <td class="cell-act"><span class="cell-act-count">${s.activities}</span> 个活动</td>
      <td class="cell-creator">${s.modifier}</td>
      <td class="cell-date">${s.modified}</td>
      <td>
        <div class="cell-actions">
          <button class="btn btn-t" onclick="editScheme('${s.id}')">编辑</button>
          <button class="btn btn-t" onclick="copyScheme('${s.id}')">复制</button>
          <button class="btn btn-t" onclick="viewDetail('${s.id}')">详情</button>
          ${!isDraft?`<button class="btn btn-t${s.status==='enabled'?' danger':''}" onclick="toggleStatus('${s.id}')">${toggleLabel}</button>`:''}
          ${(s.status==='disabled'||isDraft)?`<button class="btn btn-t danger" onclick="deleteScheme('${s.id}')">删除</button>`:''}
        </div>
      </td>
    </tr>`;
  }).join('');

  const pgText=data.length>0?`第 1-${data.length} 条，共 ${data.length} 条`:'暂无数据';

  return `<div class="tbl-card">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>方案名称</th>
            <th>方案编号</th>
            <th>版本</th>
            <th>描述</th>
            <th>状态</th>
            <th>关联活动</th>
            <th>修改人</th>
            <th>最近修改</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>${rows.length?rows:`<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--c4);font-size:13px">暂无匹配的绩效方案</td></tr>`}</tbody>
      </table>
    </div>
    <div class="pg-bar">
      <div class="pg-info">
        <span>${pgText}</span>
        <span>每页 20 条</span>
      </div>
      <div class="pg-nav">
        <button class="pg-btn" disabled>${I.chevL}</button>
        <button class="pg-btn on">1</button>
        <button class="pg-btn" disabled>${I.chevR}</button>
      </div>
    </div>
  </div>`;
}

// ═══ Modal 渲染 ═══
function renderModals(){
  let modalContent='';
  if(modalState.type==='copy'){
    const s=SCHEMES.find(x=>x.id===modalState.data);
    modalContent=`<div class="modal-hd">
      <span class="modal-hd-t">复制方案</span>
      <button class="modal-close" onclick="closeModal()">${I.x}</button>
    </div>
    <div class="modal-bd">
      <div class="modal-label">新方案名称</div>
      <input class="modal-input" id="copyName" value="${s?s.name+' (副本)':''}" placeholder="请输入新方案名称" />
    </div>
    <div class="modal-ft">
      <button class="btn btn-s" onclick="closeModal()">取消</button>
      <button class="btn btn-p" onclick="confirmCopy()">确认复制</button>
    </div>`;
  }else if(modalState.type==='delete'){
    const s=SCHEMES.find(x=>x.id===modalState.data);
    modalContent=`<div class="modal-hd">
      <span class="modal-hd-t">确认删除</span>
      <button class="modal-close" onclick="closeModal()">${I.x}</button>
    </div>
    <div class="modal-bd">
      <div class="modal-warn">
        ${I.alert}
        <div>
          <div class="modal-warn-t">此操作不可恢复</div>
          <div class="modal-warn-d">删除后，方案 "${s?s.name:''}" 及其所有配置将被永久移除。关联的考核活动将不受影响。</div>
        </div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-s" onclick="closeModal()">取消</button>
      <button class="btn btn-d" onclick="confirmDelete()">确认删除</button>
    </div>`;
  }else if(modalState.type==='toggle'){
    const s=SCHEMES.find(x=>x.id===modalState.data);
    const willEnable=s&&s.status!=='enabled';
    modalContent=`<div class="modal-hd">
      <span class="modal-hd-t">${willEnable?'启用方案':'停用方案'}</span>
      <button class="modal-close" onclick="closeModal()">${I.x}</button>
    </div>
    <div class="modal-bd">
      <div class="modal-confirm-bd">
        确定要${willEnable?'<strong>启用</strong>':'<strong>停用</strong>'}方案 "<strong>${s?s.name:''}</strong>" 吗？
        ${willEnable?'':'<br><br>停用后，该方案将无法发起新的考核活动，进行中的活动不受影响。'}
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-s" onclick="closeModal()">取消</button>
      <button class="btn ${willEnable?'btn-p':'btn-w'}" onclick="confirmToggle()">${willEnable?'确认启用':'确认停用'}</button>
    </div>`;
  }

  return `<div class="modal-ov${modalState.type?' on':''}" id="modalOv" onclick="onModalOverlayClick(event)">
    <div class="modal">${modalContent}</div>
  </div>`;
}

// ═══ 交互处理 ═══
function onSearchInput(val){
  filter.search=val.trim();
  renderApp();
  // 恢复焦点到搜索框
  const el=document.getElementById('flSearch');
  if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}
}

function onStatusChange(val){
  filter.status=val;
  renderApp();
}

function resetFilters(){
  filter={search:'',status:''};
  renderApp();
}

function createNew(){
  console.log('[绩效方案] 新建方案');
  window.location.href='perf-scheme-wizard.html';
}

function editScheme(id){
  console.log('[绩效方案] 编辑方案:',id);
  window.location.href='perf-scheme-wizard.html?id='+id;
}

function viewDetail(id){
  console.log('[绩效方案] 查看详情:',id);
  window.location.href='perf-scheme-detail.html?id='+id;
}

function copyScheme(id){
  modalState={type:'copy',data:id};
  renderApp();
  setTimeout(()=>{
    const el=document.getElementById('copyName');
    if(el){el.focus();el.select()}
  },50);
}

function confirmCopy(){
  const nameInput=document.getElementById('copyName');
  const name=nameInput?nameInput.value.trim():'';
  if(!name){nameInput.focus();return}
  console.log('[绩效方案] 复制方案:',modalState.data,'新名称:',name);
  modalState={type:null,data:null};
  renderApp();
}

function deleteScheme(id){
  modalState={type:'delete',data:id};
  renderApp();
}

function confirmDelete(){
  console.log('[绩效方案] 删除方案:',modalState.data);
  modalState={type:null,data:null};
  renderApp();
}

function toggleStatus(id){
  modalState={type:'toggle',data:id};
  renderApp();
}

function confirmToggle(){
  const s=SCHEMES.find(x=>x.id===modalState.data);
  if(s){
    if(s.status==='enabled') s.status='disabled';
    else s.status='enabled';
    console.log('[绩效方案] 切换状态:',s.id,'→',s.status);
  }
  modalState={type:null,data:null};
  renderApp();
}

function closeModal(){
  modalState={type:null,data:null};
  renderApp();
}

function onModalOverlayClick(e){
  if(e.target===e.currentTarget) closeModal();
}

// ESC 关闭弹窗
document.addEventListener('keydown',e=>{
  if(e.key==='Escape' && modalState.type) closeModal();
});

// ═══ Toast ═══
function showToast(msg, type) {
  const existing = document.querySelector('.toast-msg');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast-msg';
  t.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font:500 13px/1 var(--f);color:#FFF;z-index:9999;transition:opacity .3s;background:${type==='error'?'var(--ro)':'var(--em)'}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(), 300); }, 2500);
}

// ═══ 初始化 ═══
// Initialize navigation first to create the content container
GHR_NAV.init('perf', '绩效方案');
renderAll();
</script>
</body>
</html>
