<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 计算规则</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;--pr900:#1E3A8A;
  --em:#10B981;--em50:#ECFDF5;--em100:#D1FAE5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac100:#FDE68A;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;--ro100:#FFE4E6;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#18181B;--c8:#27272A;--c7:#3F3F46;--c6:#52525B;--c5:#71717A;--c4:#A1A1AA;--c3:#D4D4D8;--c2:#E4E4E7;--c1:#F4F4F5;--c0:#FAFAFA;
  --sf:#FFF;--bg:#F5F5F4;--dv:#F4F4F5;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadow-card-hover:0 8px 20px -4px rgba(0,0,0,.08),0 2px 6px -2px rgba(0,0,0,.04);
  --shadow-dropdown:0 10px 40px -10px rgba(0,0,0,.12),0 2px 10px -2px rgba(0,0,0,.04);
  --header-h:52px;--r1:6px;--r2:8px;--r3:10px;--r4:14px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--c7);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}
.hdr{height:var(--header-h);background:var(--sf);border-bottom:1px solid var(--dv);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:1100}
.hdr-l{display:flex;align-items:center;gap:14px}.logo{display:flex;align-items:center;gap:8px}
.logo-i{width:28px;height:28px;border-radius:6px;background:var(--pr);display:flex;align-items:center;justify-content:center}
.logo-i svg{width:15px;height:15px;color:#FFF}.logo-t{font-size:15px;font-weight:700;color:var(--c9);letter-spacing:-.3px}
.hdr-title{font:600 14px/1 var(--f);color:var(--c7);padding-left:14px;border-left:1px solid var(--c2)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:32px;border-radius:var(--r1);font:500 13px/1 var(--f);cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn svg{width:13px;height:13px}.btn-p{background:var(--pr);color:#FFF}.btn-p:hover{background:var(--pr700)}
.btn-s{background:var(--sf);color:var(--c6);border:1px solid var(--c2)}.btn-s:hover{border-color:var(--c3);color:var(--c8);background:var(--c0)}
.btn-d{background:var(--sf);color:var(--ro);border:1px solid var(--ro100)}.btn-d:hover{background:var(--ro50);border-color:var(--ro)}
.btn-sm{height:26px;padding:0 10px;font-size:12px}.btn-sm svg{width:11px;height:11px}
.sec{background:var(--sf);border-radius:var(--r3);box-shadow:var(--shadow-card);margin-bottom:20px;overflow:hidden}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--dv)}
.sec-hd-l{display:flex;align-items:center;gap:10px}
.sec-hd-ic{width:30px;height:30px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center}
.sec-hd-ic svg{width:15px;height:15px;color:#FFF}.sec-hd-ic.b{background:var(--pr)}
.sec-hd-t{font:600 15px/1.2 var(--f);color:var(--c9)}.sec-hd-s{font:400 11px/1 var(--f);color:var(--c4);margin-top:2px}
.sec-bd{padding:20px 24px}
.tbl-wrap{overflow-x:auto;border:1px solid var(--c2);border-radius:var(--r2)}
table{width:100%;border-collapse:collapse;font-size:13px}thead{position:sticky;top:0;z-index:1}
thead th{background:var(--c0);padding:10px 14px;font:600 12px/1 var(--f);color:var(--c5);text-align:left;border-bottom:1px solid var(--c2);white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
tbody td{padding:10px 14px;border-bottom:1px solid var(--dv);font:400 13px/1.4 var(--f);color:var(--c7);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}tbody tr:nth-child(even){background:var(--c0)}
tbody tr{transition:background .1s}tbody tr:hover{background:var(--pr50)}
.inp{border:1px solid var(--c2);border-radius:var(--r1);padding:6px 10px;font:400 13px/1 var(--f);color:var(--c9);background:var(--sf);outline:none;transition:all .15s;width:100%}
.inp:focus{border-color:var(--pr);box-shadow:0 0 0 2px var(--pr100)}
select.inp{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23A1A1AA' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}
label{font:500 13px/1 var(--f);color:var(--c6);display:block;margin-bottom:6px}
.form-row{display:flex;gap:16px;margin-bottom:16px}.form-row:last-child{margin-bottom:0}.form-g{flex:1}
.badge{display:inline-flex;align-items:center;gap:4px;font:600 11px/1 var(--f);padding:3px 8px;border-radius:var(--r1)}
.badge-ok{color:var(--em700);background:var(--em50)}.badge-off{color:var(--c5);background:var(--c1)}
.filter-bar{display:flex;align-items:flex-end;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar .form-g{flex:none}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-ov.on{opacity:1;pointer-events:all}
.modal{background:var(--sf);border-radius:var(--r4);box-shadow:var(--shadow-dropdown);width:920px;max-height:85vh;overflow-y:auto;transform:translateY(8px);transition:transform .2s}
.modal-ov.on .modal{transform:translateY(0)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--dv)}
.modal-hd-t{font:600 16px/1 var(--f);color:var(--c9)}
.modal-close{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--c4);background:transparent;border:none;transition:all .12s}
.modal-close:hover{background:var(--c1);color:var(--c7)}.modal-close svg{width:14px;height:14px}
.modal-bd{padding:20px 24px}.modal-ft{display:flex;justify-content:flex-end;gap:8px;padding:14px 24px;border-top:1px solid var(--dv)}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .25s ease forwards}
.toggle{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;transition:all .2s}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#FFF;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on{background:var(--em)}.toggle.on::after{left:19px}
.toggle.off{background:var(--c3)}.toggle.off::after{left:3px}
.formula-cell{font:400 12px/1.4 var(--m);color:var(--c7);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.section-title{font:600 13px/1 var(--f);color:var(--c8);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--dv)}
.fe-wrap{display:flex;gap:0;border:1px solid var(--c2);border-radius:var(--r2);overflow:hidden;height:260px}
.fe-side{width:200px;border-right:1px solid var(--c2);display:flex;flex-direction:column;flex-shrink:0}
.fe-tabs{display:flex;border-bottom:1px solid var(--c2);flex-shrink:0}
.fe-tab{flex:1;text-align:center;padding:8px 0;font:500 12px/1 var(--f);color:var(--c5);cursor:pointer;background:var(--c0);transition:all .12s;border:none}
.fe-tab.active{background:var(--sf);color:var(--pr);font-weight:600;border-bottom:2px solid var(--pr)}
.fe-panel{flex:1;overflow-y:auto;padding:8px}
.fe-panel.hidden{display:none}
.fe-item{padding:6px 10px;font:400 12px/1.4 var(--f);color:var(--c7);cursor:pointer;border-radius:var(--r1);transition:all .1s;display:flex;align-items:center;gap:6px}
.fe-item:hover{background:var(--pr50);color:var(--pr)}
.fe-item .fe-ic{width:16px;height:16px;border-radius:3px;background:var(--pr50);color:var(--pr);display:flex;align-items:center;justify-content:center;font:600 9px/1 var(--m);flex-shrink:0}
.fe-cat{font:600 11px/1 var(--f);color:var(--c4);padding:8px 10px 4px;text-transform:uppercase;letter-spacing:.3px}
.fe-center{flex:1;display:flex;flex-direction:column;min-width:0}
.fe-editor-label{padding:8px 12px;font:500 12px/1 var(--f);color:var(--c5);background:var(--c0);border-bottom:1px solid var(--c2);display:flex;align-items:center;gap:6px;flex-shrink:0}
.fe-editor{flex:1;padding:12px;font:400 13px/1.6 var(--m);color:var(--c9);background:var(--sf);border:none;outline:none;resize:none;min-height:0}
.fe-editor::placeholder{color:var(--c4)}
.fe-right{width:220px;border-left:1px solid var(--c2);display:flex;flex-direction:column;flex-shrink:0}
.fe-right-hd{padding:8px 12px;font:500 12px/1 var(--f);color:var(--c5);background:var(--c0);border-bottom:1px solid var(--c2);flex-shrink:0}
.fe-right-bd{flex:1;overflow-y:auto;padding:10px 12px;font:400 12px/1.6 var(--f);color:var(--c7)}
.fe-right-bd code{font-family:var(--m);background:var(--c1);padding:1px 4px;border-radius:3px;font-size:11px}
.fe-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 0 0;margin-top:12px;border-top:1px solid var(--dv)}
.fe-check-ok{font:500 12px/1 var(--f);color:var(--em700);display:flex;align-items:center;gap:5px}
.fe-check-ok svg{width:14px;height:14px}
.fe-check-err{font:500 12px/1 var(--f);color:var(--ro);display:flex;align-items:center;gap:5px}
.fe-check-err svg{width:14px;height:14px}
</style>
</head>
<body>
<div id="app"></div>
<div class="modal-ov" id="modalOv"><div class="modal" id="modalBox"></div></div>
<script src="navigation.js"></script>
<script>
const I={
  settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>',
  refresh:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  toggleOn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="5" width="22" height="14" rx="7" ry="7"/><circle cx="16" cy="12" r="3"/></svg>',
  toggleOff:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="5" width="22" height="14" rx="7" ry="7"/><circle cx="8" cy="12" r="3"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
};

let CALC_RULES = [
  { id:1, name:'绩效得分加权计算', code:'PERF_SCORE_WEIGHTED', dept:'中国区', formula:'SUM(评分*权重)/SUM(权重)', desc:'按节点权重加权计算绩效得分', enabled:true },
  { id:2, name:'目标完成率计算', code:'GOAL_COMPLETION_RATE', dept:'中国区', formula:'完成目标数/总目标数*100', desc:'计算目标完成百分比', enabled:true },
  { id:3, name:'360度综合评分', code:'MULTI_360_SCORE', dept:'华东大区', formula:'上级*40%+同事*30%+下级*20%+自评*10%', desc:'360度评价加权综合得分', enabled:true },
  { id:4, name:'OKR得分计算', code:'OKR_SCORE', dept:'中国区', formula:'AVG(关键结果得分)*信心指数', desc:'OKR关键结果平均分乘以信心指数', enabled:false },
];
let nextId = 5;
let searchText = '';
let filterDept = '';

function render(){
  let filtered = CALC_RULES.filter(r => {
    if(searchText && !r.name.includes(searchText)) return false;
    if(filterDept && r.dept !== filterDept) return false;
    return true;
  });
  const rows = filtered.map((r,i) => `
    <tr>
      <td>${i+1}</td>
      <td style="font-weight:500;color:var(--c8)">${r.name}</td>
      <td><span style="font-family:var(--m);font-weight:500;font-size:12px;color:var(--c6)">${r.code}</span></td>
      <td>${r.dept}</td>
      <td class="formula-cell" title="${r.formula}">${r.formula}</td>
      <td>${r.enabled ? '<span class="badge badge-ok">启用</span>' : '<span class="badge badge-off">停用</span>'}</td>
      <td>
        <button class="btn btn-s btn-sm btn-edit" data-id="${r.id}">${I.edit} 编辑</button>
        <button class="btn btn-d btn-sm btn-del" data-id="${r.id}">${I.trash}</button>
      </td>
    </tr>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div class="sec fi">
      <div class="sec-hd">
        <div class="sec-hd-l">
          <div class="sec-hd-ic b">${I.settings}</div>
          <div><div class="sec-hd-t">计算规则</div><div class="sec-hd-s">Calculation Rules · 管理绩效评分的计算公式</div></div>
        </div>
        <button class="btn btn-p" id="btnAdd">${I.plus} 新增规则</button>
      </div>
      <div class="sec-bd">
        <div class="filter-bar">
          <div class="form-g" style="width:200px"><label>规则名称</label><input class="inp" id="searchInp" placeholder="搜索规则名称" value="${searchText}"></div>
          <div class="form-g" style="width:140px"><label>适用部门</label><select class="inp" id="filterDept"><option value="">全部</option><option value="中国区" ${filterDept==='中国区'?'selected':''}>中国区</option><option value="华东大区" ${filterDept==='华东大区'?'selected':''}>华东大区</option></select></div>
          <button class="btn btn-s" id="btnSearch">${I.search} 搜索</button>
          <button class="btn btn-s" id="btnReset">${I.refresh} 重置</button>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>序号</th><th>规则名称</th><th>规则编码</th><th>适用部门</th><th>计算公式</th><th>状态</th><th>操作</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
  bindEvents();
}

function bindEvents(){
  document.getElementById('btnAdd').onclick = () => openModal(-1);
  document.getElementById('btnSearch').onclick = () => { searchText = document.getElementById('searchInp').value.trim(); filterDept = document.getElementById('filterDept').value; render(); };
  document.getElementById('btnReset').onclick = () => { searchText = ''; filterDept = ''; render(); };
  document.querySelectorAll('.btn-edit').forEach(b => b.onclick = () => openModal(parseInt(b.dataset.id)));
  document.querySelectorAll('.btn-del').forEach(b => b.onclick = () => {
    const id = parseInt(b.dataset.id);
    const r = CALC_RULES.find(x=>x.id===id);
    if(confirm(`确定删除"${r.name}"吗？`)){ CALC_RULES = CALC_RULES.filter(x=>x.id!==id); render(); }
  });
}

const FIELDS = [
  { name:'绩效自评分', code:'perf_self_score' },
  { name:'目标完成率', code:'goal_completion_rate' },
  { name:'上级评分', code:'manager_score' },
  { name:'同事评分', code:'peer_score' },
  { name:'下级评分', code:'subordinate_score' },
  { name:'KPI得分', code:'kpi_score' },
  { name:'OKR得分', code:'okr_score' },
  { name:'工作天数', code:'work_days' },
  { name:'出勤率', code:'attendance_rate' },
];

const FUNC_CATEGORIES = [
  { name:'逻辑函数', items:[
    { name:'IF', sig:'IF(条件, 真值, 假值)', desc:'条件判断函数\n\n# 含义\n根据条件返回对应值\n\n# 参数\n条件, 真值, 假值\n\n# 示例\nIF(KPI得分>=90, "A", "B")' },
    { name:'AND', sig:'AND(条件1, 条件2, ...)', desc:'逻辑与\n\n# 含义\n所有条件均为真时返回真\n\n# 示例\nAND(绩效自评分>=80, 出勤率>=95)' },
    { name:'OR', sig:'OR(条件1, 条件2, ...)', desc:'逻辑或\n\n# 含义\n任一条件为真时返回真\n\n# 示例\nOR(KPI得分>=90, OKR得分>=4.5)' },
  ]},
  { name:'数学函数', items:[
    { name:'SUM', sig:'SUM(数值1, 数值2, ...)', desc:'求和函数\n\n# 含义\n计算多个数值的总和\n\n# 示例\nSUM(绩效自评分, 上级评分)' },
    { name:'AVG', sig:'AVG(数值1, 数值2, ...)', desc:'平均值函数\n\n# 含义\n计算多个数值的平均值\n\n# 示例\nAVG(上级评分, 同事评分, 下级评分)' },
    { name:'MAX', sig:'MAX(数值1, 数值2, ...)', desc:'最大值函数\n\n# 含义\n返回多个数值中的最大值\n\n# 示例\nMAX(绩效自评分, 上级评分)' },
    { name:'MIN', sig:'MIN(数值1, 数值2, ...)', desc:'最小值函数\n\n# 含义\n返回多个数值中的最小值\n\n# 示例\nMIN(绩效自评分, 上级评分)' },
    { name:'ROUND', sig:'ROUND(数值, 小数位数)', desc:'四舍五入函数\n\n# 含义\n按指定小数位数对数值进行四舍五入\n\n# 参数\n数值, 小数位数\n\n# 示例\nRound(绩效自评分, 1)\n将绩效自评分保留一位小数，如 89.56 四舍五入为 89.6' },
    { name:'ABS', sig:'ABS(数值)', desc:'绝对值函数\n\n# 含义\n返回数值的绝对值\n\n# 示例\nABS(绩效自评分 - 目标值)' },
  ]},
];

function openModal(id){
  const isNew = id < 0;
  const r = isNew ? { name:'', code:'', dept:'中国区', formula:'', desc:'', enabled:true } : CALC_RULES.find(x=>x.id===id);

  const fieldItems = FIELDS.map(f => `
    <div class="fe-item" data-code="${f.code}" data-name="${f.name}">
      <span class="fe-ic">F</span>${f.name}
    </div>
  `).join('');

  let funcItems = '';
  FUNC_CATEGORIES.forEach(cat => {
    funcItems += `<div class="fe-cat">${cat.name}</div>`;
    cat.items.forEach(fn => {
      funcItems += `
        <div class="fe-item" data-fn="${fn.name}" data-sig="${fn.sig}" data-desc="${fn.desc}">
          <span class="fe-ic">f</span>${fn.name}
        </div>
      `;
    });
  });

  openModalBox(`
    <div class="modal-hd"><span class="modal-hd-t">${isNew?'新增计算规则':'编辑计算规则'}</span><button class="modal-close" onclick="closeModal()">${I.x}</button></div>
    <div class="modal-bd">
      <div class="section-title">基本信息</div>
      <div class="form-row">
        <div class="form-g"><label>名称</label><input class="inp" id="mName" value="${r.name}" placeholder="请输入"></div>
        <div class="form-g"><label>编码</label><input class="inp" id="mCode" value="${r.code}" placeholder="如: PERF_SCORE_WEIGHTED" style="font-family:var(--m)"></div>
      </div>
      <div class="form-row">
        <div class="form-g"><label>部门</label><select class="inp" id="mDept"><option ${r.dept==='中国区'?'selected':''}>中国区</option><option ${r.dept==='华东大区'?'selected':''}>华东大区</option><option ${r.dept==='华南大区'?'selected':''}>华南大区</option></select></div>
        <div class="form-g"><label>规则描述</label><input class="inp" id="mDesc" value="${r.desc}" placeholder="输入规则描述"></div>
        <div class="form-g" style="flex:none;width:120px"><label>是否启用</label><button class="toggle ${r.enabled?'on':'off'}" id="mEnabled" onclick="this.classList.toggle('on');this.classList.toggle('off')">${r.enabled?I.toggleOn:I.toggleOff}</button></div>
      </div>

      <div class="section-title" style="margin-top:20px">公式设置</div>
      <div class="fe-wrap">
        <div class="fe-side">
          <div class="fe-tabs">
            <button class="fe-tab active" data-panel="fields">字段</button>
            <button class="fe-tab" data-panel="funcs">函数</button>
          </div>
          <div class="fe-panel" id="panelFields">${fieldItems}</div>
          <div class="fe-panel hidden" id="panelFuncs">${funcItems}</div>
        </div>
        <div class="fe-center">
          <div class="fe-editor-label">公式</div>
          <textarea class="fe-editor" id="mFormula" placeholder="请输入公式，如: SUM(评分*权重)/SUM(权重)">${r.formula}</textarea>
        </div>
        <div class="fe-right">
          <div class="fe-right-hd">函数说明</div>
          <div class="fe-right-bd" id="funcHelp">
            <div style="color:var(--c4);font-style:italic">点击左侧函数查看说明</div>
          </div>
        </div>
      </div>
      <div class="fe-footer">
        <div id="feCheckResult"></div>
        <button class="btn btn-s btn-sm" id="btnCheckFormula">公式检查</button>
      </div>
    </div>
    <div class="modal-ft"><button class="btn btn-s" onclick="closeModal()">取消</button><button class="btn btn-p" id="btnSave">保存</button></div>
  `);

  // Tab switching
  document.querySelectorAll('.fe-tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.fe-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const panel = tab.dataset.panel;
      document.getElementById('panelFields').classList.toggle('hidden', panel !== 'fields');
      document.getElementById('panelFuncs').classList.toggle('hidden', panel !== 'funcs');
    };
  });

  // Insert field into formula
  document.querySelectorAll('#panelFields .fe-item').forEach(item => {
    item.onclick = () => {
      const editor = document.getElementById('mFormula');
      const name = item.dataset.name;
      const pos = editor.selectionStart;
      const before = editor.value.slice(0, pos);
      const after = editor.value.slice(pos);
      editor.value = before + name + after;
      editor.focus();
      editor.selectionStart = editor.selectionEnd = pos + name.length;
    };
  });

  // Show function help / insert function
  document.querySelectorAll('#panelFuncs .fe-item').forEach(item => {
    item.onclick = () => {
      const sig = item.dataset.sig;
      const desc = item.dataset.desc;
      // Show help
      const helpEl = document.getElementById('funcHelp');
      const lines = desc.split('\n');
      helpEl.innerHTML = lines.map(l => {
        if(l.startsWith('# ')) return `<div style="font:600 12px/1.6 var(--f);color:var(--c8);margin-top:6px">${l.slice(2)}</div>`;
        if(l.startsWith('示例') || l.startsWith('参数') || l.startsWith('含义')) return `<div style="font:500 12px/1.6 var(--f);color:var(--c6);margin-top:4px">${l}</div>`;
        if(l.includes('(') && l.includes(')')) return `<code>${l}</code>`;
        return `<div>${l}</div>`;
      }).join('');
      // Insert function signature
      const editor = document.getElementById('mFormula');
      const pos = editor.selectionStart;
      const before = editor.value.slice(0, pos);
      const after = editor.value.slice(pos);
      editor.value = before + sig + after;
      editor.focus();
      // Select placeholder inside parens
      const openIdx = sig.indexOf('(');
      const closeIdx = sig.lastIndexOf(')');
      if(openIdx >= 0 && closeIdx > openIdx){
        editor.selectionStart = pos + openIdx + 1;
        editor.selectionEnd = pos + closeIdx;
      }
    };
  });

  // Formula check
  document.getElementById('btnCheckFormula').onclick = () => {
    const formula = document.getElementById('mFormula').value.trim();
    const resultEl = document.getElementById('feCheckResult');
    if(!formula){
      resultEl.innerHTML = '<span class="fe-check-err">' + I.x + '<span>公式不能为空</span></span>';
      return;
    }
    // Simple validation: check balanced parentheses
    let parens = 0;
    for(const ch of formula){
      if(ch === '(') parens++;
      if(ch === ')') parens--;
      if(parens < 0) break;
    }
    if(parens !== 0){
      resultEl.innerHTML = '<span class="fe-check-err">' + I.x + '<span>括号不匹配，请检查公式</span></span>';
      return;
    }
    // Check for empty function calls
    if(/[A-Z]+\(\s*\)/.test(formula)){
      resultEl.innerHTML = '<span class="fe-check-err">' + I.x + '<span>函数参数不能为空</span></span>';
      return;
    }
    resultEl.innerHTML = '<span class="fe-check-ok">' + I.check + '<span>公式检查已完成，无错误</span></span>';
  };

  // Save
  document.getElementById('btnSave').onclick = () => {
    const name = document.getElementById('mName').value.trim();
    if(!name){ alert('请输入规则名称'); return; }
    const code = document.getElementById('mCode').value.trim();
    if(!code){ alert('请输入规则编码'); return; }
    const data = { name, code, dept:document.getElementById('mDept').value, formula:document.getElementById('mFormula').value.trim(), desc:document.getElementById('mDesc').value.trim(), enabled:document.getElementById('mEnabled').classList.contains('on') };
    if(isNew){ data.id = nextId++; CALC_RULES.push(data); } else { Object.assign(CALC_RULES.find(x=>x.id===id), data); }
    closeModal(); render();
  };
}

function openModalBox(html){ document.getElementById('modalBox').innerHTML = html; document.getElementById('modalOv').classList.add('on'); }
function closeModal(){ document.getElementById('modalOv').classList.remove('on'); }
document.getElementById('modalOv').onclick = (e) => { if(e.target === document.getElementById('modalOv')) closeModal(); };

GHR_NAV.init('perf', '计算规则');
render();
</script>
</body>
</html>
