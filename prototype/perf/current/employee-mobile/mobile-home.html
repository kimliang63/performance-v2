<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HR ONE - 我的工作台</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../mobile-base.css">
<style>
/* Page-specific: compact stat cards, todo rows, chart */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--sf);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--sx);border:1px solid var(--bd);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.pr::before{background:var(--pr)}.stat-card.em::before{background:var(--em)}.stat-card.ac::before{background:var(--ac)}.stat-card.vi::before{background:var(--vi)}
.stat-card-t{font:400 var(--fs-sm)/1 var(--f);color:var(--c5);margin-bottom:6px}
.stat-card-v{font:700 var(--fs-xl)/1 var(--fm);color:var(--c9)}
.stat-card-d{font:400 var(--fs-xs)/1 var(--f);color:var(--c4);margin-top:3px}

.weui-panel{margin-bottom:12px}
.todo-row{display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer}
.todo-row:active{background:var(--c0)}
.todo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.todo-info{flex:1;min-width:0}
.todo-name{font:500 var(--fs-base)/1.3 var(--f);color:var(--c8)}
.todo-deadline{font:400 var(--fs-sm)/1 var(--f);color:var(--c5);margin-top:3px}

.chart-wrap{background:var(--sf);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--sx);border:1px solid var(--bd);margin-bottom:12px}
.chart-wrap-title{font:600 var(--fs-base)/1 var(--f);color:var(--c8);margin-bottom:10px}
.chart-wrap canvas{width:100%!important;height:180px!important}
</style>
</head>
<body>
<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-status">9:41<div class="phone-status-r">
    <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="6" width="3" height="6" rx="1" fill="currentColor" style="color:var(--c9)"/><rect x="4.5" y="4" width="3" height="8" rx="1" fill="currentColor" style="color:var(--c9)"/><rect x="9" y="1.5" width="3" height="10.5" rx="1" fill="currentColor" style="color:var(--c9)"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="currentColor" style="color:var(--c9)"/></svg>
    <svg width="15" height="12" viewBox="0 0 15 12" fill="none"><rect x="0.5" y="0.5" width="12" height="11" rx="2" stroke="currentColor" style="color:var(--c9)" stroke-width="1.2"/><line x1="13" y1="4" x2="13" y2="8" stroke="currentColor" style="color:var(--c9)" stroke-width="1.2"/><rect x="2" y="2.5" width="7" height="7" rx="1" fill="currentColor" style="color:var(--c9)"/></svg>
  </div></div>
  <div class="weui-navigation-bar">
    <a href="../demo-index.html" class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="title">我的工作台</span>
  </div>
  <div class="phone-body" id="phoneBody"></div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
<script src="../mobile-base.js"></script>
<script>
var EMP={name:'张明',dept:'产品部',title:'高级产品经理',cycle:'2026年Q2',totalScore:87.5,grade:'符合预期+'};

var TODOS=[
  {name:'填写6月绩效目标',meta:'绩效方案 - 高级产品经理',deadline:'截止 6/30',dot:'pr',tag:'进行中',tagCls:'weui-badge',link:'mobile-goal.html'},
  {name:'确认5月绩效结果',meta:'绩效方案 - 2026年5月',deadline:'截止 7/5',dot:'ac',tag:'待处理',tagCls:'weui-badge',link:'mobile-confirm.html'}
];

function render(){
  var h='';

  // Stats
  h+='<div class="stat-grid">';
  h+='<div class="stat-card pr"><div class="stat-card-t">综合得分</div><div class="stat-card-v">'+EMP.totalScore+'</div><div class="stat-card-d">'+EMP.cycle+'</div></div>';
  h+='<div class="stat-card em"><div class="stat-card-t">综合等级</div><div class="stat-card-v" style="font-size:var(--fs-lg);color:var(--em700)">'+EMP.grade+'</div><div class="stat-card-d">'+EMP.dept+' · '+EMP.title+'</div></div>';
  h+='</div>';

  // Todos via WeUI
  h+='<div class="weui-panel weui-panel_access"><div class="weui-panel__hd" style="font:600 var(--fs-base)/1 var(--f);color:var(--c8);padding:0 0 10px">待办任务</div><div class="weui-cells">';
  TODOS.forEach(function(t){
    h+='<a class="weui-cell weui-cell_access" href="'+t.link+'"><div class="weui-cell__hd"><span style="width:8px;height:8px;border-radius:50%;background:var(--'+t.dot+');display:inline-block;margin-right:12px"></span></div><div class="weui-cell__bd"><div style="font:500 var(--fs-base)/1.3 var(--f);color:var(--c8)">'+t.name+'</div><div style="font:400 var(--fs-sm)/1 var(--f);color:var(--c5);margin-top:3px">'+t.meta+'</div></div><div class="weui-cell__ft"><span style="font:500 var(--fs-sm)/1 var(--f);padding:3px 8px;border-radius:10px;background:var(--ac50);color:var(--ac700);margin-right:4px">'+t.tag+'</span><span style="font:400 var(--fs-sm)/1 var(--f);color:var(--c5)">'+t.deadline+'</span></div></a>';
  });
  h+='</div></div>';

  // Score detail
  h+='<div class="weui-panel weui-panel_access"><div class="weui-panel__hd" style="font:600 var(--fs-base)/1 var(--f);color:var(--c8);padding:0 0 10px">绩效概览</div><div class="weui-cells">';
  h+='<div class="weui-cell"><div class="weui-cell__bd" style="font:500 var(--fs-base)/1 var(--f);color:var(--c8)">'+EMP.name+'</div><div class="weui-cell__ft" style="font:400 var(--fs-base)/1 var(--f);color:var(--c6)">'+EMP.dept+' · '+EMP.title+'</div></div>';
  h+='<div class="weui-cell"><div class="weui-cell__bd" style="font:500 var(--fs-base)/1 var(--f);color:var(--c8)">综合得分</div><div class="weui-cell__ft" style="font:700 var(--fs-lg)/1 var(--fm);color:var(--pr)">'+EMP.totalScore+'</div></div>';
  h+='<div class="weui-cell"><div class="weui-cell__bd" style="font:500 var(--fs-base)/1 var(--f);color:var(--c8)">综合等级</div><div class="weui-cell__ft"><span class="grade-tag meet-plus">'+EMP.grade+'</span></div></div>';
  h+='</div></div>';

  // Charts
  h+='<div class="chart-wrap"><div class="chart-wrap-title">月度绩效趋势</div><canvas id="chartMonthly"></canvas></div>';

  h+='<div style="height:24px"></div>';
  document.getElementById('phoneBody').innerHTML=h;
  initChart();
}

function initChart(){
  var ctx=document.getElementById('chartMonthly');if(!ctx)return;
  new Chart(ctx,{type:'line',data:{labels:['1月','2月','3月','4月','5月','6月'],datasets:[{data:[5,6,6,6,7,6],borderColor:'#CBD5E1',backgroundColor:'transparent',borderWidth:2,pointBackgroundColor:['#2563EB','#10B981','#10B981','#10B981','#047857','#10B981'],pointRadius:[5,5,5,5,5,7],pointBorderWidth:[0,0,0,0,0,2],pointBorderColor:['','','','','','#0F172A'],tension:.2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:3,max:7,ticks:{stepSize:1,callback:function(v){return['','','','符合-','符合','符合+','超出','远超'][v]||''},font:{size:10}},grid:{color:'#E2E8F0'}},x:{ticks:{font:{size:10}},grid:{display:false}}}}});
}

render();
injectAIPanel('AI 工作台助手','绩效分析 · 趋势对比 · 任务提醒',['分析我的绩效','查看成长趋势','任务提醒']);
</script>
</body>
</html>
