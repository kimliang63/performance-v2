<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 结果确认</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;
  --em:#10B981;--em50:#ECFDF5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;
  --ro:#F43F5E;--ro50:#FFF1F2;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#0F172A;--c8:#1E293B;--c7:#334155;--c6:#475569;--c5:#64748B;--c4:#94A3B8;--c3:#CBD5E1;--c2:#E2E8F0;--c1:#F1F5F9;--c0:#F8FAFC;
  --sf:#FFF;--bg:#F0F4F8;--dv:#E2E8F0;
  --r1:10px;--r2:12px;--r3:14px;--r4:18px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
  --sx:0 1px 2px rgba(0,0,0,.04);--bd:rgba(15,23,42,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:#E5E7EB;color:var(--c7);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}
.phone{width:393px;height:852px;background:var(--bg);border-radius:48px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.05),inset 0 0 0 1px rgba(255,255,255,.1);overflow:hidden;position:relative;display:flex;flex-direction:column}
.phone-notch{width:126px;height:34px;background:#000;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:100}
.phone-status{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 8px;font:600 14px/1 var(--f);color:var(--c9)}
.phone-status-r{display:flex;gap:4px;align-items:center}
.phone-nav{height:50px;display:flex;align-items:center;padding:0 16px;gap:10px}
.phone-nav-back{width:32px;height:32px;border-radius:8px;background:var(--c1);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--c7);flex-shrink:0}
.phone-nav-back svg{width:16px;height:16px}
.phone-nav-t{flex:1;font:600 17px/1 var(--f);color:var(--c9)}
.phone-body{flex:1;overflow-y:auto;padding:0 16px}
.phone-body::-webkit-scrollbar{width:0}

/* Result Hero */
.result-hero{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:24px 16px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden}
.result-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pr),var(--em))}
.result-score{font:700 48px/1 var(--fm);color:var(--pr);margin-bottom:6px}
.result-label{font:400 12px/1 var(--f);color:var(--c5);margin-bottom:12px}
.result-grade{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;background:var(--em50);font:600 14px/1 var(--f);color:var(--em700)}
.result-grade svg{width:16px;height:16px}

/* Info Card */
.info-card{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.info-avatar{width:40px;height:40px;border-radius:50%;background:var(--pr50);display:flex;align-items:center;justify-content:center;font:700 16px/1 var(--f);color:var(--pr);flex-shrink:0}
.info-detail{flex:1}
.info-name{font:600 15px/1 var(--f);color:var(--c9)}
.info-sub{font:400 12px/1 var(--f);color:var(--c5);margin-top:3px}
.info-cycle{font:600 12px/1 var(--f);color:var(--pr);background:var(--pr50);padding:4px 10px;border-radius:8px;flex-shrink:0}

/* Section */
.sec-hd{display:flex;align-items:center;gap:8px;margin:16px 0 10px}
.sec-name{font:600 14px/1 var(--f);color:var(--c8)}

/* Goal Score Row */
.goal-row{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:14px 16px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.goal-row-name{flex:1;font:500 13px/1.3 var(--f);color:var(--c8);min-width:0}
.goal-row-wt{font:500 11px/1 var(--fm);color:var(--c5);flex-shrink:0}
.goal-row-score{font:700 14px/1 var(--fm);color:var(--pr);flex-shrink:0;width:40px;text-align:right}
.goal-row-grade{font:500 11px/1 var(--f);padding:3px 8px;border-radius:6px;flex-shrink:0}
.grade-exceed{background:var(--em50);color:var(--em700)}
.grade-meet{background:var(--pr50);color:var(--pr)}
.grade-meet-minus{background:var(--ac50);color:var(--ac)}
.grade-below{background:var(--ro50);color:var(--ro)}

/* Action Bar */
.action-bar{position:absolute;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--dv);display:flex;align-items:center;padding:12px 16px;gap:8px;padding-bottom:34px;z-index:10}
.btn{height:44px;border-radius:var(--r2);font:600 14px/1 var(--f);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex:1}
.btn:active{transform:scale(.97)}
.btn-reject{background:var(--sf);color:var(--ro);border:1px solid var(--ro)}
.btn-confirm{background:var(--em);color:#FFF;box-shadow:0 2px 8px rgba(16,185,129,.25)}

.toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:var(--c9);color:#FFF;padding:10px 22px;border-radius:22px;font:500 13px/1 var(--f);z-index:900;opacity:0;pointer-events:none;transition:opacity .2s}

/* Mobile AI Bottom Sheet */
.ai-sheet{position:fixed;bottom:0;left:0;right:0;height:70vh;background:var(--sf);border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.15);z-index:950;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s ease}
.ai-sheet.open{transform:translateY(0)}
.ai-sheet-hd{padding:14px 16px;border-bottom:1px solid var(--dv);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ai-sheet-hd-ic{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--pr),var(--vi));display:flex;align-items:center;justify-content:center}
.ai-sheet-hd-ic svg{width:14px;height:14px;color:#FFF}
.ai-sheet-hd-t{flex:1;font:600 14px/1 var(--f);color:var(--c9)}
.ai-sheet-close{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--c5);cursor:pointer}
.ai-sheet-bd{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:88%;animation:fadeIn .2s ease}
.ai-msg.bot{align-self:flex-start}
.ai-msg.user{align-self:flex-end}
.ai-msg-bd{padding:10px 14px;border-radius:12px;font:400 13px/1.5 var(--f);word-break:break-word}
.ai-msg.bot .ai-msg-bd{background:var(--c0);color:var(--c8);border-bottom-left-radius:4px}
.ai-msg.user .ai-msg-bd{background:var(--pr);color:#FFF;border-bottom-right-radius:4px}
.ai-msg-time{font:400 10px/1 var(--f);color:var(--c4);margin-top:3px}
.ai-msg-actions{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.ai-msg-btn{font:500 11px/1 var(--f);padding:5px 10px;border-radius:8px;border:1px solid var(--c2);background:var(--sf);color:var(--c6);cursor:pointer}
.ai-msg-btn:active{background:var(--pr50);border-color:var(--pr)}
.ai-msg-card{background:var(--sf);border:1px solid var(--c2);border-radius:8px;padding:10px;margin-top:6px}
.ai-msg-card-t{font:600 12px/1 var(--f);color:var(--c8);margin-bottom:3px}
.ai-msg-card-d{font:400 11px/1.4 var(--f);color:var(--c5)}
.ai-msg-card-tag{display:inline-block;font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px;margin-top:4px}
.ai-shortcuts{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.ai-shortcut{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--sf);border:1px solid var(--c2);border-radius:8px;cursor:pointer}
.ai-shortcut:active{background:var(--pr50);border-color:var(--pr200)}
.ai-shortcut-icon{font-size:16px;flex-shrink:0}
.ai-shortcut-label{font:500 12px/1.2 var(--f);color:var(--c8)}
.ai-sheet-ft{padding:10px 12px;border-top:1px solid var(--dv);display:flex;gap:6px;flex-shrink:0}
.ai-sheet-input{flex:1;height:36px;border:1px solid var(--c2);border-radius:18px;padding:0 14px;font:400 13px/1 var(--f);color:var(--c8);outline:none}
.ai-sheet-input:focus{border-color:var(--pr)}
.ai-sheet-send{width:36px;height:36px;border-radius:50%;background:var(--pr);border:none;display:flex;align-items:center;justify-content:center;color:#FFF}
.ai-fab{position:fixed;bottom:80px;right:16px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--vi));border:none;box-shadow:0 4px 12px rgba(37,99,235,.3);display:flex;align-items:center;justify-content:center;z-index:940}
.ai-fab svg{width:20px;height:20px;color:#FFF}
.ai-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:940;opacity:0;pointer-events:none;transition:opacity .2s}
.ai-sheet-overlay.open{opacity:1;pointer-events:all}
</style>
</head>
<body>

<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-status">
    <span>9:41</span>
    <div class="phone-status-r">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--c9)"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="1.5" width="3" height="10.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="none" stroke="var(--c9)" stroke-width="1.2"><rect x="0.5" y="0.5" width="12" height="11" rx="2"/><line x1="13" y1="4" x2="13" y2="8"/><rect x="2" y="2.5" width="7" height="7" rx="1" fill="var(--c9)"/></svg>
    </div>
  </div>

  <div class="phone-nav">
    <a href="../demo-index.html" class="phone-nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="phone-nav-t">结果确认</span>
  </div>

  <div class="phone-body" id="phoneBody"></div>

  <div class="action-bar">
    <button class="btn btn-reject" onclick="showToast('已提交异议')">不同意</button>
    <button class="btn btn-confirm" onclick="showToast('已确认结果')">确认无误</button>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const MOCK = {
  employee: {name:'张明',dept:'产品部',title:'高级产品经理'},
  cycle: '2026年Q2',
  totalScore: 87.5,
  grade: '符合预期+',
  gradeChain: [
    {node:'审定前等级',grade:'符合预期+',type:'base'},
    {node:'直线上级',grade:'符合预期+',type:'done'},
    {node:'间接上级',grade:'符合预期+',type:'done'},
    {node:'逐级上级',grade:'符合预期+',type:'done'},
    {node:'HRBP审批',grade:'已通过',type:'hrbp'}
  ],
  goals: [
    {name:'资源利用率（通用）',weight:5,type:'定量',standard:'人员实际工作量饱和情况',target:'105%',challenge:'110%',result:'108%',progress:'108%',score:100,grade:'符合预期+'},
    {name:'HRAS UAT用户验收首次通过率',weight:10,type:'定量',standard:'需求首次业务验收通过的概率',target:'98%',challenge:'100%',result:'97%',progress:'97%',score:80,grade:'符合预期'},
    {name:'HRAS需求评审及时率',weight:15,type:'定量',standard:'迭代版本评审的及时性',target:'98%',challenge:'100%',result:'96%',progress:'96%',score:80,grade:'符合预期'},
    {name:'HRAS产品管理规范',weight:10,type:'定性',standard:'需求管理流程规范等',result:'4项规范全部符合，遵从度95%+',progress:'100%',score:null,grade:'符合预期+'},
    {name:'日常滚动需求响应',weight:10,type:'定性',standard:'滚动响应日常需求',result:'按时完成GOFO 6月迭代',progress:'100%',score:null,grade:'符合预期+'},
    {name:'HR ONE 绩效重构事项推进',weight:25,type:'定性',standard:'AI+绩效核心页面原型',result:'3个里程碑按时交付',progress:'100%',score:null,grade:'符合预期+'},
    {name:'AI应用项目探索与落地推广',weight:25,type:'定性',standard:'ASSC采购侧AI应用',result:'3个版本按时发布',progress:'100%',score:null,grade:'符合预期+'},
  ],
  comments: [
    {name:'王总监',role:'直线上级',color:'var(--pr)',text:'Q2完成3个核心功能上线，产品迭代目标达成率高。管理能力和业务理解有待提升。'},
    {name:'刘VP',role:'双线上级',color:'var(--vi)',text:'整体表现良好，产品交付质量稳定。建议重点关注团队协作和业务视野拓展。'}
  ],
  deadline: '2026-06-25 18:00'
};

function getGradeClass(grade){
  if(grade==='超出预期') return 'grade-exceed';
  if(grade==='符合预期+') return 'grade-meet';
  if(grade==='符合预期-') return 'grade-meet-minus';
  if(grade==='低于预期') return 'grade-below';
  return 'grade-meet';
}

function render(){
  const el = document.getElementById('phoneBody');
  let h = '';

  // Info card
  h += `<div class="info-card">
    <div class="info-avatar">${MOCK.employee.name[0]}</div>
    <div class="info-detail"><div class="info-name">${MOCK.employee.name}</div><div class="info-sub">${MOCK.employee.title} · ${MOCK.employee.dept}</div></div>
    <div class="info-cycle">${MOCK.cycle}</div>
  </div>`;

  // Result hero
  h += `<div class="result-hero">
    <div class="result-score">${MOCK.totalScore}</div>
    <div class="result-label">综合得分</div>
    <div class="result-grade"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>${MOCK.grade}</div>
  </div>`;

  // Grade chain
  h += '<div class="sec-hd"><span class="sec-name">等级流转</span></div>';
  h += '<div style="background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:4px;overflow-x:auto">';
  MOCK.gradeChain.forEach((c,i) => {
    const bg = c.type==='hrbp'?'var(--em50)':c.type==='base'?'var(--c1)':'var(--pr50)';
    const color = c.type==='hrbp'?'var(--em700)':c.type==='base'?'var(--c6)':'var(--pr)';
    h += `<div style="text-align:center;min-width:60px;flex-shrink:0">
      <div style="font:400 10px/1 var(--f);color:var(--c5);margin-bottom:4px">${c.node}</div>
      <span style="display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font:500 11px/1 var(--f);background:${bg};color:${color}">${c.type==='hrbp'?'✓ ':''}${c.grade}</span>
    </div>`;
    if(i<MOCK.gradeChain.length-1) h += '<span style="color:var(--c3);flex-shrink:0;font-size:10px">→</span>';
  });
  h += '</div>';

  // Goal scores
  h += '<div class="sec-hd"><span class="sec-name">得分明细</span></div>';
  MOCK.goals.forEach(g => {
    const isQuant = g.type==='定量';
    h += `<div class="goal-row" style="flex-wrap:wrap">
      <div style="flex:1;min-width:0">
        <div style="font:500 13px/1.3 var(--f);color:var(--c8)">${g.name}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
          <span style="font:500 10px/1 var(--f);padding:2px 5px;border-radius:3px;background:${isQuant?'var(--pr50)':'var(--em50)'};color:${isQuant?'var(--pr)':'var(--em700)'}">${g.type}</span>
          <span style="font:400 11px/1 var(--f);color:var(--c5)">${g.weight}%</span>
          <span style="font:400 11px/1 var(--f);color:var(--c6)">${g.result}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        ${isQuant?`<span style="font:700 14px/1 var(--fm);color:var(--pr)">${g.score}</span>`:''}
        <span class="goal-row-grade ${getGradeClass(g.grade)}">${g.grade}</span>
      </div>
    </div>`;
  });

  // Comments
  h += '<div class="sec-hd"><span class="sec-name">上级评语</span></div>';
  MOCK.comments.forEach(c => {
    h += `<div style="background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:12px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:24px;height:24px;border-radius:50%;background:${c.color};display:flex;align-items:center;justify-content:center;font:600 10px/1 var(--f);color:#FFF">${c.name[0]}</div>
        <div><span style="font:500 12px/1 var(--f);color:var(--c8)">${c.name}</span> <span style="font:400 11px/1 var(--f);color:var(--c5)">${c.role}</span></div>
      </div>
      <div style="font:400 13px/1.6 var(--f);color:var(--c7)">${c.text}</div>
    </div>`;
  });

  // Deadline
  h += `<div style="text-align:center;padding:12px;font:400 12px/1 var(--f);color:var(--ac700)">确认截止：${MOCK.deadline}</div>`;

  h += '<div style="height:100px"></div>';
  el.innerHTML = h;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2000);
}

render();

// ═══ MOBILE AI ═══
var AI_S={open:false,msgs:[{role:'bot',text:'👋 AI确认助手\n\n• 分析你的绩效\n• 查看成长趋势\n• 了解申诉流程',time:'刚刚',shortcuts:true}]};
var AI_S_SHORTCUTS=[
  {icon:'📊',label:'分析我的绩效'},
  {icon:'📈',label:'查看成长趋势'},
  {icon:'❓',label:'有异议怎么办'}
];

function toggleAI(){AI_S.open=!AI_S.open;document.getElementById('aiSheet').classList.toggle('open',AI_S.open);document.getElementById('aiOverlay').classList.toggle('open',AI_S.open);if(AI_S.open)renderAI();}
function closeAI(){AI_S.open=false;document.getElementById('aiSheet').classList.remove('open');document.getElementById('aiOverlay').classList.remove('open');}

function renderAI(){
  var bd=document.getElementById('aiSheetBd');
  bd.innerHTML=AI_S.msgs.map(function(m){
    var h='<div class="ai-msg '+m.role+'"><div class="ai-msg-bd">'+m.text.replace(/\n/g,'<br/>')+'</div>';
    if(m.shortcuts){h+='<div class="ai-shortcuts">'+AI_S_SHORTCUTS.map(function(s){return '<div class="ai-shortcut" onclick="aiAction(\''+s.label+'\')"><span class="ai-shortcut-icon">'+s.icon+'</span><span class="ai-shortcut-label">'+s.label+'</span></div>';}).join('')+'</div>';}
    if(m.card){h+='<div class="ai-msg-card"><div class="ai-msg-card-t">'+m.card.t+'</div><div class="ai-msg-card-d">'+m.card.d+'</div><span class="ai-msg-card-tag" style="background:var(--em50);color:var(--em700)">'+m.card.tag+'</span></div>';}
    if(m.acts){h+='<div class="ai-msg-actions">'+m.acts.map(function(a){return '<button class="ai-msg-btn" onclick="aiAction(\''+a+'\')">'+a+'</button>';}).join('')+'</div>';}
    if(m.time){h+='<div class="ai-msg-time">'+m.time+'</div>';}
    return h+'</div>';
  }).join('');
  bd.scrollTop=bd.scrollHeight;
}

function aiSend(){
  var inp=document.getElementById('aiInp');var t=inp.value.trim();if(!t)return;
  AI_S.msgs.push({role:'user',text:t});inp.value='';renderAI();
  setTimeout(function(){AI_S.msgs.push({role:'bot',text:'收到，正在分析…',time:'刚刚',acts:['分析我的绩效','查看成长趋势','有异议怎么办']});renderAI();},600);
}

function aiAction(a){
  AI_S.msgs.push({role:'user',text:a});
  setTimeout(function(){
    if(a==='分析我的绩效'){AI_S.msgs.push({role:'bot',text:'📊 Q2绩效分析：\n综合得分 87.5分\n等级：符合预期+\n关键指标30%优秀，关键行动70%良好',time:'刚刚',card:{t:'绩效分析',d:'整体表现优秀',tag:'符合预期+'}});}

    else if(a==='有异议怎么办'){AI_S.msgs.push({role:'bot',text:'❓ 异议流程：\n1. 点击「不同意」\n2. 填写原因\n3. HRBP 3个工作日内处理',time:'刚刚',card:{t:'流程说明',d:'3日内HRBP处理',tag:'流程'}});}
    else{AI_S.msgs.push({role:'bot',text:'收到，正在分析…',time:'刚刚'});}
    renderAI();
  },600);
}
