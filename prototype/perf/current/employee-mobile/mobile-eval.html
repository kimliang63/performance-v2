<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HR ONE - 绩效自评</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../mobile-base.css">
<style>
.goal-card{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:12px 14px;margin-bottom:8px}
.goal-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.goal-name{flex:1;font:500 var(--fs-base)/1.3 var(--f);color:var(--c8)}
.goal-type-tag{font:500 var(--fs-xs)/1 var(--f);padding:2px 6px;border-radius:3px}
.goal-type-tag.quant{background:var(--pr50);color:var(--pr)}
.goal-type-tag.qual{background:var(--em50);color:var(--em700)}
.goal-desc{font:400 var(--fs-sm)/1.4 var(--f);color:var(--c6);padding:6px 10px;background:var(--c0);border-radius:6px;margin-bottom:8px}
.section-hd{display:flex;align-items:center;gap:6px;margin:14px 0 8px}
.section-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.section-name{font:600 var(--fs-base)/1 var(--f);color:var(--c8)}
.score-num{font:700 var(--fs-base)/1 var(--fm);color:var(--pr);text-align:center;min-width:40px}
</style>
</head>
<body>
<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-status">9:41<div class="phone-status-r">
    <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="6" width="3" height="6" rx="1" fill="currentColor" style="color:var(--c9)"/><rect x="4.5" y="4" width="3" height="8" rx="1" fill="currentColor" style="color:var(--c9)"/><rect x="9" y="1.5" width="3" height="10.5" rx="1" fill="currentColor" style="color:var(--c9)"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="currentColor" style="color:var(--c9)"/></svg>
    <svg width="15" height="12" viewBox="0 0 15 12" fill="none"><rect x="0.5" y="0.5" width="12" height="11" rx="2" stroke="currentColor" style="color:var(--c9)" stroke-width="1.2"/><line x1="13" y1="4" x2="13" y2="8" stroke="currentColor" style="color:var(--c9)" stroke-width="1.2"/><rect x="2" y="2.5" width="7" height="7" rx="1" fill="currentColor" style="color:var(--c9)"/></svg>
  </div></div>
  <div class="weui-navigation-bar">
    <a href="../demo-index.html" class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="title">绩效自评</span>
  </div>
  <div class="phone-body" id="phoneBody"></div>
  <div class="bottom-bar">
    <button class="weui-btn weui-btn_default" style="flex:1" onclick="showToast('已暂存')">暂存</button>
    <button class="weui-btn weui-btn_primary" style="flex:1" onclick="showToast('已提交自评')">提交自评</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="../mobile-base.js"></script>
<script>
var EMP={name:'张明',dept:'产品部',title:'高级产品经理',cycle:'2026年Q2'};
var GRADES=['超出预期','符合预期+','符合预期','符合预期-','低于预期'];

var MODS=[
  {name:'关键指标',weight:30,color:'var(--pr)',goals:[
    {id:'g1',name:'资源利用率（通用）',type:'quant',weight:5,desc:'人员实际工作量饱和情况',target:105,challenge:110,baseline:100,unit:'%'},
    {id:'g2',name:'HRAS UAT用户验收首次通过率',type:'quant',weight:10,desc:'需求首次业务验收通过的概率',target:98,challenge:100,baseline:95,unit:'%'},
    {id:'g3',name:'HRAS需求评审及时率',type:'quant',weight:15,desc:'迭代版本评审的及时性情况',target:98,challenge:100,baseline:95,unit:'%'}
  ]},
  {name:'关键行动',weight:70,color:'var(--em)',goals:[
    {id:'g4',name:'HRAS产品管理规范',type:'qual',weight:10,desc:'需求管理流程规范、产品需求规范、迭代火车管理规范、周会/月会准时完成'},
    {id:'g5',name:'日常滚动需求响应',type:'qual',weight:10,desc:'根据业务日会需求优先级，滚动响应日常需求，输出产品解决方案'},
    {id:'g6',name:'HR ONE 绩效重构事项推进',type:'qual',weight:25,desc:'06-10 输出AI+绩效核心页面原型；06-19 完成绩效版本4需求内审；06-24 完成需求评审'},
    {id:'g7',name:'AI应用项目探索与落地推广',type:'qual',weight:25,desc:'06-05 完成ASSC采购侧AI应用1.0版本；06-12 对接LBU试点应用；06-26 完成1.1版本'}
  ]}
];

var completed={},grades={};

function calcScore(){
  var total=0,wSum=0;
  MODS.forEach(function(m){m.goals.forEach(function(g){
    var c=completed[g.id];
    if(c===undefined||c==='')return;
    if(g.type==='quant'){
      var v=parseFloat(c);if(isNaN(v))return;
      var s=v>=g.challenge?120:v>=g.target?100:v>=g.baseline?80:0;
      total+=s*g.weight;wSum+=g.weight;
    }else{
      var gr=grades[g.id];if(!gr)return;
      var sm={'超出预期':120,'符合预期+':100,'符合预期':80,'符合预期-':60,'低于预期':40};
      total+=(sm[gr]||80)*g.weight;wSum+=g.weight;
    }
  })});
  return wSum>0?Math.round(total/wSum*10)/10:0;
}
function getGrade(s){return s>=110?'超出预期':s>=90?'符合预期+':s>=70?'符合预期':s>=50?'符合预期-':'低于预期';}

function calcItemScore(g,v){var va=parseFloat(v);if(isNaN(va))return'—';return va>=g.challenge?120:va>=g.target?100:va>=g.baseline?80:0;}

function render(){
  var h='';
  // Employee
  h+='<div class="weui-panel weui-panel_access" style="margin-bottom:10px"><div class="weui-cells"><div class="weui-cell"><div class="weui-cell__hd"><div style="width:36px;height:36px;border-radius:50%;background:var(--pr50);display:flex;align-items:center;justify-content:center;font:700 var(--fs-lg)/1 var(--f);color:var(--pr);margin-right:12px">'+EMP.name[0]+'</div></div><div class="weui-cell__bd"><div style="font:600 var(--fs-base)/1 var(--f);color:var(--c9)">'+EMP.name+'</div><div style="font:400 var(--fs-sm)/1 var(--f);color:var(--c5);margin-top:2px">'+EMP.title+' · '+EMP.dept+'</div></div><div class="weui-cell__ft"><span class="weui-badge" style="background:var(--pr50);color:var(--pr)">'+EMP.cycle+'</span></div></div></div></div>';

  MODS.forEach(function(m){
    h+='<div class="section-hd"><span class="section-dot" style="background:'+m.color+'"></span><span class="section-name">'+m.name+'</span><span style="font:500 var(--fs-sm)/1 var(--fm);color:var(--c5);margin-left:auto">'+m.weight+'%</span></div>';
    m.goals.forEach(function(g){
      var isQuant=g.type==='quant',kv=completed[g.id]||'',gr=grades[g.id]||'';
      h+='<div class="goal-card"><div class="goal-top"><span class="goal-name">'+g.name+'</span><span class="goal-type-tag '+(isQuant?'quant':'qual')+'">'+(isQuant?'定量':'定性')+'</span></div><div class="goal-desc">'+g.desc+'</div>';
      if(isQuant){
        h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font:400 var(--fs-sm)/1 var(--f);color:var(--c5)">目标值</span><span style="font:500 var(--fs-base)/1 var(--fm);color:var(--pr)">'+g.target+g.unit+'</span></div>';
        h+='<div class="weui-cell" style="padding:0;margin-bottom:4px"><div class="weui-cell__bd" style="font:400 var(--fs-sm)/1 var(--f);color:var(--c5)">完成值</div><div class="weui-cell__ft"><input class="weui-input" type="number" style="width:80px;text-align:right;font-family:var(--fm);font-weight:500" placeholder="输入完成值" value="'+kv+'" oninput="setC(\''+g.id+'\',this.value)" onchange="setC(\''+g.id+'\',this.value)"><span style="font:400 var(--fs-sm)/1 var(--f);color:var(--c4);margin-left:4px">'+g.unit+'</span></div></div>';
        h+='<div style="display:flex;align-items:center;justify-content:space-between"><span style="font:400 var(--fs-sm)/1 var(--f);color:var(--c5)">得分</span><span class="score-num">'+(kv!==''?calcItemScore(g,kv):'—')+'</span></div>';
      }else{
        h+='<div style="margin-bottom:6px"><textarea class="weui-textarea" style="min-height:56px;font-size:var(--fs-sm)" placeholder="描述完成情况…" oninput="setC(\''+g.id+'\',this.value)" onchange="setC(\''+g.id+'\',this.value)">'+kv+'</textarea></div>';
        h+='<div style="display:flex;align-items:center;gap:8px"><span style="font:400 var(--fs-sm)/1 var(--f);color:var(--c5)">等级</span><select class="weui-select" style="flex:1" onchange="setG(\''+g.id+'\',this.value)"><option value="">请选择</option>'+GRADES.map(function(o){return '<option value="'+o+'"'+(gr===o?' selected':'')+'>'+o+'</option>'}).join('')+'</select></div>';
      }
      h+='</div>';
    });
  });

  var ts=calcScore(),tg=getGrade(ts);
  h+='<div style="display:flex;gap:8px;margin:12px 0"><div style="flex:1;background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:12px;text-align:center"><div style="font:700 var(--fs-xl)/1 var(--fm);color:var(--pr)">'+(ts||'—')+'</div><div style="font:400 var(--fs-xs)/1 var(--f);color:var(--c5);margin-top:3px">综合得分</div></div><div style="flex:1;background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:12px;text-align:center"><div style="font:700 var(--fs-base)/1 var(--f);color:var(--em700)">'+(ts?tg:'—')+'</div><div style="font:400 var(--fs-xs)/1 var(--f);color:var(--c5);margin-top:3px">综合等级</div></div></div>';

  h+='<div style="margin-bottom:8px"><textarea class="weui-textarea" style="min-height:72px;font-size:var(--fs-sm)" placeholder="请对本季度整体工作进行总结…"></textarea></div>';

  // Approval flow
  h+='<div class="weui-panel weui-panel_access"><div class="weui-panel__hd" style="font:600 var(--fs-base)/1 var(--f);color:var(--c8)">审批流程</div><div class="weui-cells">';
  var flow=[{n:'员工自评',p:'张明',c:'var(--em)',s:'进行中',sb:'var(--ac50)',sc:'var(--ac700)'},{n:'直线上级评分',p:'王总监',c:'var(--c4)',s:'待处理',sb:'var(--c1)',sc:'var(--c5)'},{n:'间接上级评分',p:'刘VP',c:'var(--c4)',s:'待处理',sb:'var(--c1)',sc:'var(--c5)'},{n:'HRBP审批',p:'赵敏',c:'var(--c4)',s:'待处理',sb:'var(--c1)',sc:'var(--c5)'}];
  flow.forEach(function(f){h+='<div class="weui-cell"><div class="weui-cell__hd"><div style="width:24px;height:24px;border-radius:50%;background:'+f.c+';display:flex;align-items:center;justify-content:center;margin-right:10px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div></div><div class="weui-cell__bd"><div style="font:500 var(--fs-sm)/1 var(--f);color:var(--c8)">'+f.n+'</div><div style="font:400 var(--fs-sm)/1 var(--f);color:var(--c5);margin-top:2px">'+f.p+'</div></div><div class="weui-cell__ft"><span style="font:500 var(--fs-xs)/1 var(--f);padding:2px 8px;border-radius:4px;background:'+f.sb+';color:'+f.sc+'">'+f.s+'</span></div></div>';});
  h+='</div></div><div style="height:80px"></div>';
  document.getElementById('phoneBody').innerHTML=h;
}

function setC(id,v){completed[id]=v;render();}
function setG(id,v){grades[id]=v;render();}
render();
injectAIPanel('AI 自评助手','优化评分 · 生成评语 · 完整性检查',['优化评分建议','生成评语','检查完整性']);
</script>
</body>
</html>
