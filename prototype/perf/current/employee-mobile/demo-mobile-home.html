<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 员工工作台</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;
  --em:#10B981;--em50:#ECFDF5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;
  --ro:#F43F5E;--ro50:#FFF1F2;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#0F172A;--c8:#1E293B;--c7:#334155;--c6:#475569;--c5:#64748B;--c4:#94A3B8;--c3:#CBD5E1;--c2:#E2E8F0;--c1:#F1F5F9;--c0:#F8FAFC;
  --sf:#FFF;--bg:#F0F4F8;--dv:#E2E8F0;
  --r1:10px;--r2:12px;--r3:14px;--r4:18px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
  --sx:0 1px 2px rgba(0,0,0,.04);--sm:0 2px 8px rgba(0,0,0,.06);
  --bd:rgba(15,23,42,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:#E5E7EB;color:var(--c7);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}
.phone{width:393px;height:852px;background:var(--bg);border-radius:48px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.05),inset 0 0 0 1px rgba(255,255,255,.1);overflow:hidden;position:relative;display:flex;flex-direction:column}
.phone-notch{width:126px;height:34px;background:#000;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:100}
.phone-status{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 8px;font:600 14px/1 var(--f);color:var(--c9)}
.phone-status-r{display:flex;gap:4px;align-items:center}
.phone-nav{height:50px;display:flex;align-items:center;padding:0 16px;gap:10px}
.phone-nav-back{width:32px;height:32px;border-radius:8px;background:var(--c1);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--c7);flex-shrink:0}
.phone-nav-back svg{width:16px;height:16px}
.phone-nav-t{flex:1;font:600 17px/1 var(--f);color:var(--c9)}
.phone-body{flex:1;overflow-y:auto;padding:0 16px}
.phone-body::-webkit-scrollbar{width:0}

/* Cycle Pills */
.pills{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.pill{flex-shrink:0;padding:6px 14px;border-radius:20px;font:500 12px/1 var(--f);color:var(--c5);background:var(--sf);border:1px solid var(--dv);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill.active{background:var(--pr);color:#FFF;border-color:var(--pr)}
.pill:active{transform:scale(.95)}

/* Stats Grid */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:14px 16px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.pr::before{background:var(--pr)}.stat.em::before{background:var(--em)}.stat.ac::before{background:var(--ac)}.stat.vi::before{background:var(--vi)}
.stat-t{font:400 11px/1 var(--f);color:var(--c5);margin-bottom:6px}
.stat-v{font:700 22px/1 var(--f);color:var(--c9)}
.stat-d{font:400 10px/1 var(--f);color:var(--c4);margin-top:3px}

/* Todo List */
.todo{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);margin-bottom:12px;overflow:hidden}
.todo-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.todo-title{font:600 14px/1 var(--f);color:var(--c8)}
.todo-cnt{font:600 11px/1 var(--f);color:var(--pr);background:var(--pr50);padding:2px 8px;border-radius:10px}
.todo-item{display:flex;align-items:center;padding:12px 16px;gap:12px;cursor:pointer;transition:background .1s}
.todo-item:active{background:var(--c0)}
.todo-item+.todo-item{border-top:1px solid var(--dv)}
.todo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.todo-dot.urgent{background:var(--ro)}.todo-dot.normal{background:var(--ac)}.todo-dot.done{background:var(--em)}
.todo-info{flex:1;min-width:0}
.todo-name{font:500 13px/1.3 var(--f);color:var(--c8)}
.todo-deadline{font:400 11px/1 var(--f);color:var(--c4);margin-top:3px}
.todo-arrow{color:var(--c3);flex-shrink:0}
.todo-arrow svg{width:14px;height:14px}

/* AI Banner */
.ai-banner{background:linear-gradient(135deg,var(--pr50),var(--vi50));border:1px solid var(--pr200);border-radius:var(--r2);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.ai-banner:active{transform:scale(.98)}
.ai-banner-ic{width:32px;height:32px;border-radius:var(--r1);background:linear-gradient(135deg,var(--pr),var(--vi));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-banner-ic svg{width:16px;height:16px;color:#FFF}
.ai-banner-t{font:600 13px/1.3 var(--f);color:var(--c8)}
.ai-banner-d{font:400 11px/1.3 var(--f);color:var(--c5);margin-top:2px}

/* AI FAB */
.m-fab{position:absolute;bottom:100px;right:16px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--vi));border:none;box-shadow:0 4px 12px rgba(37,99,235,.3);display:flex;align-items:center;justify-content:center;z-index:50;cursor:pointer;transition:transform .2s}
.m-fab:active{transform:scale(.92)}
.m-fab svg{width:20px;height:20px;color:#FFF}

/* Toast */
.toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:var(--c9);color:#FFF;padding:10px 22px;border-radius:22px;font:500 13px/1 var(--f);z-index:900;opacity:0;pointer-events:none;transition:opacity .2s}
</style>
</head>
<body>

<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-status">
    <span>9:41</span>
    <div class="phone-status-r">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--c9)"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="1.5" width="3" height="10.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="none" stroke="var(--c9)" stroke-width="1.2"><rect x="0.5" y="0.5" width="12" height="11" rx="2"/><line x1="13" y1="4" x2="13" y2="8"/><rect x="2" y="2.5" width="7" height="7" rx="1" fill="var(--c9)"/></svg>
    </div>
  </div>

  <div class="phone-nav">
    <a href="../demo-index.html" class="phone-nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="phone-nav-t">我的工作台</span>
  </div>

  <div class="phone-body" id="phoneBody"></div>

  <button class="m-fab" onclick="showToast('AI 助手已就绪')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/><path d="M12 14v4"/><path d="M8 18h8"/><path d="M6 22h12"/></svg>
  </button>

  <div class="toast" id="toast"></div>
</div>

<script>
const MOCK = {
  employee: {name:'张明',dept:'产品部',title:'高级产品经理'},
  directLeader: {name:'王总'},
  cycle: '2026年Q2',
  totalScore: 87.5,
  grade: '符合预期+',
};

const CYCLES = ['2026年Q1','2026年Q2','2025年Q4','2025年Q3'];
let activeCycle = 1;

const TODOS = [
  {name:'Q2 目标制定',deadline:'截止 2026-06-20',type:'urgent'},
  {name:'Q1 自评提交',deadline:'截止 2026-06-18',type:'normal'},
  {name:'确认 Q1 绩效结果',deadline:'已确认',type:'done'},
];

function render(){
  const el = document.getElementById('phoneBody');
  let h = '';

  // Cycle pills
  h += '<div class="pills">';
  CYCLES.forEach((c,i) => {
    h += `<div class="pill${i===activeCycle?' active':''}" onclick="switchCycle(${i})">${c}</div>`;
  });
  h += '</div>';

  // Stats
  h += `<div class="stats">
    <div class="stat pr"><div class="stat-t">当前阶段</div><div class="stat-v" style="font-size:16px">目标制定</div><div class="stat-d">Q2 进行中</div></div>
    <div class="stat em"><div class="stat-t">目标完成度</div><div class="stat-v">78%</div><div class="stat-d">5 个目标中</div></div>
    <div class="stat ac"><div class="stat-t">权重合计</div><div class="stat-v">100%</div><div class="stat-d">已达标</div></div>
    <div class="stat vi"><div class="stat-t">AI 建议</div><div class="stat-v" style="font-size:16px;color:var(--vi)">3 条</div><div class="stat-d">点击查看详情</div></div>
  </div>`;

  // AI Banner
  h += `<div class="ai-banner">
    <div class="ai-banner-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/><path d="M12 14v4"/><path d="M8 18h8"/><path d="M6 22h12"/></svg></div>
    <div><div class="ai-banner-t">AI 发现 3 条优化建议</div><div class="ai-banner-d">目标权重分布可优化，点击查看详情</div></div>
  </div>`;

  // Todo list
  const urgentCnt = TODOS.filter(t => t.type === 'urgent').length;
  h += `<div class="todo">
    <div class="todo-hd"><span class="todo-title">待办任务</span><span class="todo-cnt">${TODOS.length} 项</span></div>`;
  TODOS.forEach(t => {
    h += `<div class="todo-item">
      <div class="todo-dot ${t.type}"></div>
      <div class="todo-info"><div class="todo-name">${t.name}</div><div class="todo-deadline">${t.deadline}</div></div>
      <div class="todo-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>`;
  });
  h += '</div><div style="height:24px"></div>';

  el.innerHTML = h;
}

function switchCycle(i){
  activeCycle = i;
  render();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2000);
}

render();
</script>
</body>
</html>
