<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 绩效面谈·填写</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;
  --em:#10B981;--em50:#ECFDF5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;--ac700:#B45309;
  --ro:#F43F5E;--ro50:#FFF1F2;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#0F172A;--c8:#1E293B;--c7:#334155;--c6:#475569;--c5:#64748B;--c4:#94A3B8;--c3:#CBD5E1;--c2:#E2E8F0;--c1:#F1F5F9;--c0:#F8FAFC;
  --sf:#FFF;--bg:#F0F4F8;--dv:#E2E8F0;
  --r1:10px;--r2:12px;--r3:14px;--r4:18px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
  --sx:0 1px 2px rgba(0,0,0,.04);--bd:rgba(15,23,42,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:#E5E7EB;color:var(--c7);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}
.phone{width:393px;height:852px;background:var(--bg);border-radius:48px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.05),inset 0 0 0 1px rgba(255,255,255,.1);overflow:hidden;position:relative;display:flex;flex-direction:column}
.phone-notch{width:126px;height:34px;background:#000;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:100}
.phone-status{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 8px;font:600 14px/1 var(--f);color:var(--c9)}
.phone-status-r{display:flex;gap:4px;align-items:center}
.phone-nav{height:50px;display:flex;align-items:center;padding:0 16px;gap:10px}
.phone-nav-back{width:32px;height:32px;border-radius:8px;background:var(--c1);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--c7);flex-shrink:0}
.phone-nav-back svg{width:16px;height:16px}
.phone-nav-t{flex:1;font:600 17px/1 var(--f);color:var(--c9)}
.phone-body{flex:1;overflow-y:auto;padding:0 16px}
.phone-body::-webkit-scrollbar{width:0}

.card{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);margin-bottom:10px;overflow:hidden}
.card-hd{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.card-title{font:600 13px/1 var(--f);color:var(--c8)}
.card-desc{font:400 11px/1 var(--f);color:var(--c5);margin-left:auto}
.card-bd{padding:12px 14px}

.sec-hd{display:flex;align-items:center;gap:6px;margin:14px 0 8px}
.sec-ic{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-ic svg{width:12px;height:12px;color:#FFF}
.sec-name{font:600 13px/1 var(--f);color:var(--c8)}

.tip{font:400 11px/1.3 var(--f);color:var(--c5);padding:8px 10px;background:var(--pr50);border-radius:var(--r1);margin-bottom:10px;display:flex;align-items:flex-start;gap:6px}
.tip svg{width:12px;height:12px;flex-shrink:0;margin-top:1px;color:var(--pr)}

textarea.field{width:100%;min-height:80px;border:1px solid var(--c2);border-radius:var(--r1);padding:10px;font:400 13px/1.5 var(--f);color:var(--c8);outline:none;resize:vertical;font-family:var(--f);transition:border-color .12s}
textarea.field:focus{border-color:var(--pr)}
.field-hint{font:400 11px/1 var(--f);color:var(--c4);margin-top:4px}

select.field{width:100%;height:36px;border:1px solid var(--c2);border-radius:var(--r1);padding:0 24px 0 10px;font:500 13px/1 var(--f);color:var(--c7);background:var(--sf);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%2394A3B8' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center}

.upload-zone{border:2px dashed var(--c2);border-radius:var(--r1);padding:16px;text-align:center;cursor:pointer;transition:all .12s}
.upload-zone:active{border-color:var(--pr);background:var(--pr50)}

.actions{display:flex;gap:8px;padding:12px 16px;background:var(--sf);border-top:1px solid var(--dv);flex-shrink:0}
.btn{flex:1;height:40px;border-radius:var(--r2);font:600 13px/1 var(--f);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .12s}
.btn:active{transform:scale(.97)}
.btn-draft{background:var(--c1);color:var(--c6)}
.btn-submit{background:var(--pr);color:#FFF;box-shadow:0 2px 8px rgba(37,99,235,.25)}

.toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:var(--c9);color:#FFF;padding:10px 22px;border-radius:22px;font:500 13px/1 var(--f);z-index:900;opacity:0;pointer-events:none;transition:opacity .2s}

/* AI */
.ai-panel{position:fixed;bottom:0;left:0;right:0;height:70%;background:var(--sf);border-radius:16px 16px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);z-index:9999;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.ai-panel.open{transform:translateY(0)}
.ai-hd{padding:14px 16px;border-bottom:1px solid var(--dv);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ai-hd-ic{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--pr),var(--vi));display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.ai-hd-ic svg{width:16px;height:16px}
.ai-hd-info{flex:1}
.ai-hd-t{font:600 14px/1.2 var(--f);color:var(--c9)}
.ai-hd-s{font:400 11px/1 var(--f);color:var(--c5)}
.ai-hd-close{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--c5);cursor:pointer;flex-shrink:0}
.ai-bd{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:88%;animation:fadeIn .25s ease}
.ai-msg.bot{align-self:flex-start}
.ai-msg.user{align-self:flex-end}
.ai-msg-bd{padding:10px 14px;border-radius:var(--r3);font:400 13px/1.6 var(--f);word-break:break-word}
.ai-msg.bot .ai-msg-bd{background:var(--c0);color:var(--c8);border-bottom-left-radius:4px}
.ai-msg.user .ai-msg-bd{background:var(--pr);color:#fff;border-bottom-right-radius:4px}
.ai-msg-time{font:400 10px/1 var(--f);color:var(--c4);margin-top:4px}
.ai-msg-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ai-msg-btn{font:500 11px/1 var(--f);padding:5px 10px;border-radius:var(--r1);border:1px solid var(--c2);background:var(--sf);color:var(--c6);cursor:pointer}
.ai-msg-btn:active{border-color:var(--pr);color:var(--pr);background:var(--pr50)}
.ai-msg-card{background:var(--sf);border:1px solid var(--c2);border-radius:var(--r2);padding:12px;margin-top:8px}
.ai-msg-card-t{font:600 12px/1.3 var(--f);color:var(--c8);margin-bottom:6px}
.ai-msg-card-d{font:400 12px/1.5 var(--f);color:var(--c5)}
.ai-msg-card-tag{display:inline-block;font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px;margin-top:4px}
.ai-shortcuts{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.ai-shortcut{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--sf);border:1px solid var(--c2);border-radius:var(--r2);cursor:pointer}
.ai-shortcut:active{border-color:var(--pr200);background:var(--pr50)}
.ai-shortcut-icon{font-size:18px;flex-shrink:0}
.ai-shortcut-label{font:500 13px/1.2 var(--f);color:var(--c8)}
.ai-ft{padding:12px 16px;border-top:1px solid var(--dv);display:flex;gap:8px;align-items:center;flex-shrink:0}
.ai-input{flex:1;height:36px;border:1px solid var(--c2);border-radius:var(--r2);padding:0 12px;font:400 13px/1 var(--f);color:var(--c8);outline:none}
.ai-input:focus{border-color:var(--pr)}
.ai-send{width:36px;height:36px;border-radius:var(--r2);background:var(--pr);border:none;display:flex;align-items:center;justify-content:center;color:#FFF}
.ai-send:active{background:var(--pr700)}
.ai-fab{position:fixed;bottom:100px;right:calc(50% - 180px);width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--vi));border:none;box-shadow:0 4px 16px rgba(37,99,235,.35);display:flex;align-items:center;justify-content:center;z-index:960}
.ai-fab:active{transform:scale(.92)}
.ai-fab svg{width:22px;height:22px;color:#FFF}
.ai-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9998;opacity:0;pointer-events:none;transition:opacity .25s}
.ai-overlay.open{opacity:1;pointer-events:all}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-status">
    <span>9:41</span>
    <div class="phone-status-r">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--c9)"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="1.5" width="3" height="10.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="none" stroke="var(--c9)" stroke-width="1.2"><rect x="0.5" y="0.5" width="12" height="11" rx="2"/><line x1="13" y1="4" x2="13" y2="8"/><rect x="2" y="2.5" width="7" height="7" rx="1" fill="var(--c9)"/></svg>
    </div>
  </div>
  <div class="phone-nav">
    <a href="../demo-index.html" class="phone-nav-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="phone-nav-t">绩效面谈</span>
  </div>
  <div class="phone-body" id="phoneBody"></div>
  <div class="actions">
    <button class="btn btn-draft" onclick="showToast('草稿已保存')">保存草稿</button>
    <button class="btn btn-submit" onclick="showToast('面谈记录已提交')">提交</button>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
const MOCK={
  employee:{name:'张明',dept:'产品部',title:'高级产品经理'},
  cycle:'2026年Q2',
  interviewer:'王总监',
  interviewType:'定期面谈',
  held:'是，一对一面谈',
  deadline:'2026-06-25 18:00',
  monthlyData:[
    {month:'6月',score:3.95,grade:'超出预期'},
    {month:'5月',score:3.70,grade:'符合预期+'},
    {month:'4月',score:3.82,grade:'符合预期+'}
  ]
};

const GRADE_CLS={'超出预期':'excellent','符合预期+':'good','符合预期':'normal','符合预期-':'poor','低于预期':'bad'};

function render(){
  const el=document.getElementById('phoneBody');
  let h='';

  // Info card
  h+=`<div class="card" style="display:flex;align-items:center;gap:12px;padding:14px">
    <div style="width:36px;height:36px;border-radius:50%;background:var(--pr50);display:flex;align-items:center;justify-content:center;font:700 14px/1 var(--f);color:var(--pr)">${MOCK.employee.name[0]}</div>
    <div style="flex:1"><div style="font:600 14px/1 var(--f);color:var(--c9)">${MOCK.employee.name}</div><div style="font:400 11px/1 var(--f);color:var(--c5);margin-top:2px">${MOCK.employee.title} · ${MOCK.employee.dept}</div></div>
    <span style="font:600 11px/1 var(--f);color:var(--pr);background:var(--pr50);padding:4px 8px;border-radius:6px">${MOCK.cycle}</span>
  </div>`;

  // Monthly performance
  h+=`<div class="card"><div class="card-hd"><span class="card-title">月度绩效趋势</span></div><div class="card-bd" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px">`;
  MOCK.monthlyData.forEach(d=>{
    const gc=GRADE_CLS[d.grade]||'normal';
    const bw=Math.min(d.score,5)/5*100;
    const bc={'excellent':'var(--em)','good':'var(--pr)','normal':'var(--c4)','poor':'var(--ac)','bad':'var(--ro)'}[gc]||'var(--c4)';
    h+=`<div style="min-width:80px;flex-shrink:0;text-align:center;padding:8px;border:1px solid var(--bd);border-radius:8px">
      <div style="font:600 11px/1 var(--f);color:var(--c5);margin-bottom:4px">${d.month}</div>
      <div style="font:700 16px/1 var(--fm);color:var(--pr)">${d.score}</div>
      <span style="display:inline-block;padding:2px 6px;border-radius:4px;font:500 10px/1 var(--f);background:var(--${gc==='excellent'?'em':gc==='good'?'pr':gc==='poor'?'ac':'c1'}50);color:${bc};margin-top:4px">${d.grade}</span>
      <div style="height:3px;background:var(--c1);border-radius:2px;margin-top:6px;overflow:hidden"><div style="height:100%;width:${bw}%;background:${bc};border-radius:2px"></div></div>
    </div>`;
  });
  h+='</div></div>';

  // 面谈确认
  h+=`<div class="card"><div class="card-hd"><span class="card-title">面谈确认</span></div><div class="card-bd">
    <div style="font:500 12px/1 var(--f);color:var(--c6);margin-bottom:6px">直线上级是否有跟您进行过年度绩效面谈？<span style="color:var(--ro)">*</span></div>
    <select class="field">
      <option value="">请选择</option>
      <option value="1on1" selected>是，一对一面谈</option>
      <option value="phone">是，电话面谈</option>
      <option value="other">是，其他形式面谈</option>
      <option value="no">否</option>
    </select>
  </div></div>`;

  // 三个赞
  h+=`<div class="sec-hd"><div class="sec-ic" style="background:var(--em)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg></div><span class="sec-name">点三个赞</span></div>`;
  h+=`<div class="tip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>每行一项，不少于三个</div>`;
  h+=`<div class="card"><div class="card-bd"><textarea class="field" placeholder="每行一项，至少填写3项&#10;如：&#10;1. 感谢上级在XX方面的指导&#10;2. 感谢上级在XX方面的支持&#10;3. 感谢上级在XX方面的鼓励">感谢王总在产品战略方向上的清晰指导，帮助我更好地理解公司业务全局。
感谢王总在跨部门协调中的大力支持，为产品推进扫清了障碍。
感谢王总在团队管理方法上的分享，让我在带团队方面有了新的思路。</textarea></div></div>`;

  // 三个转
  h+=`<div class="sec-hd"><div class="sec-ic" style="background:var(--ac)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></div><span class="sec-name">拍三个转</span></div>`;
  h+=`<div class="tip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>每行一项，不少于三个</div>`;
  h+=`<div class="card"><div class="card-bd"><textarea class="field" placeholder="每行一项，至少填写3项&#10;如：&#10;1. 希望在XX方面有所改进&#10;2. 希望在XX方面有所突破&#10;3. 希望在XX方面有所成长">希望在需求优先级判断上更加果断，减少反复沟通的时间成本。
希望提升数据分析能力，用数据驱动产品决策而非仅凭经验。
希望加强对行业趋势的洞察，提升产品前瞻性规划能力。</textarea></div></div>`;

  // 下阶段规划
  h+=`<div class="sec-hd"><div class="sec-ic" style="background:var(--pr)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg></div><span class="sec-name">下阶段规划</span></div>`;
  h+=`<div class="tip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>请简要描述下一阶段工作目标和重点规划</div>`;
  h+=`<div class="card"><div class="card-bd"><textarea class="field" placeholder="请描述下阶段工作目标和计划…">Q3工作规划：
1. 继续推进绩效重构项目，完成考核活动管理模块上线
2. 深化AI应用场景，完成采购侧AI应用1.2版本迭代
3. 提升需求评审及时率至98%以上
4. 加强客户满意度管理，NPS评分提升至90+
5. 完成2名下属的季度IDP辅导和评估</textarea></div></div>`;

  // 需要的支持
  h+=`<div class="sec-hd"><div class="sec-ic" style="background:var(--vi)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><span class="sec-name">需要的支持</span></div>`;
  h+=`<div class="tip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>请说明希望上级给予的支持或资源</div>`;
  h+=`<div class="card"><div class="card-bd"><textarea class="field" placeholder="请描述需要的支持…">1. 希望上级在跨部门协调中继续提供支持，特别是与研发团队的资源协调
2. 希望获得更多行业交流机会，提升产品视野
3. 希望上级在绩效重构项目上给予更多指导和反馈</textarea></div></div>`;

  // 附件
  h+=`<div class="sec-hd"><div class="sec-ic" style="background:var(--c5)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></div><span class="sec-name">附件</span><span class="card-desc">可选</span></div>`;
  h+=`<div class="upload-zone" onclick="showToast('选择文件')"><div style="font:500 13px/1 var(--f);color:var(--c6)">点击上传附件</div><div style="font:400 11px/1 var(--f);color:var(--c4);margin-top:4px">支持 .doc .pdf .xlsx</div></div>`;

  // 审批流程
  h+=`<div class="sec-hd"><span class="sec-name">审批流程</span></div>`;
  h+=`<div class="card"><div class="card-bd">`;
  const flow=[
    {node:'员工填写',person:'张明',color:'var(--em)',status:'已完成',statusBg:'var(--em50)',statusColor:'var(--em700)'},
    {node:'上级审批',person:'王总监',color:'var(--pr)',status:'处理中',statusBg:'var(--pr50)',statusColor:'var(--pr)'},
    {node:'HRBP确认',person:'赵敏',color:'var(--c4)',status:'待处理',statusBg:'var(--c1)',statusColor:'var(--c5)'}
  ];
  flow.forEach(f=>{
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)">
      <div style="width:24px;height:24px;border-radius:50%;background:${f.color};display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div style="flex:1"><div style="font:500 12px/1 var(--f);color:var(--c8)">${f.node}</div><div style="font:400 11px/1 var(--f);color:var(--c5);margin-top:1px">${f.person}</div></div>
      <span style="font:500 10px/1 var(--f);padding:3px 8px;border-radius:var(--r1);background:${f.statusBg};color:${f.statusColor}">${f.status}</span>
    </div>`;
  });
  h+='</div></div>';

  h+='<div style="height:16px"></div>';
  el.innerHTML=h;
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';setTimeout(()=>{t.style.opacity='0';},2000);}

// AI
var AI_S={open:false,msgs:[{role:'bot',text:'👋 AI面谈助手\n\n• 帮你写面谈要点\n• 优化下阶段规划\n• 分析绩效趋势',time:'刚刚',shortcuts:true}]};
var AI_S_SHORTCUTS=[{icon:'💡',label:'帮我写面谈要点'},{icon:'📝',label:'优化下阶段规划'},{icon:'📊',label:'分析绩效趋势'}];
function toggleAI(){AI_S.open=!AI_S.open;document.getElementById('aiPanel').classList.toggle('open',AI_S.open);document.getElementById('aiOverlay').classList.toggle('open',AI_S.open);if(AI_S.open)renderAI();}
function closeAI(){AI_S.open=false;document.getElementById('aiPanel').classList.remove('open');document.getElementById('aiOverlay').classList.remove('open');}
function renderAI(){var bd=document.getElementById('aiBd');bd.innerHTML=AI_S.msgs.map(function(m){var h='<div class="ai-msg '+m.role+'"><div class="ai-msg-bd">'+m.text.replace(/\n/g,'<br/>')+'</div>';if(m.shortcuts){h+='<div class="ai-shortcuts">'+AI_S_SHORTCUTS.map(function(s){return '<div class="ai-shortcut" onclick="aiAction(\''+s.label+'\')"><span class="ai-shortcut-icon">'+s.icon+'</span><span class="ai-shortcut-label">'+s.label+'</span></div>';}).join('')+'</div>';}if(m.card){h+='<div class="ai-msg-card"><div class="ai-msg-card-t">'+m.card.t+'</div><div class="ai-msg-card-d">'+m.card.d+'</div><span class="ai-msg-card-tag" style="background:var(--em50);color:var(--em700)">'+m.card.tag+'</span></div>';}if(m.acts){h+='<div class="ai-msg-actions">'+m.acts.map(function(a){return '<button class="ai-msg-btn" onclick="aiAction(\''+a+'\')">'+a+'</button>';}).join('')+'</div>';}if(m.time){h+='<div class="ai-msg-time">'+m.time+'</div>';}return h+'</div>';}).join('');bd.scrollTop=bd.scrollHeight;}
function aiSend(){var inp=document.getElementById('aiInput');var t=inp.value.trim();if(!t)return;AI_S.msgs.push({role:'user',text:t});inp.value='';renderAI();setTimeout(function(){AI_S.msgs.push({role:'bot',text:'收到，正在分析…',time:'刚刚',acts:['帮我写面谈要点','优化下阶段规划','分析绩效趋势']});renderAI();},600);}
function aiAction(a){AI_S.msgs.push({role:'user',text:a});setTimeout(function(){if(a==='帮我写面谈要点'){AI_S.msgs.push({role:'bot',text:'💡 面谈要点：\n• Q2整体呈上升趋势，6月超出预期\n• 5月虽有波动但快速回升\n• 建议先肯定进步，再讨论5月波动原因',time:'刚刚',card:{t:'面谈要点',d:'Q2整体上升趋势',tag:'已生成'}});}else if(a==='优化下阶段规划'){AI_S.msgs.push({role:'bot',text:'📝 Q3规划建议：\n1. 绩效重构：完成考核活动管理模块\n2. AI应用：完成1.2版本迭代\n3. 评审及时率：提升至98%\n4. 客户满意度：NPS提升至90+',time:'刚刚',card:{t:'Q3规划',d:'4项建议已生成',tag:'AI推荐'}});}else if(a==='分析绩效趋势'){AI_S.msgs.push({role:'bot',text:'📊 趋势：\n• 4月3.82 → 5月3.70 → 6月3.95\n• 同比去年+10%，持续改善',time:'刚刚',card:{t:'趋势分析',d:'同比+10%',tag:'趋势向好'}});}else{AI_S.msgs.push({role:'bot',text:'收到，正在分析…',time:'刚刚'});}renderAI();},600);}

render();
</script>

<div class="ai-overlay" id="aiOverlay" onclick="closeAI()"></div>
<button class="ai-fab" onclick="toggleAI()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/><path d="M12 14v4"/><path d="M8 18h8"/><path d="M6 22h12"/></svg></button>
<div class="ai-panel" id="aiPanel">
  <div class="ai-hd">
    <div class="ai-hd-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/><path d="M12 14v4"/><path d="M8 18h8"/><path d="M6 22h12"/></svg></div>
    <div class="ai-hd-info"><div class="ai-hd-t">AI 面谈助手</div><div class="ai-hd-s">面谈引导 · 内容建议 · 趋势分析</div></div>
    <button class="ai-hd-close" onclick="closeAI()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="ai-bd" id="aiBd"></div>
  <div class="ai-ft">
    <input class="ai-input" id="aiInput" placeholder="输入指令…" onkeydown="if(event.key==='Enter')aiSend()">
    <button class="ai-send" onclick="aiSend()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
  </div>
</div>
