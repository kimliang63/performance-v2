<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR ONE - 员工目标制定</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#2563EB;--pr50:#F0F5FF;--pr100:#E0EAFF;--pr200:#C7D7FE;--pr700:#1D4ED8;
  --em:#10B981;--em50:#ECFDF5;--em700:#047857;
  --ac:#F59E0B;--ac50:#FFFBEB;
  --ro:#F43F5E;--ro50:#FFF1F2;
  --vi:#8B5CF6;--vi50:#F5F3FF;
  --c9:#0F172A;--c8:#1E293B;--c7:#334155;--c6:#475569;--c5:#64748B;--c4:#94A3B8;--c3:#CBD5E1;--c2:#E2E8F0;--c1:#F1F5F9;--c0:#F8FAFC;
  --sf:#FFF;--bg:#F0F4F8;--dv:#E2E8F0;
  --r1:10px;--r2:12px;--r3:14px;--r4:18px;
  --f:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
  --sx:0 1px 2px rgba(0,0,0,.04);--bd:rgba(15,23,42,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:#E5E7EB;color:var(--c7);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}
.phone{width:393px;height:852px;background:var(--bg);border-radius:48px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.05),inset 0 0 0 1px rgba(255,255,255,.1);overflow:hidden;position:relative;display:flex;flex-direction:column}
.phone-notch{width:126px;height:34px;background:#000;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:100}
.phone-status{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 8px;font:600 14px/1 var(--f);color:var(--c9)}
.phone-status-r{display:flex;gap:4px;align-items:center}
.phone-nav{height:50px;display:flex;align-items:center;padding:0 16px;gap:10px}
.phone-nav-back{width:32px;height:32px;border-radius:8px;background:var(--c1);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--c7);flex-shrink:0}
.phone-nav-back svg{width:16px;height:16px}
.phone-nav-t{flex:1;font:600 17px/1 var(--f);color:var(--c9)}
.phone-body{flex:1;overflow-y:auto;padding:0 16px}
.phone-body::-webkit-scrollbar{width:0}

/* Card */
.card{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);padding:14px 16px;margin-bottom:10px}
.card-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.card-title{font:600 13px/1 var(--f);color:var(--c8)}
.card-badge{font:500 10px/1 var(--f);padding:2px 6px;border-radius:4px}

/* Module */
.mod{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--bd);margin-bottom:8px;overflow:hidden}
.mod-hd{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:10px}
.mod-hd:active{background:var(--c0)}
.mod-ic{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font:600 11px/1 var(--f);color:#FFF}
.mod-info{flex:1}
.mod-name{font:600 13px/1 var(--f);color:var(--c8)}
.mod-meta{font:400 11px/1 var(--f);color:var(--c5);margin-top:2px}
.mod-chevron{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--c4);transition:transform .2s}
.mod-chevron.open{transform:rotate(180deg)}
.mod-chevron svg{width:12px;height:12px}
.mod-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.mod-body.open{max-height:3000px}

/* Goal Edit */
.goal{border-top:1px solid var(--dv);padding:12px 14px}
.goal:first-child{border-top:none}
.goal-hd{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.goal-name{flex:1;font:500 13px/1.3 var(--f);color:var(--c8)}
.goal-type{font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px}
.goal-type.quant{background:var(--pr50);color:var(--pr)}
.goal-type.qual{background:var(--em50);color:var(--em700)}
.goal-wt{font:500 11px/1 var(--fm);color:var(--c5)}
.goal-desc{font:400 12px/1.5 var(--f);color:var(--c6);margin-bottom:8px;padding:8px 10px;background:var(--c0);border-radius:6px}
.goal-fields{display:flex;flex-direction:column;gap:6px}
.goal-field{display:flex;align-items:center;gap:8px}
.goal-field-label{font:400 11px/1 var(--f);color:var(--c5);width:42px;flex-shrink:0}
.goal-field-input{flex:1;height:32px;border:1px solid var(--c2);border-radius:8px;padding:0 10px;font:500 13px/1 var(--fm);color:var(--c8);outline:none;background:var(--sf)}
.goal-field-input:focus{border-color:var(--pr)}
.goal-field-unit{font:400 11px/1 var(--f);color:var(--c4);flex-shrink:0}
.goal-textarea{width:100%;min-height:48px;border:1px solid var(--c2);border-radius:8px;padding:8px 10px;font:400 12px/1.4 var(--f);color:var(--c8);outline:none;resize:none;background:var(--sf)}
.goal-textarea:focus{border-color:var(--pr)}

/* Approval Flow */
.flow-node{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--dv)}
.flow-node:last-child{border-bottom:none}
.flow-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.flow-dot svg{width:12px;height:12px;color:#FFF}
.flow-info{flex:1}
.flow-name{font:500 12px/1 var(--f);color:var(--c8)}
.flow-person{font:400 11px/1 var(--f);color:var(--c5);margin-top:2px}
.flow-status{font:500 11px/1 var(--f);padding:2px 8px;border-radius:4px;flex-shrink:0}

/* Action Bar */
.action-bar{position:absolute;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--dv);display:flex;align-items:center;padding:12px 16px;gap:8px;padding-bottom:34px;z-index:10}
.btn{height:44px;border-radius:var(--r2);font:600 14px/1 var(--f);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s;flex:1}
.btn:active{transform:scale(.97)}
.btn-draft{background:var(--sf);color:var(--c7);border:1px solid var(--c2)}
.btn-submit{background:var(--pr);color:#FFF;box-shadow:0 2px 8px rgba(37,99,235,.25)}

.toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:var(--c9);color:#FFF;padding:10px 22px;border-radius:22px;font:500 13px/1 var(--f);z-index:900;opacity:0;pointer-events:none;transition:opacity .2s}



/* Add Goal Form */
.add-form{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sx);border:1px solid var(--pr200);margin-bottom:10px;overflow:hidden}
.add-form-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--dv)}
.add-form-title{font:600 13px/1 var(--f);color:var(--c8)}
.add-form-close{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:transparent;color:var(--c4)}
.add-form-close:hover{background:var(--c1);color:var(--c7)}
.add-form-bd{padding:12px 14px}
.add-field{margin-bottom:10px}
.add-field:last-child{margin-bottom:0}
.add-label{font:500 11px/1 var(--f);color:var(--c5);margin-bottom:5px;display:block}
.add-input{width:100%;height:34px;border:1px solid var(--c2);border-radius:8px;padding:0 10px;font:400 13px/1 var(--f);color:var(--c8);outline:none;background:var(--sf)}
.add-input:focus{border-color:var(--pr)}
.add-select{width:100%;height:34px;border:1px solid var(--c2);border-radius:8px;padding:0 24px 0 10px;font:500 12px/1 var(--f);color:var(--c8);background:var(--sf);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%2394A3B8' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center}
.add-textarea{width:100%;min-height:48px;border:1px solid var(--c2);border-radius:8px;padding:8px 10px;font:400 12px/1.4 var(--f);color:var(--c8);outline:none;resize:none;background:var(--sf)}
.add-textarea:focus{border-color:var(--pr)}
.add-row{display:flex;gap:8px}
.add-row .add-field{flex:1}
.add-type-btns{display:flex;gap:6px}
.add-type-btn{flex:1;height:32px;border-radius:8px;border:1px solid var(--c2);background:var(--sf);font:500 12px/1 var(--f);color:var(--c6);cursor:pointer;transition:all .12s}
.add-type-btn.active{border-color:var(--pr);background:var(--pr50);color:var(--pr)}
.add-form-actions{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--dv)}
.add-btn-cancel{flex:1;height:36px;border-radius:8px;border:1px solid var(--c2);background:var(--sf);font:500 13px/1 var(--f);color:var(--c6);cursor:pointer}
.add-btn-confirm{flex:1;height:36px;border-radius:8px;border:none;background:var(--pr);font:600 13px/1 var(--f);color:#FFF;cursor:pointer;box-shadow:0 2px 6px rgba(37,99,235,.2)}




/* ═══ MOBILE AI — 对齐 PC Agent 设计规范 ═══ */
.ai-panel{position:fixed;bottom:0;left:0;right:0;height:70%;background:var(--sf);border-radius:16px 16px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);z-index:9999;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.ai-panel.open{transform:translateY(0)}
.ai-hd{padding:14px 16px;border-bottom:1px solid var(--dv);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ai-hd-ic{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--pr),var(--vi));display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.ai-hd-ic svg{width:16px;height:16px}
.ai-hd-info{flex:1}
.ai-hd-t{font:600 14px/1.2 var(--f);color:var(--c9)}
.ai-hd-s{font:400 11px/1 var(--f);color:var(--c5)}
.ai-hd-close{width:28px;height:28px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--c5);cursor:pointer;flex-shrink:0}
.ai-hd-close:active{background:var(--c1)}
.ai-bd{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:88%;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ai-msg.bot{align-self:flex-start}
.ai-msg.user{align-self:flex-end}
.ai-msg-bd{padding:10px 14px;border-radius:var(--r3);font:400 13px/1.6 var(--f);word-break:break-word}
.ai-msg.bot .ai-msg-bd{background:var(--c0);color:var(--c8);border-bottom-left-radius:4px}
.ai-msg.user .ai-msg-bd{background:var(--pr);color:#fff;border-bottom-right-radius:4px}
.ai-msg-time{font:400 10px/1 var(--f);color:var(--c4);margin-top:4px}
.ai-msg.user .ai-msg-time{text-align:right}
.ai-msg-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ai-msg-btn{font:500 11px/1 var(--f);padding:5px 10px;border-radius:var(--r1);border:1px solid var(--c2);background:var(--sf);color:var(--c6);cursor:pointer;transition:all .12s}
.ai-msg-btn:active{border-color:var(--pr);color:var(--pr);background:var(--pr50)}
.ai-msg-card{background:var(--sf);border:1px solid var(--c2);border-radius:var(--r2);padding:12px;margin-top:8px}
.ai-msg-card-t{font:600 12px/1.3 var(--f);color:var(--c8);margin-bottom:6px}
.ai-msg-card-d{font:400 12px/1.5 var(--f);color:var(--c5)}
.ai-msg-card-ft{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.ai-msg-card-tag{display:inline-block;font:500 10px/1 var(--f);padding:2px 6px;border-radius:3px}
.ai-msg-card-tag.em{color:var(--em700);background:var(--em50)}
.ai-msg-card-tag.pr{color:var(--pr);background:var(--pr50)}
.ai-msg-card-tag.ac{color:var(--ac700);background:var(--ac50)}
.ai-shortcuts{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.ai-shortcut{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--sf);border:1px solid var(--c2);border-radius:var(--r2);cursor:pointer;transition:all .12s}
.ai-shortcut:active{border-color:var(--pr200);background:var(--pr50)}
.ai-shortcut-icon{font-size:18px;flex-shrink:0}
.ai-shortcut-text{flex:1;min-width:0}
.ai-shortcut-label{font:500 13px/1.2 var(--f);color:var(--c8)}
.ai-shortcut-desc{font:400 11px/1.3 var(--f);color:var(--c5);margin-top:2px}
.ai-ft{padding:12px 16px;border-top:1px solid var(--dv);display:flex;gap:8px;align-items:center;flex-shrink:0}
.ai-input{flex:1;height:36px;border:1px solid var(--c2);border-radius:var(--r2);padding:0 12px;font:400 13px/1 var(--f);color:var(--c8);outline:none;transition:border .15s}
.ai-input:focus{border-color:var(--pr)}
.ai-send{width:36px;height:36px;border-radius:var(--r2);background:var(--pr);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#FFF;transition:all .12s}
.ai-send:active{background:var(--pr700)}
.ai-fab{position:fixed;bottom:100px;right:calc(50% - 180px);width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--vi));border:none;box-shadow:0 4px 16px rgba(37,99,235,.35);display:flex;align-items:center;justify-content:center;z-index:960;transition:transform .2s}
.ai-fab:active{transform:scale(.92)}
.ai-fab svg{width:22px;height:22px;color:#FFF}
.ai-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9998;opacity:0;pointer-events:none;transition:opacity .25s}
.ai-overlay.open{opacity:1;pointer-events:all}

</style>
</head>
<body>

<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-status">
    <span>9:41</span>
    <div class="phone-status-r">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--c9)"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="1.5" width="3" height="10.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="none" stroke="var(--c9)" stroke-width="1.2"><rect x="0.5" y="0.5" width="12" height="11" rx="2"/><line x1="13" y1="4" x2="13" y2="8"/><rect x="2" y="2.5" width="7" height="7" rx="1" fill="var(--c9)"/></svg>
    </div>
  </div>
  <div class="phone-nav">
    <a href="../demo-index.html" class="phone-nav-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="phone-nav-t">目标制定</span>
  </div>
  <div class="phone-body" id="phoneBody"></div>
  <div class="action-bar">
    <button class="btn btn-draft" onclick="showToast('已保存草稿')">保存草稿</button>
    <button class="btn btn-submit" onclick="showToast('已提交审批')">提交审批</button>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
const EMPLOYEE={name:'张明',dept:'产品部',title:'高级产品经理',cycle:'2026年Q2'};

const MODULES=[
  {name:'关键指标',weight:30,color:'var(--pr)',goals:[
    {id:'g1',name:'资源利用率（通用）',type:'quant',weight:5,desc:'人员实际工作量饱和情况',target:105,challenge:110,baseline:100,unit:'%'},
    {id:'g2',name:'HRAS UAT用户验收首次通过率',type:'quant',weight:10,desc:'需求首次业务验收通过的概率',target:98,challenge:100,baseline:95,unit:'%'},
    {id:'g3',name:'HRAS需求评审及时率',type:'quant',weight:15,desc:'迭代版本评审的及时性情况',target:98,challenge:100,baseline:95,unit:'%'}
  ]},
  {name:'关键行动',weight:70,color:'var(--em)',goals:[
    {id:'g4',name:'HRAS产品管理规范',type:'qual',weight:10,desc:'需求管理流程规范、产品需求规范、迭代火车管理规范、周会/月会准时完成'},
    {id:'g5',name:'日常滚动需求响应',type:'qual',weight:10,desc:'根据业务日会需求优先级，滚动响应日常需求，输出产品解决方案'},
    {id:'g6',name:'HR ONE 绩效重构事项推进',type:'qual',weight:25,desc:'06-10 输出AI+绩效核心页面原型；06-19 完成绩效版本4需求内审；06-24 完成需求评审'},
    {id:'g7',name:'AI应用项目探索与落地推广',type:'qual',weight:25,desc:'06-05 完成ASSC采购侧AI应用1.0版本；06-12 对接LBU试点应用；06-26 完成1.1版本'}
  ]}
];

const APPROVAL=[
  {node:'员工提交',person:'张明',color:'var(--pr)',status:'当前',statusBg:'var(--pr50)',statusColor:'var(--pr)'},
  {node:'直线上级审批',person:'王总监',color:'var(--c4)',status:'待处理',statusBg:'var(--c1)',statusColor:'var(--c5)'},
  {node:'HRBP确认',person:'赵敏',color:'var(--c4)',status:'待处理',statusBg:'var(--c1)',statusColor:'var(--c5)'}
];

const goalValues={};
const openMods=new Set([0,1]);
let showAddForm=false;
let addForm={moduleIdx:0,name:'',type:'quant',weight:'',desc:'',target:'',challenge:'',baseline:'',unit:'%',measure:''};
let nextId=8;

function render(){
  const el=document.getElementById('phoneBody');
  let h='';

  // Employee info
  h+=`<div class="card" style="display:flex;align-items:center;gap:12px">
    <div style="width:36px;height:36px;border-radius:50%;background:var(--pr50);display:flex;align-items:center;justify-content:center;font:700 14px/1 var(--f);color:var(--pr)">${EMPLOYEE.name[0]}</div>
    <div style="flex:1"><div style="font:600 14px/1 var(--f);color:var(--c9)">${EMPLOYEE.name}</div><div style="font:400 11px/1 var(--f);color:var(--c5);margin-top:2px">${EMPLOYEE.title} · ${EMPLOYEE.dept}</div></div>
    <span style="font:600 11px/1 var(--f);color:var(--pr);background:var(--pr50);padding:4px 10px;border-radius:6px">${EMPLOYEE.cycle}</span>
  </div>`;

  // Summary
  const totalW=MODULES.reduce((s,m)=>s+m.weight,0);
  const totalGoals=MODULES.reduce((s,m)=>s+m.goals.length,0);
  h+=`<div style="display:flex;gap:8px;margin-bottom:12px">
    <div style="flex:1;background:var(--sf);border-radius:var(--r2);border:1px solid var(--bd);padding:10px;text-align:center">
      <div style="font:700 18px/1 var(--fm);color:var(--c9)">${totalGoals}</div>
      <div style="font:400 10px/1 var(--f);color:var(--c5);margin-top:2px">目标数</div>
    </div>
    <div style="flex:1;background:var(--sf);border-radius:var(--r2);border:1px solid var(--bd);padding:10px;text-align:center">
      <div style="font:700 18px/1 var(--fm);color:var(--pr)">${totalW}%</div>
      <div style="font:400 10px/1 var(--f);color:var(--c5);margin-top:2px">总权重</div>
    </div>
  </div>`;

  // Modules with editable goals
  MODULES.forEach((m,mi)=>{
    const goals=m.goals;
    const tw=goals.reduce((s,g)=>s+g.weight,0);
    const isOpen=openMods.has(mi);
    h+=`<div class="mod">
      <div class="mod-hd" onclick="toggleMod(${mi})">
        <div class="mod-ic" style="background:${m.color}">${m.name[0]}</div>
        <div class="mod-info"><div class="mod-name">${m.name}</div><div class="mod-meta">权重 ${m.weight}% · ${goals.length} 条</div></div>
        <div class="mod-chevron${isOpen?' open':''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
      </div>
      <div class="mod-body${isOpen?' open':''}">`;
    goals.forEach((g,gi)=>{
      const kv=goalValues[g.id]||{};
      h+=`<div class="goal">
        <div class="goal-hd">
          <span class="goal-name">${g.name}</span>
          <span class="goal-type ${g.type}">${g.type==='quant'?'定量':'定性'}</span>
          <span class="goal-wt">${g.weight}%</span>
        </div>
        <div class="goal-desc">${g.desc}</div>`;
      if(g.type==='quant'){
        h+=`<div class="goal-fields">
          <div class="goal-field"><span class="goal-field-label">挑战</span><input class="goal-field-input" type="number" value="${kv.challenge||g.challenge}" onchange="setVal('${g.id}','challenge',this.value)"><span class="goal-field-unit">${g.unit}</span></div>
          <div class="goal-field"><span class="goal-field-label">目标</span><input class="goal-field-input" type="number" value="${kv.target||g.target}" onchange="setVal('${g.id}','target',this.value)"><span class="goal-field-unit">${g.unit}</span></div>
          <div class="goal-field"><span class="goal-field-label">保底</span><input class="goal-field-input" type="number" value="${kv.baseline||g.baseline}" onchange="setVal('${g.id}','baseline',this.value)"><span class="goal-field-unit">${g.unit}</span></div>
        </div>`;
      }else{
        h+=`<textarea class="goal-textarea" placeholder="描述衡量标准和交付物…" onchange="setVal('${g.id}','measure',this.value)">${kv.measure||''}</textarea>`;
      }
      h+='</div>';
    });
    h+='</div></div>';
  });

  // Add goal
  if(showAddForm){
    h+=renderAddForm();
  }else{
    h+=`<div style="display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;background:var(--sf);border-radius:var(--r2);border:1.5px dashed var(--c2);font:500 13px/1 var(--f);color:var(--c5);cursor:pointer;margin-bottom:12px" onclick="openAddForm()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      添加新目标
    </div>`;
  }

  // Approval flow
  h+=`<div class="card">
    <div class="card-hd"><span class="card-title">审批流程</span></div>`;
  APPROVAL.forEach((a,i)=>{
    h+=`<div class="flow-node">
      <div class="flow-dot" style="background:${a.color}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="flow-info"><div class="flow-name">${a.node}</div><div class="flow-person">${a.person}</div></div>
      <span class="flow-status" style="background:${a.statusBg};color:${a.statusColor}">${a.status}</span>
    </div>`;
  });
  h+='</div>';

  h+='<div style="height:90px"></div>';
  el.innerHTML=h;
}

function setVal(id,key,val){goalValues[id]=goalValues[id]||{};goalValues[id][key]=val;}
function toggleMod(mi){if(openMods.has(mi))openMods.delete(mi);else openMods.add(mi);render();}

function openAddForm(){
  addForm={moduleIdx:0,name:'',type:'quant',weight:'',desc:'',target:'',challenge:'',baseline:'',unit:'%',measure:''};
  showAddForm=true;
  render();
  setTimeout(()=>{const el=document.getElementById('addName');if(el)el.focus();},100);
}
function closeAddForm(){showAddForm=false;render();}
function setAddField(k,v){addForm[k]=v;}
function setAddType(t){addForm.type=t;render();}

function confirmAdd(){
  if(!addForm.name.trim()){showToast('请输入目标名称');return;}
  if(!addForm.weight||isNaN(addForm.weight)||addForm.weight<=0){showToast('请输入有效权重');return;}
  var newGoal={id:'g'+(nextId++),name:addForm.name.trim(),type:addForm.type,weight:parseInt(addForm.weight),desc:addForm.desc.trim()};
  if(addForm.type==='quant'){
    newGoal.target=parseFloat(addForm.target)||0;
    newGoal.challenge=parseFloat(addForm.challenge)||0;
    newGoal.baseline=parseFloat(addForm.baseline)||0;
    newGoal.unit=addForm.unit||'%';
  }else{
    newGoal.measure=addForm.measure.trim()||'定性评分';
  }
  MODULES[addForm.moduleIdx].goals.push(newGoal);
  showAddForm=false;
  openMods.add(addForm.moduleIdx);
  render();
  showToast('已添加目标');
}

function renderAddForm(){
  var h='<div class="add-form">';
  h+='<div class="add-form-hd"><span class="add-form-title">添加新目标</span><button class="add-form-close" onclick="closeAddForm()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>';
  h+='<div class="add-form-bd">';
  // Module select
  h+='<div class="add-field"><label class="add-label">所属模块</label><select class="add-select" onchange="setAddField(\'moduleIdx\',parseInt(this.value))">';
  MODULES.forEach(function(m,i){h+='<option value="'+i+'"'+(addForm.moduleIdx===i?' selected':'')+'>'+m.name+' ('+m.weight+'%)</option>';});
  h+='</select></div>';
  // Name
  h+='<div class="add-field"><label class="add-label">目标名称</label><input class="add-input" id="addName" placeholder="如：HRAS产品管理规范" value="'+addForm.name+'" oninput="setAddField(\'name\',this.value)"></div>';
  // Type
  h+='<div class="add-field"><label class="add-label">指标类型</label><div class="add-type-btns"><button class="add-type-btn'+(addForm.type==='quant'?' active':'')+'" onclick="setAddType(\'quant\')">定量</button><button class="add-type-btn'+(addForm.type==='qual'?' active':'')+'" onclick="setAddType(\'qual\')">定性</button></div></div>';
  // Weight
  h+='<div class="add-field"><label class="add-label">权重 (%)</label><input class="add-input" type="number" placeholder="如 10" value="'+addForm.weight+'" oninput="setAddField(\'weight\',this.value)"></div>';
  // Desc
  h+='<div class="add-field"><label class="add-label">描述</label><textarea class="add-textarea" placeholder="指标定义、计算逻辑等…" oninput="setAddField(\'desc\',this.value)">'+addForm.desc+'</textarea></div>';
  // Type-specific fields
  if(addForm.type==='quant'){
    h+='<div class="add-row">';
    h+='<div class="add-field"><label class="add-label">挑战值</label><input class="add-input" type="number" placeholder="110" value="'+addForm.challenge+'" oninput="setAddField(\'challenge\',this.value)"></div>';
    h+='<div class="add-field"><label class="add-label">目标值</label><input class="add-input" type="number" placeholder="105" value="'+addForm.target+'" oninput="setAddField(\'target\',this.value)"></div>';
    h+='<div class="add-field"><label class="add-label">保底值</label><input class="add-input" type="number" placeholder="100" value="'+addForm.baseline+'" oninput="setAddField(\'baseline\',this.value)"></div>';
    h+='</div>';
    h+='<div class="add-field"><label class="add-label">单位</label><input class="add-input" placeholder="%" value="'+addForm.unit+'" oninput="setAddField(\'unit\',this.value)"></div>';
  }else{
    h+='<div class="add-field"><label class="add-label">衡量标准</label><textarea class="add-textarea" placeholder="描述衡量标准和交付物…" oninput="setAddField(\'measure\',this.value)">'+addForm.measure+'</textarea></div>';
  }
  h+='</div>';
  // Actions
  h+='<div class="add-form-actions"><button class="add-btn-cancel" onclick="closeAddForm()">取消</button><button class="add-btn-confirm" onclick="confirmAdd()">确认添加</button></div>';
  h+='</div>';
  return h;
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';setTimeout(()=>{t.style.opacity='0';},2000);}
render();

// ═══ MOBILE AI ═══
var AI_S={open:false,msgs:[{role:'bot',text:'👋 AI目标助手\n\n• 优化目标描述\n• 检查权重分配\n• 推荐关联指标',time:'刚刚',shortcuts:true}]};
var AI_S_SHORTCUTS=[
  {icon:'📝',label:'优化目标描述'},
  {icon:'⚖️',label:'检查权重分配'},
  {icon:'🎯',label:'推荐指标'}
];

function toggleAI(){AI_S.open=!AI_S.open;document.getElementById('aiPanel').classList.toggle('open',AI_S.open);document.getElementById('aiOverlay').classList.toggle('open',AI_S.open);if(AI_S.open)renderAI();}
function closeAI(){AI_S.open=false;document.getElementById('aiPanel').classList.remove('open');document.getElementById('aiOverlay').classList.remove('open');}

function renderAI(){
  var bd=document.getElementById('aiBd');
  bd.innerHTML=AI_S.msgs.map(function(m){
    var h='<div class="ai-msg '+m.role+'"><div class="ai-msg-bd">'+m.text.replace(/\n/g,'<br/>')+'</div>';
    if(m.shortcuts){h+='<div class="ai-shortcuts">'+AI_S_SHORTCUTS.map(function(s){return '<div class="ai-shortcut" onclick="aiAction(\''+s.label+'\')"><span class="ai-shortcut-icon">'+s.icon+'</span><span class="ai-shortcut-label">'+s.label+'</span></div>';}).join('')+'</div>';}
    if(m.card){h+='<div class="ai-msg-card"><div class="ai-msg-card-t">'+m.card.t+'</div><div class="ai-msg-card-d">'+m.card.d+'</div><span class="ai-msg-card-tag" style="background:var(--em50);color:var(--em700)">'+m.card.tag+'</span></div>';}
    if(m.acts){h+='<div class="ai-msg-actions">'+m.acts.map(function(a){return '<button class="ai-msg-btn" onclick="aiAction(\''+a+'\')">'+a+'</button>';}).join('')+'</div>';}
    if(m.time){h+='<div class="ai-msg-time">'+m.time+'</div>';}
    return h+'</div>';
  }).join('');
  bd.scrollTop=bd.scrollHeight;
}

function aiSend(){
  var inp=document.getElementById('aiInput');var t=inp.value.trim();if(!t)return;
  AI_S.msgs.push({role:'user',text:t});inp.value='';renderAI();
  setTimeout(function(){AI_S.msgs.push({role:'bot',text:'收到，正在分析…',time:'刚刚',acts:['优化目标描述','检查权重分配','推荐指标']});renderAI();},600);
}

function aiAction(a){
  AI_S.msgs.push({role:'user',text:a});
  setTimeout(function(){
    if(a==='优化目标描述'){AI_S.msgs.push({role:'bot',text:'📝 建议优化：\n• 补充具体任务清单\n• 明确完成标准\n• 细化交付时间点',time:'刚刚',card:{t:'优化建议',d:'为每个目标补充3要素',tag:'可应用'}});}
    else if(a==='检查权重分配'){AI_S.msgs.push({role:'bot',text:'⚖️ 权重分析：\n当前总权重 100%\n关键指标 30% · 关键行动 70%\n结构合理',time:'刚刚',card:{t:'权重检查',d:'总权重100%，分布合理',tag:'通过'}});}
    else if(a==='推荐指标'){AI_S.msgs.push({role:'bot',text:'🎯 推荐指标：\n• 需求交付周期（8%）\n• 产品上线准时率（5%）\n• 客户满意度（5%）',time:'刚刚',acts:['采纳全部']});}
    else{AI_S.msgs.push({role:'bot',text:'收到，正在分析…',time:'刚刚'});}
    renderAI();
  },600);
}
</script>



<!-- AI FAB + Panel -->
<div class="ai-overlay" id="aiOverlay" onclick="closeAI()"></div>
<button class="ai-fab" onclick="toggleAI()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/><path d="M12 14v4"/><path d="M8 18h8"/><path d="M6 22h12"/></svg></button>
<div class="ai-panel" id="aiPanel">
  <div class="ai-hd">
    <div class="ai-hd-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M18 14h.01"/><path d="M6 14h.01"/><path d="M12 14v4"/><path d="M8 18h8"/><path d="M6 22h12"/></svg></div>
    <div class="ai-hd-info"><div class="ai-hd-t">AI 目标助手</div><div class="ai-hd-s">优化目标 · 检查权重 · 推荐指标</div></div>
    <button class="ai-hd-close" onclick="closeAI()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="ai-bd" id="aiBd"></div>
  <div class="ai-ft">
    <input class="ai-input" id="aiInput" placeholder="输入指令…" onkeydown="if(event.key==='Enter')aiSend()">
    <button class="ai-send" onclick="aiSend()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
  </div>
</div>
